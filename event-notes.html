<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Team OS – Event Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    /* MLO-inspired clean design */
    body.light-mode {
      background-color: #ffffff;
      color: #333333;
    }
    
    body.light-mode .card {
      background-color: #ffffff !important;
      border: 1px solid #e0e0e0 !important;
      color: #333333;
      box-shadow: none !important;
    }
    
    body.light-mode .card-header {
      background-color: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      color: #333333;
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    /* Note Items - MLO Style */
    .note-item {
      padding: 8px 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 38px;
      background-color: #ffffff;
      cursor: pointer;
      position: relative;
    }
    
    .note-item:hover {
      background-color: #f8f9fa;
    }
    
    .note-item.done {
      opacity: 0.6;
    }
    
    .note-item.done .note-text {
      text-decoration: line-through;
      color: #999999;
    }
    
    /* WhatsApp Notes - Green Glow */
    .note-item.from-whatsapp {
      background: linear-gradient(90deg, rgba(37, 211, 102, 0.08) 0%, rgba(37, 211, 102, 0.02) 100%);
      border-left: 3px solid #25d366 !important;
      padding-left: 9px;
    }
    
    .note-item.from-whatsapp:hover {
      background: linear-gradient(90deg, rgba(37, 211, 102, 0.12) 0%, rgba(37, 211, 102, 0.03) 100%);
    }
    
    .note-item.from-whatsapp .whatsapp-indicator {
      color: #25d366;
      font-size: 0.75rem;
    }
    
    .note-text {
      color: #333333;
      font-size: 14px;
      flex: 1;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    
    .note-meta {
      color: #999999;
      font-size: 11px;
      white-space: nowrap;
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .note-checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    
    .activity-feed {
      max-height: 500px;
      overflow-y: auto;
      font-size: 0.85rem;
    }
    
    .activity-item {
      padding: 10px 12px;
      border-bottom: 1px solid #f0f0f0;
    }
    
    .activity-item .time {
      font-size: 0.7rem;
      color: #999999;
    }
    
    .activity-item.from-whatsapp {
      background: linear-gradient(90deg, rgba(37, 211, 102, 0.05) 0%, transparent 100%);
      border-left: 2px solid #25d366;
    }
    
    /* Minimal header */
    .page-header {
      padding: 16px 0;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 20px;
    }
    
    .page-title {
      font-size: 20px;
      font-weight: 600;
      color: #333333;
      margin: 0;
    }
    
    .page-subtitle {
      font-size: 13px;
      color: #999999;
      margin: 4px 0 0 0;
    }
    
    /* Clean buttons */
    .btn-clean {
      background: #ffffff;
      border: 1px solid #e0e0e0;
      color: #333333;
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    
    .btn-clean:hover {
      background: #f5f5f5;
      border-color: #d0d0d0;
    }
    
    .btn-primary-clean {
      background: #007bff;
      border: 1px solid #0056b3;
      color: #ffffff;
      padding: 6px 14px;
      font-size: 13px;
      border-radius: 4px;
    }
    
    .btn-primary-clean:hover {
      background: #0056b3;
    }
    
    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 2px;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 0;
    }
    
    .filter-tab {
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #666666;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    
    .filter-tab:hover {
      color: #333333;
      background: #f8f9fa;
    }
    
    .filter-tab.active {
      color: #007bff;
      border-bottom-color: #007bff;
      font-weight: 500;
    }
    
    /* Stats minimal */
    .stat-card {
      padding: 12px;
      text-align: center;
      border-right: 1px solid #f0f0f0;
    }
    
    .stat-card:last-child {
      border-right: none;
    }
    
    .stat-label {
      font-size: 11px;
      color: #999999;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #333333;
    }
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  
  <div class="rts-main container-fluid" style="max-width: 1400px;">
    <div class="page-header">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <h1 class="page-title">Notes & Tasks</h1>
          <div class="page-subtitle" id="pageSubtitle">
            <span id="currentListName">General shared notes - visible on all events</span>
          </div>
        </div>
        <div class="d-flex gap-2">
          <button class="btn-clean" id="btnSelectEvent">
            Select List
          </button>
          <button class="btn-primary-clean" id="btnAddNote">
            + Add Note
          </button>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <!-- Main Notes List -->
      <div class="col-lg-9">
        <!-- Filter Tabs -->
        <div class="filter-tabs">
          <button class="filter-tab active" data-filter="all">
            All <span id="countAll" style="color:#999;font-size:11px;">(0)</span>
          </button>
          <button class="filter-tab" data-filter="pending">
            Active <span id="countPending" style="color:#999;font-size:11px;">(0)</span>
          </button>
          <button class="filter-tab" data-filter="done">
            Done <span id="countDone" style="color:#999;font-size:11px;">(0)</span>
          </button>
        </div>

        <!-- Notes List -->
        <div class="card">
          <div class="card-body p-0">
            <div id="notesList">
              <div class="text-center py-5" style="color:#999;">
                <div style="font-size:2rem;margin-bottom:8px;">📝</div>
                <div style="font-size:14px;">No notes yet</div>
                <div style="font-size:12px;color:#ccc;">Click "Add Note" or send via WhatsApp</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="col-lg-3">
        <!-- Stats -->
        <div class="card mb-3">
          <div class="card-body p-0">
            <div class="d-flex">
              <div class="stat-card flex-fill">
                <div class="stat-label">Total</div>
                <div class="stat-value" id="statTotal">0</div>
              </div>
              <div class="stat-card flex-fill">
                <div class="stat-label">Active</div>
                <div class="stat-value" style="color:#ff9800;" id="statPending">0</div>
              </div>
            </div>
            <div class="d-flex">
              <div class="stat-card flex-fill">
                <div class="stat-label">Done</div>
                <div class="stat-value" style="color:#4caf50;" id="statDone">0</div>
              </div>
              <div class="stat-card flex-fill">
                <div class="stat-label">Progress</div>
                <div class="stat-value" style="color:#2196f3;font-size:18px;" id="statPercent">0%</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Activity Feed -->
        <div class="card">
          <div class="card-header d-flex justify-content-between align-items-center">
            <span>Recent Activity</span>
            <button class="btn btn-sm" style="padding:2px 8px;font-size:11px;border:1px solid #e0e0e0;background:#fff;" id="btnRefreshActivity">
              ↻
            </button>
          </div>
          <div class="card-body p-0">
            <div class="activity-feed" id="activityFeed">
              <div class="text-center py-3" style="color:#999;font-size:12px;">
                No activity yet
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Select Event/List Modal -->
  <div class="modal fade" id="selectEventModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content bg-light text-dark border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title">Select Event or List</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <button class="btn btn-primary w-100" id="btnCreateCustomList">
              ➕ Create New Custom List
            </button>
          </div>
          <div id="eventsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Note Modal -->
  <div class="modal fade" id="noteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content bg-light text-dark border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title">Add Note</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Note / Task / Reminder</label>
            <textarea class="form-control" id="noteText" rows="3" 
              placeholder="e.g., Remember to pack tire warmers, Check fuel levels, Confirm hotel booking..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Your Name (optional)</label>
            <input type="text" class="form-control" id="noteAuthor" 
              placeholder="e.g., Mike, Sarah...">
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="btnSaveNote">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Create Custom List Modal -->
  <div class="modal fade" id="createListModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content bg-light text-dark border-secondary">
        <div class="modal-header border-secondary">
          <h5 class="modal-title">Create Custom List</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">List Name <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="customListName" 
              placeholder="e.g., Pre-Season Checklist, Travel Essentials, Workshop Tasks...">
            <small class="text-muted">This will be your custom shared list accessible from any page</small>
          </div>
          <div class="mb-3">
            <label class="form-label">Description (optional)</label>
            <textarea class="form-control" id="customListDescription" rows="2" 
              placeholder="What is this list for?"></textarea>
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="btnSaveCustomList">Create List</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="topnav.js"></script>
  <script src="core.js"></script>
  <script src="event-notes.js"></script>
</body>
</html>
