<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Team OS – Notes & Tasks</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    /* MLO 3-Panel Layout */
    body.light-mode {
      background-color: #f5f5f5;
      color: #333333;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    
    .mlo-container {
      display: flex;
      height: calc(100vh - 60px);
      margin: 0;
      padding: 0;
    }
    
    /* LEFT SIDEBAR - Lists/Views */
    .mlo-sidebar-left {
      width: 200px;
      background: #ffffff;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .sidebar-header {
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      font-weight: 600;
      font-size: 12px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .sidebar-list {
      flex: 1;
      overflow-y: auto;
    }
    
    .sidebar-item {
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }
    
    .sidebar-item:hover {
      background: #f8f9fa;
    }
    
    .sidebar-item.active {
      background: #e3f2fd;
      border-left-color: #2196f3;
      color: #1976d2;
      font-weight: 500;
    }
    
    .sidebar-count {
      font-size: 11px;
      color: #999;
      background: #f0f0f0;
      padding: 2px 6px;
      border-radius: 10px;
    }
    
    /* CENTER PANEL - Task List */
    .mlo-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      overflow: hidden;
    }
    
    .mlo-toolbar {
      padding: 8px 12px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .mlo-toolbar button {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid #e0e0e0;
      background: #fff;
      border-radius: 3px;
      cursor: pointer;
    }
    
    .mlo-toolbar button:hover {
      background: #f5f5f5;
    }
    
    /* Column Headers */
    .task-header {
      display: grid;
      grid-template-columns: var(--col-widths, 30px 1fr 150px 100px 100px 120px);
      gap: 8px;
      padding: 6px 12px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      position: relative;
    }
    
    .task-header > div {
      position: relative;
    }
    
    .resize-handle {
      position: absolute;
      right: -4px;
      top: 0;
      bottom: 0;
      width: 8px;
      cursor: col-resize;
      user-select: none;
      z-index: 10;
    }
    
    .resize-handle:hover,
    .resize-handle.resizing {
      background: linear-gradient(90deg, transparent, #2196f3, transparent);
    }
    
    .task-list {
      flex: 1;
      overflow-y: auto;
    }
    
    /* Task Items */
    .task-item {
      display: grid;
      grid-template-columns: var(--col-widths, 30px 1fr 150px 100px 100px 120px);
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #f5f5f5;
      align-items: center;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    
    .task-item:hover {
      background: #f8f9fa;
    }
    
    .task-item.selected {
      background: #e3f2fd;
    }
    
    .task-item.done {
      opacity: 0.5;
    }
    
    .task-item.done .task-name {
      text-decoration: line-through;
      color: #999;
    }
    
    /* WhatsApp highlighting */
    .task-item.from-whatsapp {
      background: linear-gradient(90deg, rgba(37, 211, 102, 0.08) 0%, transparent 100%);
      border-left: 3px solid #25d366;
    }
    
    .task-item.from-whatsapp:hover {
      background: linear-gradient(90deg, rgba(37, 211, 102, 0.12) 0%, transparent 100%);
    }
    
    .task-checkbox {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    
    .task-name {
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .task-author {
      color: #666;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .task-tags {
      display: flex;
      gap: 4px;
      flex-wrap: nowrap;
    }
    
    .tag {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    
    .tag-whatsapp { background: #e8f5e9; color: #2e7d32; }
    .tag-urgent { background: #ffebee; color: #c62828; }
    .tag-manual { background: #e3f2fd; color: #1976d2; }
    
    .task-status {
      color: #666;
      font-size: 12px;
    }
    
    .task-date {
      color: #666;
      font-size: 12px;
    }
    
    .task-date.overdue {
      color: #d32f2f;
      font-weight: 500;
    }
    
    /* RIGHT SIDEBAR - Task Details */
    .mlo-sidebar-right {
      width: 320px;
      background: #ffffff;
      border-left: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .detail-header {
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
      font-weight: 600;
      font-size: 14px;
    }
    
    .detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .detail-field {
      margin-bottom: 16px;
    }
    
    .detail-label {
      font-size: 11px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    
    .detail-value {
      font-size: 13px;
      color: #333;
    }
    
    .detail-input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      font-size: 13px;
    }
    
    .detail-textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
      font-size: 13px;
      min-height: 80px;
      resize: vertical;
    }
    
    .detail-button {
      padding: 6px 12px;
      font-size: 12px;
      border: 1px solid #e0e0e0;
      background: #fff;
      border-radius: 3px;
      cursor: pointer;
    }
    
    .detail-button:hover {
      background: #f5f5f5;
    }
    
    .detail-button-primary {
      background: #2196f3;
      color: #fff;
      border-color: #1976d2;
    }
    
    .detail-button-primary:hover {
      background: #1976d2;
    }
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  
  <!-- MLO-Style 3-Panel Layout -->
  <div class="mlo-container">
    <!-- LEFT SIDEBAR - Lists/Views -->
    <div class="mlo-sidebar-left">
      <div class="sidebar-header">Views</div>
      <div class="sidebar-list" id="sidebarLists">
        <div class="sidebar-item active" data-view="all" onclick="window.switchView('all')">
          <span>📋 All Tasks</span>
          <span class="sidebar-count" id="countAll">0</span>
        </div>
        <div class="sidebar-item" data-view="pending" onclick="window.switchView('pending')">
          <span>⭕ Active</span>
          <span class="sidebar-count" id="countPending">0</span>
        </div>
        <div class="sidebar-item" data-view="done" onclick="window.switchView('done')">
          <span>✅ Done</span>
          <span class="sidebar-count" id="countDone">0</span>
        </div>
        <div class="sidebar-item" data-view="whatsapp" onclick="window.switchView('whatsapp')">
          <span>📱 WhatsApp</span>
          <span class="sidebar-count" id="countWhatsApp">0</span>
        </div>
        <div style="height:1px;background:#e0e0e0;margin:8px 0;"></div>
        <div class="sidebar-item" data-view="all-lists" onclick="window.showAllLists()">
          <span>🗂️ All Lists</span>
        </div>
        <div style="height:1px;background:#e0e0e0;margin:8px 0;"></div>
        <div class="sidebar-header" style="border:none;padding:12px 12px 4px;">Lists</div>
        <div id="dynamicLists"></div>
      </div>
    </div>

    <!-- CENTER PANEL - Task List -->
    <div class="mlo-main">
      <!-- Toolbar -->
      <div class="mlo-toolbar">
        <button onclick="window.showAddTaskModal()">➕ New Task</button>
        <button onclick="window.showListSelector()">📂 Switch List</button>
        <button onclick="window.showCalendarView()" title="Calendar View">📅</button>
        <div style="flex:1"></div>
        <span style="font-size:12px;color:#666;" id="currentListLabel">GENERAL LIST</span>
      </div>

      <!-- Column Headers -->
      <div class="task-header" id="taskHeader">
        <div></div>
        <div>Task<span class="resize-handle" data-col="1"></span></div>
        <div>Author<span class="resize-handle" data-col="2"></span></div>
        <div>Tags<span class="resize-handle" data-col="3"></span></div>
        <div>Status<span class="resize-handle" data-col="4"></span></div>
        <div>Due Date</div>
      </div>

      <!-- Task List -->
      <div class="task-list" id="taskList">
        <div class="text-center py-5" style="color:#999;">
          <div style="font-size:2rem;margin-bottom:8px;">📝</div>
          <div style="font-size:14px;">No tasks yet</div>
          <div style="font-size:12px;color:#ccc;">Click "New Task" or send via WhatsApp</div>
        </div>
      </div>
    </div>

    <!-- RIGHT SIDEBAR - Task Details -->
    <div class="mlo-sidebar-right">
      <div class="detail-header" id="detailHeader">Task Details</div>
      <div class="detail-content" id="detailContent">
        <div style="text-align:center;padding:40px 20px;color:#999;font-size:13px;">
          Select a task to view details
        </div>
      </div>
    </div>
  </div>

  <!-- Modals kept from original for compatibility -->
  <div class="modal fade" id="selectEventModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Switch List</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="eventsList">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="noteModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Task</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Add to List</label>
            <select class="form-control" id="noteListSelect">
              <option value="">Select list...</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Task</label>
            <textarea class="form-control" id="noteText" rows="3" placeholder="Enter task description..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Your Name (optional)</label>
            <input type="text" class="form-control" id="noteAuthor" placeholder="Who's adding this?">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="window.saveNote()">Add Task</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal fade" id="createListModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Create Custom List</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">List Name</label>
            <input type="text" class="form-control" id="customListName" placeholder="e.g., Pre-Race Checklist">
          </div>
          <div class="mb-3">
            <label class="form-label">Description (optional)</label>
            <textarea class="form-control" id="customListDescription" rows="2" placeholder="What is this list for?"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="window.saveCustomList()">Create List</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script src="event-notes.js"></script>
</body>
</html>
