<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Benchmarking</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css?v=20260420">
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); min-height:100vh; }
    .rts-main { padding:1.5rem; }
    .ev-stats-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .ev-stat-card { background:#fff; border-radius:10px; padding:1rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.08); min-width:130px; border-top:4px solid #06b6d4; }
    .ev-stat-label { font-size:.72rem; text-transform:uppercase; color:#6b7280; font-weight:600; letter-spacing:.05em; }
    .ev-stat-value { font-size:1.8rem; font-weight:800; color:#1f2937; line-height:1.1; }

    .filter-bar { background:#fff; border-radius:10px; padding:.9rem 1.25rem; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:1.25rem; display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }

    .table-wrapper { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }
    .table { margin:0; }
    .table thead th { background:#06b6d4; color:#fff; font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; border:none; padding:.7rem 1rem; white-space:nowrap; }
    .table tbody tr.data-row { cursor:pointer; transition:background .15s; }
    .table tbody tr.data-row:hover { background:#ecfeff; }
    .table tbody tr.data-row.selected { background:#cffafe !important; }
    .table tbody td { padding:.6rem 1rem; vertical-align:middle; font-size:.875rem; border-color:#f3f4f6; }

    tr.detail-strip td { background:#f0fdff; border-top:none; padding:1.1rem 1.25rem; }
    .detail-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:.75rem; }
    .detail-item { font-size:.82rem; }
    .detail-item span { font-weight:600; color:#1f2937; }
    .detail-item label { display:block; font-size:.7rem; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:.1rem; }

    .delta-neg { color:#16a34a; font-weight:700; }
    .delta-pos { color:#dc2626; font-weight:700; }
    .delta-zero { color:#6b7280; }

    .page-title { font-weight:800; color:#06b6d4; letter-spacing:-.01em; }
  </style>
</head>
<body>
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="page-title mb-0">Benchmarking</h2>
    <button class="btn btn-sm fw-semibold" style="background:#06b6d4;color:#fff;padding:.4rem 1rem" onclick="openModal()">+ Add Entry</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Sessions Ahead</div><div class="ev-stat-value" id="kpiAhead">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Sessions Behind</div><div class="ev-stat-value" id="kpiBehind">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Avg Delta (s)</div><div class="ev-stat-value" id="kpiAvgDelta">—</div></div>
  </div>

  <div class="filter-bar">
    <div>
      <label class="form-label small fw-semibold mb-1">Session</label>
      <select class="form-select form-select-sm" id="filterSession" onchange="applyFilters()" style="min-width:180px">
        <option value="">All Sessions</option>
      </select>
    </div>
    <div>
      <label class="form-label small fw-semibold mb-1">Car #</label>
      <select class="form-select form-select-sm" id="filterCar" onchange="applyFilters()" style="min-width:120px">
        <option value="">All Cars</option>
      </select>
    </div>
    <div class="ms-auto d-flex align-items-end">
      <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="table" id="mainTable">
      <thead>
        <tr>
          <th>Session</th>
          <th>Car #</th>
          <th>Driver</th>
          <th>Competitor</th>
          <th>Our Best</th>
          <th>Comp. Best</th>
          <th>Delta (s)</th>
          <th>S1 Δ</th>
          <th>S2 Δ</th>
          <th>S3 Δ</th>
          <th style="width:40px"></th>
        </tr>
      </thead>
      <tbody id="mainTbody">
        <tr><td colspan="11" class="text-center text-muted py-5">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="benchModal" tabindex="-1" aria-labelledby="benchModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:#06b6d4">
        <h5 class="modal-title text-white fw-bold" id="benchModalTitle">Add Benchmark</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="benchForm" onsubmit="return false">
          <input type="hidden" id="fId">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Event ID</label>
              <input type="text" class="form-control" id="fEventId" placeholder="e.g. EVT-001">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Session Name</label>
              <input type="text" class="form-control" id="fSessionName" placeholder="e.g. FP1">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Car #</label>
              <input type="text" class="form-control" id="fCarNumber">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Driver Name</label>
              <input type="text" class="form-control" id="fDriverName">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Competitor Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fCompetitorName" required>
            </div>
            <div class="col-12">
              <p class="text-muted small fw-semibold mb-0 mt-1">Lap Times</p>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Our Best Lap</label>
              <input type="text" class="form-control" id="fOurBestLap" placeholder="1:23.456">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Competitor Best Lap</label>
              <input type="text" class="form-control" id="fCompetitorBestLap" placeholder="1:23.456">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Delta (s)</label>
              <input type="number" class="form-control" id="fDeltaSeconds" step="0.001" placeholder="-0.123">
            </div>
            <div class="col-12">
              <p class="text-muted small fw-semibold mb-0 mt-1">Sector Deltas (s)</p>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Sector 1 Delta</label>
              <input type="number" class="form-control" id="fSector1Delta" step="0.001">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Sector 2 Delta</label>
              <input type="number" class="form-control" id="fSector2Delta" step="0.001">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Sector 3 Delta</label>
              <input type="number" class="form-control" id="fSector3Delta" step="0.001">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notes</label>
              <textarea class="form-control" id="fNotes" rows="3"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm d-none me-auto" id="btnDelete" onclick="deleteRecord()">Delete</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#06b6d4;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="core.js?v=20260420"></script>
<script src="topnav.js?v=20260420"></script>
<script>
let allData    = [];
let selectedId = null;
let bsModal;

window.addEventListener('DOMContentLoaded', () => {
  bsModal = new bootstrap.Modal(document.getElementById('benchModal'));
  loadData();
});

async function loadData() {
  try {
    const res = await fetch('/api/benchmarking');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) { allData = []; }
  populateFilters();
  updateKPIs();
  applyFilters();
}

function populateFilters() {
  const sessions = [...new Set(allData.map(r => r.session_name).filter(Boolean))].sort();
  const cars     = [...new Set(allData.map(r => r.car_number).filter(Boolean))].sort();
  const fSess = document.getElementById('filterSession');
  const curSess = fSess.value;
  fSess.innerHTML = '<option value="">All Sessions</option>' + sessions.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
  fSess.value = curSess;
  const fCar = document.getElementById('filterCar');
  const curCar = fCar.value;
  fCar.innerHTML = '<option value="">All Cars</option>' + cars.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  fCar.value = curCar;
}

function updateKPIs() {
  const withDelta = allData.filter(r => r.delta_seconds != null);
  const ahead  = allData.filter(r => r.delta_seconds != null && r.delta_seconds < 0).length;
  const behind = allData.filter(r => r.delta_seconds != null && r.delta_seconds > 0).length;
  const avg    = withDelta.length ? (withDelta.reduce((s,r) => s + Number(r.delta_seconds), 0) / withDelta.length) : null;
  document.getElementById('kpiTotal').textContent    = allData.length;
  document.getElementById('kpiAhead').textContent    = ahead;
  document.getElementById('kpiBehind').textContent   = behind;
  document.getElementById('kpiAvgDelta').textContent = avg != null ? avg.toFixed(3) : '—';
}

function applyFilters() {
  const sess = document.getElementById('filterSession').value;
  const car  = document.getElementById('filterCar').value;
  const filtered = allData.filter(r =>
    (!sess || r.session_name === sess) &&
    (!car  || r.car_number   === car)
  );
  renderTable(filtered);
}

function clearFilters() {
  document.getElementById('filterSession').value = '';
  document.getElementById('filterCar').value     = '';
  applyFilters();
}

function deltaClass(v) {
  if (v == null) return 'delta-zero';
  return Number(v) < 0 ? 'delta-neg' : Number(v) > 0 ? 'delta-pos' : 'delta-zero';
}

function fmtDelta(v) {
  if (v == null) return '—';
  const n = Number(v);
  return (n > 0 ? '+' : '') + n.toFixed(3);
}

function renderTable(data) {
  const tbody = document.getElementById('mainTbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="11" class="text-center text-muted py-5">No records found</td></tr>';
    return;
  }
  const rows = [];
  data.forEach(r => {
    const isSel = selectedId === r.id;
    rows.push(`
      <tr class="data-row ${isSel ? 'selected' : ''}" onclick="toggleDetail(${r.id})">
        <td class="fw-semibold">${esc(r.session_name)}</td>
        <td>${esc(r.car_number)}</td>
        <td>${esc(r.driver_name)}</td>
        <td>${esc(r.competitor_name)}</td>
        <td>${esc(r.our_best_lap)}</td>
        <td>${esc(r.competitor_best_lap)}</td>
        <td class="${deltaClass(r.delta_seconds)}">${fmtDelta(r.delta_seconds)}</td>
        <td class="${deltaClass(r.sector_1_delta)}">${fmtDelta(r.sector_1_delta)}</td>
        <td class="${deltaClass(r.sector_2_delta)}">${fmtDelta(r.sector_2_delta)}</td>
        <td class="${deltaClass(r.sector_3_delta)}">${fmtDelta(r.sector_3_delta)}</td>
        <td><button class="btn btn-sm btn-outline-secondary py-0 px-1" style="font-size:.7rem" onclick="event.stopPropagation();openModal(${r.id})">Edit</button></td>
      </tr>`);
    if (isSel) {
      rows.push(`
        <tr class="detail-strip">
          <td colspan="11">
            <div class="d-flex justify-content-between align-items-start mb-2">
              <strong style="color:#0891b2">Detail — ${esc(r.competitor_name)}</strong>
              <button class="btn btn-xs btn-sm btn-outline-secondary py-0 px-2" style="font-size:.7rem" onclick="openModal(${r.id})">Edit</button>
            </div>
            <div class="detail-grid">
              <div class="detail-item"><label>Event ID</label><span>${esc(r.event_id)}</span></div>
              <div class="detail-item"><label>Session</label><span>${esc(r.session_name)}</span></div>
              <div class="detail-item"><label>Car #</label><span>${esc(r.car_number)}</span></div>
              <div class="detail-item"><label>Driver</label><span>${esc(r.driver_name)}</span></div>
              <div class="detail-item"><label>Competitor</label><span>${esc(r.competitor_name)}</span></div>
              <div class="detail-item"><label>Our Best Lap</label><span>${esc(r.our_best_lap)}</span></div>
              <div class="detail-item"><label>Comp. Best Lap</label><span>${esc(r.competitor_best_lap)}</span></div>
              <div class="detail-item"><label>Delta (s)</label><span class="${deltaClass(r.delta_seconds)}">${fmtDelta(r.delta_seconds)}</span></div>
              <div class="detail-item"><label>S1 Delta</label><span class="${deltaClass(r.sector_1_delta)}">${fmtDelta(r.sector_1_delta)}</span></div>
              <div class="detail-item"><label>S2 Delta</label><span class="${deltaClass(r.sector_2_delta)}">${fmtDelta(r.sector_2_delta)}</span></div>
              <div class="detail-item"><label>S3 Delta</label><span class="${deltaClass(r.sector_3_delta)}">${fmtDelta(r.sector_3_delta)}</span></div>
            </div>
            ${r.notes ? `<div class="mt-2 text-muted small"><strong>Notes:</strong> ${esc(r.notes)}</div>` : ''}
          </td>
        </tr>`);
    }
  });
  tbody.innerHTML = rows.join('');
}

function toggleDetail(id) {
  selectedId = (selectedId === id) ? null : id;
  applyFilters();
}

function esc(v) { return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'; }
function numOrNull(id) { const v = document.getElementById(id).value; return v !== '' ? Number(v) : null; }

function openModal(id = null) {
  const rec = id ? allData.find(r => r.id === id) : null;
  document.getElementById('benchModalTitle').textContent = rec ? 'Edit Benchmark' : 'Add Benchmark';
  document.getElementById('btnDelete').classList.toggle('d-none', !rec);
  document.getElementById('fId').value               = rec ? rec.id : '';
  document.getElementById('fEventId').value          = rec ? (rec.event_id            || '') : '';
  document.getElementById('fSessionName').value      = rec ? (rec.session_name        || '') : '';
  document.getElementById('fCarNumber').value        = rec ? (rec.car_number          || '') : '';
  document.getElementById('fDriverName').value       = rec ? (rec.driver_name         || '') : '';
  document.getElementById('fCompetitorName').value   = rec ? (rec.competitor_name     || '') : '';
  document.getElementById('fOurBestLap').value       = rec ? (rec.our_best_lap        || '') : '';
  document.getElementById('fCompetitorBestLap').value= rec ? (rec.competitor_best_lap || '') : '';
  document.getElementById('fDeltaSeconds').value     = rec ? (rec.delta_seconds    ?? '') : '';
  document.getElementById('fSector1Delta').value     = rec ? (rec.sector_1_delta   ?? '') : '';
  document.getElementById('fSector2Delta').value     = rec ? (rec.sector_2_delta   ?? '') : '';
  document.getElementById('fSector3Delta').value     = rec ? (rec.sector_3_delta   ?? '') : '';
  document.getElementById('fNotes').value            = rec ? (rec.notes              || '') : '';
  bsModal.show();
}

async function saveRecord() {
  const payload = {
    event_id            : document.getElementById('fEventId').value.trim(),
    session_name        : document.getElementById('fSessionName').value.trim(),
    car_number          : document.getElementById('fCarNumber').value.trim(),
    driver_name         : document.getElementById('fDriverName').value.trim(),
    competitor_name     : document.getElementById('fCompetitorName').value.trim(),
    our_best_lap        : document.getElementById('fOurBestLap').value.trim(),
    competitor_best_lap : document.getElementById('fCompetitorBestLap').value.trim(),
    delta_seconds       : numOrNull('fDeltaSeconds'),
    sector_1_delta      : numOrNull('fSector1Delta'),
    sector_2_delta      : numOrNull('fSector2Delta'),
    sector_3_delta      : numOrNull('fSector3Delta'),
    notes               : document.getElementById('fNotes').value.trim()
  };
  if (!payload.competitor_name) { alert('Competitor Name is required'); return; }
  const id = document.getElementById('fId').value;
  try {
    const res = await fetch(id ? `/api/benchmarking/${id}` : '/api/benchmarking', {
      method : id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    await loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Delete this benchmark entry?')) return;
  try {
    const res = await fetch(`/api/benchmarking/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    selectedId = null;
    await loadData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}
</script>
</body>
</html>
