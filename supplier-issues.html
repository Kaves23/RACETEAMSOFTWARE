<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Supplier Issues</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 18px;min-width:120px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .ev-stat-value{font-size:1.6rem;font-weight:700;color:#1a1d24;}
    /* Kanban */
    .kanban-board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;min-height:calc(100vh - 280px);}
    .kanban-col{background:#f3f4f6;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
    .kanban-col-hdr{padding:10px 12px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;display:flex;justify-content:space-between;align-items:center;}
    .kanban-col-hdr.col-open{background:#fce7f3;color:#be185d;}
    .kanban-col-hdr.col-in_progress{background:#dbeafe;color:#1d4ed8;}
    .kanban-col-hdr.col-resolved{background:#d1fae5;color:#065f46;}
    .kanban-col-hdr.col-escalated{background:#fee2e2;color:#991b1b;}
    .kanban-cards{padding:8px;display:flex;flex-direction:column;gap:8px;overflow-y:auto;flex:1;}
    .issue-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 12px;cursor:pointer;transition:box-shadow .15s,transform .1s;}
    .issue-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-1px);}
    .issue-card .card-title{font-weight:700;font-size:.83rem;margin-bottom:4px;color:#1a1d24;}
    .issue-card .card-supplier{font-size:.75rem;color:#6b7280;margin-bottom:6px;}
    .issue-card .card-raised{font-size:.72rem;color:#9ca3af;margin-top:6px;}
    .issue-card .badges{display:flex;gap:4px;flex-wrap:wrap;}
    .kanban-empty{text-align:center;padding:24px 12px;color:#9ca3af;font-size:.78rem;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Supplier Issues</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Track and resolve supplier quality, delivery and communication issues</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#f43f5e;border-color:#f43f5e;">+ New Issue</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #f43f5e;"><div class="ev-stat-label">Open</div><div class="ev-stat-value" id="kpiOpen">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #ef4444;"><div class="ev-stat-label">Critical</div><div class="ev-stat-value" id="kpiCritical">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #10b981;"><div class="ev-stat-label">Resolved</div><div class="ev-stat-value" id="kpiResolved">—</div></div>
  </div>

  <div class="kanban-board" id="kanbanBoard"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="issueModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:#f43f5e;color:#fff;">
        <h5 class="modal-title" id="modalTitle">New Issue</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="issueForm" class="row g-3" onsubmit="return false">
          <div class="col-md-6"><label class="form-label small fw-semibold">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Supplier Name *</label><input class="form-control form-control-sm" id="fSupplierName"/></div>
          <div class="col-12"><label class="form-label small fw-semibold">Issue Title *</label><input class="form-control form-control-sm" id="fIssueTitle"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Issue Type</label>
            <select class="form-select form-select-sm" id="fIssueType">
              <option value="quality">Quality</option><option value="delivery">Delivery</option>
              <option value="pricing">Pricing</option><option value="communication">Communication</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Severity</label>
            <select class="form-select form-select-sm" id="fSeverity">
              <option value="low">Low</option><option value="medium">Medium</option>
              <option value="high">High</option><option value="critical">Critical</option>
            </select>
          </div>
          <div class="col-12"><label class="form-label small fw-semibold">Description</label><textarea class="form-control form-control-sm" id="fDescription" rows="3"></textarea></div>
          <div class="col-12"><label class="form-label small fw-semibold">Impact</label><textarea class="form-control form-control-sm" id="fImpact" rows="2"></textarea></div>
          <div class="col-12"><label class="form-label small fw-semibold">Resolution</label><textarea class="form-control form-control-sm" id="fResolution" rows="2"></textarea></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Status</label>
            <select class="form-select form-select-sm" id="fStatus">
              <option value="open">Open</option><option value="in_progress">In Progress</option>
              <option value="resolved">Resolved</option><option value="escalated">Escalated</option>
            </select>
          </div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Raised By</label><input class="form-control form-control-sm" id="fRaisedBy"/></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-danger me-auto" id="btnDel" style="display:none;">Delete</button>
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm text-white" id="btnSave" style="background:#f43f5e;border-color:#f43f5e;">Save Issue</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/supplier-issues';
let all=[],sel=null;
const modal=new bootstrap.Modal(document.getElementById('issueModal'));
const gv=id=>(document.getElementById(id)||{}).value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};

const TYPE_BADGE={quality:'primary',delivery:'warning text-dark',pricing:'success',communication:'info text-dark',other:'secondary'};
const SEV_BADGE={critical:'danger',high:'warning text-dark',medium:'warning',low:'success'};
const COLS=[
  {key:'open',label:'Open'},
  {key:'in_progress',label:'In Progress'},
  {key:'resolved',label:'Resolved'},
  {key:'escalated',label:'Escalated'}
];

async function load(){
  try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();renderKanban();}
  catch(e){console.error(e);}
}

function updateKPIs(){
  document.getElementById('kpiTotal').textContent=all.length;
  document.getElementById('kpiOpen').textContent=all.filter(x=>x.status==='open').length;
  document.getElementById('kpiCritical').textContent=all.filter(x=>x.severity==='critical').length;
  document.getElementById('kpiResolved').textContent=all.filter(x=>x.status==='resolved').length;
}

function renderKanban(){
  const board=document.getElementById('kanbanBoard');
  board.innerHTML=COLS.map(col=>{
    const items=all.filter(x=>x.status===col.key);
    return`<div class="kanban-col">
      <div class="kanban-col-hdr col-${col.key}">
        <span>${col.label}</span>
        <span class="badge rounded-pill bg-white" style="color:#374151;">${items.length}</span>
      </div>
      <div class="kanban-cards">
        ${items.length?items.map(item=>`
          <div class="issue-card" data-id="${item.id}">
            <div class="card-title">${item.issue_title||'Untitled'}</div>
            <div class="card-supplier"><i class="bi bi-building me-1"></i>${item.supplier_name||'—'}</div>
            <div class="badges">
              <span class="badge bg-${TYPE_BADGE[item.issue_type]||'secondary'}">${item.issue_type||'—'}</span>
              <span class="badge bg-${SEV_BADGE[item.severity]||'secondary'}">${item.severity||'—'}</span>
            </div>
            <div class="card-raised">Raised by: ${item.raised_by||'—'}</div>
          </div>`).join('')
          :'<div class="kanban-empty"><i class="bi bi-check-circle" style="font-size:1.5rem;display:block;margin-bottom:4px;"></i>Nothing here</div>'}
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('.issue-card[data-id]').forEach(card=>card.onclick=()=>{
    const item=all.find(x=>String(x.id)===card.dataset.id);if(item)openEdit(item);
  });
}

function openNew(){
  sel=null;document.getElementById('issueForm').reset();
  sv('fIssueType','quality');sv('fSeverity','medium');sv('fStatus','open');
  document.getElementById('modalTitle').textContent='New Issue';
  document.getElementById('btnDel').style.display='none';modal.show();
}

function openEdit(item){
  sel=item;document.getElementById('modalTitle').textContent='Edit Issue: '+item.issue_title;
  document.getElementById('btnDel').style.display='';
  sv('fSupplierId',item.supplier_id);sv('fSupplierName',item.supplier_name);
  sv('fIssueTitle',item.issue_title);sv('fIssueType',item.issue_type||'quality');
  sv('fDescription',item.description);sv('fImpact',item.impact);sv('fResolution',item.resolution);
  sv('fSeverity',item.severity||'medium');sv('fStatus',item.status||'open');sv('fRaisedBy',item.raised_by);
  modal.show();
}

async function save(){
  const body={supplier_id:gv('fSupplierId')||null,supplier_name:gv('fSupplierName'),
    issue_title:gv('fIssueTitle'),issue_type:gv('fIssueType')||'quality',
    description:gv('fDescription'),impact:gv('fImpact'),resolution:gv('fResolution'),
    severity:gv('fSeverity')||'medium',status:gv('fStatus')||'open',raised_by:gv('fRaisedBy')};
  if(!body.supplier_name||!body.issue_title){alert('Supplier Name and Issue Title are required');return;}
  try{
    const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){modal.hide();await load();}else alert('Save failed');
  }catch(e){console.error(e);alert('Save failed');}
}

async function del(){
  if(!sel||!confirm('Delete this issue?'))return;
  try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){modal.hide();await load();}else alert('Delete failed');}
  catch(e){console.error(e);}
}

document.getElementById('btnAdd').onclick=openNew;
document.getElementById('btnSave').onclick=save;
document.getElementById('btnDel').onclick=del;
load();
</script>
</body>
</html>
