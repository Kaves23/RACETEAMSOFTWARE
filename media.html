<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Media Obligations</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    .table-wrap{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);overflow:hidden;}
    .table-header{padding:10px 16px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.06);}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;color:#1a1d24;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#fdf2f8;}
    .table-scroll{overflow-y:auto;max-height:calc(100vh - 280px);}

    .badge-t{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:700;white-space:nowrap;}
    .bt-interview{background:#dbeafe;color:#1d4ed8;}
    .bt-photoshoot{background:#fce7f3;color:#9d174d;}
    .bt-video{background:#ede9fe;color:#5b21b6;}
    .bt-press_release{background:#fef3c7;color:#92400e;}
    .bt-social{background:#ccfbf1;color:#0f766e;}
    .bt-other{background:#f3f4f6;color:#6b7280;}

    .bs-planned{background:#f3f4f6;color:#6b7280;}
    .bs-completed{background:#d1fae5;color:#065f46;}
    .bs-cancelled{background:#fee2e2;color:#991b1b;}
    .bs-published{background:#dbeafe;color:#1d4ed8;}

    .approved-icon{font-size:1rem;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Media Obligations</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Interviews, photoshoots, press releases and social content</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#ec4899;border-color:#ec4899;">+ New Media</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Upcoming</div><div class="ev-stat-value" id="kpiUpcoming">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Completed</div><div class="ev-stat-value" id="kpiCompleted">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Published</div><div class="ev-stat-value" id="kpiPublished">—</div></div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <span style="font-size:.75rem;font-weight:700;color:#6c757d;text-transform:uppercase;">Media Records</span>
      <div class="d-flex gap-2 flex-wrap">
        <input type="search" id="fSearch" class="form-control form-control-sm" placeholder="Search driver, title…" style="width:200px;"/>
        <select id="fType" class="form-select form-select-sm" style="width:150px;">
          <option value="">All Types</option>
          <option value="interview">Interview</option>
          <option value="photoshoot">Photoshoot</option>
          <option value="video">Video</option>
          <option value="press_release">Press Release</option>
          <option value="social">Social</option>
          <option value="other">Other</option>
        </select>
        <select id="fStatus" class="form-select form-select-sm" style="width:140px;">
          <option value="">All Status</option>
          <option value="planned">Planned</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
          <option value="published">Published</option>
        </select>
      </div>
    </div>
    <div class="table-scroll">
      <table class="data-table">
        <thead>
          <tr>
            <th>Driver</th><th>Title</th><th>Type</th><th>Publication</th><th>Date</th>
            <th>Dur (mins)</th><th>Location</th><th>PR Contact</th><th>Approved</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="mModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#ec4899;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">New Media Obligation</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="mForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver ID</label>
              <input type="text" class="form-control form-control-sm" id="fDriverId"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Title *</label>
              <input type="text" class="form-control form-control-sm" id="fTitle" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Media Type</label>
              <select class="form-select form-select-sm" id="fMediaType">
                <option value="">Select…</option>
                <option value="interview">Interview</option>
                <option value="photoshoot">Photoshoot</option>
                <option value="video">Video</option>
                <option value="press_release">Press Release</option>
                <option value="social">Social</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Publication</label>
              <input type="text" class="form-control form-control-sm" id="fPublication"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Scheduled Date</label>
              <input type="date" class="form-control form-control-sm" id="fScheduledDate"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Duration (mins)</label>
              <input type="number" class="form-control form-control-sm" id="fDurationMins"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Location</label>
              <input type="text" class="form-control form-control-sm" id="fLocation"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">PR Contact</label>
              <input type="text" class="form-control form-control-sm" id="fPrContact"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Status</label>
              <select class="form-select form-select-sm" id="fStatus2">
                <option value="planned">Planned</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
                <option value="published">Published</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Content URL</label>
              <input type="url" class="form-control form-control-sm" id="fContentUrl" placeholder="https://…"/>
            </div>
            <div class="col-12">
              <div class="form-check mt-1">
                <input class="form-check-input" type="checkbox" id="fApproved"/>
                <label class="form-check-label fw-semibold" for="fApproved" style="font-size:.78rem;">Approved</label>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-danger me-auto d-none" id="btnDel">Delete</button>
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#ec4899;border-color:#ec4899;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/driver-media';
let allMedia=[];
const modal=new bootstrap.Modal(document.getElementById('mModal'));

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}

function typeBadge(t){const m={interview:'bt-interview',photoshoot:'bt-photoshoot',video:'bt-video',press_release:'bt-press_release',social:'bt-social'};return`<span class="badge-t ${m[t]||'bt-other'}">${esc(t||'')}</span>`;}
function statusBadge(s){const m={planned:'bs-planned',completed:'bs-completed',cancelled:'bs-cancelled',published:'bs-published'};return`<span class="badge-t ${m[s]||'bs-planned'}">${esc(s||'')}</span>`;}

async function load(){
  try{const r=await fetch(API);if(r.ok)allMedia=await r.json();}catch(e){allMedia=[];}
  renderKPIs();
  renderTable();
}

function renderKPIs(){
  const today=new Date().toISOString().slice(0,10);
  document.getElementById('kpiTotal').textContent=allMedia.length;
  document.getElementById('kpiUpcoming').textContent=allMedia.filter(m=>m.status==='planned').length;
  document.getElementById('kpiCompleted').textContent=allMedia.filter(m=>m.status==='completed').length;
  document.getElementById('kpiPublished').textContent=allMedia.filter(m=>m.status==='published').length;
}

function filtered(){
  const q=document.getElementById('fSearch').value.toLowerCase();
  const t=document.getElementById('fType').value;
  const s=document.getElementById('fStatus').value;
  return allMedia.filter(m=>{
    if(t&&m.media_type!==t)return false;
    if(s&&m.status!==s)return false;
    if(q&&!`${m.driver_name} ${m.title}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>new Date(b.scheduled_date||0)-new Date(a.scheduled_date||0));
}

function renderTable(){
  const data=filtered();
  document.getElementById('tbody').innerHTML=data.length?data.map(m=>`
    <tr onclick="openEdit(${m.id})">
      <td class="fw-semibold">${esc(m.driver_name||'')}</td>
      <td>${esc(m.title||'')}</td>
      <td>${typeBadge(m.media_type)}</td>
      <td>${esc(m.publication||'')}</td>
      <td>${fmtDate(m.scheduled_date)}</td>
      <td>${m.duration_mins!=null?m.duration_mins:'—'}</td>
      <td>${esc(m.location||'')}</td>
      <td>${esc(m.pr_contact||'')}</td>
      <td class="text-center approved-icon">${m.approved?'<span style="color:#10b981;font-size:1.1rem;">✓</span>':'<span style="color:#f59e0b;">⏳</span>'}</td>
      <td>${statusBadge(m.status)}</td>
      <td><button class="btn btn-outline-secondary btn-sm" style="font-size:.7rem;padding:1px 7px;" onclick="event.stopPropagation();openEdit(${m.id})">Edit</button></td>
    </tr>`).join(''):'<tr><td colspan="11" class="text-center text-secondary py-4">No media obligations found</td></tr>';
}

function openNew(){
  document.getElementById('mForm').reset();
  document.getElementById('fId').value='';
  document.getElementById('fStatus2').value='planned';
  document.getElementById('modalTitle').textContent='New Media Obligation';
  document.getElementById('btnDel').classList.add('d-none');
  modal.show();
}

function openEdit(id){
  const m=allMedia.find(x=>x.id===id);if(!m)return;
  document.getElementById('fId').value=m.id;
  document.getElementById('fDriverName').value=m.driver_name||'';
  document.getElementById('fDriverId').value=m.driver_id||'';
  document.getElementById('fTitle').value=m.title||'';
  document.getElementById('fMediaType').value=m.media_type||'';
  document.getElementById('fPublication').value=m.publication||'';
  document.getElementById('fScheduledDate').value=m.scheduled_date?m.scheduled_date.slice(0,10):'';
  document.getElementById('fDurationMins').value=m.duration_mins??'';
  document.getElementById('fLocation').value=m.location||'';
  document.getElementById('fPrContact').value=m.pr_contact||'';
  document.getElementById('fStatus2').value=m.status||'planned';
  document.getElementById('fContentUrl').value=m.content_url||'';
  document.getElementById('fApproved').checked=!!m.approved;
  document.getElementById('fNotes').value=m.notes||'';
  document.getElementById('modalTitle').textContent='Edit Media Obligation';
  document.getElementById('btnDel').classList.remove('d-none');
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    driver_id:document.getElementById('fDriverId').value.trim(),
    title:document.getElementById('fTitle').value.trim(),
    media_type:document.getElementById('fMediaType').value,
    publication:document.getElementById('fPublication').value.trim(),
    scheduled_date:document.getElementById('fScheduledDate').value||null,
    duration_mins:document.getElementById('fDurationMins').value||null,
    location:document.getElementById('fLocation').value.trim(),
    pr_contact:document.getElementById('fPrContact').value.trim(),
    status:document.getElementById('fStatus2').value,
    content_url:document.getElementById('fContentUrl').value.trim(),
    approved:document.getElementById('fApproved').checked,
    notes:document.getElementById('fNotes').value.trim()
  };
  if(!body.driver_name||!body.title){alert('Driver Name and Title are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(){
  const id=document.getElementById('fId').value;if(!id)return;
  if(!confirm('Delete this media obligation?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  modal.hide();load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('btnDel').addEventListener('click',del);
document.getElementById('fSearch').addEventListener('input',renderTable);
document.getElementById('fType').addEventListener('change',renderTable);
document.getElementById('fStatus').addEventListener('change',renderTable);
load();
</script>
</body>
</html>
