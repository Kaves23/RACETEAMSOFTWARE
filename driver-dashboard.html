<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driver Dashboard - Race Team OS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <style>
    .driver-card {
      background: linear-gradient(135deg, #fff 0%, #f8f9fa 100%);
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      transition: all 0.3s;
    }
    .driver-card:hover {
      border-color: #1a73e8;
      box-shadow: 0 4px 12px rgba(26, 115, 232, 0.15);
    }
    .driver-card.has-assignments {
      border-left: 4px solid #34a853;
    }
    .driver-card.no-assignments {
      border-left: 4px solid #e0e0e0;
    }
    .driver-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .driver-name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #202124;
    }
    .driver-info {
      font-size: 0.85rem;
      color: #5f6368;
      margin-bottom: 4px;
    }
    .driver-stats {
      display: flex;
      gap: 16px;
      margin-top: 12px;
    }
    .stat-item {
      flex: 1;
      background: #fff;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #e0e0e0;
      text-align: center;
    }
    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a73e8;
    }
    .stat-label {
      font-size: 0.75rem;
      color: #5f6368;
      margin-top: 4px;
    }
    .box-list {
      margin-top: 12px;
    }
    .box-item {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-left: 3px solid #ea4335;
      border-radius: 4px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .box-item:hover {
      background: #f8f9fa;
      border-left-color: #d93025;
      transform: translateX(4px);
    }
    .box-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .box-name {
      font-weight: 600;
      color: #202124;
    }
    .box-barcode {
      font-size: 0.85rem;
      color: #5f6368;
      font-family: monospace;
    }
    .items-count {
      background: #e8f0fe;
      color: #1a73e8;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .item-list {
      margin-top: 8px;
      padding-left: 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s;
    }
    .item-list.show {
      max-height: 500px;
    }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.85rem;
    }
    .item-row:last-child {
      border-bottom: none;
    }
    .checkout-btn {
      background: #34a853;
      color: #fff;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .checkout-btn:hover {
      background: #2d8e47;
      transform: scale(1.05);
    }
    .checked-out {
      background: #fef7e0;
      border-left-color: #f9ab00;
    }
    .return-btn {
      background: #f9ab00;
      color: #202124;
      border: none;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.75rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }
    .return-btn:hover {
      background: #ea8600;
      transform: scale(1.05);
    }
    .dashboard-header {
      background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
      color: #fff;
      padding: 24px;
      border-radius: 8px;
      margin-bottom: 24px;
    }
    .dashboard-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .dashboard-subtitle {
      font-size: 0.95rem;
      opacity: 0.9;
    }
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #e0e0e0;
      background: #fff;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .filter-btn:hover {
      border-color: #1a73e8;
      background: #e8f0fe;
    }
    .filter-btn.active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #5f6368;
    }
    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div id="rtsTopNav"></div>
  
  <div class="rts-main container-fluid" style="max-width: 1400px; margin: 0 auto;">
    <div class="dashboard-header">
      <div class="dashboard-title">🚗 Driver Dashboard</div>
      <div class="dashboard-subtitle">Track driver assignments, boxes, and equipment checkout</div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="filterDrivers('all')">All Drivers</button>
      <button class="filter-btn" onclick="filterDrivers('assigned')">With Assignments</button>
      <button class="filter-btn" onclick="filterDrivers('none')">No Assignments</button>
    </div>

    <div id="driversList"></div>

    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-state-icon">🚗</div>
      <h3>No drivers found</h3>
      <p>Add drivers in the Drivers page to see them here.</p>
    </div>
  </div>

  <!-- Checkout Confirmation Modal -->
  <div class="modal fade" id="checkoutModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">📦 Checkout Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="checkoutDetails"></div>
          <div class="mb-3">
            <label class="form-label">Notes (optional)</label>
            <textarea class="form-control" id="checkoutNotes" rows="3" placeholder="Add any notes about this checkout..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-success" onclick="confirmCheckout()">✓ Confirm Checkout</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="core.js"></script>
  <script>
    let drivers = [];
    let boxes = [];
    let boxContents = [];
    let currentFilter = 'all';
    let checkedOutItems = new Map(); // itemId -> { driverId, notes, checkoutDate }

    // Load checked out items from localStorage
    function loadCheckouts() {
      const stored = localStorage.getItem('driverCheckouts');
      if (stored) {
        checkedOutItems = new Map(JSON.parse(stored));
      }
    }

    function saveCheckouts() {
      localStorage.setItem('driverCheckouts', JSON.stringify([...checkedOutItems]));
    }

    async function loadData() {
      try {
        // Load drivers
        const driversResp = await RTS_API.getCollectionItems('drivers');
        drivers = driversResp?.items || [];

        // Load boxes
        const boxesResp = await RTS_API.getBoxes();
        boxes = boxesResp?.boxes || [];

        // Load box contents
        const contentsResp = await RTS_API.getBoxContents();
        boxContents = contentsResp?.contents || [];

        console.log(`✅ Loaded ${drivers.length} drivers, ${boxes.length} boxes, ${boxContents.length} contents`);
        renderDrivers();
      } catch (error) {
        console.error('❌ Error loading data:', error);
        if (RTS.showToast) RTS.showToast('Failed to load data', 'error');
      }
    }

    function filterDrivers(filter) {
      currentFilter = filter;
      
      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      renderDrivers();
    }

    function renderDrivers() {
      const driversList = document.getElementById('driversList');
      const emptyState = document.getElementById('emptyState');

      if (drivers.length === 0) {
        driversList.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      // Get assigned boxes count for each driver
      const driverBoxes = new Map();
      boxes.forEach(box => {
        if (box.assigned_driver_id) {
          if (!driverBoxes.has(box.assigned_driver_id)) {
            driverBoxes.set(box.assigned_driver_id, []);
          }
          driverBoxes.get(box.assigned_driver_id).push(box);
        }
      });

      // Filter drivers
      let filteredDrivers = drivers;
      if (currentFilter === 'assigned') {
        filteredDrivers = drivers.filter(d => driverBoxes.has(d.id));
      } else if (currentFilter === 'none') {
        filteredDrivers = drivers.filter(d => !driverBoxes.has(d.id));
      }

      if (filteredDrivers.length === 0) {
        driversList.innerHTML = '<div class="empty-state"><p>No drivers match this filter</p></div>';
        return;
      }

      const html = filteredDrivers.map(driver => {
        const assignedBoxes = driverBoxes.get(driver.id) || [];
        const hasAssignments = assignedBoxes.length > 0;
        
        // Count total items
        let totalItems = 0;
        let checkedOutCount = 0;
        assignedBoxes.forEach(box => {
          const items = boxContents.filter(c => c.box_id === box.id);
          totalItems += items.length;
          items.forEach(item => {
            if (checkedOutItems.has(item.id)) {
              checkedOutCount++;
            }
          });
        });

        return `
          <div class="driver-card ${hasAssignments ? 'has-assignments' : 'no-assignments'}">
            <div class="driver-header">
              <div>
                <div class="driver-name">🚗 ${esc(driver.name || 'Unnamed Driver')}</div>
                <div class="driver-info">License: ${esc(driver.license_number || 'N/A')}</div>
                ${driver.phone ? `<div class="driver-info">📞 ${esc(driver.phone)}</div>` : ''}
              </div>
            </div>

            <div class="driver-stats">
              <div class="stat-item">
                <div class="stat-value">${assignedBoxes.length}</div>
                <div class="stat-label">Assigned Boxes</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${totalItems}</div>
                <div class="stat-label">Total Items</div>
              </div>
              <div class="stat-item">
                <div class="stat-value">${checkedOutCount}</div>
                <div class="stat-label">Checked Out</div>
              </div>
            </div>

            ${hasAssignments ? `
              <div class="box-list">
                ${assignedBoxes.map(box => renderBox(box, driver.id)).join('')}
              </div>
            ` : '<div style="text-align:center;padding:20px;color:#5f6368;font-size:0.85rem">No boxes assigned</div>'}
          </div>
        `;
      }).join('');

      driversList.innerHTML = html;
    }

    function renderBox(box, driverId) {
      const items = boxContents.filter(c => c.box_id === box.id);
      const boxId = `box-${box.id}`;

      return `
        <div class="box-item" onclick="toggleBoxItems('${boxId}')">
          <div class="box-item-header">
            <div>
              <div class="box-name">📦 ${esc(box.name)}</div>
              <div class="box-barcode">${esc(box.barcode)}</div>
            </div>
            <span class="items-count">${items.length} items</span>
          </div>
          <div class="item-list" id="${boxId}">
            ${items.length === 0 ? '<div style="text-align:center;padding:10px;color:#5f6368;font-size:0.85rem">Box is empty</div>' : 
              items.map(item => {
                const isCheckedOut = checkedOutItems.has(item.id);
                const checkout = isCheckedOut ? checkedOutItems.get(item.id) : null;
                return `
                  <div class="item-row ${isCheckedOut ? 'checked-out' : ''}">
                    <div style="flex:1">
                      <div style="font-weight:600">${esc(item.name || 'Unnamed Item')}</div>
                      <div style="font-size:0.75rem;color:#5f6368">${esc(item.category || 'No category')}</div>
                      ${isCheckedOut ? `<div style="font-size:0.7rem;color:#f9ab00;margin-top:2px">✓ Checked out ${new Date(checkout.checkoutDate).toLocaleDateString()}</div>` : ''}
                    </div>
                    ${isCheckedOut ? 
                      `<button class="return-btn" onclick="returnItem(event, '${item.id}', '${driverId}')">Return</button>` :
                      `<button class="checkout-btn" onclick="checkoutItem(event, '${item.id}', '${driverId}', '${esc(item.name)}', '${esc(box.name)}')">Checkout</button>`
                    }
                  </div>
                `;
              }).join('')
            }
          </div>
        </div>
      `;
    }

    function toggleBoxItems(boxId) {
      const itemList = document.getElementById(boxId);
      itemList.classList.toggle('show');
    }

    let currentCheckoutItem = null;

    function checkoutItem(event, itemId, driverId, itemName, boxName) {
      event.stopPropagation();
      
      const driver = drivers.find(d => d.id === driverId);
      
      document.getElementById('checkoutDetails').innerHTML = `
        <div class="mb-3" style="background:#f8f9fa;padding:12px;border-radius:6px">
          <div style="margin-bottom:8px"><strong>Driver:</strong> ${esc(driver?.name || 'Unknown')}</div>
          <div style="margin-bottom:8px"><strong>Item:</strong> ${itemName}</div>
          <div><strong>From Box:</strong> ${boxName}</div>
        </div>
      `;

      currentCheckoutItem = { itemId, driverId, itemName, boxName };
      
      const modal = new bootstrap.Modal(document.getElementById('checkoutModal'));
      modal.show();
    }

    function confirmCheckout() {
      if (!currentCheckoutItem) return;

      const notes = document.getElementById('checkoutNotes').value;
      
      checkedOutItems.set(currentCheckoutItem.itemId, {
        driverId: currentCheckoutItem.driverId,
        notes: notes,
        checkoutDate: new Date().toISOString()
      });

      saveCheckouts();
      
      RTS.showToast(`✅ Item checked out to driver`, 'success');
      
      bootstrap.Modal.getInstance(document.getElementById('checkoutModal')).hide();
      document.getElementById('checkoutNotes').value = '';
      currentCheckoutItem = null;
      
      renderDrivers();
    }

    function returnItem(event, itemId, driverId) {
      event.stopPropagation();
      
      if (confirm('Return this item to the box?')) {
        checkedOutItems.delete(itemId);
        saveCheckouts();
        RTS.showToast('✅ Item returned to box', 'success');
        renderDrivers();
      }
    }

    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Initialize
    loadCheckouts();
    loadData();
  </script>
</body>
</html>
