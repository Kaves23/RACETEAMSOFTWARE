<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Driver Preferences</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
    .filter-bar input,.filter-bar select{font-size:.8rem;padding:4px 8px;border:1px solid #dee2e6;border-radius:6px;background:#fff;color:#1a1d24;}

    .accordion-wrap{display:flex;flex-direction:column;gap:8px;}
    .acc-item{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);overflow:hidden;}
    .acc-header{padding:13px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .1s;}
    .acc-header:hover{background:#f0fdfb;}
    .acc-driver{font-size:.95rem;font-weight:700;color:#1a1d24;}
    .acc-meta{font-size:.75rem;color:#6c757d;}
    .acc-chevron{transition:transform .2s;font-size:.85rem;color:#6c757d;}
    .acc-chevron.open{transform:rotate(90deg);}
    .acc-body{display:none;border-top:1px solid #f0f0f0;}
    .acc-body.show{display:block;}
    .acc-body-inner{padding:12px;}

    .pref-table{width:100%;font-size:.8rem;border-collapse:separate;border-spacing:0;}
    .pref-table thead{background:#f8f9fa;}
    .pref-table th{padding:6px 10px;font-size:.68rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .pref-table td{padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;color:#1a1d24;}
    .pref-table tbody tr:last-child td{border-bottom:none;}

    .badge-p{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.63rem;font-weight:700;}
    .bp-critical{background:#fee2e2;color:#991b1b;}
    .bp-high{background:#ffedd5;color:#c2410c;}
    .bp-normal{background:#dbeafe;color:#1d4ed8;}
    .bp-low{background:#f3f4f6;color:#6b7280;}

    .badge-cat{display:inline-block;padding:1px 6px;border-radius:8px;font-size:.63rem;font-weight:600;}
    .bc-setup{background:#ede9fe;color:#5b21b6;}
    .bc-travel{background:#dbeafe;color:#1d4ed8;}
    .bc-nutrition{background:#d1fae5;color:#065f46;}
    .bc-hotel{background:#fef3c7;color:#92400e;}
    .bc-media{background:#fce7f3;color:#9d174d;}
    .bc-communication{background:#ccfbf1;color:#0f766e;}
    .bc-other{background:#f3f4f6;color:#6b7280;}

    .row-actions{opacity:0;transition:opacity .15s;}
    .pref-table tbody tr:hover .row-actions{opacity:1;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Driver Preferences</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Setup, travel, nutrition and communication preferences per driver</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#14b8a6;border-color:#14b8a6;">+ New Preference</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Drivers</div><div class="ev-stat-value" id="kpiDrivers">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Preferences</div><div class="ev-stat-value" id="kpiPrefs">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Critical</div><div class="ev-stat-value" id="kpiCritical">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Categories</div><div class="ev-stat-value" id="kpiCategories">—</div></div>
  </div>

  <div class="filter-bar">
    <label class="fw-semibold me-1" style="font-size:.8rem;color:#6c757d;">Filter:</label>
    <input type="search" id="fSearch" placeholder="Search driver, key…" style="width:200px;"/>
    <select id="fCategory">
      <option value="">All Categories</option>
      <option value="setup">Setup</option>
      <option value="travel">Travel</option>
      <option value="nutrition">Nutrition</option>
      <option value="hotel">Hotel</option>
      <option value="media">Media</option>
      <option value="communication">Communication</option>
      <option value="other">Other</option>
    </select>
    <select id="fPriority">
      <option value="">All Priorities</option>
      <option value="critical">Critical</option>
      <option value="high">High</option>
      <option value="normal">Normal</option>
      <option value="low">Low</option>
    </select>
  </div>

  <div class="accordion-wrap" id="accordionWrap"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="pModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#14b8a6;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">New Preference</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="pForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver ID</label>
              <input type="text" class="form-control form-control-sm" id="fDriverId"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Category</label>
              <select class="form-select form-select-sm" id="fCategory2">
                <option value="setup">Setup</option>
                <option value="travel">Travel</option>
                <option value="nutrition">Nutrition</option>
                <option value="hotel">Hotel</option>
                <option value="media">Media</option>
                <option value="communication">Communication</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Priority</label>
              <select class="form-select form-select-sm" id="fPriority2">
                <option value="normal">Normal</option>
                <option value="low">Low</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Preference Key *</label>
              <input type="text" class="form-control form-control-sm" id="fPreferenceKey" required placeholder="e.g. Seat Angle, Airline, Pre-race Meal"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Preference Value</label>
              <input type="text" class="form-control form-control-sm" id="fPreferenceValue" placeholder="e.g. 12°, Business Class, Pasta"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-danger me-auto d-none" id="btnDel">Delete</button>
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#14b8a6;border-color:#14b8a6;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/driver-preferences';
let allPrefs=[];
const modal=new bootstrap.Modal(document.getElementById('pModal'));

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function prioBadge(p){const m={critical:'bp-critical',high:'bp-high',normal:'bp-normal',low:'bp-low'};return`<span class="badge-p ${m[p]||'bp-normal'}">${esc(p||'normal')}</span>`;}
function catBadge(c){const m={setup:'bc-setup',travel:'bc-travel',nutrition:'bc-nutrition',hotel:'bc-hotel',media:'bc-media',communication:'bc-communication'};return`<span class="badge-cat ${m[c]||'bc-other'}">${esc(c||'')}</span>`;}

async function load(){
  try{const r=await fetch(API);if(r.ok)allPrefs=await r.json();}catch(e){allPrefs=[];}
  renderKPIs();
  renderAccordion();
}

function renderKPIs(){
  const drivers=[...new Set(allPrefs.map(p=>p.driver_name).filter(Boolean))];
  const cats=[...new Set(allPrefs.map(p=>p.category).filter(Boolean))];
  document.getElementById('kpiDrivers').textContent=drivers.length;
  document.getElementById('kpiPrefs').textContent=allPrefs.length;
  document.getElementById('kpiCritical').textContent=allPrefs.filter(p=>p.priority==='critical').length;
  document.getElementById('kpiCategories').textContent=cats.length;
}

function filtered(){
  const q=document.getElementById('fSearch').value.toLowerCase();
  const cat=document.getElementById('fCategory').value;
  const pri=document.getElementById('fPriority').value;
  return allPrefs.filter(p=>{
    if(cat&&p.category!==cat)return false;
    if(pri&&p.priority!==pri)return false;
    if(q&&!`${p.driver_name} ${p.preference_key}`.toLowerCase().includes(q))return false;
    return true;
  });
}

function renderAccordion(){
  const data=filtered();
  const drivers=[...new Set(allPrefs.map(p=>p.driver_name).filter(Boolean))].sort();
  const wrap=document.getElementById('accordionWrap');
  const openSections=new Set([...wrap.querySelectorAll('.acc-body.show')].map(el=>el.dataset.driver));
  wrap.innerHTML='';
  if(!drivers.length){wrap.innerHTML='<div class="text-secondary" style="font-size:.85rem;">No preferences found.</div>';return;}
  drivers.forEach(name=>{
    const driverPrefs=data.filter(p=>p.driver_name===name);
    const allCount=allPrefs.filter(p=>p.driver_name===name).length;
    const critCount=allPrefs.filter(p=>p.driver_name===name&&p.priority==='critical').length;
    const item=document.createElement('div');
    item.className='acc-item';
    item.innerHTML=`
      <div class="acc-header" onclick="toggleAcc(this)">
        <div>
          <div class="acc-driver">${esc(name)}</div>
          <div class="acc-meta">${allCount} preference${allCount!==1?'s':''}${critCount>0?` · <span style="color:#ef4444;font-weight:600;">${critCount} critical</span>`:''}</div>
        </div>
        <div class="d-flex gap-2 align-items-center">
          <button class="btn btn-sm text-white" style="font-size:.75rem;padding:3px 10px;background:#14b8a6;border-color:#14b8a6;" onclick="event.stopPropagation();openNewForDriver('${esc(name)}')">+ Add</button>
          <span class="acc-chevron${openSections.has(name)?' open':''}">&#9654;</span>
        </div>
      </div>
      <div class="acc-body${openSections.has(name)?' show':''}" data-driver="${esc(name)}">
        <div class="acc-body-inner">
          ${driverPrefs.length?`
          <table class="pref-table">
            <thead><tr><th>Category</th><th>Key</th><th>Value</th><th>Priority</th><th>Notes</th><th></th></tr></thead>
            <tbody>
              ${driverPrefs.map(p=>`<tr>
                <td>${catBadge(p.category)}</td>
                <td class="fw-semibold">${esc(p.preference_key||'')}</td>
                <td>${esc(p.preference_value||'')}</td>
                <td>${prioBadge(p.priority)}</td>
                <td class="text-secondary">${esc(p.notes||'')}</td>
                <td class="row-actions"><button class="btn btn-outline-secondary" style="font-size:.7rem;padding:1px 7px;" onclick="openEdit(${p.id})">Edit</button></td>
              </tr>`).join('')}
            </tbody>
          </table>`:'<div class="text-secondary py-2" style="font-size:.82rem;">No preferences match filter for this driver.</div>'}
        </div>
      </div>`;
    wrap.appendChild(item);
  });
}

function toggleAcc(header){
  const body=header.nextElementSibling;
  const chevron=header.querySelector('.acc-chevron');
  body.classList.toggle('show');
  chevron.classList.toggle('open');
}

function openNew(){
  document.getElementById('pForm').reset();
  document.getElementById('fId').value='';
  document.getElementById('fPriority2').value='normal';
  document.getElementById('fCategory2').value='setup';
  document.getElementById('modalTitle').textContent='New Preference';
  document.getElementById('btnDel').classList.add('d-none');
  modal.show();
}

function openNewForDriver(name){
  openNew();
  document.getElementById('fDriverName').value=name;
}

function openEdit(id){
  const p=allPrefs.find(x=>x.id===id);if(!p)return;
  document.getElementById('fId').value=p.id;
  document.getElementById('fDriverName').value=p.driver_name||'';
  document.getElementById('fDriverId').value=p.driver_id||'';
  document.getElementById('fCategory2').value=p.category||'setup';
  document.getElementById('fPriority2').value=p.priority||'normal';
  document.getElementById('fPreferenceKey').value=p.preference_key||'';
  document.getElementById('fPreferenceValue').value=p.preference_value||'';
  document.getElementById('fNotes').value=p.notes||'';
  document.getElementById('modalTitle').textContent='Edit Preference';
  document.getElementById('btnDel').classList.remove('d-none');
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    driver_id:document.getElementById('fDriverId').value.trim(),
    category:document.getElementById('fCategory2').value,
    preference_key:document.getElementById('fPreferenceKey').value.trim(),
    preference_value:document.getElementById('fPreferenceValue').value.trim(),
    priority:document.getElementById('fPriority2').value,
    notes:document.getElementById('fNotes').value.trim()
  };
  if(!body.driver_name||!body.preference_key){alert('Driver Name and Preference Key are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(){
  const id=document.getElementById('fId').value;if(!id)return;
  if(!confirm('Delete this preference?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  modal.hide();load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('btnDel').addEventListener('click',del);
document.getElementById('fSearch').addEventListener('input',renderAccordion);
document.getElementById('fCategory').addEventListener('change',renderAccordion);
document.getElementById('fPriority').addEventListener('change',renderAccordion);
load();
</script>
</body>
</html>
