<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Race Team OS – Lead Times</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;}
    #mainShell.mlo-shell{background:transparent;border:none;gap:10px;}
    #mainShell .mlo-pane-left,#mainShell .mlo-pane-mid,#mainShell .mlo-pane-right{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;}
    .data-table td{padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.05);}
    .data-table tbody tr{cursor:pointer;}
    .data-table tbody tr:hover{background:#f8f9fa;}
    .data-table tbody tr.selected{background:rgba(14,165,233,.08);outline:2px solid #0ea5e9;outline-offset:-2px;}
    .filter-item{padding:5px 8px;border-radius:4px;cursor:pointer;font-size:.8rem;margin-bottom:2px;display:block;color:#495057;text-decoration:none;}
    .filter-item:hover{background:#f0f9ff;color:#0ea5e9;}
    .filter-item.active{background:rgba(14,165,233,.12);color:#0ea5e9;font-weight:600;}
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
      <div>
        <h1 class="h4 mb-1">Lead Times</h1>
        <p class="text-secondary mb-0" style="font-size:.85rem;">Standard and express part delivery lead times by supplier</p>
      </div>
      <button class="btn btn-sm" id="btnAdd" style="background:#0ea5e9;border-color:#0ea5e9;color:#fff">+ New Lead Time</button>
    </div>
    <div class="ev-stats-bar">
      <div class="ev-stat-card"><div class="ev-stat-label">Total Parts</div><div class="ev-stat-value" id="kpi0">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Avg Standard</div><div class="ev-stat-value" id="kpi1">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Avg Express</div><div class="ev-stat-value" id="kpi2">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Below 3 Days</div><div class="ev-stat-value" id="kpi3">—</div></div>
    </div>
    <div class="mlo-shell" id="mainShell">
      <div class="mlo-pane mlo-pane-left" style="width:180px;min-width:140px;">
        <div class="mlo-pane-header p-2 border-bottom"><small class="fw-bold text-muted">CATEGORY</small></div>
        <div class="mlo-pane-content p-2" id="filterList"></div>
      </div>
      <div class="mlo-resizer"></div>
      <div class="mlo-pane mlo-pane-mid" style="flex:1 1 0;min-width:200px;">
        <div class="mlo-pane-header p-2 border-bottom d-flex justify-content-between align-items-center">
          <small class="fw-bold text-muted">LEAD TIMES LIST</small>
          <input type="search" class="form-control form-control-sm" id="searchBox" placeholder="Search…" style="width:160px"/>
        </div>
        <div class="mlo-pane-content p-0" style="overflow-y:auto;max-height:calc(100vh - 260px);">
          <table class="data-table">
            <thead><tr><th>Part</th><th>Part #</th><th>Category</th><th>Standard (days)</th><th>Express (days)</th><th>Cost (£)</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="mlo-resizer"></div>
      <div class="mlo-pane mlo-pane-right" style="width:320px;min-width:260px;">
        <div class="mlo-pane-header p-2 border-bottom d-flex justify-content-between align-items-center">
          <small class="fw-bold text-muted">INSPECTOR</small>
          <button class="btn btn-sm btn-danger" id="btnDel" style="display:none">Delete</button>
        </div>
        <div class="mlo-pane-content p-3" style="overflow-y:auto;max-height:calc(100vh - 260px);">
          <form id="form" class="vstack gap-2" onsubmit="return false">
            <div><label class="form-label small fw-semibold mb-1">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId"/></div>
            <div><label class="form-label small fw-semibold mb-1">Part Name *</label><input class="form-control form-control-sm" id="fPartName"/></div>
            <div><label class="form-label small fw-semibold mb-1">Part Number</label><input class="form-control form-control-sm" id="fPartNum"/></div>
            <div><label class="form-label small fw-semibold mb-1">Category</label>
              <select class="form-select form-select-sm" id="fCategory">
                <option value="components">Components</option><option value="consumables">Consumables</option>
                <option value="tooling">Tooling</option><option value="safety">Safety</option><option value="other">Other</option>
              </select>
            </div>
            <div class="row g-2">
              <div class="col-6"><label class="form-label small fw-semibold mb-1">Standard Lead (days)</label><input type="number" class="form-control form-control-sm" id="fStandard" min="0"/></div>
              <div class="col-6"><label class="form-label small fw-semibold mb-1">Express Lead (days)</label><input type="number" class="form-control form-control-sm" id="fExpress" min="0"/></div>
            </div>
            <div><label class="form-label small fw-semibold mb-1">Standard Cost (£)</label><input type="number" class="form-control form-control-sm" id="fCost" min="0" step="0.01"/></div>
            <div><label class="form-label small fw-semibold mb-1">Express Premium (%)</label><input type="number" class="form-control form-control-sm" id="fPremium" value="50" min="0"/></div>
            <div><label class="form-label small fw-semibold mb-1">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="3"></textarea></div>
          </form>
          <button class="btn btn-sm mt-2 w-100" id="btnSave" style="background:#0ea5e9;color:#fff">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="core.js?v=20260420"></script>
  <script>
  const API='/api/lead-times';
  const CATS=['components','consumables','tooling','safety','other'];
  let all=[],sel=null,filt='all';
  const gv=id=>(document.getElementById(id)||{}).value||'';
  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};

  async function load(){
    try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();buildFilters();render();}
    catch(e){console.error(e);}
  }

  function updateKPIs(){
    document.getElementById('kpi0').textContent=all.length;
    const hasStd=all.filter(x=>x.standard_lead_days!=null);
    const hasExp=all.filter(x=>x.express_lead_days!=null);
    document.getElementById('kpi1').textContent=hasStd.length
      ?(hasStd.reduce((a,x)=>a+Number(x.standard_lead_days),0)/hasStd.length).toFixed(1)+'d':'—';
    document.getElementById('kpi2').textContent=hasExp.length
      ?(hasExp.reduce((a,x)=>a+Number(x.express_lead_days),0)/hasExp.length).toFixed(1)+'d':'—';
    document.getElementById('kpi3').textContent=all.filter(x=>x.standard_lead_days!=null&&Number(x.standard_lead_days)<3).length;
  }

  function buildFilters(){
    document.getElementById('filterList').innerHTML=
      [['all','All'],...CATS.map(c=>[c,c.charAt(0).toUpperCase()+c.slice(1)])].map(([v,l])=>
        `<a class="filter-item${filt===v?' active':''}" data-val="${v}" href="#">${l} <small class="text-muted">(${v==='all'?all.length:all.filter(x=>x.category===v).length})</small></a>`
      ).join('');
    document.querySelectorAll('#filterList .filter-item').forEach(a=>a.onclick=e=>{e.preventDefault();filt=a.dataset.val;buildFilters();render();});
  }

  function render(){
    const q=document.getElementById('searchBox').value.toLowerCase();
    let d=filt==='all'?[...all]:all.filter(x=>x.category===filt);
    if(q)d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
    document.getElementById('tbody').innerHTML=d.length
      ?d.map(row=>`<tr data-id="${row.id}" class="${sel&&String(sel.id)===String(row.id)?'selected':''}">
          <td class="fw-semibold">${row.part_name||'—'}</td>
          <td class="text-muted" style="font-size:.75rem">${row.part_number||'—'}</td>
          <td><span class="badge bg-light text-dark border">${row.category||'—'}</span></td>
          <td>${row.standard_lead_days??'—'}</td><td>${row.express_lead_days??'—'}</td>
          <td>${row.standard_cost!=null?'£'+Number(row.standard_cost).toLocaleString():'—'}</td>
        </tr>`).join('')
      :'<tr><td colspan="6" class="text-center text-muted py-4">No lead times found</td></tr>';
    document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
      const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)pick(item);
    });
  }

  function pick(item){
    sel=item;
    sv('fSupplierId',item.supplier_id);sv('fPartName',item.part_name);sv('fPartNum',item.part_number);
    sv('fCategory',item.category||'components');sv('fStandard',item.standard_lead_days);
    sv('fExpress',item.express_lead_days);sv('fCost',item.standard_cost);
    sv('fPremium',item.express_premium_pct??50);sv('fNotes',item.notes);
    document.getElementById('btnDel').style.display='';render();
  }

  function clearForm(){
    sel=null;document.getElementById('form').reset();
    sv('fCategory','components');sv('fPremium','50');
    document.getElementById('btnDel').style.display='none';render();
  }

  async function save(){
    const body={supplier_id:gv('fSupplierId')||null,part_name:gv('fPartName'),part_number:gv('fPartNum'),
      category:gv('fCategory'),standard_lead_days:gv('fStandard')||null,express_lead_days:gv('fExpress')||null,
      standard_cost:gv('fCost')||null,express_premium_pct:gv('fPremium')||50,notes:gv('fNotes')};
    if(!body.part_name){alert('Part name is required');return;}
    try{
      const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){const saved=await r.json();if(!sel){sel=saved.data||saved;}await load();}
      else alert('Save failed');
    }catch(e){console.error(e);alert('Save failed');}
  }

  async function del(){
    if(!sel||!confirm('Delete this lead time entry? This cannot be undone.'))return;
    try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){clearForm();await load();}else alert('Delete failed');}
    catch(e){console.error(e);}
  }

  document.getElementById('btnAdd').onclick=clearForm;
  document.getElementById('btnSave').onclick=save;
  document.getElementById('btnDel').onclick=del;
  document.getElementById('searchBox').addEventListener('input',render);
  load();
  </script>
</body>
</html>
