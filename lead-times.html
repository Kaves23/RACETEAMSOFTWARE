<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Lead Times</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 18px;min-width:120px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .ev-stat-value{font-size:1.6rem;font-weight:700;color:#1a1d24;}
    .main-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;overflow:hidden;}
    .main-card-hdr{padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#ecfeff;}
    .perf-bar-wrap{width:120px;height:12px;background:#e5e7eb;border-radius:6px;overflow:hidden;display:inline-block;vertical-align:middle;}
    .perf-bar-fill{height:100%;border-radius:6px;transition:width .3s;}
    .perf-good{background:#10b981;}
    .perf-mid{background:#f59e0b;}
    .perf-low{background:#ef4444;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Lead Times</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Supplier delivery performance and reliability tracking</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#06b6d4;border-color:#06b6d4;">+ New Record</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Suppliers</div><div class="ev-stat-value" id="kpiSuppliers">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #06b6d4;"><div class="ev-stat-label">Avg Standard Lead</div><div class="ev-stat-value" id="kpiAvgStd">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #0ea5e9;"><div class="ev-stat-label">Avg Actual Lead</div><div class="ev-stat-value" id="kpiAvgActual">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #10b981;"><div class="ev-stat-label">Avg Reliability %</div><div class="ev-stat-value" id="kpiAvgRel">—</div></div>
  </div>

  <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
    <select class="form-select form-select-sm" id="filterSupplier" style="width:220px;"><option value="">All Suppliers</option></select>
    <input type="search" class="form-control form-control-sm" id="searchBox" placeholder="Search…" style="width:200px;"/>
  </div>

  <div class="main-card">
    <div class="main-card-hdr">
      <small style="font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;letter-spacing:.5px;">Lead Time Records</small>
      <small id="rowCount" class="text-muted" style="font-size:.75rem;">0 records</small>
    </div>
    <div style="overflow-y:auto;max-height:calc(100vh - 380px);">
      <table class="data-table">
        <thead><tr><th>Supplier</th><th>Category</th><th>Item Description</th><th>Standard (days)</th><th>Expedited (days)</th><th>Last Actual (days)</th><th>Reliability %</th><th>Performance</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="ltModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:#06b6d4;color:#fff;">
        <h5 class="modal-title" id="modalTitle">New Lead Time Record</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="ltForm" class="row g-3" onsubmit="return false">
          <div class="col-md-6"><label class="form-label small fw-semibold">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Supplier Name *</label><input class="form-control form-control-sm" id="fSupplierName"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Item Category *</label><input class="form-control form-control-sm" id="fItemCategory" placeholder="e.g. Brakes, Electronics"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Item Description</label><input class="form-control form-control-sm" id="fItemDescription"/></div>
          <div class="col-md-3"><label class="form-label small fw-semibold">Standard Lead (days) *</label><input type="number" class="form-control form-control-sm" id="fStandardLeadDays" min="0"/></div>
          <div class="col-md-3"><label class="form-label small fw-semibold">Expedited Lead (days)</label><input type="number" class="form-control form-control-sm" id="fExpeditedLeadDays" min="0"/></div>
          <div class="col-md-3"><label class="form-label small fw-semibold">Last Actual (days)</label><input type="number" class="form-control form-control-sm" id="fLastActualDays" min="0"/></div>
          <div class="col-md-3"><label class="form-label small fw-semibold">Reliability %</label><input type="number" class="form-control form-control-sm" id="fReliabilityPct" min="0" max="100" placeholder="0–100"/></div>
          <div class="col-12"><label class="form-label small fw-semibold">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="3"></textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-danger me-auto" id="btnDel" style="display:none;">Delete</button>
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm text-white" id="btnSave" style="background:#06b6d4;border-color:#06b6d4;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/lead-times';
let all=[],sel=null;
const modal=new bootstrap.Modal(document.getElementById('ltModal'));
const gv=id=>(document.getElementById(id)||{}).value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};

function perfBar(pct){
  const n=parseFloat(pct);
  if(isNaN(n))return'<span class="text-muted small">—</span>';
  const cls=n>=90?'perf-good':n>=70?'perf-mid':'perf-low';
  const label=n>=90?'<span style="color:#10b981;font-size:.72rem;font-weight:600;">'+n+'%</span>':n>=70?'<span style="color:#f59e0b;font-size:.72rem;font-weight:600;">'+n+'%</span>':'<span style="color:#ef4444;font-size:.72rem;font-weight:600;">'+n+'%</span>';
  return`<div class="d-flex align-items-center gap-2"><div class="perf-bar-wrap"><div class="perf-bar-fill ${cls}" style="width:${Math.min(n,100)}%;"></div></div>${label}</div>`;
}

async function load(){
  try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();buildSupplierFilter();render();}
  catch(e){console.error(e);}
}

function updateKPIs(){
  const suppliers=new Set(all.map(x=>x.supplier_name).filter(Boolean));
  document.getElementById('kpiSuppliers').textContent=suppliers.size||'—';
  const hasStd=all.filter(x=>x.standard_lead_days!=null);
  const hasAct=all.filter(x=>x.last_actual_days!=null);
  const hasRel=all.filter(x=>x.reliability_pct!=null);
  document.getElementById('kpiAvgStd').textContent=hasStd.length?(hasStd.reduce((a,x)=>a+Number(x.standard_lead_days),0)/hasStd.length).toFixed(1)+'d':'—';
  document.getElementById('kpiAvgActual').textContent=hasAct.length?(hasAct.reduce((a,x)=>a+Number(x.last_actual_days),0)/hasAct.length).toFixed(1)+'d':'—';
  document.getElementById('kpiAvgRel').textContent=hasRel.length?(hasRel.reduce((a,x)=>a+Number(x.reliability_pct),0)/hasRel.length).toFixed(1)+'%':'—';
}

function buildSupplierFilter(){
  const suppliers=[...new Set(all.map(x=>x.supplier_name).filter(Boolean))].sort();
  const sel=document.getElementById('filterSupplier');
  const cur=sel.value;
  sel.innerHTML='<option value="">All Suppliers</option>'+suppliers.map(s=>`<option value="${s}">${s}</option>`).join('');
  if(cur) sel.value=cur;
}

function render(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const fs=document.getElementById('filterSupplier').value;
  let d=[...all];
  if(fs) d=d.filter(x=>x.supplier_name===fs);
  if(q) d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
  document.getElementById('rowCount').textContent=d.length+' records';
  document.getElementById('tbody').innerHTML=d.length
    ?d.map(row=>`<tr data-id="${row.id}">
        <td class="fw-semibold">${row.supplier_name||'—'}</td>
        <td>${row.item_category||'—'}</td>
        <td>${row.item_description||'—'}</td>
        <td>${row.standard_lead_days!=null?row.standard_lead_days+'d':'—'}</td>
        <td>${row.expedited_lead_days!=null?row.expedited_lead_days+'d':'—'}</td>
        <td>${row.last_actual_days!=null?row.last_actual_days+'d':'—'}</td>
        <td>${row.reliability_pct!=null?row.reliability_pct+'%':'—'}</td>
        <td>${perfBar(row.reliability_pct)}</td>
      </tr>`).join('')
    :'<tr><td colspan="8" class="text-center text-muted py-4">No records found</td></tr>';
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
    const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)openEdit(item);
  });
}

function openNew(){
  sel=null;document.getElementById('ltForm').reset();
  document.getElementById('modalTitle').textContent='New Lead Time Record';
  document.getElementById('btnDel').style.display='none';modal.show();
}

function openEdit(item){
  sel=item;document.getElementById('modalTitle').textContent='Edit Lead Time Record';
  document.getElementById('btnDel').style.display='';
  sv('fSupplierId',item.supplier_id);sv('fSupplierName',item.supplier_name);
  sv('fItemCategory',item.item_category);sv('fItemDescription',item.item_description);
  sv('fStandardLeadDays',item.standard_lead_days);sv('fExpeditedLeadDays',item.expedited_lead_days);
  sv('fLastActualDays',item.last_actual_days);sv('fReliabilityPct',item.reliability_pct);sv('fNotes',item.notes);
  modal.show();
}

async function save(){
  const body={supplier_id:gv('fSupplierId')||null,supplier_name:gv('fSupplierName'),
    item_category:gv('fItemCategory'),item_description:gv('fItemDescription'),
    standard_lead_days:gv('fStandardLeadDays')||null,expedited_lead_days:gv('fExpeditedLeadDays')||null,
    last_actual_days:gv('fLastActualDays')||null,reliability_pct:gv('fReliabilityPct')||null,notes:gv('fNotes')};
  if(!body.supplier_name||!body.item_category||!body.standard_lead_days){alert('Supplier Name, Item Category and Standard Lead Days are required');return;}
  try{
    const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){modal.hide();await load();}else alert('Save failed');
  }catch(e){console.error(e);alert('Save failed');}
}

async function del(){
  if(!sel||!confirm('Delete this record?'))return;
  try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){modal.hide();await load();}else alert('Delete failed');}
  catch(e){console.error(e);}
}

document.getElementById('btnAdd').onclick=openNew;
document.getElementById('btnSave').onclick=save;
document.getElementById('btnDel').onclick=del;
document.getElementById('searchBox').addEventListener('input',render);
document.getElementById('filterSupplier').addEventListener('change',render);
load();
</script>
</body>
</html>
