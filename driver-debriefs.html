<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Driver Debriefs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    .main-shell{display:flex;gap:12px;}
    .sidebar{width:200px;min-width:170px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);}
    .sidebar-header{padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #dee2e6;}
    .sidebar-body{padding:8px;}
    .drv-item{display:block;padding:7px 10px;border-radius:6px;font-size:.82rem;color:#1a1d24;cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all .1s;}
    .drv-item:hover{background:#fff0f3;color:#f43f5e;}
    .drv-item.active{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.3);color:#f43f5e;font-weight:700;}

    .main-content{flex:1 1 0;min-width:0;}
    .content-header{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px 8px 0 0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 4px rgba(0,0,0,.06);}
    .debriefs-list{display:flex;flex-direction:column;gap:10px;}

    .debrief-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.05);overflow:hidden;}
    .debrief-card-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;transition:background .1s;}
    .debrief-card-header:hover{background:#fdf2f5;}
    .debrief-title{font-size:.9rem;font-weight:700;color:#1a1d24;}
    .debrief-meta{font-size:.75rem;color:#6c757d;}
    .ratings-row{display:flex;gap:8px;align-items:center;}
    .rating-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0;}
    .rc-balance{background:#3b82f6;}
    .rc-traction{background:#10b981;}
    .rc-braking{background:#ef4444;}
    .rating-label{font-size:.6rem;text-align:center;margin-top:2px;color:#6c757d;}

    .debrief-card-body{padding:16px;border-top:1px solid #f0f0f0;background:#fafafa;display:none;}
    .debrief-card-body.show{display:block;}
    .section-label{font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;letter-spacing:.05em;margin-bottom:4px;}
    .section-text{font-size:.82rem;color:#1a1d24;margin-bottom:12px;line-height:1.5;}

    .badge-ms{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;}
    .ms-positive{background:#d1fae5;color:#065f46;}
    .ms-neutral{background:#f3f4f6;color:#374151;}
    .ms-frustrated{background:#fee2e2;color:#991b1b;}
    .ms-confident{background:#dbeafe;color:#1d4ed8;}
    .ms-struggling{background:#fef3c7;color:#92400e;}

    .chevron{transition:transform .2s;display:inline-block;}
    .chevron.open{transform:rotate(90deg);}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Driver Debriefs</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Post-session driver feedback — balance, traction and braking ratings</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#f43f5e;border-color:#f43f5e;">+ New Debrief</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Avg Balance</div><div class="ev-stat-value" id="kpiBalance">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Avg Traction</div><div class="ev-stat-value" id="kpiTraction">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Avg Braking</div><div class="ev-stat-value" id="kpiBraking">—</div></div>
  </div>

  <div class="main-shell">
    <div class="sidebar">
      <div class="sidebar-header"><span style="font-size:.75rem;font-weight:700;color:#6c757d;text-transform:uppercase;">Drivers</span></div>
      <div class="sidebar-body" id="driverList"></div>
    </div>
    <div class="main-content">
      <div class="content-header">
        <div>
          <div class="fw-bold" id="contentTitle" style="font-size:.95rem;">All Drivers</div>
          <div class="text-secondary" id="contentSub" style="font-size:.78rem;"></div>
        </div>
        <input type="search" id="fSearch" class="form-control form-control-sm" placeholder="Search session…" style="width:180px;"/>
      </div>
      <div class="mt-2 debriefs-list" id="debriefsContainer">
        <div class="p-4 text-center text-secondary" style="font-size:.85rem;">No debriefs found.</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="dbModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#f43f5e;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">New Debrief</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="dbForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver ID</label>
              <input type="text" class="form-control form-control-sm" id="fDriverId"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Session Name *</label>
              <input type="text" class="form-control form-control-sm" id="fSessionName" required/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Debrief Date *</label>
              <input type="date" class="form-control form-control-sm" id="fDebriefDate" required/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Event ID</label>
              <input type="text" class="form-control form-control-sm" id="fEventId"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Engineer Name</label>
              <input type="text" class="form-control form-control-sm" id="fEngineerName"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Mental State</label>
              <select class="form-select form-select-sm" id="fMentalState">
                <option value="">Select…</option>
                <option value="positive">Positive</option>
                <option value="neutral">Neutral</option>
                <option value="frustrated">Frustrated</option>
                <option value="confident">Confident</option>
                <option value="struggling">Struggling</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Balance Rating (1-10)</label>
              <input type="number" min="1" max="10" class="form-control form-control-sm" id="fBalanceRating"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Traction Rating (1-10)</label>
              <input type="number" min="1" max="10" class="form-control form-control-sm" id="fTractionRating"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Braking Rating (1-10)</label>
              <input type="number" min="1" max="10" class="form-control form-control-sm" id="fBrakingRating"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Overall Feeling</label>
              <textarea class="form-control form-control-sm" id="fOverallFeeling" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Key Issues</label>
              <textarea class="form-control form-control-sm" id="fKeyIssues" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Setup Requests</label>
              <textarea class="form-control form-control-sm" id="fSetupRequests" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Action Items</label>
              <textarea class="form-control form-control-sm" id="fActionItems" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-danger me-auto d-none" id="btnDel">Delete</button>
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#f43f5e;border-color:#f43f5e;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/driver-debriefs';
let allDebriefs=[],selDriver='',editId=null;
const modal=new bootstrap.Modal(document.getElementById('dbModal'));

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function avg(arr,key){const vs=arr.map(x=>parseFloat(x[key])).filter(v=>!isNaN(v));return vs.length?( vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):'—';}

function msBadge(s){const m={positive:'ms-positive',neutral:'ms-neutral',frustrated:'ms-frustrated',confident:'ms-confident',struggling:'ms-struggling'};return s?`<span class="badge-ms ${m[s]||'ms-neutral'}">${esc(s)}</span>`:'';;}

async function load(){
  try{const r=await fetch(API);if(r.ok)allDebriefs=await r.json();}catch(e){allDebriefs=[];}
  renderKPIs();
  renderSidebar();
  renderDebriefs();
}

function renderKPIs(){
  document.getElementById('kpiTotal').textContent=allDebriefs.length;
  document.getElementById('kpiBalance').textContent=avg(allDebriefs,'balance_rating');
  document.getElementById('kpiTraction').textContent=avg(allDebriefs,'traction_rating');
  document.getElementById('kpiBraking').textContent=avg(allDebriefs,'braking_rating');
}

function renderSidebar(){
  const drivers=[...new Set(allDebriefs.map(d=>d.driver_name).filter(Boolean))].sort();
  document.getElementById('driverList').innerHTML=
    `<span class="drv-item${selDriver===''?' active':''}" onclick="selectDriver('')">All Drivers</span>`+
    drivers.map(n=>`<span class="drv-item${selDriver===n?' active':''}" onclick="selectDriver('${esc(n)}')">${esc(n)}</span>`).join('');
}

function selectDriver(name){
  selDriver=allDebriefs.find(d=>d.driver_name===name)?name:(name===''?'':selDriver);
  selDriver=name;
  renderSidebar();
  renderDebriefs();
}

function filtered(){
  const q=document.getElementById('fSearch').value.toLowerCase();
  return allDebriefs.filter(d=>{
    if(selDriver&&d.driver_name!==selDriver)return false;
    if(q&&!`${d.session_name} ${d.driver_name}`.toLowerCase().includes(q))return false;
    return true;
  }).sort((a,b)=>new Date(b.debrief_date)-new Date(a.debrief_date));
}

function renderDebriefs(){
  const data=filtered();
  const ct=document.getElementById('debriefsContainer');
  document.getElementById('contentTitle').textContent=selDriver||'All Drivers';
  document.getElementById('contentSub').textContent=`${data.length} debrief${data.length!==1?'s':''}`;
  if(!data.length){ct.innerHTML='<div class="bg-white border rounded p-4 text-center text-secondary" style="font-size:.85rem;">No debriefs found.</div>';return;}
  ct.innerHTML=data.map(d=>`
    <div class="debrief-card">
      <div class="debrief-card-header" onclick="toggleCard(this)">
        <div>
          <div class="debrief-title">${esc(d.session_name||'')} <small class="text-secondary fw-normal ms-2" style="font-size:.75rem;">${fmtDate(d.debrief_date)}</small></div>
          <div class="debrief-meta">${esc(d.driver_name||'')}${d.engineer_name?` · Engineer: ${esc(d.engineer_name)}`:''}</div>
          <div class="mt-1">${msBadge(d.mental_state)}</div>
        </div>
        <div class="d-flex align-items-center gap-3">
          <div class="ratings-row">
            <div class="text-center">
              <div class="rating-circle rc-balance">${d.balance_rating??'—'}</div>
              <div class="rating-label">Balance</div>
            </div>
            <div class="text-center">
              <div class="rating-circle rc-traction">${d.traction_rating??'—'}</div>
              <div class="rating-label">Traction</div>
            </div>
            <div class="text-center">
              <div class="rating-circle rc-braking">${d.braking_rating??'—'}</div>
              <div class="rating-label">Braking</div>
            </div>
          </div>
          <div class="d-flex gap-1">
            <button class="btn btn-outline-secondary" style="font-size:.7rem;padding:2px 8px;" onclick="event.stopPropagation();openEdit(${d.id})">Edit</button>
          </div>
          <span class="chevron" style="font-size:.85rem;color:#6c757d;">&#9654;</span>
        </div>
      </div>
      <div class="debrief-card-body">
        ${d.overall_feeling?`<div class="section-label">Overall Feeling</div><div class="section-text">${esc(d.overall_feeling)}</div>`:''}
        ${d.key_issues?`<div class="section-label">Key Issues</div><div class="section-text">${esc(d.key_issues)}</div>`:''}
        ${d.setup_requests?`<div class="section-label">Setup Requests</div><div class="section-text">${esc(d.setup_requests)}</div>`:''}
        ${d.action_items?`<div class="section-label">Action Items</div><div class="section-text">${esc(d.action_items)}</div>`:''}
      </div>
    </div>`).join('');
}

function toggleCard(header){
  const body=header.nextElementSibling;
  const chevron=header.querySelector('.chevron');
  body.classList.toggle('show');
  chevron.classList.toggle('open');
}

function openNew(){
  document.getElementById('dbForm').reset();
  document.getElementById('fId').value='';
  editId=null;
  document.getElementById('modalTitle').textContent='New Debrief';
  document.getElementById('btnDel').classList.add('d-none');
  if(selDriver) document.getElementById('fDriverName').value=selDriver;
  modal.show();
}

function openEdit(id){
  const d=allDebriefs.find(x=>x.id===id);if(!d)return;
  editId=id;
  document.getElementById('fId').value=d.id;
  document.getElementById('fDriverName').value=d.driver_name||'';
  document.getElementById('fDriverId').value=d.driver_id||'';
  document.getElementById('fEventId').value=d.event_id||'';
  document.getElementById('fSessionName').value=d.session_name||'';
  document.getElementById('fDebriefDate').value=d.debrief_date?d.debrief_date.slice(0,10):'';
  document.getElementById('fEngineerName').value=d.engineer_name||'';
  document.getElementById('fBalanceRating').value=d.balance_rating??'';
  document.getElementById('fTractionRating').value=d.traction_rating??'';
  document.getElementById('fBrakingRating').value=d.braking_rating??'';
  document.getElementById('fOverallFeeling').value=d.overall_feeling||'';
  document.getElementById('fKeyIssues').value=d.key_issues||'';
  document.getElementById('fSetupRequests').value=d.setup_requests||'';
  document.getElementById('fMentalState').value=d.mental_state||'';
  document.getElementById('fActionItems').value=d.action_items||'';
  document.getElementById('modalTitle').textContent='Edit Debrief';
  document.getElementById('btnDel').classList.remove('d-none');
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    driver_id:document.getElementById('fDriverId').value.trim(),
    event_id:document.getElementById('fEventId').value.trim(),
    session_name:document.getElementById('fSessionName').value.trim(),
    debrief_date:document.getElementById('fDebriefDate').value||null,
    engineer_name:document.getElementById('fEngineerName').value.trim(),
    balance_rating:document.getElementById('fBalanceRating').value||null,
    traction_rating:document.getElementById('fTractionRating').value||null,
    braking_rating:document.getElementById('fBrakingRating').value||null,
    overall_feeling:document.getElementById('fOverallFeeling').value.trim(),
    key_issues:document.getElementById('fKeyIssues').value.trim(),
    setup_requests:document.getElementById('fSetupRequests').value.trim(),
    mental_state:document.getElementById('fMentalState').value,
    action_items:document.getElementById('fActionItems').value.trim()
  };
  if(!body.driver_name||!body.session_name||!body.debrief_date){alert('Driver Name, Session Name and Date are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(){
  const id=document.getElementById('fId').value;if(!id)return;
  if(!confirm('Delete this debrief?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  modal.hide();load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('btnDel').addEventListener('click',del);
document.getElementById('fSearch').addEventListener('input',renderDebriefs);
load();
</script>
</body>
</html>
