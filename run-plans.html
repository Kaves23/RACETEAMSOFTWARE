<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Run Plans</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css?v=20260420">
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); min-height:100vh; }
    .rts-main { padding:1.5rem; }
    .ev-stats-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .ev-stat-card { background:#fff; border-radius:10px; padding:1rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.08); min-width:130px; border-top:4px solid #7c3aed; }
    .ev-stat-label { font-size:.72rem; text-transform:uppercase; color:#6b7280; font-weight:600; letter-spacing:.05em; }
    .ev-stat-value { font-size:1.8rem; font-weight:800; color:#1f2937; line-height:1.1; }
    .page-body { display:flex; gap:1.25rem; align-items:flex-start; }
    .filter-sidebar { width:210px; flex-shrink:0; background:#fff; border-radius:10px; padding:1.1rem; box-shadow:0 2px 8px rgba(0,0,0,.08); position:sticky; top:1rem; }
    .filter-sidebar h6 { font-weight:700; color:#374151; margin-bottom:1rem; font-size:.85rem; text-transform:uppercase; letter-spacing:.05em; }
    .main-content { flex:1; min-width:0; }
    .table-wrapper { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }
    .table { margin:0; }
    .table thead th { background:#7c3aed; color:#fff; font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; border:none; padding:.7rem 1rem; white-space:nowrap; }
    .table tbody tr { cursor:pointer; transition:background .15s; }
    .table tbody tr:hover { background:#f5f3ff; }
    .table tbody tr.selected { background:#ede9fe !important; }
    .table tbody td { padding:.6rem 1rem; vertical-align:middle; font-size:.875rem; border-color:#f3f4f6; }
    .bp { display:inline-block; padding:.25rem .65rem; border-radius:20px; font-size:.75rem; font-weight:600; white-space:nowrap; }
    .bp-planned    { background:#dbeafe; color:#1d4ed8; }
    .bp-in_progress{ background:#fef3c7; color:#b45309; }
    .bp-completed  { background:#d1fae5; color:#065f46; }
    .bp-cancelled  { background:#f3f4f6; color:#6b7280; }
    /* Drawer */
    .drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:1040; }
    .drawer-overlay.open { display:block; }
    .drawer { position:fixed; top:0; right:-520px; width:480px; height:100vh; background:#fff; z-index:1050; box-shadow:-6px 0 30px rgba(0,0,0,.15); transition:right .28s ease; overflow-y:auto; display:flex; flex-direction:column; }
    .drawer.open { right:0; }
    .drawer-head { padding:1.2rem 1.5rem; border-bottom:1px solid #e5e7eb; background:#7c3aed; color:#fff; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .drawer-head h5 { margin:0; font-weight:700; font-size:1rem; }
    .drawer-body { padding:1.5rem; flex:1; overflow-y:auto; }
    .drawer-foot { padding:1rem 1.5rem; border-top:1px solid #e5e7eb; display:flex; gap:.5rem; justify-content:flex-end; flex-shrink:0; }
    .section-label { font-size:.7rem; font-weight:700; text-transform:uppercase; color:#9ca3af; letter-spacing:.06em; margin:1.1rem 0 .55rem; }
    .page-title { font-weight:800; color:#7c3aed; letter-spacing:-.01em; }
  </style>
</head>
<body>
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="page-title mb-0">Run Plans</h2>
    <button class="btn btn-sm fw-semibold" style="background:#7c3aed;color:#fff;padding:.4rem 1rem" onclick="openDrawer()">+ New Run Plan</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Planned</div><div class="ev-stat-value" id="kpiPlanned">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">In Progress</div><div class="ev-stat-value" id="kpiInProgress">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Completed</div><div class="ev-stat-value" id="kpiCompleted">—</div></div>
  </div>

  <div class="page-body">
    <aside class="filter-sidebar">
      <h6>Filters</h6>
      <label class="form-label small fw-semibold mb-1">Status</label>
      <select class="form-select form-select-sm mb-3" id="filterStatus" onchange="applyFilters()">
        <option value="">All</option>
        <option value="planned">Planned</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <label class="form-label small fw-semibold mb-1">Car #</label>
      <select class="form-select form-select-sm" id="filterCar" onchange="applyFilters()">
        <option value="">All</option>
      </select>
      <button class="btn btn-outline-secondary btn-sm mt-3 w-100" onclick="clearFilters()">Clear Filters</button>
    </aside>

    <div class="main-content">
      <div class="table-wrapper">
        <table class="table table-hover" id="mainTable">
          <thead>
            <tr>
              <th>Session Name</th>
              <th>Car #</th>
              <th>Driver</th>
              <th>Planned Laps</th>
              <th>Actual Laps</th>
              <th>Fuel Load (L)</th>
              <th>Compound</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="mainTbody">
            <tr><td colspan="8" class="text-center text-muted py-5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Slide-in drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h5 id="drawerTitle">New Run Plan</h5>
    <button type="button" class="btn-close btn-close-white" onclick="closeDrawer()"></button>
  </div>
  <div class="drawer-body">
    <form id="runPlanForm" onsubmit="return false">
      <input type="hidden" id="fId">
      <div class="mb-3">
        <label class="form-label fw-semibold">Session Name <span class="text-danger">*</span></label>
        <input type="text" class="form-control" id="fSessionName" required placeholder="e.g. FP1, Q1, Race">
      </div>
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Car #</label>
          <input type="text" class="form-control" id="fCarNumber" placeholder="e.g. 7">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Driver Name</label>
          <input type="text" class="form-control" id="fDriverName">
        </div>
      </div>
      <div class="section-label">Lap &amp; Fuel Data</div>
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Planned Laps</label>
          <input type="number" class="form-control" id="fPlannedLaps" min="0" placeholder="0">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Actual Laps</label>
          <input type="number" class="form-control" id="fActualLaps" min="0" placeholder="0">
        </div>
      </div>
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Fuel Load (L)</label>
          <input type="number" class="form-control" id="fFuelLoad" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Tyre Compound</label>
          <input type="text" class="form-control" id="fTyreCompound" placeholder="e.g. Soft">
        </div>
      </div>
      <div class="section-label">Plan Details</div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Objectives</label>
        <textarea class="form-control" id="fObjectives" rows="3" placeholder="Session objectives…"></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Notes</label>
        <textarea class="form-control" id="fNotes" rows="3"></textarea>
      </div>
      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label fw-semibold">Status</label>
          <select class="form-select" id="fStatus">
            <option value="planned">Planned</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option>
          </select>
        </div>
        <div class="col">
          <label class="form-label fw-semibold">Created By</label>
          <input type="text" class="form-control" id="fCreatedBy">
        </div>
      </div>
    </form>
  </div>
  <div class="drawer-foot">
    <button class="btn btn-outline-danger btn-sm d-none me-auto" id="btnDelete" onclick="deleteRecord()">Delete</button>
    <button class="btn btn-secondary btn-sm" onclick="closeDrawer()">Cancel</button>
    <button class="btn btn-sm fw-semibold" style="background:#7c3aed;color:#fff" onclick="saveRecord()">Save</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="core.js?v=20260420"></script>
<script src="topnav.js?v=20260420"></script>
<script>
let allData = [];
let currentId = null;

async function loadData() {
  try {
    const res = await fetch('/api/run-plans');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) { allData = []; }
  populateCarFilter();
  updateKPIs();
  applyFilters();
}

function populateCarFilter() {
  const cars = [...new Set(allData.map(r => r.car_number).filter(Boolean))].sort();
  const sel = document.getElementById('filterCar');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All</option>' + cars.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  sel.value = cur;
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent      = allData.length;
  document.getElementById('kpiPlanned').textContent    = allData.filter(r => r.status === 'planned').length;
  document.getElementById('kpiInProgress').textContent = allData.filter(r => r.status === 'in_progress').length;
  document.getElementById('kpiCompleted').textContent  = allData.filter(r => r.status === 'completed').length;
}

function statusBadge(s) {
  const map = { planned:'bp-planned', in_progress:'bp-in_progress', completed:'bp-completed', cancelled:'bp-cancelled' };
  return `<span class="bp ${map[s] || 'bp-cancelled'}">${(s||'—').replace('_',' ')}</span>`;
}

function applyFilters() {
  const st  = document.getElementById('filterStatus').value;
  const car = document.getElementById('filterCar').value;
  const filtered = allData.filter(r =>
    (!st  || r.status === st) &&
    (!car || r.car_number === car)
  );
  renderTable(filtered);
}

function clearFilters() {
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterCar').value    = '';
  applyFilters();
}

function renderTable(data) {
  const tbody = document.getElementById('mainTbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">No records found</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr onclick="selectRow(${r.id})" class="${currentId === r.id ? 'selected' : ''}">
      <td class="fw-semibold">${esc(r.session_name)}</td>
      <td>${esc(r.car_number)}</td>
      <td>${esc(r.driver_name)}</td>
      <td>${r.planned_laps ?? '—'}</td>
      <td>${r.actual_laps ?? '—'}</td>
      <td>${r.fuel_load != null ? Number(r.fuel_load).toFixed(2) : '—'}</td>
      <td>${esc(r.tyre_compound)}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>`).join('');
}

function esc(v) {
  return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—';
}

function selectRow(id) {
  const rec = allData.find(r => r.id === id);
  if (!rec) return;
  currentId = id;
  applyFilters();
  openDrawer(rec);
}

function openDrawer(rec = null) {
  document.getElementById('drawerTitle').textContent = rec ? 'Edit Run Plan' : 'New Run Plan';
  document.getElementById('btnDelete').classList.toggle('d-none', !rec);
  document.getElementById('fId').value          = rec ? rec.id : '';
  document.getElementById('fSessionName').value = rec ? (rec.session_name || '') : '';
  document.getElementById('fCarNumber').value   = rec ? (rec.car_number   || '') : '';
  document.getElementById('fDriverName').value  = rec ? (rec.driver_name  || '') : '';
  document.getElementById('fPlannedLaps').value = rec ? (rec.planned_laps ?? '') : '';
  document.getElementById('fActualLaps').value  = rec ? (rec.actual_laps  ?? '') : '';
  document.getElementById('fFuelLoad').value    = rec ? (rec.fuel_load    ?? '') : '';
  document.getElementById('fTyreCompound').value= rec ? (rec.tyre_compound|| '') : '';
  document.getElementById('fObjectives').value  = rec ? (rec.objectives   || '') : '';
  document.getElementById('fNotes').value       = rec ? (rec.notes        || '') : '';
  document.getElementById('fStatus').value      = rec ? (rec.status || 'planned') : 'planned';
  document.getElementById('fCreatedBy').value   = rec ? (rec.created_by   || '') : '';
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
}

function closeDrawer() {
  currentId = null;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  applyFilters();
}

function buildPayload() {
  return {
    session_name : document.getElementById('fSessionName').value.trim(),
    car_number   : document.getElementById('fCarNumber').value.trim(),
    driver_name  : document.getElementById('fDriverName').value.trim(),
    planned_laps : numOrNull('fPlannedLaps'),
    actual_laps  : numOrNull('fActualLaps'),
    fuel_load    : numOrNull('fFuelLoad'),
    tyre_compound: document.getElementById('fTyreCompound').value.trim(),
    objectives   : document.getElementById('fObjectives').value.trim(),
    notes        : document.getElementById('fNotes').value.trim(),
    status       : document.getElementById('fStatus').value,
    created_by   : document.getElementById('fCreatedBy').value.trim()
  };
}

function numOrNull(id) {
  const v = document.getElementById(id).value;
  return v !== '' ? Number(v) : null;
}

async function saveRecord() {
  const payload = buildPayload();
  if (!payload.session_name) { alert('Session Name is required'); return; }
  const id = document.getElementById('fId').value;
  try {
    const res = await fetch(id ? `/api/run-plans/${id}` : '/api/run-plans', {
      method : id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    closeDrawer();
    await loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Delete this run plan? This cannot be undone.')) return;
  try {
    const res = await fetch(`/api/run-plans/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    closeDrawer();
    await loadData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}

loadData();
</script>
</body>
</html>
