<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Driver Licences</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
    .filter-bar select,.filter-bar input{font-size:.8rem;padding:4px 8px;border:1px solid #dee2e6;border-radius:6px;background:#fff;color:#1a1d24;}

    .licences-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;}
    .lic-card{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.08);border:2px solid transparent;cursor:pointer;transition:all .15s;position:relative;}
    .lic-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12);}
    .lic-card.valid{border-color:#10b981;}
    .lic-card.expiring_soon{border-color:#f59e0b;}
    .lic-card.expired,.lic-card.suspended{border-color:#ef4444;}
    .lic-card.pending{border-color:#9ca3af;}

    .lic-driver{font-size:1rem;font-weight:700;color:#1a1d24;margin-bottom:6px;}
    .lic-type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;margin-bottom:10px;}
    .lt-competition{background:#dbeafe;color:#1d4ed8;}
    .lt-international{background:#ede9fe;color:#5b21b6;}
    .lt-superlicence{background:#fef3c7;color:#92400e;}
    .lt-national{background:#d1fae5;color:#065f46;}
    .lt-medical{background:#fee2e2;color:#991b1b;}
    .lt-other{background:#f3f4f6;color:#6b7280;}

    .lic-meta{font-size:.75rem;color:#6c757d;margin-bottom:3px;}
    .lic-meta span{color:#1a1d24;font-weight:600;}

    .lic-expiry{font-size:1.4rem;font-weight:800;margin:10px 0 4px;}
    .lic-expiry.valid{color:#10b981;}
    .lic-expiry.expiring_soon{color:#f59e0b;}
    .lic-expiry.expired,.lic-expiry.suspended{color:#ef4444;}
    .lic-expiry.pending{color:#9ca3af;}

    .lic-countdown{font-size:.72rem;font-weight:600;margin-bottom:8px;}

    .lic-status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.65rem;font-weight:700;}
    .ls-valid{background:#d1fae5;color:#065f46;}
    .ls-expiring_soon{background:#fef3c7;color:#92400e;}
    .ls-expired{background:#fee2e2;color:#991b1b;}
    .ls-suspended{background:#fee2e2;color:#991b1b;}
    .ls-pending{background:#f3f4f6;color:#6b7280;}

    .sp-badge{background:#fef3c7;color:#92400e;display:inline-block;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:700;margin-left:4px;}
    .edit-btn{position:absolute;top:10px;right:10px;opacity:0;transition:opacity .15s;}
    .lic-card:hover .edit-btn{opacity:1;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Driver Licences</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Competition licences, superlicences and medical certificates</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#f59e0b;border-color:#f59e0b;">+ New Licence</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Valid</div><div class="ev-stat-value" id="kpiValid">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Expiring &lt;60d</div><div class="ev-stat-value" id="kpiExpiring">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Expired / Suspended</div><div class="ev-stat-value" id="kpiExpired">—</div></div>
  </div>

  <div class="filter-bar">
    <label class="fw-semibold me-1" style="font-size:.8rem;color:#6c757d;">Filter:</label>
    <input type="search" id="fSearch" placeholder="Search driver…" style="width:180px;"/>
    <select id="fType">
      <option value="">All Types</option>
      <option value="competition">Competition</option>
      <option value="international">International</option>
      <option value="superlicence">Superlicence</option>
      <option value="national">National</option>
      <option value="medical">Medical</option>
      <option value="other">Other</option>
    </select>
    <select id="fStatus">
      <option value="">All Status</option>
      <option value="valid">Valid</option>
      <option value="expiring_soon">Expiring Soon</option>
      <option value="expired">Expired</option>
      <option value="suspended">Suspended</option>
      <option value="pending">Pending</option>
    </select>
  </div>

  <div class="licences-grid" id="licGrid"></div>
</div>

<!-- Modal -->
<div class="modal fade" id="lModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#f59e0b;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">New Licence</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="lForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver ID</label>
              <input type="text" class="form-control form-control-sm" id="fDriverId"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Licence Type</label>
              <select class="form-select form-select-sm" id="fLicenceType">
                <option value="competition">Competition</option>
                <option value="international">International</option>
                <option value="superlicence">Superlicence</option>
                <option value="national">National</option>
                <option value="medical">Medical</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Issuing Body *</label>
              <input type="text" class="form-control form-control-sm" id="fIssuingBody" required placeholder="e.g. FIA, MSA"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Licence Number</label>
              <input type="text" class="form-control form-control-sm" id="fLicenceNumber"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Issue Date</label>
              <input type="date" class="form-control form-control-sm" id="fIssueDate"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Expiry Date *</label>
              <input type="date" class="form-control form-control-sm" id="fExpiryDate" required/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Grade</label>
              <input type="text" class="form-control form-control-sm" id="fGrade"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Superlicence Points</label>
              <input type="number" class="form-control form-control-sm" id="fSuperlicencePoints" value="0"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Status</label>
              <select class="form-select form-select-sm" id="fStatus2">
                <option value="valid">Valid</option>
                <option value="expiring_soon">Expiring Soon</option>
                <option value="expired">Expired</option>
                <option value="suspended">Suspended</option>
                <option value="pending">Pending</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Document URL</label>
              <input type="url" class="form-control form-control-sm" id="fDocumentUrl" placeholder="https://…"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-danger me-auto d-none" id="btnDel">Delete</button>
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#f59e0b;border-color:#f59e0b;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/driver-licences';
let allLicences=[];
const modal=new bootstrap.Modal(document.getElementById('lModal'));

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function daysUntil(s){if(!s)return null;return Math.ceil((new Date(s)-new Date())/86400000);}

function licTypeClass(t){return({competition:'lt-competition',international:'lt-international',superlicence:'lt-superlicence',national:'lt-national',medical:'lt-medical'})[t]||'lt-other';}
function statusClass(s){return({valid:'ls-valid',expiring_soon:'ls-expiring_soon',expired:'ls-expired',suspended:'ls-suspended',pending:'ls-pending'})[s]||'ls-pending';}
function cardClass(s){return({valid:'valid',expiring_soon:'expiring_soon',expired:'expired',suspended:'suspended',pending:'pending'})[s]||'pending';}

function computeStatus(lic){
  if(lic.status&&lic.status!=='valid') return lic.status;
  if(!lic.expiry_date) return lic.status||'pending';
  const d=daysUntil(lic.expiry_date);
  if(d<0) return 'expired';
  if(d<=60) return 'expiring_soon';
  return 'valid';
}

async function load(){
  try{const r=await fetch(API);if(r.ok)allLicences=await r.json();}catch(e){allLicences=[];}
  renderKPIs();
  renderGrid();
}

function renderKPIs(){
  const statuses=allLicences.map(l=>computeStatus(l));
  document.getElementById('kpiTotal').textContent=allLicences.length;
  document.getElementById('kpiValid').textContent=statuses.filter(s=>s==='valid').length;
  document.getElementById('kpiExpiring').textContent=statuses.filter(s=>s==='expiring_soon').length;
  document.getElementById('kpiExpired').textContent=statuses.filter(s=>s==='expired'||s==='suspended').length;
}

function filtered(){
  const q=document.getElementById('fSearch').value.toLowerCase();
  const t=document.getElementById('fType').value;
  const s=document.getElementById('fStatus').value;
  return allLicences.filter(l=>{
    const cs=computeStatus(l);
    if(t&&l.licence_type!==t)return false;
    if(s&&cs!==s)return false;
    if(q&&!(l.driver_name||'').toLowerCase().includes(q))return false;
    return true;
  });
}

function renderGrid(){
  const data=filtered();
  const grid=document.getElementById('licGrid');
  if(!data.length){grid.innerHTML='<div class="text-secondary" style="font-size:.85rem;">No licences found.</div>';return;}
  grid.innerHTML=data.map(l=>{
    const cs=computeStatus(l);
    const d=daysUntil(l.expiry_date);
    let countdown='';
    if(d!==null){
      if(d<0) countdown=`<div class="lic-countdown" style="color:#ef4444;">Expired ${Math.abs(d)} days ago</div>`;
      else if(d===0) countdown=`<div class="lic-countdown" style="color:#ef4444;">Expires TODAY</div>`;
      else countdown=`<div class="lic-countdown" style="color:${d<=60?'#f59e0b':'#6c757d'};">${d} days remaining</div>`;
    }
    const sp=parseInt(l.superlicence_points)||0;
    return `<div class="lic-card ${cardClass(cs)}" onclick="openEdit(${l.id})">
      <button class="edit-btn btn btn-sm btn-outline-secondary" style="font-size:.7rem;padding:1px 7px;" onclick="event.stopPropagation();openEdit(${l.id})">Edit</button>
      <div class="lic-driver">${esc(l.driver_name||'')}</div>
      <div><span class="lic-type-badge ${licTypeClass(l.licence_type)}">${esc(l.licence_type||'')}</span></div>
      <div class="lic-meta">Issuing Body: <span>${esc(l.issuing_body||'')}</span></div>
      ${l.licence_number?`<div class="lic-meta">Licence No: <span>${esc(l.licence_number)}</span></div>`:''}
      ${l.grade?`<div class="lic-meta">Grade: <span>${esc(l.grade)}</span></div>`:''}
      <div class="lic-expiry ${cardClass(cs)}">${fmtDate(l.expiry_date)}</div>
      ${countdown}
      <div class="d-flex align-items-center gap-2">
        <span class="lic-status-badge ${statusClass(cs)}">${cs.replace('_',' ')}</span>
        ${sp>0?`<span class="sp-badge">${sp} SL pts</span>`:''}
        ${l.document_url?`<a href="${esc(l.document_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()" class="ms-auto" style="font-size:.72rem;color:#0ea5e9;">Doc ↗</a>`:''}
      </div>
    </div>`;
  }).join('');
}

function openNew(){
  document.getElementById('lForm').reset();
  document.getElementById('fId').value='';
  document.getElementById('fSuperlicencePoints').value='0';
  document.getElementById('fStatus2').value='valid';
  document.getElementById('modalTitle').textContent='New Licence';
  document.getElementById('btnDel').classList.add('d-none');
  modal.show();
}

function openEdit(id){
  const l=allLicences.find(x=>x.id===id);if(!l)return;
  document.getElementById('fId').value=l.id;
  document.getElementById('fDriverName').value=l.driver_name||'';
  document.getElementById('fDriverId').value=l.driver_id||'';
  document.getElementById('fLicenceType').value=l.licence_type||'competition';
  document.getElementById('fIssuingBody').value=l.issuing_body||'';
  document.getElementById('fLicenceNumber').value=l.licence_number||'';
  document.getElementById('fIssueDate').value=l.issue_date?l.issue_date.slice(0,10):'';
  document.getElementById('fExpiryDate').value=l.expiry_date?l.expiry_date.slice(0,10):'';
  document.getElementById('fGrade').value=l.grade||'';
  document.getElementById('fSuperlicencePoints').value=l.superlicence_points??0;
  document.getElementById('fStatus2').value=l.status||'valid';
  document.getElementById('fDocumentUrl').value=l.document_url||'';
  document.getElementById('fNotes').value=l.notes||'';
  document.getElementById('modalTitle').textContent='Edit Licence';
  document.getElementById('btnDel').classList.remove('d-none');
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    driver_id:document.getElementById('fDriverId').value.trim(),
    licence_type:document.getElementById('fLicenceType').value,
    issuing_body:document.getElementById('fIssuingBody').value.trim(),
    licence_number:document.getElementById('fLicenceNumber').value.trim(),
    issue_date:document.getElementById('fIssueDate').value||null,
    expiry_date:document.getElementById('fExpiryDate').value||null,
    grade:document.getElementById('fGrade').value.trim(),
    superlicence_points:document.getElementById('fSuperlicencePoints').value||0,
    status:document.getElementById('fStatus2').value,
    document_url:document.getElementById('fDocumentUrl').value.trim(),
    notes:document.getElementById('fNotes').value.trim()
  };
  if(!body.driver_name||!body.issuing_body||!body.expiry_date){alert('Driver Name, Issuing Body and Expiry Date are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(){
  const id=document.getElementById('fId').value;if(!id)return;
  if(!confirm('Delete this licence?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  modal.hide();load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('btnDel').addEventListener('click',del);
document.getElementById('fSearch').addEventListener('input',renderGrid);
document.getElementById('fType').addEventListener('change',renderGrid);
document.getElementById('fStatus').addEventListener('change',renderGrid);
load();
</script>
</body>
</html>
