<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Procurement Contracts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 18px;min-width:120px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .ev-stat-value{font-size:1.6rem;font-weight:700;color:#1a1d24;}
    .shell{display:flex;gap:10px;height:calc(100vh - 230px);}
    .pane{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;}
    .pane-hdr{padding:8px 12px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
    .pane-hdr small{font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;letter-spacing:.5px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#f0fdf4;}
    .data-table tbody tr.selected{background:rgba(16,185,129,.1);outline:2px solid #10b981;outline-offset:-2px;}
    .data-table tbody tr.expiring-soon td{background:rgba(245,158,11,.08);}
    .data-table tbody tr.expiring-soon:hover td{background:rgba(245,158,11,.15);}
    .detail-pane{width:380px;min-width:320px;}
    .detail-pane form label{font-size:.78rem;font-weight:600;color:#374151;margin-bottom:2px;}
    .empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#adb5bd;}
    .empty-detail i{font-size:2.5rem;margin-bottom:8px;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Procurement Contracts</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Manage supplier agreements, terms and renewal dates</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#10b981;border-color:#10b981;">+ New Contract</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #10b981;"><div class="ev-stat-label">Active</div><div class="ev-stat-value" id="kpiActive">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #f59e0b;"><div class="ev-stat-label">Expiring Soon</div><div class="ev-stat-value" id="kpiExpiring">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #ef4444;"><div class="ev-stat-label">Expired</div><div class="ev-stat-value" id="kpiExpired">—</div></div>
  </div>

  <div class="shell">
    <div class="pane" style="flex:1 1 0;min-width:0;">
      <div class="pane-hdr">
        <small>Contracts</small>
        <div class="d-flex gap-2 align-items-center flex-wrap">
          <input type="search" class="form-control form-control-sm" id="searchBox" placeholder="Search…" style="width:160px;"/>
          <select class="form-select form-select-sm" id="filterType" style="width:160px;">
            <option value="">All Types</option>
            <option value="supply">Supply</option><option value="service">Service</option>
            <option value="nda">NDA</option><option value="framework">Framework</option>
            <option value="sponsorship">Sponsorship</option><option value="other">Other</option>
          </select>
          <select class="form-select form-select-sm" id="filterStatus" style="width:140px;">
            <option value="">All Status</option>
            <option value="draft">Draft</option><option value="active">Active</option>
            <option value="expired">Expired</option><option value="terminated">Terminated</option>
            <option value="under_review">Under Review</option>
          </select>
        </div>
      </div>
      <div style="overflow-y:auto;flex:1;">
        <table class="data-table">
          <thead><tr><th>Title</th><th>Supplier</th><th>Type</th><th>Value</th><th>Currency</th><th>Start</th><th>End</th><th>Auto-Renew</th><th>Status</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="pane detail-pane" id="detailPane">
      <div class="pane-hdr">
        <small id="detailTitle">Detail</small>
        <button class="btn btn-sm btn-danger" id="btnDel" style="display:none;font-size:.75rem;">Delete</button>
      </div>
      <div style="overflow-y:auto;flex:1;padding:14px;" id="detailBody">
        <div class="empty-detail"><i class="bi bi-file-earmark-text"></i><span>Select a contract</span></div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/proc-contracts';
let all=[],sel=null;
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const gv=id=>(document.getElementById(id)||{}).value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};
const esc=v=>String(v??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const fmt=v=>v!=null?parseFloat(v).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const statusBadge=s=>{const m={draft:'secondary',active:'success',expired:'danger',terminated:'dark',under_review:'warning'};return`<span class="badge bg-${m[s]||'secondary'}">${(s||'—').replace('_',' ')}</span>`;};

function isExpiringSoon(row){
  if(!row.end_date||row.status!=='active')return false;
  const d=new Date(row.end_date);const diff=(d-TODAY)/(1000*60*60*24);
  return diff>=0&&diff<=60;
}

async function load(){
  try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();render();}
  catch(e){console.error(e);}
}

function updateKPIs(){
  document.getElementById('kpiTotal').textContent=all.length;
  document.getElementById('kpiActive').textContent=all.filter(x=>x.status==='active').length;
  document.getElementById('kpiExpiring').textContent=all.filter(isExpiringSoon).length;
  document.getElementById('kpiExpired').textContent=all.filter(x=>x.status==='expired').length;
}

function render(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  const ft=document.getElementById('filterType').value;
  const fs=document.getElementById('filterStatus').value;
  let d=[...all];
  if(ft) d=d.filter(x=>x.contract_type===ft);
  if(fs) d=d.filter(x=>x.status===fs);
  if(q) d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
  document.getElementById('tbody').innerHTML=d.length
    ?d.map(row=>`<tr data-id="${row.id}" class="${sel&&String(sel.id)===String(row.id)?'selected':''}${isExpiringSoon(row)?' expiring-soon':''}">
        <td class="fw-semibold">${row.contract_title||'—'}</td>
        <td>${row.supplier_name||'—'}</td>
        <td><span class="badge bg-light text-dark border">${row.contract_type||'—'}</span></td>
        <td>${row.value!=null?'£'+fmt(row.value):'—'}</td>
        <td>${row.currency||'—'}</td>
        <td>${row.start_date||'—'}</td>
        <td>${row.end_date?`<span${isExpiringSoon(row)?' style="color:#d97706;font-weight:600;"':''}>${row.end_date}</span>`:'—'}</td>
        <td>${row.auto_renew?'<span class="badge bg-success">Yes</span>':'<span class="badge bg-secondary">No</span>'}</td>
        <td>${statusBadge(row.status)}</td>
      </tr>`).join('')
    :'<tr><td colspan="9" class="text-center text-muted py-4">No contracts found</td></tr>';
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
    const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)pick(item);
  });
}

function buildForm(item){
  const i=item||{};
  return `<form id="detailForm" class="vstack gap-2" onsubmit="return false">
    <div><label class="form-label small fw-semibold">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId" value="${esc(i.supplier_id)}"/></div>
    <div><label class="form-label small fw-semibold">Supplier Name *</label><input class="form-control form-control-sm" id="fSupplierName" value="${esc(i.supplier_name)}"/></div>
    <div><label class="form-label small fw-semibold">Contract Title *</label><input class="form-control form-control-sm" id="fContractTitle" value="${esc(i.contract_title)}"/></div>
    <div><label class="form-label small fw-semibold">Contract Type</label>
      <select class="form-select form-select-sm" id="fContractType">
        ${['supply','service','nda','framework','sponsorship','other'].map(t=>`<option value="${t}"${i.contract_type===t?' selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
      </select>
    </div>
    <div class="row g-2">
      <div class="col-8"><label class="form-label small fw-semibold">Value</label><input type="number" class="form-control form-control-sm" id="fValue" step="0.01" value="${esc(i.value)}"/></div>
      <div class="col-4"><label class="form-label small fw-semibold">Currency</label><input class="form-control form-control-sm" id="fCurrency" value="${esc(i.currency)||'GBP'}"/></div>
    </div>
    <div class="row g-2">
      <div class="col-6"><label class="form-label small fw-semibold">Start Date</label><input type="date" class="form-control form-control-sm" id="fStartDate" value="${esc(i.start_date)}"/></div>
      <div class="col-6"><label class="form-label small fw-semibold">End Date</label><input type="date" class="form-control form-control-sm" id="fEndDate" value="${esc(i.end_date)}"/></div>
    </div>
    <div class="row g-2">
      <div class="col-6"><label class="form-label small fw-semibold">Notice Period (days)</label><input type="number" class="form-control form-control-sm" id="fNoticePeriodDays" value="${esc(i.notice_period_days)}" min="0"/></div>
      <div class="col-6 d-flex align-items-end pb-1"><div class="form-check"><input type="checkbox" class="form-check-input" id="fAutoRenew"${i.auto_renew?' checked':''}/><label class="form-check-label small" for="fAutoRenew">Auto-Renew</label></div></div>
    </div>
    <div><label class="form-label small fw-semibold">Document URL</label><input class="form-control form-control-sm" id="fDocumentUrl" value="${esc(i.document_url)}"/></div>
    <div><label class="form-label small fw-semibold">Status</label>
      <select class="form-select form-select-sm" id="fStatus">
        ${['draft','active','expired','terminated','under_review'].map(s=>`<option value="${s}"${i.status===s?' selected':''}>${s.replace('_',' ')}</option>`).join('')}
      </select>
    </div>
    <div><label class="form-label small fw-semibold">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="3">${esc(i.notes)}</textarea></div>
    <div><label class="form-label small fw-semibold">Created By</label><input class="form-control form-control-sm" id="fCreatedBy" value="${esc(i.created_by)}"/></div>
    <button class="btn btn-sm text-white mt-1" id="btnSave" style="background:#10b981;border-color:#10b981;">Save Changes</button>
  </form>`;
}

function pick(item){
  sel=item;
  document.getElementById('detailTitle').textContent=item.contract_title||'Contract';
  document.getElementById('btnDel').style.display='';
  document.getElementById('detailBody').innerHTML=buildForm(item);
  document.getElementById('btnSave').onclick=save;
  render();
}

function newContract(){
  sel=null;
  document.getElementById('detailTitle').textContent='New Contract';
  document.getElementById('btnDel').style.display='none';
  document.getElementById('detailBody').innerHTML=buildForm({status:'draft',contract_type:'supply',currency:'GBP'});
  document.getElementById('btnSave').onclick=save;
  render();
}

async function save(){
  const body={supplier_id:gv('fSupplierId')||null,supplier_name:gv('fSupplierName'),
    contract_title:gv('fContractTitle'),contract_type:gv('fContractType'),
    value:gv('fValue')||null,currency:gv('fCurrency')||'GBP',
    start_date:gv('fStartDate')||null,end_date:gv('fEndDate')||null,
    auto_renew:document.getElementById('fAutoRenew')?.checked||false,
    notice_period_days:gv('fNoticePeriodDays')||null,document_url:gv('fDocumentUrl'),
    status:gv('fStatus')||'draft',notes:gv('fNotes'),created_by:gv('fCreatedBy')};
  if(!body.supplier_name||!body.contract_title){alert('Supplier Name and Contract Title are required');return;}
  try{
    const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const saved=await r.json();sel=saved.data||saved;await load();pick(sel);}
    else alert('Save failed');
  }catch(e){console.error(e);alert('Save failed');}
}

async function del(){
  if(!sel||!confirm('Delete this contract?'))return;
  try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});
    if(r.ok){sel=null;document.getElementById('detailBody').innerHTML='<div class="empty-detail"><i class="bi bi-file-earmark-text"></i><span>Select a contract</span></div>';document.getElementById('btnDel').style.display='none';await load();}
    else alert('Delete failed');}
  catch(e){console.error(e);}
}

document.getElementById('btnAdd').onclick=newContract;
document.getElementById('btnDel').onclick=del;
document.getElementById('searchBox').addEventListener('input',render);
document.getElementById('filterType').addEventListener('change',render);
document.getElementById('filterStatus').addEventListener('change',render);
load();
</script>
</body>
</html>
