<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Race Team OS – Contracts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;}
    #mainShell.mlo-shell{background:transparent;border:none;gap:10px;}
    #mainShell .mlo-pane-left,#mainShell .mlo-pane-mid,#mainShell .mlo-pane-right{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;}
    .data-table td{padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.05);}
    .data-table tbody tr{cursor:pointer;}
    .data-table tbody tr:hover{background:#f8f9fa;}
    .data-table tbody tr.selected{background:rgba(14,165,233,.08);outline:2px solid #0ea5e9;outline-offset:-2px;}
    .filter-item{padding:5px 8px;border-radius:4px;cursor:pointer;font-size:.8rem;margin-bottom:2px;display:block;color:#495057;text-decoration:none;}
    .filter-item:hover{background:#f0f9ff;color:#0ea5e9;}
    .filter-item.active{background:rgba(14,165,233,.12);color:#0ea5e9;font-weight:600;}
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
      <div>
        <h1 class="h4 mb-1">Procurement Contracts</h1>
        <p class="text-secondary mb-0" style="font-size:.85rem;">Supplier contracts, service agreements and NDAs</p>
      </div>
      <button class="btn btn-sm" id="btnAdd" style="background:#0ea5e9;border-color:#0ea5e9;color:#fff">+ New Contract</button>
    </div>
    <div class="ev-stats-bar">
      <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpi0">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Active</div><div class="ev-stat-value" id="kpi1">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Expiring Soon</div><div class="ev-stat-value" id="kpi2">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Expired</div><div class="ev-stat-value" id="kpi3">—</div></div>
    </div>
    <div class="mlo-shell" id="mainShell">
      <div class="mlo-pane mlo-pane-left" style="width:180px;min-width:140px;">
        <div class="mlo-pane-header p-2 border-bottom"><small class="fw-bold text-muted">STATUS</small></div>
        <div class="mlo-pane-content p-2" id="filterList"></div>
      </div>
      <div class="mlo-resizer"></div>
      <div class="mlo-pane mlo-pane-mid" style="flex:1 1 0;min-width:200px;">
        <div class="mlo-pane-header p-2 border-bottom d-flex justify-content-between align-items-center">
          <small class="fw-bold text-muted">CONTRACTS LIST</small>
          <input type="search" class="form-control form-control-sm" id="searchBox" placeholder="Search…" style="width:160px"/>
        </div>
        <div class="mlo-pane-content p-0" style="overflow-y:auto;max-height:calc(100vh - 260px);">
          <table class="data-table">
            <thead><tr><th>Title</th><th>Type</th><th>Supplier</th><th>Start</th><th>End</th><th>Value</th><th>Status</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="mlo-resizer"></div>
      <div class="mlo-pane mlo-pane-right" style="width:340px;min-width:260px;">
        <div class="mlo-pane-header p-2 border-bottom d-flex justify-content-between align-items-center">
          <small class="fw-bold text-muted">INSPECTOR</small>
          <button class="btn btn-sm btn-danger" id="btnDel" style="display:none">Delete</button>
        </div>
        <div class="mlo-pane-content p-3" style="overflow-y:auto;max-height:calc(100vh - 260px);">
          <form id="form" class="vstack gap-2" onsubmit="return false">
            <div><label class="form-label small fw-semibold mb-1">Title *</label><input class="form-control form-control-sm" id="fTitle"/></div>
            <div><label class="form-label small fw-semibold mb-1">Contract Type</label>
              <select class="form-select form-select-sm" id="fType">
                <option value="supplier">Supplier</option><option value="service">Service</option>
                <option value="nda">NDA</option><option value="framework">Framework</option>
                <option value="sponsorship">Sponsorship</option><option value="other">Other</option>
              </select>
            </div>
            <div><label class="form-label small fw-semibold mb-1">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId"/></div>
            <div class="row g-2">
              <div class="col-6"><label class="form-label small fw-semibold mb-1">Start Date</label><input type="date" class="form-control form-control-sm" id="fStart"/></div>
              <div class="col-6"><label class="form-label small fw-semibold mb-1">End Date</label><input type="date" class="form-control form-control-sm" id="fEnd"/></div>
            </div>
            <div class="row g-2">
              <div class="col-8"><label class="form-label small fw-semibold mb-1">Total Value</label><input type="number" class="form-control form-control-sm" id="fValue" min="0" step="0.01"/></div>
              <div class="col-4"><label class="form-label small fw-semibold mb-1">Currency</label><input class="form-control form-control-sm" id="fCurrency" value="GBP"/></div>
            </div>
            <div><label class="form-label small fw-semibold mb-1">Payment Schedule</label><textarea class="form-control form-control-sm" id="fPaySched" rows="2"></textarea></div>
            <div><label class="form-label small fw-semibold mb-1">Key Terms</label><textarea class="form-control form-control-sm" id="fTerms" rows="3"></textarea></div>
            <div><label class="form-label small fw-semibold mb-1">Renewal Notice (days)</label><input type="number" class="form-control form-control-sm" id="fRenewal" value="30" min="0"/></div>
            <div><label class="form-label small fw-semibold mb-1">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="draft">Draft</option><option value="active">Active</option>
                <option value="expired">Expired</option><option value="terminated">Terminated</option><option value="under_review">Under Review</option>
              </select>
            </div>
            <div><label class="form-label small fw-semibold mb-1">Signed By</label><input class="form-control form-control-sm" id="fSignedBy"/></div>
          </form>
          <button class="btn btn-sm mt-2 w-100" id="btnSave" style="background:#0ea5e9;color:#fff">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="core.js?v=20260420"></script>
  <script>
  const API='/api/proc-contracts';
  const STATUSES=['draft','active','expired','terminated','under_review'];
  let all=[],sel=null,filt='all';
  const gv=id=>(document.getElementById(id)||{}).value||'';
  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};

  async function load(){
    try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();buildFilters();render();}
    catch(e){console.error(e);}
  }

  function updateKPIs(){
    const now=new Date();const soon=new Date();soon.setDate(soon.getDate()+30);
    document.getElementById('kpi0').textContent=all.length;
    document.getElementById('kpi1').textContent=all.filter(x=>x.status==='active').length;
    document.getElementById('kpi2').textContent=all.filter(x=>x.status==='active'&&x.end_date&&new Date(x.end_date)<=soon&&new Date(x.end_date)>=now).length;
    document.getElementById('kpi3').textContent=all.filter(x=>x.status==='expired').length;
  }

  function buildFilters(){
    const labels={draft:'Draft',active:'Active',expired:'Expired',terminated:'Terminated',under_review:'Under Review'};
    document.getElementById('filterList').innerHTML=
      [['all','All'],...STATUSES.map(s=>[s,labels[s]||s])].map(([v,l])=>
        `<a class="filter-item${filt===v?' active':''}" data-val="${v}" href="#">${l} <small class="text-muted">(${v==='all'?all.length:all.filter(x=>x.status===v).length})</small></a>`
      ).join('');
    document.querySelectorAll('#filterList .filter-item').forEach(a=>a.onclick=e=>{e.preventDefault();filt=a.dataset.val;buildFilters();render();});
  }

  function render(){
    const q=document.getElementById('searchBox').value.toLowerCase();
    let d=filt==='all'?[...all]:all.filter(x=>x.status===filt);
    if(q)d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
    const SB={draft:'secondary',active:'success',expired:'dark',terminated:'danger',under_review:'warning'};
    document.getElementById('tbody').innerHTML=d.length
      ?d.map(row=>`<tr data-id="${row.id}" class="${sel&&String(sel.id)===String(row.id)?'selected':''}">
          <td class="fw-semibold">${row.title||'—'}</td>
          <td><span class="badge bg-light text-dark border">${row.contract_type||'—'}</span></td>
          <td>${row.supplier_id||'—'}</td><td>${row.start_date||'—'}</td><td>${row.end_date||'—'}</td>
          <td>${row.total_value!=null?Number(row.total_value).toLocaleString()+' '+(row.currency||''):'—'}</td>
          <td><span class="badge bg-${SB[row.status]||'secondary'}">${(row.status||'').replace('_',' ')}</span></td>
        </tr>`).join('')
      :'<tr><td colspan="7" class="text-center text-muted py-4">No contracts found</td></tr>';
    document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
      const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)pick(item);
    });
  }

  function pick(item){
    sel=item;
    sv('fTitle',item.title);sv('fType',item.contract_type||'supplier');sv('fSupplierId',item.supplier_id);
    sv('fStart',item.start_date);sv('fEnd',item.end_date);sv('fValue',item.total_value);
    sv('fCurrency',item.currency||'GBP');sv('fPaySched',item.payment_schedule);sv('fTerms',item.key_terms);
    sv('fRenewal',item.renewal_notice_days??30);sv('fStatus',item.status||'draft');sv('fSignedBy',item.signed_by);
    document.getElementById('btnDel').style.display='';render();
  }

  function clearForm(){
    sel=null;document.getElementById('form').reset();
    sv('fType','supplier');sv('fStatus','draft');sv('fCurrency','GBP');sv('fRenewal','30');
    document.getElementById('btnDel').style.display='none';render();
  }

  async function save(){
    const body={title:gv('fTitle'),contract_type:gv('fType'),supplier_id:gv('fSupplierId')||null,
      start_date:gv('fStart')||null,end_date:gv('fEnd')||null,total_value:gv('fValue')||null,
      currency:gv('fCurrency')||'GBP',payment_schedule:gv('fPaySched'),key_terms:gv('fTerms'),
      renewal_notice_days:gv('fRenewal')||30,status:gv('fStatus'),signed_by:gv('fSignedBy')};
    if(!body.title){alert('Title is required');return;}
    try{
      const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){const saved=await r.json();if(!sel){sel=saved.data||saved;}await load();}
      else alert('Save failed');
    }catch(e){console.error(e);alert('Save failed');}
  }

  async function del(){
    if(!sel||!confirm('Delete this contract? This cannot be undone.'))return;
    try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){clearForm();await load();}else alert('Delete failed');}
    catch(e){console.error(e);}
  }

  document.getElementById('btnAdd').onclick=clearForm;
  document.getElementById('btnSave').onclick=save;
  document.getElementById('btnDel').onclick=del;
  document.getElementById('searchBox').addEventListener('input',render);
  load();
  </script>
</body>
</html>
