<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Migrate Events to Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css?v=20260420" rel="stylesheet" />
</head>
<body>
  <div id="rtsTopNav"></div>
  <div class="rts-main container">
    <div class="pt-4">
      <h1 class="h4">Migrate Events to Database</h1>
      <p class="text-secondary">This tool migrates events from localStorage to the database.</p>
      
      <div id="status" class="alert alert-info">
        Checking localStorage...
      </div>
      
      <div id="preview" class="card bg-dark border-secondary mb-3" style="display:none;">
        <div class="card-body">
          <h6>Found <span id="count">0</span> events in localStorage</h6>
          <div id="eventList" class="small"></div>
        </div>
      </div>
      
      <div class="d-flex gap-2">
        <button id="btnMigrate" class="btn btn-primary" disabled>Migrate to Database</button>
        <button id="btnClear" class="btn btn-danger" disabled>Clear localStorage (dangerous)</button>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="core.js"></script>
  <script>
    RTS.setActiveNav();
    
    const LS_KEY = 'rts.vp.events';
    let localEvents = [];
    
    function init() {
      try {
        localEvents = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
        if (!Array.isArray(localEvents)) localEvents = [];
        
        if (localEvents.length === 0) {
          document.getElementById('status').className = 'alert alert-warning';
          document.getElementById('status').textContent = 'No events found in localStorage. Nothing to migrate.';
          return;
        }
        
        document.getElementById('count').textContent = localEvents.length;
        document.getElementById('eventList').innerHTML = localEvents.map(e => 
          `<div>• ${e.title || 'Untitled'} (${e.start || 'No date'})</div>`
        ).join('');
        document.getElementById('preview').style.display = 'block';
        document.getElementById('btnMigrate').disabled = false;
        document.getElementById('btnClear').disabled = false;
        
        document.getElementById('status').className = 'alert alert-success';
        document.getElementById('status').textContent = `Found ${localEvents.length} events ready to migrate.`;
      } catch (error) {
        document.getElementById('status').className = 'alert alert-danger';
        document.getElementById('status').textContent = 'Error reading localStorage: ' + error.message;
      }
    }
    
    async function migrateEvents() {
      document.getElementById('btnMigrate').disabled = true;
      document.getElementById('status').className = 'alert alert-info';
      document.getElementById('status').textContent = 'Migrating...';
      
      let success = 0;
      let failed = 0;
      
      for (const ev of localEvents) {
        try {
          const data = {
            id: ev.id || RTS.uid('event'),
            name: ev.title || 'Untitled Event',
            start_date: ev.start || null,
            end_date: ev.end || ev.start || null,
            event_type: ev.type || 'Test Day',
            status: ev.status || 'Planned',
            circuit: ev.venue || '',
            brief: ev.brief || '',
            drivers: ev.drivers || [],
            crew: ev.crew || [],
            documents: ev.documents || [],
            runbook: ev.runbook || {},
            setups: ev.setups || [],
            run_plan: ev.runPlan || [],
            checklists: ev.checklists || [],
            session_logs: ev.sessionLogs || {}
          };
          
          const resp = await RTS_API.createCollectionItem('events', data);
          if (resp && resp.success) {
            success++;
          } else {
            failed++;
            console.error('Failed to migrate:', ev.title, resp);
          }
        } catch (error) {
          failed++;
          console.error('Error migrating event:', ev.title, error);
        }
      }
      
      document.getElementById('status').className = 'alert alert-success';
      document.getElementById('status').innerHTML = `
        <strong>Migration complete!</strong><br>
        ✅ Successfully migrated: ${success} events<br>
        ${failed > 0 ? `❌ Failed: ${failed} events` : ''}
      `;
      
      if (success > 0) {
        RTS.showToast(`Migrated ${success} events to database`, 'success');
      }
    }
    
    function clearLocalStorage() {
      if (!confirm('⚠️ This will DELETE all events from localStorage.\n\nMake sure you have migrated them to the database first!\n\nContinue?')) {
        return;
      }
      
      if (!confirm('Are you ABSOLUTELY sure? This cannot be undone.')) {
        return;
      }
      
      localStorage.removeItem(LS_KEY);
      document.getElementById('status').className = 'alert alert-warning';
      document.getElementById('status').textContent = 'localStorage cleared. Refresh to see current state.';
      document.getElementById('btnClear').disabled = true;
    }
    
    document.getElementById('btnMigrate').addEventListener('click', migrateEvents);
    document.getElementById('btnClear').addEventListener('click', clearLocalStorage);
    
    init();
  </script>
</body>
</html>
