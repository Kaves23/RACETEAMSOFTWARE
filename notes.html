<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Notes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .note-tag {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px;
      border-radius: 3px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(100, 150, 200, 0.2);
      color: #7bd7ff;
      cursor: pointer;
    }
    .note-tag:hover {
      background: rgba(100, 150, 200, 0.35);
    }
    .note-tag.active {
      background: var(--rts-accent);
      color: #0f1115;
    }
    .note-item-tags {
      margin-top: 4px;
      font-size: 0.7rem;
      line-height: 1.2;
    }
    .note-item-tag-badge {
      display: inline-block;
      padding: 1px 6px;
      margin-right: 4px;
      border-radius: 2px;
      background: rgba(100, 150, 200, 0.15);
      color: #7bd7ff;
      font-size: 0.7rem;
    }
    /* Fix note list item text overflow */
    #notesList li {
      line-height: 1.3;
      padding: 8px 10px;
      display: block;
    }
    #notesList li .note-filename {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px;
    }
    #notesList li .note-item-tags {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Markdown viewer styling */
    .notes-viewer-content h1 {
      color: var(--rts-accent);
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(255,255,255,0.1);
    }
    .notes-viewer-content h2 {
      color: #7bd7ff;
      margin-top: 1.25rem;
      margin-bottom: 0.75rem;
    }
    .notes-viewer-content h3 {
      color: #a0a3a8;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    .notes-viewer-content code {
      background: #16191f;
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      color: #7bd7ff;
    }
    .notes-viewer-content pre {
      background: #16191f;
      padding: 15px;
      border-radius: 5px;
      overflow-x: auto;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .notes-viewer-content pre code {
      background: none;
      padding: 0;
      color: #e0e3e6;
    }
    .notes-viewer-content table {
      border-collapse: collapse;
      width: 100%;
      margin: 20px 0;
    }
    .notes-viewer-content table th,
    .notes-viewer-content table td {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 10px;
      text-align: left;
    }
    .notes-viewer-content table th {
      background: #16191f;
      font-weight: bold;
      color: var(--rts-accent);
    }
    .notes-viewer-content blockquote {
      border-left: 4px solid var(--rts-accent);
      margin: 20px 0;
      padding: 10px 20px;
      background: rgba(100, 150, 200, 0.05);
    }
    .notes-viewer-content img {
      max-width: 100%;
      height: auto;
      border-radius: 5px;
      margin: 15px 0;
    }
    .notes-viewer-content a {
      color: #7bd7ff;
    }
    .notes-viewer-content a:hover {
      color: var(--rts-accent);
    }
    .tag-input-container {
      margin-top: 8px;
      display: flex;
      gap: 4px;
    }
    .tag-input-container input {
      flex: 1;
      font-size: 0.8rem;
    }
    .tag-input-container button {
      font-size: 0.8rem;
      padding: 2px 8px;
    }
  </style>
</head>
<body class="page-notes">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <h1 class="my-3">Notes</h1>

    <div class="mlo-shell" id="notesShell">
      <!-- LEFT -->
      <section class="mlo-pane mlo-pane-left" aria-label="Notes navigation">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Library</div>
            <span class="badge text-bg-secondary" id="notesCountBadge">0</span>
          </div>
        </div>
        <div class="mlo-pane-content">
          <div class="d-flex gap-2 mb-3">
            <label for="fileInput" class="btn btn-sm btn-outline-light mlo-btn flex-grow-1" style="margin:0;">Upload MD</label>
            <input type="file" id="fileInput" accept=".md,.markdown,.txt" multiple style="display:none;">
            <button class="btn btn-sm btn-outline-danger" onclick="clearNotes()">Clear</button>
          </div>

          <div class="mlo-section-label">Filter by Tag</div>
          <div id="tagFilterContainer" class="mb-3">
            <div class="note-tag" data-tag="all">All Notes</div>
          </div>

          <div class="mlo-section-label">Notes</div>
          <ul class="mlo-tree pastel-tree" id="notesList">
            <!-- Notes will be populated here -->
          </ul>
        </div>
      </section>

      <div class="mlo-resizer" data-resize="left" title="Drag to resize"></div>

      <!-- MIDDLE -->
      <section class="mlo-pane mlo-pane-mid" aria-label="Notes viewer">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title" id="currentNoteName">No Note Selected</div>
            <button class="btn btn-sm btn-outline-light mlo-btn" id="btnEditTags" style="display:none;">Edit Tags</button>
          </div>
        </div>
        <div class="mlo-pane-content notes-viewer-content" id="notesViewer">
          <div class="text-center" style="padding: 60px 20px; color: rgba(255,255,255,0.5);">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="margin-bottom:20px; opacity:0.5;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <h2>No Note Selected</h2>
            <p>Upload a markdown file or select a note from the sidebar to view it here.</p>
          </div>
        </div>
      </section>

      <div class="mlo-resizer" data-resize="right" title="Drag to resize"></div>

      <!-- RIGHT -->
      <section class="mlo-pane mlo-pane-right mlo-inspector" aria-label="Note metadata">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Metadata</div>
          </div>
        </div>
        <div class="mlo-pane-content">
          <div id="noteMetadata">
            <p class="text-muted">Select a note to view metadata</p>
          </div>
          
          <div class="mlo-section-label mt-3">Tags</div>
          <div id="noteTagsDisplay"></div>
          
          <div id="tagInputArea" style="display:none;">
            <div class="tag-input-container">
              <input type="text" id="tagInput" class="form-control form-control-sm" placeholder="Add tag...">
              <button class="btn btn-sm btn-outline-light mlo-btn" onclick="addTag()">Add</button>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="core.js"></script>
  <script src="topnav.js"></script>
  <script>
    // Store notes in localStorage
    const STORAGE_KEY = 'raceTeamNotes';
    let currentNoteIndex = -1;
    let activeTagFilter = 'all';
    
    // Initialize marked options
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: true,
        mangle: false
      });
    }
    
    // Load notes from localStorage
    function loadNotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    }
    
    // Save notes to localStorage
    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }
    
    // Extract all unique tags from notes
    function getAllTags() {
      const notes = loadNotes();
      const tagSet = new Set();
      notes.forEach(note => {
        if (note.tags && Array.isArray(note.tags)) {
          note.tags.forEach(tag => tagSet.add(tag));
        }
      });
      return Array.from(tagSet).sort();
    }
    
    // Display tag filters
    function displayTagFilters() {
      const tags = getAllTags();
      const container = document.getElementById('tagFilterContainer');
      
      let html = '<div class="note-tag' + (activeTagFilter === 'all' ? ' active' : '') + '" data-tag="all" onclick="filterByTag(\'all\')">All Notes</div>';
      
      tags.forEach(tag => {
        html += '<div class="note-tag' + (activeTagFilter === tag ? ' active' : '') + '" data-tag="' + tag + '" onclick="filterByTag(\'' + tag + '\')">' + tag + '</div>';
      });
      
      container.innerHTML = html;
    }
    
    // Filter notes by tag
    function filterByTag(tag) {
      activeTagFilter = tag;
      displayTagFilters();
      displayNotesList();
    }
    
    // Display notes list
    function displayNotesList() {
      const notes = loadNotes();
      const notesList = document.getElementById('notesList');
      const countBadge = document.getElementById('notesCountBadge');
      
      // Filter notes by active tag
      let filteredNotes = notes;
      if (activeTagFilter !== 'all') {
        filteredNotes = notes.filter(note => 
          note.tags && note.tags.includes(activeTagFilter)
        );
      }
      
      countBadge.textContent = filteredNotes.length;
      
      if (filteredNotes.length === 0) {
        notesList.innerHTML = '<li style="color: rgba(255,255,255,0.5); cursor: default; background: transparent;">No notes</li>';
        return;
      }
      
      notesList.innerHTML = filteredNotes.map((note, idx) => {
        const originalIndex = notes.indexOf(note);
        const tags = note.tags && note.tags.length > 0 
          ? '<div class="note-item-tags">' + note.tags.map(t => '<span class="note-item-tag-badge">' + t + '</span>').join('') + '</div>'
          : '';
        return '<li onclick="displayNote(' + originalIndex + ')" data-index="' + originalIndex + '" class="' + (currentNoteIndex === originalIndex ? 'active' : '') + '"><span class="note-filename">📄 ' + note.name + '</span>' + tags + '</li>';
      }).join('');
    }
    
    // Display a specific note
    function displayNote(index) {
      const notes = loadNotes();
      if (index < 0 || index >= notes.length) return;
      
      currentNoteIndex = index;
      const note = notes[index];
      const viewer = document.getElementById('notesViewer');
      const nameDisplay = document.getElementById('currentNoteName');
      const editTagsBtn = document.getElementById('btnEditTags');
      
      // Update header
      nameDisplay.textContent = note.name;
      editTagsBtn.style.display = 'block';
      
      // Parse markdown and display
      if (typeof marked !== 'undefined') {
        viewer.innerHTML = marked.parse(note.content);
      } else {
        viewer.innerHTML = '<pre>' + note.content + '</pre>';
      }
      
      // Update metadata panel
      displayMetadata(note);
      
      // Update active state
      displayNotesList();
    }
    
    // Display note metadata
    function displayMetadata(note) {
      const metadataDiv = document.getElementById('noteMetadata');
      const tagsDisplay = document.getElementById('noteTagsDisplay');
      
      const date = new Date(note.timestamp);
      metadataDiv.innerHTML = `
        <div class="mb-2"><strong>File:</strong> ${note.name}</div>
        <div class="mb-2"><strong>Added:</strong> ${date.toLocaleString()}</div>
        <div class="mb-2"><strong>Size:</strong> ${(note.content.length / 1024).toFixed(2)} KB</div>
      `;
      
      // Display tags
      if (note.tags && note.tags.length > 0) {
        tagsDisplay.innerHTML = note.tags.map(tag => 
          '<span class="note-tag" onclick="removeTag(\'' + tag + '\')" title="Click to remove">' + tag + ' ×</span>'
        ).join('');
      } else {
        tagsDisplay.innerHTML = '<p class="text-muted" style="font-size:0.85rem;">No tags</p>';
      }
    }
    
    // Toggle tag input
    document.getElementById('btnEditTags').addEventListener('click', function() {
      const tagInputArea = document.getElementById('tagInputArea');
      tagInputArea.style.display = tagInputArea.style.display === 'none' ? 'block' : 'none';
    });
    
    // Add tag to current note
    function addTag() {
      if (currentNoteIndex === -1) return;
      
      const input = document.getElementById('tagInput');
      const tag = input.value.trim();
      
      if (!tag) return;
      
      const notes = loadNotes();
      const note = notes[currentNoteIndex];
      
      if (!note.tags) note.tags = [];
      
      if (!note.tags.includes(tag)) {
        note.tags.push(tag);
        saveNotes(notes);
        displayNote(currentNoteIndex);
        displayTagFilters();
        input.value = '';
      }
    }
    
    // Remove tag from current note
    function removeTag(tag) {
      if (currentNoteIndex === -1) return;
      
      const notes = loadNotes();
      const note = notes[currentNoteIndex];
      
      if (note.tags) {
        note.tags = note.tags.filter(t => t !== tag);
        saveNotes(notes);
        displayNote(currentNoteIndex);
        displayTagFilters();
      }
    }
    
    // Handle Enter key in tag input
    document.getElementById('tagInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        addTag();
      }
    });
    
    // Handle file upload
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const files = e.target.files;
      if (!files.length) return;
      
      const notes = loadNotes();
      let filesProcessed = 0;
      
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        
        reader.onload = function(event) {
          const content = event.target.result;
          
          // Add note to storage
          notes.push({
            name: file.name,
            content: content,
            timestamp: new Date().toISOString(),
            tags: []
          });
          
          filesProcessed++;
          
          // When all files are processed
          if (filesProcessed === files.length) {
            saveNotes(notes);
            displayNotesList();
            displayTagFilters();
            
            // Display the first newly added note
            displayNote(notes.length - filesProcessed);
          }
        };
        
        reader.readAsText(file);
      });
      
      // Reset input
      e.target.value = '';
    });
    
    // Clear all notes
    function clearNotes() {
      if (confirm('Are you sure you want to clear all notes? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        currentNoteIndex = -1;
        activeTagFilter = 'all';
        displayNotesList();
        displayTagFilters();
        document.getElementById('notesViewer').innerHTML = `
          <div class="text-center" style="padding: 60px 20px; color: rgba(255,255,255,0.5);">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="margin-bottom:20px; opacity:0.5;">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
            </svg>
            <h2>No Note Selected</h2>
            <p>Upload a markdown file or select a note from the sidebar to view it here.</p>
          </div>
        `;
        document.getElementById('currentNoteName').textContent = 'No Note Selected';
        document.getElementById('btnEditTags').style.display = 'none';
        document.getElementById('noteMetadata').innerHTML = '<p class="text-muted">Select a note to view metadata</p>';
        document.getElementById('noteTagsDisplay').innerHTML = '';
      }
    }
    
    // Load existing markdown files from the workspace
    async function loadWorkspaceMarkdown() {
      const markdownFiles = ['README.md', 'DRIVER_PACKAGES_INVOICING.md', 'server/TELEMETRY_TSDB_README.md'];
      
      for (const filename of markdownFiles) {
        try {
          const response = await fetch(filename);
          if (response.ok) {
            const content = await response.text();
            const notes = loadNotes();
            
            // Check if already loaded
            if (!notes.some(n => n.name === filename)) {
              notes.push({
                name: filename,
                content: content,
                timestamp: new Date().toISOString(),
                tags: ['workspace']
              });
              saveNotes(notes);
            }
          }
        } catch (e) {
          console.log(`Could not load ${filename}`);
        }
      }
      
      displayNotesList();
      displayTagFilters();
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      displayNotesList();
      displayTagFilters();
      loadWorkspaceMarkdown();
    });
  </script>
</body>
</html>
