<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Simulator Sessions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    .shell{display:flex;gap:12px;}
    .pane-filters{width:180px;min-width:160px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);}
    .pane-table{flex:1 1 0;min-width:0;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);overflow:hidden;}
    .pane-detail{width:320px;min-width:280px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);}
    .pane-header{padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;align-items:center;justify-content:space-between;}
    .pane-title{font-size:.75rem;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;}
    .pane-body{overflow-y:auto;max-height:calc(100vh - 240px);}
    .detail-body{padding:16px;overflow-y:auto;max-height:calc(100vh - 200px);}

    .fil-item{display:block;padding:5px 10px;font-size:.8rem;color:#495057;text-decoration:none;border-radius:4px;margin-bottom:2px;cursor:pointer;}
    .fil-item:hover{background:#f3f0ff;color:#8b5cf6;}
    .fil-item.active{background:rgba(139,92,246,.12);color:#8b5cf6;font-weight:600;}

    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.06);}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;color:#1a1d24;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#f5f3ff;}
    .data-table tbody tr.selected{background:rgba(139,92,246,.08);outline:2px solid #8b5cf6;outline-offset:-2px;}

    .badge-s{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:700;}
    .bs-planned{background:#dbeafe;color:#1d4ed8;}
    .bs-completed{background:#d1fae5;color:#065f46;}
    .bs-cancelled{background:#f3f4f6;color:#6b7280;}

    .dl-row{display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0;padding:6px 0;font-size:.82rem;}
    .dl-label{color:#6c757d;font-weight:600;white-space:nowrap;margin-right:8px;}
    .dl-val{color:#1a1d24;text-align:right;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Simulator Sessions</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Driver simulator programme — schedules, programmes and outcomes</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#8b5cf6;border-color:#8b5cf6;">+ New Session</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Completed</div><div class="ev-stat-value" id="kpiCompleted">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Planned</div><div class="ev-stat-value" id="kpiPlanned">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Total Hours</div><div class="ev-stat-value" id="kpiHours">—</div></div>
  </div>

  <div class="mb-2 d-flex gap-2">
    <input type="search" id="fSearch" class="form-control form-control-sm" placeholder="Search driver, circuit…" style="max-width:220px;"/>
    <select id="fDriver" class="form-select form-select-sm" style="max-width:180px;"><option value="">All Drivers</option></select>
    <select id="fCircuit" class="form-select form-select-sm" style="max-width:180px;"><option value="">All Circuits</option></select>
  </div>

  <div class="shell">
    <div class="pane-filters">
      <div class="pane-header"><span class="pane-title">Status</span></div>
      <div class="p-2" id="statusFilters">
        <span class="fil-item active" data-val="">All</span>
        <span class="fil-item" data-val="planned">Planned</span>
        <span class="fil-item" data-val="completed">Completed</span>
        <span class="fil-item" data-val="cancelled">Cancelled</span>
      </div>
    </div>
    <div class="pane-table">
      <div class="pane-body">
        <table class="data-table">
          <thead><tr><th>Driver</th><th>Date</th><th>Circuit</th><th>Programme</th><th>Hrs</th><th>Engineer</th><th>Best Lap</th><th>Status</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="pane-detail">
      <div class="pane-header">
        <span class="pane-title">Detail</span>
        <div id="detailActions" class="d-none d-flex gap-2">
          <button class="btn btn-sm btn-outline-primary" style="font-size:.75rem;padding:2px 10px;" id="btnEdit">Edit</button>
          <button class="btn btn-sm btn-outline-danger" style="font-size:.75rem;padding:2px 10px;" id="btnDel">Delete</button>
        </div>
      </div>
      <div class="detail-body" id="detailBody">
        <p class="text-secondary" style="font-size:.82rem;">Select a session to view details.</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="sModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#8b5cf6;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">New Simulator Session</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="sForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver ID</label>
              <input type="text" class="form-control form-control-sm" id="fDriverId"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Session Date *</label>
              <input type="date" class="form-control form-control-sm" id="fSessionDate" required/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Duration (hrs)</label>
              <input type="number" step="0.1" class="form-control form-control-sm" id="fDurationHours"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="planned">Planned</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Circuit</label>
              <input type="text" class="form-control form-control-sm" id="fCircuit"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Programme</label>
              <input type="text" class="form-control form-control-sm" id="fProgramme"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Engineer Name</label>
              <input type="text" class="form-control form-control-sm" id="fEngineerName"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Best Lap Time</label>
              <input type="text" class="form-control form-control-sm" id="fLapTimeBest" placeholder="e.g. 1:23.456"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Objectives</label>
              <textarea class="form-control form-control-sm" id="fObjectives" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Outcomes</label>
              <textarea class="form-control form-control-sm" id="fOutcomes" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Setup Correlation</label>
              <textarea class="form-control form-control-sm" id="fSetupCorrelation" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#8b5cf6;border-color:#8b5cf6;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/simulator-sessions';
let allSessions=[],selId=null,statusFil='';
const modal=new bootstrap.Modal(document.getElementById('sModal'));

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function statusBadge(s){const m={planned:'bs-planned',completed:'bs-completed',cancelled:'bs-cancelled'};return`<span class="badge-s ${m[s]||'bs-planned'}">${esc(s)}</span>`;}

async function load(){
  try{const r=await fetch(API);if(r.ok)allSessions=await r.json();}catch(e){allSessions=[];}
  populateFilters();
  renderKPIs();
  renderTable();
}

function populateFilters(){
  const drivers=[...new Set(allSessions.map(s=>s.driver_name).filter(Boolean))].sort();
  const circuits=[...new Set(allSessions.map(s=>s.circuit).filter(Boolean))].sort();
  const dSel=document.getElementById('fDriver'),cSel=document.getElementById('fCircuit');
  const dv=dSel.value,cv=cSel.value;
  dSel.innerHTML='<option value="">All Drivers</option>'+drivers.map(n=>`<option value="${esc(n)}"${n===dv?' selected':''}>${esc(n)}</option>`).join('');
  cSel.innerHTML='<option value="">All Circuits</option>'+circuits.map(n=>`<option value="${esc(n)}"${n===cv?' selected':''}>${esc(n)}</option>`).join('');
}

function renderKPIs(){
  document.getElementById('kpiTotal').textContent=allSessions.length;
  document.getElementById('kpiCompleted').textContent=allSessions.filter(s=>s.status==='completed').length;
  document.getElementById('kpiPlanned').textContent=allSessions.filter(s=>s.status==='planned').length;
  const hrs=allSessions.reduce((a,s)=>a+(parseFloat(s.duration_hours)||0),0);
  document.getElementById('kpiHours').textContent=hrs.toFixed(1);
}

function filtered(){
  const q=document.getElementById('fSearch').value.toLowerCase();
  const d=document.getElementById('fDriver').value;
  const c=document.getElementById('fCircuit').value;
  return allSessions.filter(s=>{
    if(statusFil&&s.status!==statusFil)return false;
    if(d&&s.driver_name!==d)return false;
    if(c&&s.circuit!==c)return false;
    if(q&&!`${s.driver_name} ${s.circuit} ${s.programme}`.toLowerCase().includes(q))return false;
    return true;
  });
}

function renderTable(){
  const data=filtered();
  document.getElementById('tbody').innerHTML=data.length?data.map(s=>`
    <tr class="${s.id===selId?'selected':''}" onclick="selectRow(${s.id})">
      <td class="fw-semibold">${esc(s.driver_name||'')}</td>
      <td>${fmtDate(s.session_date)}</td>
      <td>${esc(s.circuit||'')}</td>
      <td>${esc(s.programme||'')}</td>
      <td>${s.duration_hours!=null?Number(s.duration_hours).toFixed(1):'—'}</td>
      <td>${esc(s.engineer_name||'')}</td>
      <td><code style="font-size:.75rem;">${esc(s.lap_time_best||'—')}</code></td>
      <td>${statusBadge(s.status)}</td>
    </tr>`).join(''):'<tr><td colspan="8" class="text-center text-secondary py-4">No sessions found</td></tr>';
}

function selectRow(id){
  selId=id;renderTable();
  const s=allSessions.find(x=>x.id===id);if(!s)return;
  document.getElementById('detailActions').classList.remove('d-none');
  document.getElementById('detailBody').innerHTML=`
    <div class="fw-bold mb-1" style="font-size:.95rem;">${esc(s.driver_name||'')}</div>
    <div class="mb-3">${statusBadge(s.status)}</div>
    ${[
      ['Date',fmtDate(s.session_date)],['Circuit',s.circuit],['Programme',s.programme],
      ['Duration',s.duration_hours!=null?`${Number(s.duration_hours).toFixed(1)} hrs`:'—'],
      ['Engineer',s.engineer_name],['Best Lap',s.lap_time_best]
    ].map(([l,v])=>`<div class="dl-row"><span class="dl-label">${l}</span><span class="dl-val">${v?esc(String(v)):'—'}</span></div>`).join('')}
    ${s.objectives?`<div class="mt-3"><div class="fw-semibold text-secondary mb-1" style="font-size:.72rem;text-transform:uppercase;">Objectives</div><div style="font-size:.82rem;">${esc(s.objectives)}</div></div>`:''}
    ${s.outcomes?`<div class="mt-2"><div class="fw-semibold text-secondary mb-1" style="font-size:.72rem;text-transform:uppercase;">Outcomes</div><div style="font-size:.82rem;">${esc(s.outcomes)}</div></div>`:''}
    ${s.setup_correlation?`<div class="mt-2"><div class="fw-semibold text-secondary mb-1" style="font-size:.72rem;text-transform:uppercase;">Setup Correlation</div><div style="font-size:.82rem;">${esc(s.setup_correlation)}</div></div>`:''}
    ${s.notes?`<div class="mt-2"><div class="fw-semibold text-secondary mb-1" style="font-size:.72rem;text-transform:uppercase;">Notes</div><div style="font-size:.82rem;">${esc(s.notes)}</div></div>`:''}`;
  document.getElementById('btnEdit').onclick=()=>openEdit(id);
  document.getElementById('btnDel').onclick=()=>del(id);
}

function openNew(){
  document.getElementById('sForm').reset();
  document.getElementById('fId').value='';
  document.getElementById('fStatus').value='planned';
  document.getElementById('modalTitle').textContent='New Simulator Session';
  modal.show();
}

function openEdit(id){
  const s=allSessions.find(x=>x.id===id);if(!s)return;
  document.getElementById('fId').value=s.id;
  document.getElementById('fDriverName').value=s.driver_name||'';
  document.getElementById('fDriverId').value=s.driver_id||'';
  document.getElementById('fSessionDate').value=s.session_date?s.session_date.slice(0,10):'';
  document.getElementById('fDurationHours').value=s.duration_hours??'';
  document.getElementById('fStatus').value=s.status||'planned';
  document.getElementById('fCircuit').value=s.circuit||'';
  document.getElementById('fProgramme').value=s.programme||'';
  document.getElementById('fEngineerName').value=s.engineer_name||'';
  document.getElementById('fLapTimeBest').value=s.lap_time_best||'';
  document.getElementById('fObjectives').value=s.objectives||'';
  document.getElementById('fOutcomes').value=s.outcomes||'';
  document.getElementById('fSetupCorrelation').value=s.setup_correlation||'';
  document.getElementById('fNotes').value=s.notes||'';
  document.getElementById('modalTitle').textContent='Edit Simulator Session';
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    driver_id:document.getElementById('fDriverId').value.trim(),
    session_date:document.getElementById('fSessionDate').value||null,
    duration_hours:document.getElementById('fDurationHours').value||null,
    status:document.getElementById('fStatus').value,
    circuit:document.getElementById('fCircuit').value.trim(),
    programme:document.getElementById('fProgramme').value.trim(),
    engineer_name:document.getElementById('fEngineerName').value.trim(),
    lap_time_best:document.getElementById('fLapTimeBest').value.trim(),
    objectives:document.getElementById('fObjectives').value.trim(),
    outcomes:document.getElementById('fOutcomes').value.trim(),
    setup_correlation:document.getElementById('fSetupCorrelation').value.trim(),
    notes:document.getElementById('fNotes').value.trim()
  };
  if(!body.driver_name||!body.session_date){alert('Driver Name and Session Date are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(id){
  if(!confirm('Delete this session?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  selId=null;
  document.getElementById('detailBody').innerHTML='<p class="text-secondary" style="font-size:.82rem;">Select a session to view details.</p>';
  document.getElementById('detailActions').classList.add('d-none');
  load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('fSearch').addEventListener('input',renderTable);
document.getElementById('fDriver').addEventListener('change',renderTable);
document.getElementById('fCircuit').addEventListener('change',renderTable);
document.querySelectorAll('#statusFilters .fil-item').forEach(el=>{
  el.addEventListener('click',()=>{
    document.querySelectorAll('#statusFilters .fil-item').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    statusFil=el.dataset.val;
    renderTable();
  });
});
load();
</script>
</body>
</html>
