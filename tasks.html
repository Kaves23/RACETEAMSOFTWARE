<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Team ERP – Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
      /* Make task rows single-line with inline tags and lighter tag weight to match left pane */
      .mlo-table td, .mlo-table th { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
      /* layout: title on the left (flex:1) and tags pinned to the right (flex:0) */
      .task-row-inner { display: flex; align-items: center; justify-content: space-between; gap: 8px; width:100%; }
      .task-title { font-weight: 600; display: block; min-width: 0; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
      .task-inline-tags { flex: 0 0 auto; display: flex; align-items: center; gap:6px; font-weight: 300; font-size: 0.82rem; color: #333; }
  .task-inline-tags .ev-type-pill { font-weight: 300; font-size: 0.78rem; padding: 2px 6px; margin-left:0; white-space:nowrap; }
  /* due date pills */
  .due-pill { display:inline-block; padding:2px 8px; border-radius:6px; background:#f3f3f3; color:#111; font-size:0.86rem; }
  .due-overdue { background:#e74c3c; color:#fff; font-weight:600; }
    /* sort control styling to match compact dark design */
    .sort-wrapper { display:flex; align-items:center; gap:6px; }
    .sort-select { background:#222; color:#e9eef2; border:1px solid rgba(255,255,255,0.06); padding:0.15rem 0.45rem; border-radius:6px; height:30px; font-size:0.82rem; }
    .sort-select:focus { outline: none; box-shadow: 0 0 0 3px rgba(100,150,200,0.06); }
    .sort-icon { color:#9fb0b8; font-size:0.92rem; display:inline-flex; align-items:center; padding:2px; }
    /* Header controls dark theme (search/selects/buttons) */
    .mlo-pane-header .form-control, .mlo-pane-header .form-select { background:#222; color:#e9eef2; border:1px solid rgba(255,255,255,0.06); height:30px; padding:0.12rem 0.45rem; border-radius:6px; }
    .mlo-pane-header .form-control::placeholder { color: rgba(233,238,242,0.45); }
    .mlo-pane-header .form-control:focus, .mlo-pane-header .form-select:focus { box-shadow: 0 0 0 3px rgba(100,150,200,0.06); outline:none; }
    .mlo-pane-header .btn { background: transparent; border:1px solid rgba(255,255,255,0.04); color:#e9eef2; height:30px; padding:0.12rem 0.5rem; }
    .mlo-pane-header .btn.btn-outline-light { background:#1b1b1b; border:1px solid rgba(255,255,255,0.06); color:#e9eef2; }
    </style>
</head>
<body class="page-tasks">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
            
            
                <h1 class="my-3">Tasks</h1>

                <!-- MLO-inspired tri-pane task manager (dark F1 theme) -->
                <div class="mlo-shell" id="taskShell">
                    <!-- LEFT: perspectives + project tree -->
                    <section class="mlo-pane mlo-pane-left" aria-label="Task navigation">
                        <div class="mlo-pane-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="mlo-title">Perspectives</div>
                                <span class="badge text-bg-secondary" id="taskCountBadge">0</span>
                            </div>
                        </div>
                        <div class="mlo-pane-content">
                            <div class="mlo-section-label">Smart lists</div>
                            <ul class="mlo-tree pastel-tree" id="taskPerspectiveList">
                                <li class="mlo-tree-item active" data-perspective="all">All Tasks</li>
                                <li class="mlo-tree-item" data-perspective="inbox">Open (Inbox)</li>
                                <li class="mlo-tree-item" data-perspective="today">Today</li>
                                <li class="mlo-tree-item" data-perspective="overdue">Overdue</li>
                                <li class="mlo-tree-item" data-perspective="next7">Next 7 Days</li>
                                <li class="mlo-tree-item" data-perspective="completed">Completed</li>
                            </ul>

                            <div class="d-flex align-items-center justify-content-between mt-3">
                              <div class="mlo-section-label">Projects</div>
                              <button id="btnClearProject" class="btn btn-sm btn-outline-light" title="Clear project selection">Clear</button>
                            </div>
                            <ul class="mlo-tree pastel-tree" id="taskProjectList"></ul>
                        </div>
                    </section>

                    <div class="mlo-resizer" data-resize="left" title="Drag to resize"></div>

                    <!-- MIDDLE: dense list + filters -->
                    <section class="mlo-pane mlo-pane-mid" aria-label="Task list">
                        <div class="mlo-pane-header">
                            <div class="d-flex flex-wrap align-items-center gap-1">
                                <input id="taskSearch" type="text" class="form-control form-control-sm" placeholder="Search…" style="max-width: 220px;">
                                <select id="statusFilter" class="form-select form-select-sm" style="max-width: 150px;">
                                    <option value="">Status: All</option>
                                    <option value="Pending">Pending</option>
                                    <option value="In Progress">In Progress</option>
                                    <option value="Completed">Completed</option>
                                </select>
                                <select id="eventFilter" class="form-select form-select-sm" style="max-width: 210px;">
                                    <option value="">Event: All</option>
                                </select>
                                <select id="assigneeFilter" class="form-select form-select-sm" style="max-width: 190px;">
                                    <option value="">Assignee: All</option>
                                </select>
                                <select id="groupBy" class="form-select form-select-sm" style="max-width: 160px;">
                                    <option value="">Group: None</option>
                                    <option value="event">Group: Event</option>
                                    <option value="status">Group: Status</option>
                                    <option value="assignee">Group: Assignee</option>
                                    <option value="priority">Group: Priority</option>
                                </select>
                                <div class="sort-wrapper" style="max-width:220px;">
                                  <select id="sortBy" class="sort-select form-select-sm" style="max-width: 180px;">
                                      <option value="dueAsc">Sort: Due ↑</option>
                                      <option value="dueDesc">Sort: Due ↓</option>
                                      <option value="createdNew">Sort: Created (Newest)</option>
                                      <option value="createdOld">Sort: Created (Oldest)</option>
                                      <option value="updatedNew">Sort: Updated (Newest)</option>
                                      <option value="updatedOld">Sort: Updated (Oldest)</option>
                                  </select>
                                  <span id="sortIcon" class="sort-icon" title="Sort direction"></span>
                                </div>
                                <button class="btn btn-sm btn-accent mlo-btn" id="btnAddTask" type="button">Add Task</button>
                            </div>
                        </div>
                        <div class="mlo-pane-content" style="padding: 0;">
                            <table class="table table-dark table-hover mlo-table" style="margin:0;">
                                <thead>
                          <tr>
                            <th style="width: 58px;">#</th>
                            <th>Title & details</th>
                            <th style="width: 120px;">Due</th>
                          </tr>
                                </thead>
                                <tbody id="tasks-body"></tbody>
                            </table>
                        </div>
                    </section>

                    <div class="mlo-resizer" data-resize="right" title="Drag to resize"></div>

                    <!-- RIGHT: inspector -->
                    <section class="mlo-pane mlo-pane-right mlo-inspector" aria-label="Task inspector">
                        <div class="mlo-pane-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <div class="mlo-title">Inspector</div>
                                <span class="badge text-bg-secondary" id="inspectorBadge">No selection</span>
                            </div>
                        </div>
            <div class="mlo-pane-content">
              <form id="taskForm" autocomplete="off">
                <ul class="nav nav-tabs nav-dark mb-2" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="tab-task-details" data-bs-toggle="tab" data-bs-target="#pane-task-details" type="button" role="tab" aria-controls="pane-task-details" aria-selected="true">Details</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-task-attachments" data-bs-toggle="tab" data-bs-target="#pane-task-attachments" type="button" role="tab" aria-controls="pane-task-attachments" aria-selected="false">Attachments</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-task-meta" data-bs-toggle="tab" data-bs-target="#pane-task-meta" type="button" role="tab" aria-controls="pane-task-meta" aria-selected="false">Meta</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-task-checklist" data-bs-toggle="tab" data-bs-target="#pane-task-checklist" type="button" role="tab" aria-controls="pane-task-checklist" aria-selected="false">Checklist</button>
                </li>
                </ul>

                <div class="tab-content">
                <div class="tab-pane fade show active" id="pane-task-details" role="tabpanel" aria-labelledby="tab-task-details">
                  <div class="row g-2">
                  <div class="col-4">
                    <label for="f_id" class="form-label">ID</label>
                    <input id="f_id" class="form-control form-control-sm" type="text" readonly>
                  </div>
                  <div class="col-8">
                    <label for="f_title" class="form-label">Title</label>
                    <input id="f_title" class="form-control form-control-sm" type="text" placeholder="e.g. Re-bleed brakes">
                  </div>
                  <div class="col-12">
                    <label for="f_desc" class="form-label">Description</label>
                    <textarea id="f_desc" class="form-control form-control-sm" rows="2" placeholder="Detailed task description, measurements, constraints, acceptance criteria…"></textarea>
                  </div>

                  <div class="col-12">
                    <label for="f_event" class="form-label">Event / Project</label>
                    <select id="f_event" class="form-select form-select-sm"></select>
                  </div>

                  <div class="col-7">
                    <label for="f_assignee" class="form-label">Assigned To</label>
                    <select id="f_assignee" class="form-select form-select-sm"></select>
                  </div>
                  <div class="col-5">
                    <label for="f_status" class="form-label">Status</label>
                    <select id="f_status" class="form-select form-select-sm">
                      <option value="Pending">Pending</option>
                      <option value="In Progress">In Progress</option>
                      <option value="Completed">Completed</option>
                    </select>
                  </div>

                  <div class="col-6">
                    <label for="f_start" class="form-label">Start</label>
                    <input id="f_start" class="form-control form-control-sm" type="date">
                  </div>
                  <div class="col-6">
                    <label for="f_due" class="form-label">Due</label>
                    <input id="f_due" class="form-control form-control-sm" type="date">
                  </div>

                  <div class="col-6">
                    <label for="f_priority" class="form-label">Priority</label>
                    <select id="f_priority" class="form-select form-select-sm">
                      <option value="Low">Low</option>
                      <option value="Medium">Medium</option>
                      <option value="High">High</option>
                      <option value="Critical">Critical</option>
                    </select>
                  </div>
                  <div class="col-3">
                    <label for="f_est" class="form-label">Est. (h)</label>
                    <input id="f_est" class="form-control form-control-sm" type="number" min="0" step="0.25">
                  </div>
                  <div class="col-3">
                    <label for="f_act" class="form-label">Act. (h)</label>
                    <input id="f_act" class="form-control form-control-sm" type="number" min="0" step="0.25">
                  </div>

                  <div class="col-12">
                    <label for="f_tags" class="form-label">Tags</label>
                    <input id="f_tags" class="form-control form-control-sm" type="text" placeholder="e.g. #engine #spares #scrutineering">
                  </div>
                  <div class="col-12">
                    <label for="f_notes" class="form-label">Notes</label>
                    <textarea id="f_notes" class="form-control form-control-sm" rows="4" placeholder="Observations, measurements, torque specs, part numbers, photos reference…"></textarea>
                  </div>

                  <div class="col-12 d-flex gap-1 mt-1">
                    <button class="btn btn-sm btn-primary mlo-btn" id="btnSave" type="button">Save</button>
                    <button class="btn btn-sm btn-outline-light mlo-btn" id="btnDuplicate" type="button">Duplicate</button>
                    <button class="btn btn-sm btn-outline-danger mlo-btn" id="btnDelete" type="button">Delete</button>
                  </div>
                  </div>
                </div>

                <div class="tab-pane fade" id="pane-task-attachments" role="tabpanel" aria-labelledby="tab-task-attachments">
                  <div class="mb-2">
                  <label class="form-label">Attachments</label>
                  <div id="taskAttList" class="d-grid gap-1"></div>
                  </div>
                  <div class="d-flex gap-1 mt-1">
                  <input id="taskAttName" class="form-control form-control-sm" type="text" placeholder="Name" style="max-width: 180px;">
                  <input id="taskAttUrl" class="form-control form-control-sm" type="text" placeholder="URL">
                  <button class="btn btn-sm btn-outline-light mlo-btn" id="btnTaskAttDrive" type="button">Drive</button>
                  <button class="btn btn-sm btn-outline-light mlo-btn" id="btnTaskAttAdd" type="button">Add</button>
                  </div>
                  <div class="text-secondary" style="font-size:0.75rem; margin-top:0.15rem;">
                  Use Settings → Calendar to enable Google Drive Picker.
                  </div>
                </div>

                <div class="tab-pane fade" id="pane-task-meta" role="tabpanel" aria-labelledby="tab-task-meta">
                  <div class="text-secondary" style="font-size:0.9rem;">
                  <div><span style="opacity:0.7;">Created:</span> <span id="metaCreated">—</span></div>
                  <div><span style="opacity:0.7;">Updated:</span> <span id="metaUpdated">—</span></div>
                  </div>
                </div>
                <div class="tab-pane fade" id="pane-task-checklist" role="tabpanel" aria-labelledby="tab-task-checklist">
                  <div class="row g-2">
                    <div class="col-12 d-flex align-items-end gap-1">
                      <div style="flex:1;">
                        <label class="form-label">Master Checklist</label>
                        <select id="taskChkMaster" class="form-select form-select-sm"></select>
                      </div>
                      <div>
                        <button class="btn btn-sm btn-outline-light mlo-btn" id="btnTaskChkSpawn" type="button">Spawn Checklist</button>
                      </div>
                    </div>
                    <div class="col-12">
                      <div id="taskChkList" class="d-grid gap-2"></div>
                    </div>
                  </div>
                </div>
                </div>
              </form>
            </div>
                    </section>
                </div>
            </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="config.js"></script>
    <script src="core.js"></script>
    <script src="topnav.js"></script>
    <script>RTS.setActiveNav();</script>
    <script>
    (function () {
      const LS_TASKS = 'rts.tasks.v4';
      const LS_UI = 'rts.tasks.ui.v4';
      const STATUS = ['Pending', 'In Progress', 'Completed'];
      const PRIORITY = ['Low', 'Medium', 'High', 'Critical'];

      let settings = RTS.getSettings();
      const storedEvents = RTS.safeLoadJSON('rts.events.v4', []);
      let events = Array.isArray(storedEvents) ? storedEvents : [];
      const typeMap = (()=> {
        const cfg = RTS.getSettings().eventTypes || [];
        const m = new Map();
        cfg.forEach(t => m.set(String(t.code), t.color || '#e32636'));
        return m;
      })();
      const eventMap = new Map(events.map(ev => [String(ev.id), ev.title || ev.name || 'Event']));
      const eventOptions = events.map(ev => ({
        id: ev.id,
        title: ev.title || ev.name || 'Event',
        color: ev.type ? (typeMap.get(String(ev.type)) || '#e32636') : '#e32636'
      }));
      const ASSIGNEES = (settings.staff || []).filter(s => s.active !== false).map(s => s.name);

      const els = {
        shell: document.getElementById('taskShell'),
        tbody: document.getElementById('tasks-body'),
        countBadge: document.getElementById('taskCountBadge'),
        inspectorBadge: document.getElementById('inspectorBadge'),
        metaCreated: document.getElementById('metaCreated'),
        metaUpdated: document.getElementById('metaUpdated'),
        perspectiveList: document.getElementById('taskPerspectiveList'),
        projectList: document.getElementById('taskProjectList'),
  btnClearProject: document.getElementById('btnClearProject'),
        search: document.getElementById('taskSearch'),
        status: document.getElementById('statusFilter'),
        event: document.getElementById('eventFilter'),
        assignee: document.getElementById('assigneeFilter'),
        groupBy: document.getElementById('groupBy'),
  sortBy: document.getElementById('sortBy'),
  sortIcon: document.getElementById('sortIcon'),
        btnAdd: document.getElementById('btnAddTask'),
        btnSave: document.getElementById('btnSave'),
        btnDup: document.getElementById('btnDuplicate'),
        btnDel: document.getElementById('btnDelete'),
        taskAttList: document.getElementById('taskAttList'),
        taskAttName: document.getElementById('taskAttName'),
        taskAttUrl: document.getElementById('taskAttUrl'),
        btnTaskAttDrive: document.getElementById('btnTaskAttDrive'),
        btnTaskAttAdd: document.getElementById('btnTaskAttAdd'),
        f: {
          id: document.getElementById('f_id'),
          title: document.getElementById('f_title'),
          desc: document.getElementById('f_desc'),
          event: document.getElementById('f_event'),
          assignee: document.getElementById('f_assignee'),
          status: document.getElementById('f_status'),
          start: document.getElementById('f_start'),
          due: document.getElementById('f_due'),
          priority: document.getElementById('f_priority'),
          est: document.getElementById('f_est'),
          act: document.getElementById('f_act'),
          tags: document.getElementById('f_tags'),
          notes: document.getElementById('f_notes'),
        }
        ,
        chk: {
          master: document.getElementById('taskChkMaster'),
          spawn: document.getElementById('btnTaskChkSpawn'),
          list: document.getElementById('taskChkList'),
        }
      };

      let tasks = [];
      let ui = {
        perspective: 'all',
        search: '',
        status: '',
        event: '',
        assignee: '',
        groupBy: 'event',
        sortBy: 'dueAsc',
        selectedId: null,
        paneLeftWidth: 240,
        paneRightWidth: 380,
      };

      function escapeHtml(str) {
        return String(str || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }
      function eventTitle(id) {
        return eventMap.get(String(id)) || 'Unassigned';
      }
      function nowISO() { return new Date().toISOString(); }
      function toDateInput(iso) {
        if (!iso) return '';
        const d = new Date(iso);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      }
      function fromDateInput(v) {
        if (!v) return '';
        const [y, m, d] = v.split('-').map(Number);
        const dt = new Date(y, m - 1, d, 0, 0, 0);
        return dt.toISOString();
      }
      function addDaysISO(days) {
        const d = new Date();
        d.setDate(d.getDate() + days);
        return d.toISOString();
      }

      function normalizeTask(t) {
        if (!t) return null;
        const clone = { ...t };
        if (!Array.isArray(clone.attachments)) clone.attachments = [];
        if (clone.eventId == null && clone.event) {
          const match = events.find(ev => (ev.title || ev.name) === clone.event);
          if (match) clone.eventId = match.id;
        }
        if (clone.eventId == null && events[0]) clone.eventId = events[0].id;
        delete clone.event;
        return clone;
      }

      function load() {
        const storedTasks = RTS.safeLoadJSON(LS_TASKS, []);
        const storedUi = RTS.safeLoadJSON(LS_UI, {});
        tasks = Array.isArray(storedTasks) ? storedTasks.map(normalizeTask).filter(Boolean) : [];
        if (!Array.isArray(tasks) || tasks.length === 0) {
          tasks = seedTasks();
          persistTasks();
        }
        ui = RTS.deepMerge(ui, storedUi || {});

        // deep links
        const qEvent = RTS.getQueryParam('event');
        if (qEvent) ui.event = String(qEvent);
        const qSel = RTS.getQueryParam('select');
        if (qSel) ui.selectedId = isNaN(Number(qSel)) ? qSel : Number(qSel);

        const left = els.shell.querySelector('.mlo-pane-left');
        const right = els.shell.querySelector('.mlo-pane-right');
        if (left) left.style.width = `${ui.paneLeftWidth}px`;
        if (right) right.style.width = `${ui.paneRightWidth}px`;
      }

      function persistTasks() { RTS.safeSaveJSON(LS_TASKS, tasks); }
      function persistUi() { RTS.safeSaveJSON(LS_UI, ui); }

      function seedTasks() {
        const firstEventId = events[0]?.id || '';
        const base = [
          {
            id: 1,
            title: 'Prep chassis',
            description: 'Pre-event chassis inspection, alignment, chain line, axle check, fastener torque marks.',
            eventId: firstEventId,
            assignee: ASSIGNEES[0] || 'Mechanic',
            status: 'Completed',
            priority: 'High',
            startDate: addDaysISO(-7),
            dueDate: addDaysISO(-2),
            estHours: 2.5,
            actHours: 2.25,
            tags: '#workshop #prep',
            notes: 'Confirm ride height + rear track. Replace any suspect nylocs.',
            createdAt: addDaysISO(-10),
            updatedAt: addDaysISO(-3),
            attachments: [],
          },
          {
            id: 2,
            title: 'Book accommodation',
            description: 'Confirm rooms, check-in times, cancellation window, and invoice to Finance.',
            eventId: firstEventId,
            assignee: ASSIGNEES[1] || 'Team Manager',
            status: 'In Progress',
            priority: 'Medium',
            startDate: addDaysISO(-5),
            dueDate: addDaysISO(1),
            estHours: 1,
            actHours: 0.25,
            tags: '#logistics',
            notes: 'Prefer close to circuit, parking for trailer.',
            createdAt: addDaysISO(-8),
            updatedAt: nowISO(),
            attachments: [],
          },
          {
            id: 3,
            title: 'Engine rebuild',
            description: 'Top-end inspection, check piston/cylinder, replace seals, set squish, verify jetting baseline.',
            eventId: events[1]?.id || firstEventId,
            assignee: ASSIGNEES[2] || 'Mechanic',
            status: 'Pending',
            priority: 'Critical',
            startDate: '',
            dueDate: addDaysISO(3),
            estHours: 6,
            actHours: 0,
            tags: '#engine #service',
            notes: 'Log engine hours and seal number. Photograph bore cross-hatch.',
            createdAt: addDaysISO(-6),
            updatedAt: addDaysISO(-6),
            attachments: [],
          },
          {
            id: 4,
            title: 'Prepare driver brief',
            description: 'Schedule, objectives, baseline setup, tyre/fuel plan, comms protocol and safety reminders.',
            eventId: events[2]?.id || firstEventId,
            assignee: ASSIGNEES[3] || 'Race Engineer',
            status: 'In Progress',
            priority: 'High',
            startDate: addDaysISO(-1),
            dueDate: addDaysISO(2),
            estHours: 1.5,
            actHours: 0.5,
            tags: '#briefing #drivers',
            notes: 'Include wet plan and gearing ranges.',
            createdAt: addDaysISO(-4),
            updatedAt: nowISO(),
            attachments: [],
          }
        ];

        let id = 5;
        const maxSeed = Math.min(50, Math.max(5, events.length ? 20 : 10));
        for (; id <= maxSeed; id++) {
          const ev = events[(id - 1) % (events.length || 1)];
          const assignee = ASSIGNEES[(id - 1) % (ASSIGNEES.length || 1)] || 'Crew';
          const status = STATUS[(id - 1) % STATUS.length];
          const priority = PRIORITY[(id - 1) % PRIORITY.length];
          const dueIn = (id % 14) - 3;
          base.push({
            id,
            title: `Task ${id}`,
            description: `Detailed scope for Task ${id}. Record measurements, part numbers, and acceptance criteria here.`,
            eventId: ev ? ev.id : firstEventId,
            assignee,
            status,
            priority,
            startDate: status === 'Pending' ? '' : addDaysISO(-(id % 10)),
            dueDate: addDaysISO(dueIn),
            estHours: Number(((id % 8) * 0.5 + 0.5).toFixed(2)),
            actHours: status === 'Completed' ? Number(((id % 6) * 0.5 + 0.25).toFixed(2)) : 0,
            tags: (id % 3 === 0) ? '#workshop #prep' : (id % 3 === 1) ? '#trackside #ops' : '#admin #logistics',
            notes: '',
            attachments: [],
            createdAt: addDaysISO(-((id % 20) + 1)),
            updatedAt: addDaysISO(-((id % 7))),
          });
        }
        return base;
      }

      function renderProjectTree() {
        const eventNames = new Set(eventOptions.map(e => e.title));
        tasks.forEach(t => eventNames.add(eventTitle(t.eventId)));
        const eventsSorted = Array.from(eventNames).filter(Boolean).sort();
        els.projectList.innerHTML = '';
        eventsSorted.forEach(name => {
          const li = document.createElement('li');
          li.className = 'mlo-tree-item';
          const matched = eventOptions.find(e => e.title === name);
          li.dataset.event = matched ? String(matched.id) : '';
          li.textContent = name;
          els.projectList.appendChild(li);
        });
      }

      function renderFilterOptions() {
        const assignees = Array.from(new Set(tasks.map(t => t.assignee))).filter(Boolean).sort();
        const curEv = ui.event;
        const curAs = ui.assignee;

        els.event.innerHTML = '<option value="">Event: All</option>' + eventOptions.map(ev => `<option value="${escapeHtml(String(ev.id))}">${escapeHtml(ev.title)}</option>`).join('');
        const assigneeList = ASSIGNEES.length ? ASSIGNEES : assignees;
        els.assignee.innerHTML = '<option value="">Assignee: All</option>' + assigneeList.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');

        els.event.value = curEv || '';
        els.assignee.value = curAs || '';

        if (els.f.event) {
          els.f.event.innerHTML = eventOptions.length
            ? eventOptions.map(ev => `<option value="${escapeHtml(String(ev.id))}">${escapeHtml(ev.title)}</option>`).join('')
            : '<option value="">Unassigned</option>';
          if (curEv) els.f.event.value = curEv;
        }

        if (els.f.assignee) {
          els.f.assignee.innerHTML = assigneeList.length
            ? assigneeList.map(a => `<option value="${escapeHtml(a)}">${escapeHtml(a)}</option>`).join('')
            : '<option value="">Unassigned</option>';
        }
      }

      function isSameDay(aIso, b) {
        if (!aIso) return false;
        const a = new Date(aIso);
        return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      }
      function inNextDays(iso, days) {
        if (!iso) return false;
        const d = new Date(iso);
        const now = new Date();
        const end = new Date();
        end.setDate(now.getDate() + days);
        return d >= now && d <= end;
      }
      function isOverdue(iso) {
        if (!iso) return false;
        const d = new Date(iso);
        const now = new Date();
        const end = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59);
        return end < now;
      }

  function applyFilters(list) {
        const q = (ui.search || '').trim().toLowerCase();
        const today = new Date();
        let out = list.slice();

        if (ui.perspective === 'inbox') {
          out = out.filter(t => t.status !== 'Completed');
        } else if (ui.perspective === 'today') {
          out = out.filter(t => t.status !== 'Completed' && isSameDay(t.dueDate, today));
        } else if (ui.perspective === 'overdue') {
          out = out.filter(t => t.status !== 'Completed' && isOverdue(t.dueDate));
        } else if (ui.perspective === 'next7') {
          out = out.filter(t => t.status !== 'Completed' && inNextDays(t.dueDate, 7));
        } else if (ui.perspective === 'completed') {
          out = out.filter(t => t.status === 'Completed');
        }

        if (ui.status) out = out.filter(t => t.status === ui.status);
        if (ui.event) out = out.filter(t => String(t.eventId || '') === String(ui.event));
        if (ui.assignee) out = out.filter(t => t.assignee === ui.assignee);
        if (q) {
          out = out.filter(t => (
            (t.title || '').toLowerCase().includes(q) ||
            (t.description || '').toLowerCase().includes(q) ||
            (eventTitle(t.eventId) || '').toLowerCase().includes(q) ||
            (t.assignee || '').toLowerCase().includes(q) ||
            (t.tags || '').toLowerCase().includes(q)
          ));
        }

            return out;
      }

          function applySort(list) {
            const out = list.slice();
            const prRank = { 'Critical': 4, 'High': 3, 'Medium': 2, 'Low': 1 };
            const sortBy = ui.sortBy || 'dueAsc';
            if (sortBy === 'dueAsc') {
              out.sort((a, b) => {
                // place tasks with NO due date first
                const aHas = !!a.dueDate;
                const bHas = !!b.dueDate;
                if (!aHas && bHas) return -1;
                if (aHas && !bHas) return 1;
                const ad = a.dueDate ? new Date(a.dueDate).getTime() : 9e15;
                const bd = b.dueDate ? new Date(b.dueDate).getTime() : 9e15;
                if (ad !== bd) return ad - bd;
                return (prRank[b.priority] || 0) - (prRank[a.priority] || 0);
              });
            } else if (sortBy === 'dueDesc') {
              out.sort((a, b) => {
                // place tasks with NO due date first
                const aHas = !!a.dueDate;
                const bHas = !!b.dueDate;
                if (!aHas && bHas) return -1;
                if (aHas && !bHas) return 1;
                const ad = a.dueDate ? new Date(a.dueDate).getTime() : -9e15;
                const bd = b.dueDate ? new Date(b.dueDate).getTime() : -9e15;
                if (ad !== bd) return bd - ad;
                return (prRank[b.priority] || 0) - (prRank[a.priority] || 0);
              });
            } else if (sortBy === 'createdNew') {
              out.sort((a, b) => {
                const ac = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                const bc = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                return bc - ac;
              });
            } else if (sortBy === 'createdOld') {
              out.sort((a, b) => {
                const ac = a.createdAt ? new Date(a.createdAt).getTime() : 0;
                const bc = b.createdAt ? new Date(b.createdAt).getTime() : 0;
                return ac - bc;
              });
            } else if (sortBy === 'updatedNew') {
              out.sort((a, b) => {
                const au = a.updatedAt ? new Date(a.updatedAt).getTime() : 0;
                const bu = b.updatedAt ? new Date(b.updatedAt).getTime() : 0;
                return bu - au;
              });
            } else if (sortBy === 'updatedOld') {
              out.sort((a, b) => {
                const au = a.updatedAt ? new Date(a.updatedAt).getTime() : 0;
                const bu = b.updatedAt ? new Date(b.updatedAt).getTime() : 0;
                return au - bu;
              });
            }
            return out;
          }

      function badgeForStatus(status) {
        if (status === 'Completed') return '<span class="ev-type-pill" style="background:#c0f4a6; color:#0b0d12;">Completed</span>';
        if (status === 'In Progress') return '<span class="ev-type-pill" style="background:#9be5f0; color:#0b0d12;">In Progress</span>';
        return '<span class="ev-type-pill" style="background:#fcb0c3; color:#0b0d12;">Pending</span>';
      }

      function statusTag(status){
        return badgeForStatus(status);
      }

      function lightenColor(hex, amt){
        const h = String(hex||'').replace('#','');
        if (h.length!==6) return hex || '#9be5f0';
        const toCh = (s)=> Math.min(255, Math.max(0, parseInt(s,16) + amt));
        const r = toCh(h.slice(0,2));
        const g = toCh(h.slice(2,4));
        const b = toCh(h.slice(4,6));
        const comp = (n)=> n.toString(16).padStart(2,'0');
        return `#${comp(r)}${comp(g)}${comp(b)}`;
      }

      function priorityTag(p){
        const map = { 'Critical':'#fcb0c3','High':'#ffc48a','Medium':'#f4d35e','Low':'#9be5f0' };
        const color = map[p] || '#9be5f0';
        return `<span class="ev-type-pill" style="background:${color}; color:#0b0d12; padding:2px 8px; display:inline-block;">${escapeHtml(p||'')}</span>`;
      }

      function eventTag(id){
        try {
          const ev = eventOptions.find(e=>String(e.id)===String(id));
          const typeColor = ev ? lightenColor(ev.color, 20) : '#9be5f0';
          const title = ev ? ev.title : 'Unassigned';
          return `<span class="ev-type-pill" style="background:${typeColor}; color:#0b0d12; padding:2px 8px; display:inline-block;">${escapeHtml(title)}</span>`;
        } catch(_e){
          return escapeHtml(eventTitle(id));
        }
      }

      function renderTable() {
        const filtered = applyFilters(tasks);
        const sorted = applySort(filtered);
        els.countBadge.textContent = String(filtered.length);
        els.tbody.innerHTML = '';
        const groupBy = ui.groupBy || '';

        if (!groupBy) {
          sorted.forEach(t => els.tbody.appendChild(renderRow(t)));
        } else {
          const groups = new Map();
          sorted.forEach(t => {
            let key = '—';
            if (groupBy === 'event') key = eventTitle(t.eventId);
            else key = t[groupBy] || '—';
            if (!groups.has(key)) groups.set(key, []);
            groups.get(key).push(t);
          });
          const keys = Array.from(groups.keys()).sort();
          keys.forEach(key => {
            const grp = groups.get(key);
            const trh = document.createElement('tr');
              trh.className = 'mlo-group-row';
              trh.innerHTML = `<td colspan="3">${escapeHtml(String(groupBy).toUpperCase())}: ${escapeHtml(key)} <span style="opacity:0.7; font-weight:600;">(${grp.length})</span></td>`;
            els.tbody.appendChild(trh);
            grp.forEach(t => els.tbody.appendChild(renderRow(t)));
          });
        }

        if (ui.selectedId !== null) {
          const row = els.tbody.querySelector(`tr[data-id="${ui.selectedId}"]`);
          if (row) row.classList.add('mlo-row-selected');
        }
      }

      function renderRow(t) {
        const tr = document.createElement('tr');
        tr.dataset.id = String(t.id);
        // inline tags (event, priority, status, assignee) — compact and lightweight
        const tagsHtml = `${eventTag(t.eventId)}${priorityTag(t.priority)}${statusTag(t.status)}<span class="ev-type-pill" style="background:#eee; color:#111; padding:2px 6px; display:inline-block;">${escapeHtml(t.assignee||'')}</span>`;
        const dueHtml = t.dueDate ? (isOverdue(t.dueDate) ? `<span class="due-pill due-overdue">${escapeHtml(toDateInput(t.dueDate))}</span>` : `<span class="due-pill">${escapeHtml(toDateInput(t.dueDate))}</span>`) : '—';
        tr.innerHTML = `
          <th scope="row">${t.id}</th>
          <td>
            <div class="task-row-inner">
              <div class="task-title">${escapeHtml(t.title)}</div>
              <div class="task-inline-tags">${tagsHtml}</div>
            </div>
          </td>
          <td>${dueHtml}</td>
        `;
        tr.addEventListener('click', () => selectTask(t.id));
        return tr;
      }

      function selectTask(id) {
        ui.selectedId = id;
        persistUi();
        const task = tasks.find(t => t.id === id);
        hydrateInspector(task);
        renderTable();
      }

      function hydrateInspector(t) {
        if (!t) {
          els.inspectorBadge.textContent = 'No selection';
          els.inspectorBadge.className = 'badge text-bg-secondary';
          Object.values(els.f).forEach(el => el.disabled = true);
          els.btnSave.disabled = true;
          els.btnDup.disabled = true;
          els.btnDel.disabled = true;
          els.metaCreated.textContent = '—';
          els.metaUpdated.textContent = '—';
          return;
        }

        Object.values(els.f).forEach(el => el.disabled = false);
        els.btnSave.disabled = false;
        els.btnDup.disabled = false;
        els.btnDel.disabled = false;

        els.inspectorBadge.textContent = `#${t.id}`;
        els.inspectorBadge.className = 'badge text-bg-secondary';

        els.f.id.value = String(t.id);
        els.f.title.value = t.title || '';
        els.f.desc.value = t.description || '';
        els.f.event.value = String(t.eventId || '');
        els.f.assignee.value = t.assignee || '';
        els.f.status.value = t.status || 'Pending';
        els.f.start.value = toDateInput(t.startDate);
        els.f.due.value = toDateInput(t.dueDate);
        els.f.priority.value = t.priority || 'Medium';
        els.f.est.value = (t.estHours ?? '');
        els.f.act.value = (t.actHours ?? '');
        els.f.tags.value = t.tags || '';
        els.f.notes.value = t.notes || '';

        els.metaCreated.textContent = t.createdAt ? new Date(t.createdAt).toLocaleString() : '—';
        els.metaUpdated.textContent = t.updatedAt ? new Date(t.updatedAt).toLocaleString() : '—';

        renderAttachments(t);
        renderTaskChecklist(t);
      }

      function renderAttachments(task) {
        els.taskAttList.innerHTML = '';
        const atts = Array.isArray(task.attachments) ? task.attachments : [];
        if (atts.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'text-secondary';
          empty.style.fontSize = '0.75rem';
          empty.textContent = 'No attachments.';
          els.taskAttList.appendChild(empty);
          return;
        }
        atts.forEach((a, idx) => {
          const prov = a && a.provider ? String(a.provider) : '';
          const label = prov === 'gdrive' ? 'Drive' : (prov ? prov : 'Link');
          const row = document.createElement('div');
          row.className = 'd-flex align-items-center justify-content-between gap-2';
          row.innerHTML = `
            <div class="text-truncate" style="min-width:0; cursor:pointer;">
              <span class="badge text-bg-secondary" style="font-size:0.65rem; margin-right:0.25rem;">${escapeHtml(label)}</span>
              <span class="text-truncate">${escapeHtml(a.name || a.url || 'Attachment')}</span>
            </div>
            <div class="d-flex gap-1">
              <button class="btn btn-sm btn-outline-light mlo-btn" data-open="1" title="Open">Open</button>
              <button class="btn btn-sm btn-outline-danger mlo-btn" data-del="1" title="Remove">×</button>
            </div>
          `;
          row.querySelector('[data-open]')?.addEventListener('click', (e) => {
            e.stopPropagation();
            if (a.url) window.open(a.url, '_blank');
          });
          row.querySelector('[data-del]')?.addEventListener('click', (e) => {
            e.stopPropagation();
            task.attachments.splice(idx, 1);
            task.updatedAt = nowISO();
            persistTasks();
            hydrateInspector(task);
          });
          row.querySelector('div.text-truncate')?.addEventListener('click', () => { if (a.url) window.open(a.url, '_blank'); });
          els.taskAttList.appendChild(row);
        });
      }

      function addAttachmentLink() {
        if (ui.selectedId === null) return;
        const idx = tasks.findIndex(t => t.id === ui.selectedId);
        if (idx === -1) return;
        const task = tasks[idx];
        const name = els.taskAttName.value.trim();
        const url = els.taskAttUrl.value.trim();
        if (!name && !url) return;
        task.attachments = Array.isArray(task.attachments) ? task.attachments : [];
        task.attachments.push({ provider: 'link', name: name || 'Link', url });
        els.taskAttName.value = '';
        els.taskAttUrl.value = '';
        task.updatedAt = nowISO();
        persistTasks();
        hydrateInspector(task);
      }

      async function addAttachmentDrive() {
        if (ui.selectedId === null) return;
        const idx = tasks.findIndex(t => t.id === ui.selectedId);
        if (idx === -1) return;
        const task = tasks[idx];
        try {
          const picked = await RTS.pickDriveFiles({ multiSelect: true, includeFolders: false });
          if (!picked || picked.length === 0) return;
          task.attachments = Array.isArray(task.attachments) ? task.attachments : [];
          picked.forEach(p => task.attachments.push({ provider: 'gdrive', id: p.id, name: p.name, url: p.url, mimeType: p.mimeType, pickedAt: p.pickedAt }));
          task.updatedAt = nowISO();
          persistTasks();
          hydrateInspector(task);
        } catch (e) {
          alert('Drive Picker error: ' + (e && e.message ? e.message : String(e)));
        }
      }

      // ----- Task-local checklist -----
      function ensureTaskChecklist(t){ if(!t.checklist) t.checklist = { id: RTS.uid('tchk'), name: '', items: [] }; return t.checklist; }
      function renderChecklistMasterOptions(){
        const masters = (RTS.getSettings().masterChecklists||[]).slice();
        if (els.chk.master) els.chk.master.innerHTML = masters.map(m=>`<option value="${escapeHtml(String(m.id))}">${escapeHtml(m.name||'Checklist')}</option>`).join('');
      }
      function spawnTaskChecklist(){
        if (ui.selectedId === null) return;
        const idx = tasks.findIndex(t => t.id === ui.selectedId);
        if (idx === -1) return;
        const t = tasks[idx];
        const masters = (RTS.getSettings().masterChecklists||[]).slice();
        const m = masters.find(x=> String(x.id)===String(els.chk.master.value)) || masters[0];
        if (!m) { alert('No master checklists defined in Settings.'); return; }
        const items = (m.items||[]).map(txt => ({ id: RTS.uid('item'), text: txt, done: false }));
        t.checklist = { id: RTS.uid('tchk'), name: m.name||'Checklist', items };
        t.updatedAt = nowISO();
        persistTasks();
        renderTaskChecklist(t);
      }
      function renderTaskChecklist(t){
        if (!els.chk.list) return;
        els.chk.list.innerHTML = '';
        if (!t){ els.chk.list.innerHTML = '<div class="text-secondary">No selection.</div>'; return; }
        const chk = ensureTaskChecklist(t);
        const card = document.createElement('div');
        card.className = 'p-2 border rounded';
        card.style.borderColor = 'rgba(255,255,255,0.12)';
        const itemsHtml = (chk.items||[]).map(it=>{
          const id = `taskchk_${chk.id}_${it.id}`;
          return `<div class=\"form-check form-check-sm\"><input class=\"form-check-input\" type=\"checkbox\" id=\"${id}\" ${it.done? 'checked':''}><label class=\"form-check-label\" for=\"${id}\">${escapeHtml(it.text)}</label></div>`;
        }).join('');
        card.innerHTML = `
          <div class=\"d-flex justify-content-between align-items-center mb-1\"><strong>${escapeHtml(chk.name||'Checklist')}</strong><div class=\"d-flex gap-1\"><button class=\"btn btn-sm btn-outline-light mlo-btn\" data-act=\"clear\">Clear</button></div></div>
          ${itemsHtml || '<div class=\"text-secondary\">No items.</div>'}
        `;
        card.querySelectorAll('.form-check-input').forEach((inp, j)=>{
          inp.addEventListener('change', ()=>{
            chk.items[j].done = inp.checked;
            t.updatedAt = nowISO(); persistTasks();
          });
        });
        card.querySelector('[data-act=\"clear\"]').addEventListener('click', ()=>{
          (chk.items||[]).forEach(it=> it.done = false);
          t.updatedAt = nowISO(); persistTasks(); renderTaskChecklist(t);
        });
        els.chk.list.appendChild(card);
      }

      function upsertFromInspector() {
        if (ui.selectedId === null) return;
        const idx = tasks.findIndex(t => t.id === ui.selectedId);
        if (idx === -1) return;
        const t = tasks[idx];

        t.title = els.f.title.value.trim() || `Task ${t.id}`;
        t.description = els.f.desc.value;
        t.eventId = els.f.event.value;
        t.assignee = els.f.assignee.value || 'Unassigned';
        t.status = els.f.status.value;
        t.startDate = fromDateInput(els.f.start.value);
        t.dueDate = fromDateInput(els.f.due.value);
        t.priority = els.f.priority.value;
        t.estHours = Number(els.f.est.value || 0);
        t.actHours = Number(els.f.act.value || 0);
        t.tags = els.f.tags.value;
        t.notes = els.f.notes.value;
        t.updatedAt = nowISO();

        tasks[idx] = t;
        persistTasks();
        renderProjectTree();
        renderFilterOptions();
        renderTable();
        hydrateInspector(t);
      }

      function addTask() {
        const maxId = tasks.reduce((m, t) => Math.max(m, t.id), 0);
        const newId = maxId + 1;
        const ev = ui.event || (eventOptions[0]?.id ? String(eventOptions[0].id) : '');
        const as = ui.assignee || ASSIGNEES[0] || 'Unassigned';
        const t = {
          id: newId,
          title: `New Task ${newId}`,
          description: '',
          eventId: ev,
          assignee: as,
          status: 'Pending',
          priority: 'Medium',
          startDate: '',
          dueDate: addDaysISO(3),
          estHours: 0,
          actHours: 0,
          tags: '',
          notes: '',
          attachments: [],
          createdAt: nowISO(),
          updatedAt: nowISO(),
        };
        tasks.push(t);
        persistTasks();
        renderProjectTree();
        renderFilterOptions();
        selectTask(newId);
      }

      function duplicateSelected() {
        if (ui.selectedId === null) return;
        const src = tasks.find(t => t.id === ui.selectedId);
        if (!src) return;
        const maxId = tasks.reduce((m, t) => Math.max(m, t.id), 0);
        const newId = maxId + 1;
        const copy = { ...src, id: newId, title: `${src.title} (Copy)`, createdAt: nowISO(), updatedAt: nowISO() };
        copy.attachments = Array.isArray(src.attachments) ? src.attachments.map(a => ({ ...a })) : [];
        tasks.push(copy);
        persistTasks();
        renderProjectTree();
        renderFilterOptions();
        selectTask(newId);
      }

      async function deleteSelected() {
        if (ui.selectedId === null) return;
        const src = tasks.find(t => t.id === ui.selectedId);
        if (!src) return;
        let ok = false;
        if (window.RTS && typeof window.RTS.confirmPrompt === 'function') ok = await window.RTS.confirmPrompt(`Delete task #${src.id} — ${src.title}?`);
        else ok = window.confirm(`Delete task #${src.id} — ${src.title}?`);
        if (!ok) return;
        tasks = tasks.filter(t => t.id !== ui.selectedId);
        ui.selectedId = null;
        persistTasks();
        persistUi();
        renderProjectTree();
        renderFilterOptions();
        renderTable();
        hydrateInspector(null);
      }

      function setActiveTreeItem(container, predicate) {
        container.querySelectorAll('.mlo-tree-item').forEach(li => {
          li.classList.toggle('active', predicate(li));
        });
      }

      function bindTree() {
        els.perspectiveList.addEventListener('click', (e) => {
          const li = e.target.closest('.mlo-tree-item');
          if (!li) return;
          const p = li.dataset.perspective;
          ui.perspective = p || 'all';
          persistUi();
          setActiveTreeItem(els.perspectiveList, (x) => x.dataset.perspective === ui.perspective);
          renderTable();
        });

        els.projectList.addEventListener('click', (e) => {
          const li = e.target.closest('.mlo-tree-item');
          if (!li) return;
          ui.event = li.dataset.event || '';
          els.event.value = ui.event;
          persistUi();
          setActiveTreeItem(els.projectList, (x) => x.dataset.event === ui.event);
          renderTable();
        });
      }

      function bindFilters() {
        els.search.value = ui.search;
        els.status.value = ui.status;
        els.groupBy.value = ui.groupBy;
        if (els.sortBy) els.sortBy.value = ui.sortBy || 'dueAsc';

        els.search.addEventListener('input', () => {
          ui.search = els.search.value;
          persistUi();
          renderTable();
        });
        els.status.addEventListener('change', () => {
          ui.status = els.status.value;
          persistUi();
          renderTable();
        });
        els.event.addEventListener('change', () => {
          ui.event = els.event.value;
          persistUi();
          setActiveTreeItem(els.projectList, (x) => x.dataset.event === ui.event);
          renderTable();
        });
        els.assignee.addEventListener('change', () => {
          ui.assignee = els.assignee.value;
          persistUi();
          renderTable();
        });
        els.groupBy.addEventListener('change', () => {
          ui.groupBy = els.groupBy.value;
          persistUi();
          renderTable();
        });
        if (els.sortBy) {
          els.sortBy.addEventListener('change', () => {
            ui.sortBy = els.sortBy.value;
            persistUi();
            renderTable();
            updateSortIcon();
          });
        }
      }

      function updateSortIcon(){
        if (!els.sortIcon) return;
        const s = ui.sortBy || 'dueAsc';
        // use a small SVG caret for crisper visuals
        const svgUp = `<svg width="12" height="8" viewBox="0 0 10 8" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="5,0 10,8 0,8" fill="currentColor" /></svg>`;
        const svgDown = `<svg width="12" height="8" viewBox="0 0 10 8" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="0,0 10,0 5,8" fill="currentColor" /></svg>`;
        const svgBoth = `<svg width="12" height="12" viewBox="0 0 12 12" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><polygon points="6,1 11,7 1,7" fill="currentColor" /><polygon points="1,5 11,5 6,11" fill="currentColor" opacity="0.6" /></svg>`;
        if (s === 'dueAsc' || s === 'createdOld' || s === 'updatedOld') els.sortIcon.innerHTML = svgUp;
        else if (s === 'dueDesc' || s === 'createdNew' || s === 'updatedNew') els.sortIcon.innerHTML = svgDown;
        else els.sortIcon.innerHTML = svgBoth;
      }

      function bindButtons() {
        els.btnAdd.addEventListener('click', addTask);
        els.btnSave.addEventListener('click', upsertFromInspector);
        els.btnDup.addEventListener('click', duplicateSelected);
        els.btnDel.addEventListener('click', deleteSelected);
        els.btnTaskAttAdd.addEventListener('click', addAttachmentLink);
        els.btnTaskAttDrive.addEventListener('click', addAttachmentDrive);
        if (els.chk && els.chk.spawn) els.chk.spawn.addEventListener('click', spawnTaskChecklist);
        // clear project selection
        if (els.btnClearProject) {
          els.btnClearProject.addEventListener('click', () => {
            ui.event = '';
            persistUi();
            // clear active state for project list
            els.projectList.querySelectorAll('.mlo-tree-item').forEach(li => li.classList.remove('active'));
            if (els.event) els.event.value = '';
            renderTable();
          });
        }
      }

      function bindResizers() {
        const leftPane = els.shell.querySelector('.mlo-pane-left');
        const rightPane = els.shell.querySelector('.mlo-pane-right');
        const resizers = els.shell.querySelectorAll('.mlo-resizer');
        resizers.forEach(r => {
          r.addEventListener('mousedown', (ev) => {
            ev.preventDefault();
            const kind = r.dataset.resize;
            const startX = ev.clientX;
            const startLeft = leftPane.getBoundingClientRect().width;
            const startRight = rightPane.getBoundingClientRect().width;

            function onMove(e) {
              const dx = e.clientX - startX;
              if (kind === 'left') {
                const w = Math.max(180, Math.min(420, startLeft + dx));
                leftPane.style.width = `${w}px`;
                ui.paneLeftWidth = Math.round(w);
              } else {
                const w = Math.max(260, Math.min(520, startRight - dx));
                rightPane.style.width = `${w}px`;
                ui.paneRightWidth = Math.round(w);
              }
              persistUi();
            }
            function onUp() {
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
            }
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          });
        });
      }

      function init() {
        load();
        renderProjectTree();
        renderFilterOptions();

        els.search.value = ui.search || '';
        els.status.value = ui.status || '';
        els.event.value = ui.event || '';
        els.assignee.value = ui.assignee || '';
        els.groupBy.value = ui.groupBy || '';

        setActiveTreeItem(els.perspectiveList, (x) => x.dataset.perspective === (ui.perspective || 'all'));
        setActiveTreeItem(els.projectList, (x) => x.dataset.event === ui.event);

        bindTree();
        bindFilters();
  updateSortIcon();
        bindButtons();
        bindResizers();
    renderChecklistMasterOptions();

        renderTable();
        if (ui.selectedId && tasks.some(t => t.id === ui.selectedId)) {
          hydrateInspector(tasks.find(t => t.id === ui.selectedId));
        } else if (tasks[0]) {
          selectTask(tasks[0].id);
        } else {
          hydrateInspector(null);
        }
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
