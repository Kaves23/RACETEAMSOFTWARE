<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Sim Correlation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css?v=20260420">
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); min-height:100vh; }
    .rts-main { padding:1.5rem; }
    .ev-stats-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .ev-stat-card { background:#fff; border-radius:10px; padding:1rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.08); min-width:130px; border-top:4px solid #6366f1; }
    .ev-stat-label { font-size:.72rem; text-transform:uppercase; color:#6b7280; font-weight:600; letter-spacing:.05em; }
    .ev-stat-value { font-size:1.8rem; font-weight:800; color:#1f2937; line-height:1.1; }

    .filter-bar { background:#fff; border-radius:10px; padding:.9rem 1.25rem; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:1.25rem; display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }

    .table-wrapper { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }
    .table { margin:0; }
    .table thead th { background:#6366f1; color:#fff; font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; border:none; padding:.7rem 1rem; white-space:nowrap; }
    .table tbody tr.data-row { cursor:pointer; transition:background .15s; }
    .table tbody tr.data-row:hover { background:#eef2ff; }
    .table tbody tr.data-row.expanded { background:#e0e7ff !important; }
    .table tbody td { padding:.6rem 1rem; vertical-align:middle; font-size:.875rem; border-color:#f3f4f6; }

    tr.expand-detail td { background:#f5f3ff; border-top:none; padding:1.1rem 1.5rem; }
    .expand-inner { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .expand-block label { font-size:.7rem; text-transform:uppercase; color:#9ca3af; font-weight:600; margin-bottom:.2rem; display:block; }
    .expand-block p  { margin:0; font-size:.875rem; color:#1f2937; white-space:pre-wrap; }

    .corr-high { color:#16a34a; font-weight:700; }
    .corr-mid  { color:#d97706; font-weight:700; }
    .corr-low  { color:#dc2626; font-weight:700; }
    .delta-neg { color:#16a34a; font-weight:700; }
    .delta-pos { color:#dc2626; font-weight:700; }
    .expand-btn { font-size:.85rem; line-height:1; transition:transform .2s; display:inline-block; }
    .expand-btn.open { transform:rotate(90deg); }

    .page-title { font-weight:800; color:#6366f1; letter-spacing:-.01em; }
  </style>
</head>
<body>
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="page-title mb-0">Sim Correlation</h2>
    <button class="btn btn-sm fw-semibold" style="background:#6366f1;color:#fff;padding:.4rem 1rem" onclick="openModal()">+ Add Entry</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Avg Corr %</div><div class="ev-stat-value" id="kpiAvgCorr">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">High ≥ 95%</div><div class="ev-stat-value" id="kpiHigh">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Low &lt; 85%</div><div class="ev-stat-value" id="kpiLow">—</div></div>
  </div>

  <div class="filter-bar">
    <div>
      <label class="form-label small fw-semibold mb-1">Event ID</label>
      <input type="text" class="form-control form-control-sm" id="filterEvent" oninput="applyFilters()" placeholder="Filter event…" style="min-width:160px">
    </div>
    <div>
      <label class="form-label small fw-semibold mb-1">Session</label>
      <select class="form-select form-select-sm" id="filterSession" onchange="applyFilters()" style="min-width:180px">
        <option value="">All Sessions</option>
      </select>
    </div>
    <div>
      <label class="form-label small fw-semibold mb-1">Car #</label>
      <select class="form-select form-select-sm" id="filterCar" onchange="applyFilters()" style="min-width:120px">
        <option value="">All Cars</option>
      </select>
    </div>
    <div class="ms-auto d-flex align-items-end">
      <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="table" id="mainTable">
      <thead>
        <tr>
          <th style="width:36px"></th>
          <th>Session</th>
          <th>Car #</th>
          <th>Sim Lap</th>
          <th>Actual Lap</th>
          <th>Delta (s)</th>
          <th>Corr %</th>
          <th style="width:60px"></th>
        </tr>
      </thead>
      <tbody id="mainTbody">
        <tr><td colspan="8" class="text-center text-muted py-5">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="corrModal" tabindex="-1" aria-labelledby="corrModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:#6366f1">
        <h5 class="modal-title text-white fw-bold" id="corrModalTitle">Add Correlation Entry</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="corrForm" onsubmit="return false">
          <input type="hidden" id="fId">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Event ID</label>
              <input type="text" class="form-control" id="fEventId" placeholder="e.g. EVT-001">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Car #</label>
              <input type="text" class="form-control" id="fCarNumber">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Session Name</label>
              <input type="text" class="form-control" id="fSessionName" placeholder="e.g. FP1">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Sim Lap Time</label>
              <input type="text" class="form-control" id="fSimLapTime" placeholder="1:23.456">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Actual Lap Time</label>
              <input type="text" class="form-control" id="fActualLapTime" placeholder="1:23.456">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Delta (s)</label>
              <input type="number" class="form-control" id="fDeltaSeconds" step="0.001">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Correlation %</label>
              <input type="number" class="form-control" id="fCorrelationPct" step="0.01" min="0" max="100">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Setup Changes</label>
              <textarea class="form-control" id="fSetupChanges" rows="3" placeholder="Describe setup changes applied…"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notes</label>
              <textarea class="form-control" id="fNotes" rows="3"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm d-none me-auto" id="btnDelete" onclick="deleteRecord()">Delete</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#6366f1;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="core.js?v=20260420"></script>
<script src="topnav.js?v=20260420"></script>
<script>
let allData    = [];
let expandedIds = new Set();
let bsModal;

window.addEventListener('DOMContentLoaded', () => {
  bsModal = new bootstrap.Modal(document.getElementById('corrModal'));
  loadData();
});

async function loadData() {
  try {
    const res = await fetch('/api/correlation');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) { allData = []; }
  populateFilters();
  updateKPIs();
  applyFilters();
}

function populateFilters() {
  const sessions = [...new Set(allData.map(r => r.session_name).filter(Boolean))].sort();
  const cars     = [...new Set(allData.map(r => r.car_number).filter(Boolean))].sort();
  const fSess = document.getElementById('filterSession');
  const curSess = fSess.value;
  fSess.innerHTML = '<option value="">All Sessions</option>' + sessions.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join('');
  fSess.value = curSess;
  const fCar = document.getElementById('filterCar');
  const curCar = fCar.value;
  fCar.innerHTML = '<option value="">All Cars</option>' + cars.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  fCar.value = curCar;
}

function updateKPIs() {
  const withCorr = allData.filter(r => r.correlation_pct != null);
  const avg = withCorr.length ? withCorr.reduce((s,r) => s + Number(r.correlation_pct), 0) / withCorr.length : null;
  document.getElementById('kpiTotal').textContent   = allData.length;
  document.getElementById('kpiAvgCorr').textContent = avg != null ? avg.toFixed(1) + '%' : '—';
  document.getElementById('kpiHigh').textContent    = allData.filter(r => r.correlation_pct != null && Number(r.correlation_pct) >= 95).length;
  document.getElementById('kpiLow').textContent     = allData.filter(r => r.correlation_pct != null && Number(r.correlation_pct) < 85).length;
}

function applyFilters() {
  const evFilter   = (document.getElementById('filterEvent').value || '').toLowerCase();
  const sessFilter = document.getElementById('filterSession').value;
  const carFilter  = document.getElementById('filterCar').value;
  const filtered = allData.filter(r =>
    (!evFilter   || (r.event_id     || '').toLowerCase().includes(evFilter)) &&
    (!sessFilter || r.session_name  === sessFilter) &&
    (!carFilter  || r.car_number    === carFilter)
  );
  renderTable(filtered);
}

function clearFilters() {
  document.getElementById('filterEvent').value   = '';
  document.getElementById('filterSession').value = '';
  document.getElementById('filterCar').value     = '';
  applyFilters();
}

function corrClass(v) {
  if (v == null) return '';
  const n = Number(v);
  if (n >= 95) return 'corr-high';
  if (n >= 85) return 'corr-mid';
  return 'corr-low';
}

function deltaClass(v) {
  if (v == null) return '';
  return Number(v) < 0 ? 'delta-neg' : Number(v) > 0 ? 'delta-pos' : '';
}

function fmtDelta(v) {
  if (v == null) return '—';
  const n = Number(v);
  return (n > 0 ? '+' : '') + n.toFixed(3);
}

function renderTable(data) {
  const tbody = document.getElementById('mainTbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">No records found</td></tr>';
    return;
  }
  const rows = [];
  data.forEach(r => {
    const isExp = expandedIds.has(r.id);
    rows.push(`
      <tr class="data-row ${isExp ? 'expanded' : ''}" onclick="toggleRow(${r.id})">
        <td><span class="expand-btn ${isExp ? 'open' : ''}">▸</span></td>
        <td class="fw-semibold">${esc(r.session_name)}</td>
        <td>${esc(r.car_number)}</td>
        <td>${esc(r.sim_lap_time)}</td>
        <td>${esc(r.actual_lap_time)}</td>
        <td class="${deltaClass(r.delta_seconds)}">${fmtDelta(r.delta_seconds)}</td>
        <td class="${corrClass(r.correlation_pct)}">${r.correlation_pct != null ? Number(r.correlation_pct).toFixed(2) + '%' : '—'}</td>
        <td><button class="btn btn-sm btn-outline-secondary py-0 px-1" style="font-size:.7rem" onclick="event.stopPropagation();openModal(${r.id})">Edit</button></td>
      </tr>`);
    if (isExp) {
      rows.push(`
        <tr class="expand-detail">
          <td colspan="8">
            <div class="expand-inner">
              <div class="expand-block">
                <label>Event ID</label>
                <p>${esc(r.event_id)}</p>
              </div>
              <div class="expand-block">
                <label>Car #</label>
                <p>${esc(r.car_number)}</p>
              </div>
              <div class="expand-block">
                <label>Setup Changes</label>
                <p>${r.setup_changes ? esc(r.setup_changes) : '<span class="text-muted">—</span>'}</p>
              </div>
              <div class="expand-block">
                <label>Notes</label>
                <p>${r.notes ? esc(r.notes) : '<span class="text-muted">—</span>'}</p>
              </div>
            </div>
          </td>
        </tr>`);
    }
  });
  tbody.innerHTML = rows.join('');
}

function toggleRow(id) {
  if (expandedIds.has(id)) expandedIds.delete(id);
  else expandedIds.add(id);
  applyFilters();
}

function esc(v)     { return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'; }
function numOrNull(id) { const v = document.getElementById(id).value; return v !== '' ? Number(v) : null; }

function openModal(id = null) {
  const rec = id ? allData.find(r => r.id === id) : null;
  document.getElementById('corrModalTitle').textContent = rec ? 'Edit Correlation Entry' : 'Add Correlation Entry';
  document.getElementById('btnDelete').classList.toggle('d-none', !rec);
  document.getElementById('fId').value              = rec ? rec.id : '';
  document.getElementById('fEventId').value         = rec ? (rec.event_id         || '') : '';
  document.getElementById('fCarNumber').value       = rec ? (rec.car_number       || '') : '';
  document.getElementById('fSessionName').value     = rec ? (rec.session_name     || '') : '';
  document.getElementById('fSimLapTime').value      = rec ? (rec.sim_lap_time     || '') : '';
  document.getElementById('fActualLapTime').value   = rec ? (rec.actual_lap_time  || '') : '';
  document.getElementById('fDeltaSeconds').value    = rec ? (rec.delta_seconds    ?? '') : '';
  document.getElementById('fCorrelationPct').value  = rec ? (rec.correlation_pct  ?? '') : '';
  document.getElementById('fSetupChanges').value    = rec ? (rec.setup_changes    || '') : '';
  document.getElementById('fNotes').value           = rec ? (rec.notes            || '') : '';
  bsModal.show();
}

async function saveRecord() {
  const payload = {
    event_id        : document.getElementById('fEventId').value.trim(),
    car_number      : document.getElementById('fCarNumber').value.trim(),
    session_name    : document.getElementById('fSessionName').value.trim(),
    sim_lap_time    : document.getElementById('fSimLapTime').value.trim(),
    actual_lap_time : document.getElementById('fActualLapTime').value.trim(),
    delta_seconds   : numOrNull('fDeltaSeconds'),
    correlation_pct : numOrNull('fCorrelationPct'),
    setup_changes   : document.getElementById('fSetupChanges').value.trim(),
    notes           : document.getElementById('fNotes').value.trim()
  };
  const id = document.getElementById('fId').value;
  try {
    const res = await fetch(id ? `/api/correlation/${id}` : '/api/correlation', {
      method : id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    await loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Delete this correlation entry?')) return;
  try {
    const res = await fetch(`/api/correlation/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    expandedIds.delete(Number(id));
    await loadData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}
</script>
</body>
</html>
