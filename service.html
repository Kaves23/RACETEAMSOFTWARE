<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Service Queue (stub)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    #svcTbody td, #svcTbody th { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  </style>
</head>
<body>
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <h1 class="my-3">Service Queue</h1>

    <div class="mlo-shell" id="svcShell">
      <!-- LEFT -->
      <section class="mlo-pane mlo-pane-left" aria-label="Service filters">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Filters</div>
            <span class="badge text-bg-secondary" id="svcCountBadge">0</span>
          </div>
        </div>
        <div class="mlo-pane-content">
          <div class="mlo-section-label">Status</div>
          <ul class="mlo-tree pastel-tree" id="svcStatusList">
            <li class="active" data-status="">All</li>
            <li data-status="Open">Open</li>
            <li data-status="In Progress">In Progress</li>
            <li data-status="Awaiting Parts">Awaiting Parts</li>
            <li data-status="Done">Done</li>
          </ul>

          <div class="mlo-section-label mt-3">Severity</div>
          <ul class="mlo-tree pastel-tree" id="svcSeverityList">
            <li class="active" data-sev="">All</li>
            <li data-sev="P1">P1</li>
            <li data-sev="P2">P2</li>
            <li data-sev="P3">P3</li>
            <li data-sev="P4">P4</li>
          </ul>
        </div>
      </section>

      <div class="mlo-resizer" data-resize="left" title="Drag to resize"></div>

      <!-- MIDDLE -->
      <section class="mlo-pane mlo-pane-mid" aria-label="Service list">
        <div class="mlo-pane-header">
          <div class="d-flex align-items-center flex-nowrap gap-1" style="overflow:hidden;">
            <input id="svcSearch" type="text" class="form-control form-control-sm" placeholder="Search…" style="flex:1 1 180px; min-width:160px; max-width:220px;">
            <select id="svcEvent" class="form-select form-select-sm" style="flex:1 1 180px; min-width:150px; max-width:200px;"></select>
            <select id="svcAsset" class="form-select form-select-sm" style="flex:1 1 180px; min-width:150px; max-width:200px;"></select>
            <select id="svcType" class="form-select form-select-sm" style="flex:0 1 160px; min-width:140px; max-width:180px;">
              <option value="">Type: All</option>
              <option>Inspection</option>
              <option>Damage</option>
              <option>Work Order</option>
            </select>
            <button class="btn btn-sm btn-outline-light mlo-btn" id="btnAddSvc" type="button" style="white-space:nowrap;">Add</button>
          </div>
        </div>
        <div class="mlo-pane-content" style="padding:0;">
          <table class="table table-dark table-hover mlo-table" style="margin:0;">
            <thead>
              <tr>
                <th style="width:60px;">#</th>
                <th style="width:120px;">Type</th>
                <th style="width:180px;">Asset</th>
                <th style="width:140px;">Event</th>
                <th style="width:110px;">Status</th>
                <th style="width:90px;">Priority</th>
                <th style="width:150px;">Updated</th>
              </tr>
            </thead>
            <tbody id="svcTbody"></tbody>
          </table>
        </div>
      </section>

      <div class="mlo-resizer" data-resize="right" title="Drag to resize"></div>

      <!-- RIGHT -->
      <section class="mlo-pane mlo-pane-right mlo-inspector" aria-label="Service inspector">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Inspector</div>
            <span class="badge text-bg-secondary" id="svcInspectorBadge">No selection</span>
          </div>
        </div>
        <div class="mlo-pane-content">
          <form id="svcForm" autocomplete="off">
            <ul class="nav nav-tabs nav-dark mb-2" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-svc-details" data-bs-toggle="tab" data-bs-target="#pane-svc-details" type="button" role="tab" aria-controls="pane-svc-details" aria-selected="true">Details</button>
              </li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="pane-svc-details" role="tabpanel" aria-labelledby="tab-svc-details">
                <div class="row g-2">
              <div class="col-6">
                <label class="form-label">Type</label>
                <select id="f_svc_type" class="form-select form-select-sm">
                  <option>Inspection</option>
                  <option>Damage</option>
                  <option>Work Order</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Status</label>
                <select id="f_svc_status" class="form-select form-select-sm">
                  <option>Open</option>
                  <option>In Progress</option>
                  <option>Awaiting Parts</option>
                  <option>Done</option>
                  <option>Closed</option>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Priority (P1–P4)</label>
                <select id="f_svc_priority" class="form-select form-select-sm">
                  <option>P1</option>
                  <option>P2</option>
                  <option>P3</option>
                  <option>P4</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label">Incident link</label>
                <input id="f_svc_incident" class="form-control form-control-sm" type="text" placeholder="Incident ID (from Incidents)">
              </div>

              <div class="col-6">
                <label class="form-label">Asset</label>
                <select id="f_svc_asset" class="form-select form-select-sm"></select>
              </div>
              <div class="col-6">
                <label class="form-label">Event</label>
                <select id="f_svc_event" class="form-select form-select-sm"></select>
              </div>

              <div class="col-12">
                <label class="form-label">Title</label>
                <input id="f_svc_title" class="form-control form-control-sm" type="text" placeholder="e.g. Post-session inspection">
              </div>

              <div class="col-12">
                <label class="form-label">Findings / Description</label>
                <textarea id="f_svc_desc" class="form-control form-control-sm" rows="3" placeholder="Condition, damage details, checklist notes"></textarea>
              </div>

              <div class="col-12">
                <label class="form-label">Next action / Work order</label>
                <textarea id="f_svc_action" class="form-control form-control-sm" rows="3" placeholder="Tasks, parts, owner, ETA"></textarea>
              </div>

              <div class="col-6">
                <label class="form-label">Assigned to</label>
                <input id="f_svc_owner" class="form-control form-control-sm" type="text" placeholder="Mechanic / Engineer">
              </div>
              <div class="col-6">
                <label class="form-label">Time spent (min)</label>
                <input id="f_svc_time" class="form-control form-control-sm" type="number" min="0" step="5">
              </div>

              <div class="col-12 d-flex gap-1 mt-1">
                <button class="btn btn-sm btn-primary mlo-btn" id="btnSaveSvc" type="button">Save</button>
                <button class="btn btn-sm btn-outline-light mlo-btn" id="btnDupSvc" type="button">Duplicate</button>
                <button class="btn btn-sm btn-outline-danger mlo-btn" id="btnDelSvc" type="button">Delete</button>
              </div>
            </div>
          </form>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script src="topnav.js"></script>
  <script>
  (function(){
    RTS.setActiveNav();
    const LS = 'rts.service.v1';
    const LS_UI = 'rts.service.ui.v1';
    const LS_PANES = 'rts.service.panes.v1';

    const assetsStore = RTS.safeLoadJSON('rts.assets.v4', []);
    const ASSET_OPTIONS = Array.isArray(assetsStore) ? assetsStore.map(a=>({ id:a.id, label:a.name||a.id })) : [];
    const eventsStore = RTS.safeLoadJSON('rts.events.v4', []);
    const EVENT_OPTIONS = Array.isArray(eventsStore) ? eventsStore.map(e=>({ id:e.id, title:e.title||e.name||'Event' })) : [];
    const eventMap = new Map(EVENT_OPTIONS.map(e=>[String(e.id), e.title]));

    function eventTitle(id){ return eventMap.get(String(id)) || ''; }
    function escapeHtml(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;'); }
    function nowISO(){ return new Date().toISOString(); }

    function seed(){
      const out=[];
      for(let i=1;i<=12;i++){
        const asset = ASSET_OPTIONS[i % ASSET_OPTIONS.length];
        const ev = EVENT_OPTIONS[i % EVENT_OPTIONS.length];
        out.push({
          id: RTS.uid('svc'),
          type: (i%3===0)?'Damage':((i%2===0)?'Inspection':'Work Order'),
          status: (i%4===0)?'Awaiting Parts':((i%3===0)?'In Progress':'Open'),
          priority: (i%4===0)?'P1':(i%3===0?'P2':'P3'),
          assetId: asset ? asset.id : '',
          eventId: ev ? ev.id : '',
          title: `Item ${i}`,
          desc: 'Findings / damage notes.',
          action: 'Plan parts and repair.',
          owner: 'Mechanic',
          timeSpent: i*5,
          incidentId: (i%5===0) ? `INC-${100+i}` : '',
          updatedAt: nowISO()
        });
      }
      return out;
    }

    let items = RTS.safeLoadJSON(LS, null);
    if (!Array.isArray(items) || items.length===0) items = seed();
    let ui = RTS.deepMerge({ status:'', severity:'', search:'', event:'', asset:'', type:'', selectedId:null }, RTS.safeLoadJSON(LS_UI, {}));

    const el = {
      shell: document.getElementById('svcShell'),
      count: document.getElementById('svcCountBadge'),
      statusList: document.getElementById('svcStatusList'),
      severityList: document.getElementById('svcSeverityList'),
      tbody: document.getElementById('svcTbody'),
      search: document.getElementById('svcSearch'),
      event: document.getElementById('svcEvent'),
      asset: document.getElementById('svcAsset'),
      type: document.getElementById('svcType'),
      add: document.getElementById('btnAddSvc'),
      inspectorBadge: document.getElementById('svcInspectorBadge'),
      btnSave: document.getElementById('btnSaveSvc'),
      btnDup: document.getElementById('btnDupSvc'),
      btnDel: document.getElementById('btnDelSvc'),
      
      f: {
        type: document.getElementById('f_svc_type'),
        status: document.getElementById('f_svc_status'),
        priority: document.getElementById('f_svc_priority'),
        incident: document.getElementById('f_svc_incident'),
        asset: document.getElementById('f_svc_asset'),
        event: document.getElementById('f_svc_event'),
        title: document.getElementById('f_svc_title'),
        desc: document.getElementById('f_svc_desc'),
        action: document.getElementById('f_svc_action'),
        owner: document.getElementById('f_svc_owner'),
        time: document.getElementById('f_svc_time')
      }
    };

    RTS.initTriPaneResizers(el.shell, LS_PANES);

    function persist(){
      RTS.safeSaveJSON(LS, items);
      RTS.safeSaveJSON(LS_UI, ui);
    }

    function buildFilters(){
      el.event.innerHTML = '<option value="">Event: All</option>' + EVENT_OPTIONS.map(ev=>`<option value="${ev.id}">${escapeHtml(ev.title)}</option>`).join('');
      el.asset.innerHTML = '<option value="">Asset: All</option>' + ASSET_OPTIONS.map(a=>`<option value="${a.id}">${escapeHtml(a.label)}</option>`).join('');
      el.f.asset.innerHTML = ASSET_OPTIONS.map(a=>`<option value="${a.id}">${escapeHtml(a.label)}</option>`).join('') || '<option value="">Unassigned</option>';
      el.f.event.innerHTML = EVENT_OPTIONS.map(ev=>`<option value="${ev.id}">${escapeHtml(ev.title)}</option>`).join('') || '<option value="">Unassigned</option>';
    }

    function applyFilters(list){
      let out = list.slice();
      if (ui.status) out = out.filter(i=>i.status===ui.status);
      if (ui.severity) out = out.filter(i=>i.priority===ui.severity);
      if (ui.event) out = out.filter(i=>String(i.eventId||'')===String(ui.event));
      if (ui.asset) out = out.filter(i=>String(i.assetId||'')===String(ui.asset));
      if (ui.type) out = out.filter(i=>i.type===ui.type);
      if (ui.search){
        const q = ui.search.toLowerCase();
        out = out.filter(i => (`${i.title} ${i.desc} ${i.action} ${i.incidentId||''}`).toLowerCase().includes(q));
      }
      return out;
    }

    function render(){
      el.search.value = ui.search || '';
      el.event.value = ui.event || '';
      el.asset.value = ui.asset || '';
      el.type.value = ui.type || '';

      const filtered = applyFilters(items);
      el.count.textContent = String(filtered.length);

      el.tbody.innerHTML = '';
      let idx=0;
      filtered.forEach(i=>{
        idx++;
        const tr = document.createElement('tr');
        tr.dataset.id = i.id;
        if (ui.selectedId===i.id) tr.classList.add('mlo-row-selected');
        tr.innerHTML = `
          <td>${idx}</td>
          <td>${escapeHtml(i.type||'')}</td>
          <td>${escapeHtml(assetLabel(i.assetId))}</td>
          <td>${escapeHtml(eventTitle(i.eventId))}</td>
          <td>${escapeHtml(i.status||'')}</td>
          <td>${escapeHtml(i.priority||'')}</td>
          <td>${escapeHtml((i.updatedAt||'').replace('T',' ').slice(0,16))}</td>
        `;
        tr.addEventListener('click', ()=>{ ui.selectedId = i.id; render(); });
        el.tbody.appendChild(tr);
      });

      hydrate(items.find(x=>x.id===ui.selectedId) || null);
      persist();
    }

    function assetLabel(id){
      const a = ASSET_OPTIONS.find(a=>String(a.id)===String(id));
      return a ? a.label : '';
    }

    function hydrate(i){
      if (!i){
        el.inspectorBadge.textContent = 'No selection';
        Object.values(el.f).forEach(f=> f.value='');
        return;
      }
      el.inspectorBadge.textContent = i.title || i.id;
      el.f.type.value = i.type || 'Inspection';
      el.f.status.value = i.status || 'Open';
      el.f.priority.value = i.priority || 'P3';
      el.f.incident.value = i.incidentId || '';
      el.f.asset.value = i.assetId || '';
      el.f.event.value = i.eventId || '';
      el.f.title.value = i.title || '';
      el.f.desc.value = i.desc || '';
      el.f.action.value = i.action || '';
      el.f.owner.value = i.owner || '';
      el.f.time.value = i.timeSpent || '';
    }

    function readInspector(){
      const i = items.find(x=>x.id===ui.selectedId);
      if (!i) return;
      i.type = el.f.type.value;
      i.status = el.f.status.value;
      i.priority = el.f.priority.value;
      i.incidentId = el.f.incident.value.trim();
      i.assetId = el.f.asset.value;
      i.eventId = el.f.event.value;
      i.title = el.f.title.value.trim() || i.title;
      i.desc = el.f.desc.value;
      i.action = el.f.action.value;
      i.owner = el.f.owner.value;
      i.timeSpent = Number(el.f.time.value||0);
      i.updatedAt = nowISO();
      persist();
      render();
    }

    function addItem(){
      const id = RTS.uid('svc');
      const a = ASSET_OPTIONS[0];
      const ev = EVENT_OPTIONS[0];
      const i = {
        id,
        type:'Inspection',
        status:'Open',
        priority:'P3',
        assetId: a ? a.id : '',
        eventId: ev ? ev.id : '',
        title:`Service ${items.length+1}`,
        desc:'',
        action:'',
        owner:'',
        timeSpent:0,
        incidentId:'',
        updatedAt: nowISO()
      };
      items.unshift(i);
      ui.selectedId = id;
      render();
    }

    function duplicateItem(){
      const src = items.find(x=>x.id===ui.selectedId);
      if (!src) return;
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = RTS.uid('svc');
      copy.title = `${src.title} (Copy)`;
      copy.status = 'Open';
      copy.updatedAt = nowISO();
      items.unshift(copy);
      ui.selectedId = copy.id;
      render();
    }

    function deleteItem(){
      const idx = items.findIndex(x=>x.id===ui.selectedId);
      if (idx<0) return;
      items.splice(idx,1);
      ui.selectedId = items[0]?.id || null;
      render();
    }

    function bind(){
      el.statusList.addEventListener('click', (e)=>{
        const li = e.target.closest('li[data-status]');
        if (!li) return;
        el.statusList.querySelectorAll('li').forEach(x=>x.classList.remove('active'));
        li.classList.add('active');
        ui.status = li.dataset.status || '';
        render();
      });
      el.severityList.addEventListener('click', (e)=>{
        const li = e.target.closest('li[data-sev]');
        if (!li) return;
        el.severityList.querySelectorAll('li').forEach(x=>x.classList.remove('active'));
        li.classList.add('active');
        ui.severity = li.dataset.sev || '';
        render();
      });
      el.search.addEventListener('input', ()=>{ ui.search = el.search.value; render(); });
      el.event.addEventListener('change', ()=>{ ui.event = el.event.value; render(); });
      el.asset.addEventListener('change', ()=>{ ui.asset = el.asset.value; render(); });
      el.type.addEventListener('change', ()=>{ ui.type = el.type.value; render(); });
      el.add.addEventListener('click', addItem);
      el.btnSave.addEventListener('click', readInspector);
      el.btnDup.addEventListener('click', duplicateItem);
      // Use modal-backed async confirmation when available; fall back to window.confirm for file://
      el.btnDel.addEventListener('click', async (e)=>{
        const msg = 'Delete selected service item? This cannot be undone.';
        let ok = false;
        try{
          if (window.RTS && typeof window.RTS.confirmPrompt === 'function') {
            ok = await window.RTS.confirmPrompt(msg);
          } else {
            ok = window.confirm(msg);
          }
        }catch(err){
          // If anything goes wrong, fall back to a synchronous confirm
          ok = window.confirm(msg);
        }
        if (ok) deleteItem();
      });
  // Fuel Mix moved to dedicated page under Tech > Fuel Calcs
    }

    function init(){
      buildFilters();
      bind();
      render();
      if (!ui.selectedId && items[0]) { ui.selectedId = items[0].id; render(); }
    }

    // Fuel & Mix Calculator moved to dedicated page fuel-calcs.html
    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
