<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Debriefs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css?v=20260420">
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); min-height:100vh; }
    .rts-main { padding:1.5rem; }
    .ev-stats-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .ev-stat-card { background:#fff; border-radius:10px; padding:1rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.08); min-width:120px; border-top:4px solid #f43f5e; }
    .ev-stat-label { font-size:.72rem; text-transform:uppercase; color:#6b7280; font-weight:600; letter-spacing:.05em; }
    .ev-stat-value { font-size:1.8rem; font-weight:800; color:#1f2937; line-height:1.1; }

    .page-body { display:flex; gap:1.25rem; align-items:flex-start; height:calc(100vh - 230px); min-height:400px; }

    /* Left list */
    .debrief-list { width:280px; flex-shrink:0; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow-y:auto; display:flex; flex-direction:column; }
    .debrief-list-header { padding:.8rem 1rem; border-bottom:1px solid #f3f4f6; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
    .debrief-list-header h6 { margin:0; font-weight:700; color:#374151; font-size:.85rem; }
    .session-group-label { padding:.45rem 1rem .3rem; font-size:.7rem; font-weight:700; text-transform:uppercase; color:#9ca3af; letter-spacing:.06em; background:#f9fafb; border-bottom:1px solid #f3f4f6; }
    .debrief-list-item { padding:.6rem 1rem; cursor:pointer; transition:background .15s; border-bottom:1px solid #f9fafb; }
    .debrief-list-item:hover { background:#fff1f2; }
    .debrief-list-item.active { background:#ffe4e6 !important; border-left:3px solid #f43f5e; }
    .debrief-list-item .item-session { font-size:.82rem; font-weight:600; color:#1f2937; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .debrief-list-item .item-meta { display:flex; gap:.4rem; margin-top:.2rem; flex-wrap:wrap; }

    /* Detail card */
    .debrief-detail { flex:1; min-width:0; background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow-y:auto; }
    .detail-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#9ca3af; }
    .detail-empty svg { margin-bottom:1rem; }
    .detail-head { padding:1.2rem 1.5rem; border-bottom:1px solid #f3f4f6; display:flex; align-items:center; justify-content:space-between; }
    .detail-head h5 { margin:0; font-weight:700; color:#1f2937; }
    .detail-body { padding:1.5rem; }
    .field-row { margin-bottom:1.1rem; }
    .field-row label { font-size:.7rem; font-weight:700; text-transform:uppercase; color:#9ca3af; letter-spacing:.06em; display:block; margin-bottom:.2rem; }
    .field-row .field-val { font-size:.9rem; color:#1f2937; white-space:pre-wrap; word-break:break-word; }
    .field-row .field-val.empty { color:#d1d5db; }
    .two-col { display:grid; grid-template-columns:1fr 1fr; gap:0 2rem; }
    @media(max-width:768px) { .two-col { grid-template-columns:1fr; } }

    /* Badges */
    .bp { display:inline-block; padding:.2rem .6rem; border-radius:20px; font-size:.7rem; font-weight:700; white-space:nowrap; }
    .bp-open     { background:#dbeafe; color:#1d4ed8; }
    .bp-actioned { background:#fef3c7; color:#b45309; }
    .bp-closed   { background:#d1fae5; color:#065f46; }
    .bp-post_session { background:#ede9fe; color:#5b21b6; }
    .bp-post_event   { background:#fae8ff; color:#86198f; }
    .bp-mid_event    { background:#cffafe; color:#0e7490; }

    .page-title { font-weight:800; color:#f43f5e; letter-spacing:-.01em; }
  </style>
</head>
<body>
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="page-title mb-0">Debriefs</h2>
    <button class="btn btn-sm fw-semibold" style="background:#f43f5e;color:#fff;padding:.4rem 1rem" onclick="openModal()">+ New Debrief</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Open</div><div class="ev-stat-value" id="kpiOpen">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Actioned</div><div class="ev-stat-value" id="kpiActioned">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Closed</div><div class="ev-stat-value" id="kpiClosed">—</div></div>
  </div>

  <div class="page-body">
    <!-- Left list -->
    <div class="debrief-list">
      <div class="debrief-list-header">
        <h6>Debriefs</h6>
        <input type="text" class="form-control form-control-sm" id="listSearch" placeholder="Search…" oninput="renderList()" style="width:110px;font-size:.78rem">
      </div>
      <div id="listBody" style="flex:1;overflow-y:auto">
        <div class="text-center text-muted py-4 small">Loading…</div>
      </div>
    </div>

    <!-- Right detail -->
    <div class="debrief-detail" id="detailPanel">
      <div class="detail-empty">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#e5e7eb" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-3-3v6M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="small">Select a debrief to view details</p>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="debriefModal" tabindex="-1" aria-labelledby="debriefModalTitle" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header" style="background:#f43f5e">
        <h5 class="modal-title text-white fw-bold" id="debriefModalTitle">New Debrief</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="debriefForm" onsubmit="return false">
          <input type="hidden" id="fId">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Session Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fSessionName" required placeholder="e.g. Post FP1">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Debrief Type</label>
              <select class="form-select" id="fDebriefType">
                <option value="post_session">Post Session</option>
                <option value="post_event">Post Event</option>
                <option value="mid_event">Mid Event</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Status</label>
              <select class="form-select" id="fStatus">
                <option value="open">Open</option>
                <option value="actioned">Actioned</option>
                <option value="closed">Closed</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Driver Name</label>
              <input type="text" class="form-control" id="fDriverName">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Car #</label>
              <input type="text" class="form-control" id="fCarNumber">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Created By</label>
              <input type="text" class="form-control" id="fCreatedBy">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Attendees</label>
              <textarea class="form-control" id="fAttendees" rows="2" placeholder="Comma-separated list of attendees…"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Key Findings</label>
              <textarea class="form-control" id="fKeyFindings" rows="4"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Action Items</label>
              <textarea class="form-control" id="fActionItems" rows="4"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Balance Feedback</label>
              <textarea class="form-control" id="fBalanceFeedback" rows="3"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Tyre Feedback</label>
              <textarea class="form-control" id="fTyreFeedback" rows="3"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Setup Direction</label>
              <textarea class="form-control" id="fSetupDirection" rows="3"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm d-none me-auto" id="btnDelete" onclick="deleteRecord()">Delete</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#f43f5e;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="core.js?v=20260420"></script>
<script src="topnav.js?v=20260420"></script>
<script>
let allData    = [];
let selectedId = null;
let bsModal;

window.addEventListener('DOMContentLoaded', () => {
  bsModal = new bootstrap.Modal(document.getElementById('debriefModal'));
  loadData();
});

async function loadData() {
  try {
    const res = await fetch('/api/debriefs');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) { allData = []; }
  updateKPIs();
  renderList();
  if (selectedId) {
    const still = allData.find(r => r.id === selectedId);
    still ? renderDetail(still) : clearDetail();
  }
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent    = allData.length;
  document.getElementById('kpiOpen').textContent     = allData.filter(r => r.status === 'open').length;
  document.getElementById('kpiActioned').textContent = allData.filter(r => r.status === 'actioned').length;
  document.getElementById('kpiClosed').textContent   = allData.filter(r => r.status === 'closed').length;
}

function renderList() {
  const search = (document.getElementById('listSearch').value || '').toLowerCase();
  const data   = search
    ? allData.filter(r =>
        (r.session_name     || '').toLowerCase().includes(search) ||
        (r.driver_name      || '').toLowerCase().includes(search) ||
        (r.debrief_type     || '').toLowerCase().includes(search))
    : allData;

  // Group by session_name
  const groups = {};
  data.forEach(r => {
    const key = r.session_name || 'Unknown Session';
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const listBody = document.getElementById('listBody');
  if (!data.length) {
    listBody.innerHTML = '<div class="text-center text-muted py-4 small">No debriefs found</div>';
    return;
  }

  const html = [];
  Object.keys(groups).sort().forEach(session => {
    html.push(`<div class="session-group-label">${esc(session)}</div>`);
    groups[session].forEach(r => {
      html.push(`
        <div class="debrief-list-item ${selectedId === r.id ? 'active' : ''}" onclick="selectItem(${r.id})">
          <div class="item-session">${esc(r.driver_name) !== '—' ? esc(r.driver_name) : 'No Driver'}</div>
          <div class="item-meta">
            ${typeBadge(r.debrief_type)}
            ${statusBadge(r.status)}
          </div>
        </div>`);
    });
  });
  listBody.innerHTML = html.join('');
}

function selectItem(id) {
  selectedId = id;
  renderList();
  const rec = allData.find(r => r.id === id);
  if (rec) renderDetail(rec);
}

function clearDetail() {
  selectedId = null;
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-empty">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="#e5e7eb" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-3-3v6M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="small">Select a debrief to view details</p>
    </div>`;
}

function renderDetail(r) {
  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-head">
      <div>
        <h5>${esc(r.session_name)}</h5>
        <div class="d-flex gap-2 mt-1 flex-wrap">
          ${typeBadge(r.debrief_type)}
          ${statusBadge(r.status)}
          ${r.car_number ? `<span class="badge bg-secondary bg-opacity-10 text-secondary">Car ${esc(r.car_number)}</span>` : ''}
        </div>
      </div>
      <button class="btn btn-sm btn-outline-secondary" onclick="openModal(${r.id})">Edit</button>
    </div>
    <div class="detail-body">
      <div class="two-col">
        <div class="field-row">
          <label>Driver Name</label>
          <div class="field-val ${!r.driver_name ? 'empty' : ''}">${esc(r.driver_name)}</div>
        </div>
        <div class="field-row">
          <label>Car #</label>
          <div class="field-val ${!r.car_number ? 'empty' : ''}">${esc(r.car_number)}</div>
        </div>
        <div class="field-row">
          <label>Debrief Type</label>
          <div class="field-val">${(r.debrief_type || '').replace('_', ' ')}</div>
        </div>
        <div class="field-row">
          <label>Status</label>
          <div class="field-val">${statusBadge(r.status)}</div>
        </div>
      </div>
      <div class="field-row">
        <label>Attendees</label>
        <div class="field-val ${!r.attendees ? 'empty' : ''}">${esc(r.attendees)}</div>
      </div>
      <div class="field-row">
        <label>Key Findings</label>
        <div class="field-val ${!r.key_findings ? 'empty' : ''}">${esc(r.key_findings)}</div>
      </div>
      <div class="field-row">
        <label>Action Items</label>
        <div class="field-val ${!r.action_items ? 'empty' : ''}">${esc(r.action_items)}</div>
      </div>
      <div class="two-col">
        <div class="field-row">
          <label>Balance Feedback</label>
          <div class="field-val ${!r.balance_feedback ? 'empty' : ''}">${esc(r.balance_feedback)}</div>
        </div>
        <div class="field-row">
          <label>Tyre Feedback</label>
          <div class="field-val ${!r.tyre_feedback ? 'empty' : ''}">${esc(r.tyre_feedback)}</div>
        </div>
      </div>
      <div class="field-row">
        <label>Setup Direction</label>
        <div class="field-val ${!r.setup_direction ? 'empty' : ''}">${esc(r.setup_direction)}</div>
      </div>
    </div>`;
}

function typeBadge(t) {
  const map = { post_session:'bp-post_session', post_event:'bp-post_event', mid_event:'bp-mid_event' };
  return `<span class="bp ${map[t] || 'bp-post_session'}">${(t || '—').replace('_', ' ')}</span>`;
}

function statusBadge(s) {
  const map = { open:'bp-open', actioned:'bp-actioned', closed:'bp-closed' };
  return `<span class="bp ${map[s] || 'bp-open'}">${s || '—'}</span>`;
}

function esc(v) { return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'; }

function openModal(id = null) {
  const rec = id ? allData.find(r => r.id === id) : null;
  document.getElementById('debriefModalTitle').textContent = rec ? 'Edit Debrief' : 'New Debrief';
  document.getElementById('btnDelete').classList.toggle('d-none', !rec);
  document.getElementById('fId').value              = rec ? rec.id : '';
  document.getElementById('fSessionName').value     = rec ? (rec.session_name    || '') : '';
  document.getElementById('fDebriefType').value     = rec ? (rec.debrief_type    || 'post_session') : 'post_session';
  document.getElementById('fStatus').value          = rec ? (rec.status          || 'open') : 'open';
  document.getElementById('fDriverName').value      = rec ? (rec.driver_name     || '') : '';
  document.getElementById('fCarNumber').value       = rec ? (rec.car_number      || '') : '';
  document.getElementById('fCreatedBy').value       = rec ? (rec.created_by      || '') : '';
  document.getElementById('fAttendees').value       = rec ? (rec.attendees       || '') : '';
  document.getElementById('fKeyFindings').value     = rec ? (rec.key_findings    || '') : '';
  document.getElementById('fActionItems').value     = rec ? (rec.action_items    || '') : '';
  document.getElementById('fBalanceFeedback').value = rec ? (rec.balance_feedback|| '') : '';
  document.getElementById('fTyreFeedback').value    = rec ? (rec.tyre_feedback   || '') : '';
  document.getElementById('fSetupDirection').value  = rec ? (rec.setup_direction || '') : '';
  bsModal.show();
}

async function saveRecord() {
  const payload = {
    session_name     : document.getElementById('fSessionName').value.trim(),
    debrief_type     : document.getElementById('fDebriefType').value,
    status           : document.getElementById('fStatus').value,
    driver_name      : document.getElementById('fDriverName').value.trim(),
    car_number       : document.getElementById('fCarNumber').value.trim(),
    created_by       : document.getElementById('fCreatedBy').value.trim(),
    attendees        : document.getElementById('fAttendees').value.trim(),
    key_findings     : document.getElementById('fKeyFindings').value.trim(),
    action_items     : document.getElementById('fActionItems').value.trim(),
    balance_feedback : document.getElementById('fBalanceFeedback').value.trim(),
    tyre_feedback    : document.getElementById('fTyreFeedback').value.trim(),
    setup_direction  : document.getElementById('fSetupDirection').value.trim()
  };
  if (!payload.session_name) { alert('Session Name is required'); return; }
  const id = document.getElementById('fId').value;
  try {
    const res = await fetch(id ? `/api/debriefs/${id}` : '/api/debriefs', {
      method : id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    const saved = await res.json();
    if (!id) selectedId = saved.id;
    await loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Delete this debrief?')) return;
  try {
    const res = await fetch(`/api/debriefs/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    selectedId = null;
    clearDetail();
    await loadData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}
</script>
</body>
</html>
