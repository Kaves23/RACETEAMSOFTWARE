<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Root Cause Analysis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .rts-main{padding:1.5rem;}
    .ev-stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;}
    .ev-stat-card{background:#fff;border-radius:10px;padding:1rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);min-width:120px;border-top:4px solid #8b5cf6;}
    .ev-stat-label{font-size:.72rem;text-transform:uppercase;color:#6b7280;font-weight:600;letter-spacing:.05em;}
    .ev-stat-value{font-size:1.8rem;font-weight:800;color:#1f2937;line-height:1.1;}
    .page-body{display:flex;gap:1.25rem;align-items:flex-start;height:calc(100vh - 230px);min-height:400px;}
    /* Left list */
    .rca-list{width:280px;flex-shrink:0;background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow-y:auto;display:flex;flex-direction:column;}
    .rca-list-header{padding:.8rem 1rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .rca-list-header h6{margin:0;font-weight:700;color:#374151;font-size:.85rem;}
    .rca-item{padding:.65rem 1rem;cursor:pointer;transition:background .15s;border-bottom:1px solid #f9fafb;}
    .rca-item:hover{background:#f5f3ff;}
    .rca-item.active{background:#ede9fe!important;border-left:3px solid #8b5cf6;}
    .rca-item .item-title{font-size:.83rem;font-weight:600;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rca-item .item-sub{font-size:.75rem;color:#6b7280;margin-top:.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .rca-item .item-badges{display:flex;gap:.3rem;margin-top:.3rem;flex-wrap:wrap;}
    /* Detail */
    .rca-detail{flex:1;min-width:0;background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow-y:auto;display:flex;flex-direction:column;}
    .detail-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#9ca3af;}
    .detail-head{padding:1.1rem 1.5rem;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .detail-head h5{margin:0;font-weight:700;color:#1f2937;font-size:1rem;}
    .detail-body{padding:1.4rem;flex:1;overflow-y:auto;}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 2rem;}
    .frow{margin-bottom:1rem;}
    .frow label{font-size:.68rem;font-weight:700;text-transform:uppercase;color:#9ca3af;letter-spacing:.06em;display:block;margin-bottom:.2rem;}
    .frow .fv{font-size:.88rem;color:#1f2937;white-space:pre-wrap;word-break:break-word;}
    .frow .fv.empty{color:#d1d5db;font-style:italic;}
    .five-whys-box{background:#f5f3ff;border:1.5px solid #c4b5fd;border-radius:8px;padding:1rem;font-size:.85rem;white-space:pre-wrap;word-break:break-word;color:#3730a3;}
    /* Badges */
    .bp{display:inline-block;padding:.2rem .65rem;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;}
    .st-in_progress{background:#fef3c7;color:#92400e;}
    .st-complete{background:#dbeafe;color:#1d4ed8;}
    .st-reviewed{background:#d1fae5;color:#065f46;}
    .m-five_whys{background:#ede9fe;color:#5b21b6;}
    .m-fishbone{background:#fce7f3;color:#9d174d;}
    .m-fault_tree{background:#cffafe;color:#0e7490;}
    .m-other{background:#f3f4f6;color:#374151;}
    .page-title{font-weight:800;color:#8b5cf6;letter-spacing:-.01em;}
    .modal-header-accent{background:#8b5cf6;color:#fff;}
    .modal-header-accent .btn-close{filter:invert(1);}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="page-title mb-0">Root Cause Analysis</h2>
      <div class="text-secondary small mt-1">Structured analysis of reliability failures with 5-Why, fishbone and fault-tree methodologies.</div>
    </div>
    <button class="btn btn-sm fw-semibold" style="background:#8b5cf6;color:#fff;padding:.4rem 1.1rem" onclick="openModal()">+ New RCA</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">In Progress</div><div class="ev-stat-value" style="color:#f59e0b" id="kpiInProgress">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Complete</div><div class="ev-stat-value" style="color:#3b82f6" id="kpiComplete">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Reviewed</div><div class="ev-stat-value" style="color:#10b981" id="kpiReviewed">—</div></div>
  </div>

  <div class="page-body">
    <div class="rca-list">
      <div class="rca-list-header">
        <h6>RCA Items</h6>
        <input type="text" class="form-control form-control-sm" id="listSearch" placeholder="Search…" oninput="renderList()" style="width:100px;font-size:.78rem">
      </div>
      <div id="listBody" style="flex:1;overflow-y:auto">
        <div class="text-center text-muted py-4 small">Loading…</div>
      </div>
    </div>

    <div class="rca-detail" id="detailPanel">
      <div class="detail-empty">
        <svg width="48" height="48" fill="none" stroke="#d1d5db" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <div class="mt-2 small">Select an RCA item to view details</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="crudModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header modal-header-accent">
        <h5 class="modal-title" id="modalTitle">New RCA</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="crudForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Incident ID <span class="text-muted">(if linked)</span></label>
              <input type="text" class="form-control form-control-sm" id="fIncidentId"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Component <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="fComponent" required/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Failure Mode</label>
              <input type="text" class="form-control form-control-sm" id="fFailureMode"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Root Cause</label>
              <textarea class="form-control form-control-sm" id="fRootCause" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Contributing Factors</label>
              <textarea class="form-control form-control-sm" id="fContributingFactors" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Five Whys</label>
              <textarea class="form-control form-control-sm" id="fFiveWhys" rows="5" placeholder="Why 1: ...&#10;Why 2: ...&#10;Why 3: ...&#10;Why 4: ...&#10;Why 5: ..."></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Methodology</label>
              <select class="form-select form-select-sm" id="fMethodology">
                <option value="five_whys">Five Whys</option>
                <option value="fishbone">Fishbone</option>
                <option value="fault_tree">Fault Tree</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="in_progress">In Progress</option>
                <option value="complete">Complete</option>
                <option value="reviewed">Reviewed</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Assigned To</label>
              <input type="text" class="form-control form-control-sm" id="fAssignedTo"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Conclusion</label>
              <textarea class="form-control form-control-sm" id="fConclusion" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Created By</label>
              <input type="text" class="form-control form-control-sm" id="fCreatedBy"/>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#8b5cf6;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API = '/api/rca';
let allData = [], selectedId = null;
const bsModal = new bootstrap.Modal(document.getElementById('crudModal'));

async function load() {
  try { const r = await fetch(API); allData = await r.json(); } catch(e) { allData = []; }
  updateKPIs(); renderList();
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent = allData.length;
  document.getElementById('kpiInProgress').textContent = allData.filter(x=>x.status==='in_progress').length;
  document.getElementById('kpiComplete').textContent = allData.filter(x=>x.status==='complete').length;
  document.getElementById('kpiReviewed').textContent = allData.filter(x=>x.status==='reviewed').length;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function stBadge(s){
  const m={in_progress:'st-in_progress',complete:'st-complete',reviewed:'st-reviewed'};
  const l={in_progress:'In Progress',complete:'Complete',reviewed:'Reviewed'};
  return `<span class="bp ${m[s]||'st-in_progress'}">${l[s]||esc(s)||'—'}</span>`;
}
function methodBadge(s){
  const m={five_whys:'m-five_whys',fishbone:'m-fishbone',fault_tree:'m-fault_tree',other:'m-other'};
  const l={five_whys:'5 Whys',fishbone:'Fishbone',fault_tree:'Fault Tree',other:'Other'};
  return `<span class="bp ${m[s]||'m-other'}">${l[s]||esc(s)||'—'}</span>`;
}

function renderList() {
  const q = document.getElementById('listSearch').value.toLowerCase();
  const items = allData.filter(r => !q || `${r.component||''} ${r.failure_mode||''}`.toLowerCase().includes(q));
  const body = document.getElementById('listBody');
  if (!items.length) { body.innerHTML = '<div class="text-center text-muted py-4 small">No items found.</div>'; return; }
  body.innerHTML = items.map(r => `
    <div class="rca-item ${selectedId===r.id?'active':''}" onclick="selectItem(${r.id})">
      <div class="item-title">${esc(r.component)||'—'}</div>
      <div class="item-sub">${esc(r.failure_mode)||'No failure mode'}</div>
      <div class="item-badges">${methodBadge(r.methodology)} ${stBadge(r.status)}</div>
    </div>`).join('');
}

function selectItem(id) {
  selectedId = id;
  renderList();
  const r = allData.find(x=>x.id===id);
  if (r) showDetail(r);
}

function showDetail(r) {
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = `
    <div class="detail-head">
      <h5>${esc(r.component)||'RCA Detail'}</h5>
      <div class="d-flex gap-2 align-items-center">
        ${stBadge(r.status)}
        <button class="btn btn-sm btn-outline-danger" onclick="deleteRecord()">Delete</button>
        <button class="btn btn-sm fw-semibold" style="background:#8b5cf6;color:#fff" onclick="editRecord()">Edit</button>
      </div>
    </div>
    <div class="detail-body">
      <div class="two-col">
        <div class="frow"><label>Incident ID</label><div class="fv">${esc(r.incident_id)||'—'}</div></div>
        <div class="frow"><label>Component</label><div class="fv"><strong>${esc(r.component)||'—'}</strong></div></div>
        <div class="frow"><label>Failure Mode</label><div class="fv">${esc(r.failure_mode)||'—'}</div></div>
        <div class="frow"><label>Methodology</label><div class="fv">${methodBadge(r.methodology)}</div></div>
        <div class="frow"><label>Status</label><div class="fv">${stBadge(r.status)}</div></div>
        <div class="frow"><label>Assigned To</label><div class="fv">${esc(r.assigned_to)||'—'}</div></div>
        <div class="frow"><label>Created By</label><div class="fv">${esc(r.created_by)||'—'}</div></div>
      </div>
      <div class="frow"><label>Root Cause</label><div class="fv ${r.root_cause?'':' empty'}">${esc(r.root_cause)||'Not yet identified.'}</div></div>
      <div class="frow"><label>Contributing Factors</label><div class="fv ${r.contributing_factors?'':' empty'}">${esc(r.contributing_factors)||'None noted.'}</div></div>
      <div class="frow">
        <label>Five Whys Analysis</label>
        <div class="five-whys-box ${r.five_whys?'':' empty'}">${esc(r.five_whys)||'Five whys not yet completed.'}</div>
      </div>
      <div class="frow"><label>Conclusion</label><div class="fv ${r.conclusion?'':' empty'}">${esc(r.conclusion)||'No conclusion yet.'}</div></div>
    </div>`;
}

function editRecord() {
  const r = allData.find(x=>x.id===selectedId);
  if (r) openModal(r);
}

function openModal(r) {
  document.getElementById('crudForm').reset();
  document.getElementById('fId').value = '';
  document.getElementById('modalTitle').textContent = r ? 'Edit RCA' : 'New RCA';
  if (r) {
    document.getElementById('fId').value = r.id||''
    document.getElementById('fIncidentId').value = r.incident_id||''
    document.getElementById('fComponent').value = r.component||''
    document.getElementById('fFailureMode').value = r.failure_mode||''
    document.getElementById('fRootCause').value = r.root_cause||''
    document.getElementById('fContributingFactors').value = r.contributing_factors||''
    document.getElementById('fFiveWhys').value = r.five_whys||''
    document.getElementById('fMethodology').value = r.methodology||'five_whys'
    document.getElementById('fConclusion').value = r.conclusion||''
    document.getElementById('fStatus').value = r.status||'in_progress'
    document.getElementById('fAssignedTo').value = r.assigned_to||''
    document.getElementById('fCreatedBy').value = r.created_by||''
  }
  bsModal.show();
}

async function saveRecord() {
  const comp = document.getElementById('fComponent');
  if (!comp.value.trim()) { comp.classList.add('is-invalid'); comp.focus(); return; }
  comp.classList.remove('is-invalid');
  const id = document.getElementById('fId').value;
  const body = {
    incident_id: document.getElementById('fIncidentId').value||null,
    component: document.getElementById('fComponent').value.trim(),
    failure_mode: document.getElementById('fFailureMode').value||null,
    root_cause: document.getElementById('fRootCause').value||null,
    contributing_factors: document.getElementById('fContributingFactors').value||null,
    five_whys: document.getElementById('fFiveWhys').value||null,
    methodology: document.getElementById('fMethodology').value,
    conclusion: document.getElementById('fConclusion').value||null,
    status: document.getElementById('fStatus').value,
    assigned_to: document.getElementById('fAssignedTo').value||null,
    created_by: document.getElementById('fCreatedBy').value||null
  };
  try {
    const r = await fetch(id?`${API}/${id}`:API, {method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    bsModal.hide();
    const saved = await r.json();
    selectedId = saved.id||selectedId;
    await load();
    const updated = allData.find(x=>x.id===selectedId);
    if (updated) showDetail(updated);
  } catch(e) { alert('Save failed: '+e.message); }
}

async function deleteRecord() {
  if (!selectedId) return;
  if (!confirm('Delete this RCA? This cannot be undone.')) return;
  try {
    const r = await fetch(`${API}/${selectedId}`,{method:'DELETE'});
    if (!r.ok) throw new Error();
    selectedId = null;
    document.getElementById('detailPanel').innerHTML = '<div class="detail-empty"><div class="mt-2 small">Select an RCA item to view details</div></div>';
    await load();
  } catch(e) { alert('Delete failed.'); }
}

load();
</script>
</body>
</html>
