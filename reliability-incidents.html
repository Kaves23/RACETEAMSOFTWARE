<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Reliability Incidents</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .rts-main{padding:1.5rem;}
    .ev-stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;}
    .ev-stat-card{background:#fff;border-radius:10px;padding:1rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);min-width:120px;border-top:4px solid #ef4444;}
    .ev-stat-label{font-size:.72rem;text-transform:uppercase;color:#6b7280;font-weight:600;letter-spacing:.05em;}
    .ev-stat-value{font-size:1.8rem;font-weight:800;color:#1f2937;line-height:1.1;}
    .filter-bar{background:#fff;border-radius:10px;padding:.75rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;}
    .filter-bar .flabel{font-size:.7rem;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:.2rem;}
    .table-wrapper{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;}
    .data-table{width:100%;font-size:.83rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:9px 12px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6b7280;border-bottom:2px solid #e5e7eb;white-space:nowrap;}
    .data-table td{padding:7px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle;color:#1f2937;}
    .data-table tbody tr{cursor:pointer;transition:background .12s;}
    .data-table tbody tr:hover{background:#fef2f2;}
    .data-table tbody tr.table-selected{background:rgba(239,68,68,.07)!important;outline:2px solid #ef4444;outline-offset:-2px;}
    .bp{display:inline-block;padding:.2rem .65rem;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;}
    .sev-critical{background:#fee2e2;color:#991b1b;outline:1.5px solid #fca5a5;}
    .sev-major{background:#ffedd5;color:#9a3412;}
    .sev-moderate{background:#fef3c7;color:#92400e;}
    .sev-minor{background:#dbeafe;color:#1d4ed8;}
    .st-open{background:#fee2e2;color:#991b1b;}
    .st-under_review{background:#fef3c7;color:#92400e;}
    .st-closed{background:#d1fae5;color:#065f46;}
    .dnf-yes{color:#ef4444;font-weight:700;}
    .dnf-no{color:#10b981;font-weight:500;}
    .drawer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1040;}
    .drawer-overlay.open{display:block;}
    .drawer{position:fixed;top:0;right:-560px;width:520px;height:100vh;background:#fff;z-index:1050;box-shadow:-6px 0 30px rgba(0,0,0,.15);transition:right .28s ease;display:flex;flex-direction:column;}
    .drawer.open{right:0;}
    .drawer-head{padding:1.1rem 1.5rem;border-bottom:1px solid #e5e7eb;background:#ef4444;color:#fff;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .drawer-head h5{margin:0;font-weight:700;font-size:.95rem;}
    .drawer-body{padding:1.4rem;flex:1;overflow-y:auto;}
    .drawer-foot{padding:.9rem 1.4rem;border-top:1px solid #e5e7eb;display:flex;gap:.5rem;justify-content:flex-end;flex-shrink:0;}
    .frow{margin-bottom:.9rem;}
    .frow label{font-size:.68rem;font-weight:700;text-transform:uppercase;color:#9ca3af;letter-spacing:.06em;display:block;margin-bottom:.2rem;}
    .frow .fv{font-size:.88rem;color:#1f2937;white-space:pre-wrap;word-break:break-word;}
    .frow .fv.empty{color:#d1d5db;font-style:italic;}
    .two-col{display:grid;grid-template-columns:1fr 1fr;gap:0 2rem;}
    .page-title{font-weight:800;color:#ef4444;letter-spacing:-.01em;}
    .modal-header-accent{background:#ef4444;color:#fff;}
    .modal-header-accent .btn-close{filter:invert(1);}
    .empty-row td{text-align:center;padding:2.5rem;color:#9ca3af;font-size:.9rem;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="page-title mb-0">Reliability Incidents</h2>
      <div class="text-secondary small mt-1">Log and track all vehicle and component reliability incidents.</div>
    </div>
    <button class="btn btn-sm fw-semibold" style="background:#ef4444;color:#fff;padding:.4rem 1.1rem" onclick="openModal()">+ New Incident</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Critical</div><div class="ev-stat-value" style="color:#ef4444" id="kpiCritical">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Major</div><div class="ev-stat-value" style="color:#f97316" id="kpiMajor">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">DNFs</div><div class="ev-stat-value" style="color:#ef4444" id="kpiDNF">—</div></div>
  </div>

  <div class="filter-bar">
    <div>
      <span class="flabel">Severity</span>
      <select class="form-select form-select-sm" id="fltSeverity" onchange="applyFilters()">
        <option value="">All</option>
        <option value="critical">Critical</option>
        <option value="major">Major</option>
        <option value="moderate">Moderate</option>
        <option value="minor">Minor</option>
      </select>
    </div>
    <div>
      <span class="flabel">Status</span>
      <select class="form-select form-select-sm" id="fltStatus" onchange="applyFilters()">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="under_review">Under Review</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div>
      <span class="flabel">Car #</span>
      <select class="form-select form-select-sm" id="fltCar" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>
    <div>
      <span class="flabel">Search</span>
      <input type="text" class="form-control form-control-sm" id="fltSearch" placeholder="Component / failure…" oninput="applyFilters()" style="min-width:180px;">
    </div>
    <div style="margin-top:auto;">
      <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Date</th><th>Car #</th><th>Component</th><th>Failure Mode</th>
          <th>Session</th><th>Lap</th><th>Severity</th><th>DNF</th><th>Status</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" class="text-center text-muted py-4">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h5 id="drawerTitle">Incident Detail</h5>
    <button type="button" class="btn-close btn-close-white btn-sm" onclick="closeDrawer()"></button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot">
    <button class="btn btn-sm btn-outline-danger" onclick="deleteRecord()">Delete</button>
    <button class="btn btn-sm fw-semibold" style="background:#ef4444;color:#fff" onclick="editRecord()">Edit</button>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="crudModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header modal-header-accent">
        <h5 class="modal-title" id="modalTitle">New Incident</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="crudForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Event ID</label>
              <input type="text" class="form-control form-control-sm" id="fEventId" placeholder="Optional"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Car Number</label>
              <input type="text" class="form-control form-control-sm" id="fCarNumber"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Component <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="fComponent" required/>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Failure Mode</label>
              <input type="text" class="form-control form-control-sm" id="fFailureMode"/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Session Name</label>
              <input type="text" class="form-control form-control-sm" id="fSessionName"/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Lap Number</label>
              <input type="number" class="form-control form-control-sm" id="fLapNumber" min="0"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Severity</label>
              <select class="form-select form-select-sm" id="fSeverity">
                <option value="minor">Minor</option>
                <option value="moderate">Moderate</option>
                <option value="major">Major</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="open">Open</option>
                <option value="under_review">Under Review</option>
                <option value="closed">Closed</option>
              </select>
            </div>
            <div class="col-md-4 d-flex align-items-end pb-1">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="fDnf"/>
                <label class="form-check-label small fw-semibold" for="fDnf">DNF (Did Not Finish)</label>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Description</label>
              <textarea class="form-control form-control-sm" id="fDescription" rows="3"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Immediate Action Taken</label>
              <textarea class="form-control form-control-sm" id="fImmediateAction" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Created By</label>
              <input type="text" class="form-control form-control-sm" id="fCreatedBy"/>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#ef4444;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API = '/api/reliability-incidents';
let allData = [], filtered = [], selectedId = null;
const bsModal = new bootstrap.Modal(document.getElementById('crudModal'));

async function load() {
  try { const r = await fetch(API); allData = await r.json(); } catch(e) { allData = []; }
  updateKPIs(); populateCarFilter(); applyFilters();
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent = allData.length;
  document.getElementById('kpiCritical').textContent = allData.filter(x => x.severity === 'critical').length;
  document.getElementById('kpiMajor').textContent = allData.filter(x => x.severity === 'major').length;
  document.getElementById('kpiDNF').textContent = allData.filter(x => x.dnf).length;
}

function populateCarFilter() {
  const sel = document.getElementById('fltCar');
  const stored = sel.value;
  const cars = [...new Set(allData.map(x => x.car_number).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All</option>' + cars.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  sel.value = stored;
}

function applyFilters() {
  const sev = document.getElementById('fltSeverity').value;
  const st = document.getElementById('fltStatus').value;
  const car = document.getElementById('fltCar').value;
  const q = document.getElementById('fltSearch').value.toLowerCase();
  filtered = allData.filter(r => {
    if (sev && r.severity !== sev) return false;
    if (st && r.status !== st) return false;
    if (car && r.car_number !== car) return false;
    if (q && !`${r.component||''} ${r.failure_mode||''}`.toLowerCase().includes(q)) return false;
    return true;
  });
  renderTable();
}

function clearFilters() {
  ['fltSeverity','fltStatus','fltCar','fltSearch'].forEach(id => { const el=document.getElementById(id); el.value=''; });
  applyFilters();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function sevBadge(s) {
  const m = {critical:'sev-critical',major:'sev-major',moderate:'sev-moderate',minor:'sev-minor'};
  return `<span class="bp ${m[s]||'sev-minor'}">${esc(s)||'—'}</span>`;
}
function stBadge(s) {
  const m = {open:'st-open',under_review:'st-under_review',closed:'st-closed'};
  const l = {open:'Open',under_review:'Under Review',closed:'Closed'};
  return `<span class="bp ${m[s]||'st-open'}">${l[s]||esc(s)||'—'}</span>`;
}
function dnfHtml(v) { return v ? '<span class="dnf-yes">✗ DNF</span>' : '<span class="dnf-no">—</span>'; }
function fmtDate(d) { if (!d) return '—'; return String(d).split('T')[0]; }

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No incidents match your filters.</td></tr>';
    return;
  }
  tbody.innerHTML = filtered.map(r => `
    <tr data-id="${r.id}" onclick="selectRow(${r.id})" class="${selectedId===r.id?'table-selected':''}">
      <td>${fmtDate(r.incident_date||r.created_at)}</td>
      <td>${esc(r.car_number)||'—'}</td>
      <td><strong>${esc(r.component)||'—'}</strong></td>
      <td>${esc(r.failure_mode)||'—'}</td>
      <td>${esc(r.session_name)||'—'}</td>
      <td>${r.lap_number!=null?r.lap_number:'—'}</td>
      <td>${sevBadge(r.severity)}</td>
      <td>${dnfHtml(r.dnf)}</td>
      <td>${stBadge(r.status)}</td>
    </tr>`).join('');
}

function selectRow(id) {
  selectedId = id;
  document.querySelectorAll('.data-table tbody tr').forEach(tr =>
    tr.classList.toggle('table-selected', parseInt(tr.dataset.id)===id));
  const r = allData.find(x => x.id === id);
  if (r) openDrawer(r);
}

function openDrawer(r) {
  document.getElementById('drawerTitle').textContent = `${esc(r.component)||'Incident'} — #${r.id}`;
  document.getElementById('drawerBody').innerHTML = `
    <div class="two-col">
      <div class="frow"><label>Date</label><div class="fv">${fmtDate(r.incident_date||r.created_at)}</div></div>
      <div class="frow"><label>Car Number</label><div class="fv">${esc(r.car_number)||'—'}</div></div>
      <div class="frow"><label>Component</label><div class="fv"><strong>${esc(r.component)||'—'}</strong></div></div>
      <div class="frow"><label>Failure Mode</label><div class="fv">${esc(r.failure_mode)||'—'}</div></div>
      <div class="frow"><label>Session</label><div class="fv">${esc(r.session_name)||'—'}</div></div>
      <div class="frow"><label>Lap</label><div class="fv">${r.lap_number!=null?r.lap_number:'—'}</div></div>
      <div class="frow"><label>Severity</label><div class="fv">${sevBadge(r.severity)}</div></div>
      <div class="frow"><label>Status</label><div class="fv">${stBadge(r.status)}</div></div>
      <div class="frow"><label>DNF</label><div class="fv">${dnfHtml(r.dnf)}</div></div>
      <div class="frow"><label>Event ID</label><div class="fv">${esc(r.event_id)||'—'}</div></div>
    </div>
    <div class="frow"><label>Description</label><div class="fv ${r.description?'':'empty'}">${esc(r.description)||'No description recorded.'}</div></div>
    <div class="frow"><label>Immediate Action</label><div class="fv ${r.immediate_action?'':'empty'}">${esc(r.immediate_action)||'None recorded.'}</div></div>
    <div class="frow"><label>Created By</label><div class="fv">${esc(r.created_by)||'—'}</div></div>`;
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer() {
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function openModal(r) {
  document.getElementById('crudForm').reset();
  document.getElementById('fId').value = '';
  document.getElementById('modalTitle').textContent = r ? 'Edit Incident' : 'New Incident';
  if (r) {
    document.getElementById('fId').value = r.id||'';
    document.getElementById('fEventId').value = r.event_id||'';
    document.getElementById('fCarNumber').value = r.car_number||'';
    document.getElementById('fComponent').value = r.component||'';
    document.getElementById('fFailureMode').value = r.failure_mode||'';
    document.getElementById('fSessionName').value = r.session_name||'';
    document.getElementById('fLapNumber').value = r.lap_number!=null?r.lap_number:'';
    document.getElementById('fSeverity').value = r.severity||'minor';
    document.getElementById('fStatus').value = r.status||'open';
    document.getElementById('fDnf').checked = !!r.dnf;
    document.getElementById('fDescription').value = r.description||'';
    document.getElementById('fImmediateAction').value = r.immediate_action||'';
    document.getElementById('fCreatedBy').value = r.created_by||'';
  }
  bsModal.show();
}

function editRecord() {
  const r = allData.find(x => x.id === selectedId);
  if (r) { closeDrawer(); openModal(r); }
}

async function saveRecord() {
  const comp = document.getElementById('fComponent');
  if (!comp.value.trim()) { comp.classList.add('is-invalid'); comp.focus(); return; }
  comp.classList.remove('is-invalid');
  const id = document.getElementById('fId').value;
  const body = {
    event_id: document.getElementById('fEventId').value||null,
    car_number: document.getElementById('fCarNumber').value||null,
    component: document.getElementById('fComponent').value.trim(),
    failure_mode: document.getElementById('fFailureMode').value||null,
    session_name: document.getElementById('fSessionName').value||null,
    lap_number: document.getElementById('fLapNumber').value!==''?parseInt(document.getElementById('fLapNumber').value):null,
    severity: document.getElementById('fSeverity').value,
    dnf: document.getElementById('fDnf').checked,
    description: document.getElementById('fDescription').value||null,
    immediate_action: document.getElementById('fImmediateAction').value||null,
    status: document.getElementById('fStatus').value,
    created_by: document.getElementById('fCreatedBy').value||null
  };
  try {
    const r = await fetch(id?`${API}/${id}`:API, {
      method: id?'PUT':'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    if (!r.ok) throw new Error(await r.text());
    bsModal.hide();
    await load();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  if (!selectedId) return;
  if (!confirm('Delete this incident? This cannot be undone.')) return;
  try {
    const r = await fetch(`${API}/${selectedId}`, {method:'DELETE'});
    if (!r.ok) throw new Error();
    selectedId = null;
    closeDrawer();
    await load();
  } catch(e) { alert('Delete failed.'); }
}

load();
</script>
</body>
</html>
