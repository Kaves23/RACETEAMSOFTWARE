<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Race Team OS – Activity History</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="style.css?v=20260420" rel="stylesheet">
  <style>
    /* ── Stats bar ─────────────────────────────────────────── */
    .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 140px; background: #fff;
      border: 1px solid #e8eaed; border-radius: 10px; padding: 14px 18px;
    }
    .stat-card .stat-value { font-size: 2rem; font-weight: 700; line-height: 1; }
    .stat-card .stat-label { font-size: .74rem; color: #80868b; margin-top: 4px; font-weight: 500; }
    .stat-login  .stat-value { color: #2e7d32; }
    .stat-total  .stat-value { color: #1565c0; }
    .stat-week   .stat-value { color: #6d4c41; }
    .stat-users  .stat-value { color: #6a1b9a; }

    /* ── Filter bar ────────────────────────────────────────── */
    .filter-bar {
      background: #fff; border: 1px solid #e8eaed; border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px;
    }

    /* ── Feed ──────────────────────────────────────────────── */
    .timeline-feed { list-style: none; padding: 0; margin: 0; }
    .feed-item {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 12px 6px; border-bottom: 1px solid #f3f4f6;
      transition: background .1s;
    }
    .feed-item:hover { background: #fafbfc; border-radius: 8px; }
    .feed-item:last-child { border-bottom: none; }
    .feed-icon {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; background: #f0f4ff;
    }
    .feed-icon svg { display: block; }
    .feed-icon.icon-login        { background: #e8f5e9; }
    .feed-icon.icon-logout       { background: #fce4ec; }
    .feed-icon.icon-created      { background: #e8f5e9; }
    .feed-icon.icon-updated      { background: #e3f2fd; }
    .feed-icon.icon-packed       { background: #fff8e1; }
    .feed-icon.icon-unpacked     { background: #fce4ec; }
    .feed-icon.icon-retired      { background: #f5f5f5; }
    .feed-icon.icon-checked_out  { background: #fffde7; }
    .feed-icon.icon-returned     { background: #e8f5e9; }
    .feed-icon.icon-note_added   { background: #ede9fe; }
    .feed-icon.icon-mileage_added{ background: #dbeafe; }
    .feed-icon.icon-used         { background: #ffedd5; }

    .feed-body { flex: 1; min-width: 0; }
    .feed-headline {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px;
    }
    .feed-entity-name { font-weight: 600; font-size: .88rem; color: #202124; }
    a.feed-entity-name { color: #1a73e8; text-decoration: none; }
    a.feed-entity-name:hover { text-decoration: underline; }
    .feed-meta { font-size: .76rem; color: #80868b; margin-top: 2px; }
    .feed-meta strong { color: #5f6368; font-weight: 600; }

    /* ── Action badges ─────────────────────────────────────── */
    .action-badge {
      display: inline-block; padding: 2px 9px; border-radius: 10px;
      font-size: .68rem; font-weight: 700; letter-spacing: .4px;
      text-transform: uppercase; white-space: nowrap;
    }
    .action-created      { background: #e8f5e9; color: #2e7d32; }
    .action-updated      { background: #e3f2fd; color: #1565c0; }
    .action-packed       { background: #fff3e0; color: #e65100; }
    .action-unpacked     { background: #fce4ec; color: #c62828; }
    .action-retired      { background: #f5f5f5; color: #757575; }
    .action-checked_out  { background: #fff9c4; color: #f57f17; }
    .action-returned     { background: #d1fae5; color: #065f46; }
    .action-note_added   { background: #ede9fe; color: #5b21b6; }
    .action-mileage_added{ background: #dbeafe; color: #1e40af; }
    .action-used         { background: #ffedd5; color: #9a3412; }
    .action-login        { background: #e8f5e9; color: #1b5e20; }
    .action-logout       { background: #fce4ec; color: #880e4f; }

    /* ── Entity type badge ─────────────────────────────────── */
    .entity-badge {
      display: inline-block; padding: 2px 7px; border-radius: 8px;
      font-size: .65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: .3px; background: #f1f3f4; color: #5f6368; white-space: nowrap;
    }

    /* ── Time cell ─────────────────────────────────────────── */
    .feed-time { flex-shrink: 0; text-align: right; padding-top: 2px; min-width: 54px; }
    .time-hhmm { font-size: .88rem; font-weight: 700; color: #3c4043; display: block; }
    .time-date { font-size: .72rem; color: #9aa0a6; display: block; margin-top: 1px; }

    /* ── Before / After diff ───────────────────────────────── */
    .diff-card {
      display: flex; gap: 0; margin-top: 8px; border-radius: 8px;
      overflow: hidden; border: 1px solid #e8eaed; font-size: .78rem;
    }
    .diff-col { flex: 1; padding: 8px 12px; min-width: 0; }
    .diff-before { background: #fff5f5; border-right: 1px solid #ffd6d6; }
    .diff-after  { background: #f0faf4; }
    .diff-label  {
      font-size: .63rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 5px;
    }
    .diff-before .diff-label { color: #c62828; }
    .diff-after  .diff-label { color: #2e7d32; }
    .diff-row   { display: flex; gap: 6px; align-items: baseline; margin-bottom: 2px; }
    .diff-field { font-size: .7rem; color: #9aa0a6; flex-shrink: 0; min-width: 70px; }
    .diff-val   { color: #202124; font-weight: 500; word-break: break-word; }

    /* ── Detail pills ──────────────────────────────────────── */
    .detail-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .detail-pill {
      background: #f8f9fa; border: 1px solid #e8eaed; border-radius: 6px;
      padding: 2px 8px; font-size: .74rem;
    }
    .pill-key { color: #9aa0a6; margin-right: 3px; }
    .pill-val { color: #202124; font-weight: 500; }

    /* ── Day divider ───────────────────────────────────────── */
    .day-divider {
      display: flex; align-items: center; gap: 10px; padding: 18px 6px 8px;
      color: #80868b; font-size: .72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .6px;
    }
    .day-divider::before, .day-divider::after {
      content: ''; flex: 1; height: 1px; background: #e8eaed;
    }

    /* ── Pagination & results row ──────────────────────────── */
    .results-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
    }
    #logCount { font-size: .78rem; color: #5f6368; }
    .pagination-row {
      display: flex; gap: 8px; justify-content: center; align-items: center; padding-top: 12px;
    }
    .empty-state { text-align: center; padding: 60px 20px; color: #9aa0a6; }

    /* ── Software update banner row ────────────────────────────────────────── */
    .feed-item.software-update {
      background: linear-gradient(90deg, #fffbeb 0%, #fef9f0 100%);
      border-left: 4px solid #f59e0b;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .feed-item.software-update .feed-icon {
      background: #fef3c7;
    }
    .feed-item.software-update .feed-entity-name {
      color: #92400e;
      font-weight: 700;
    }
    .action-software_update {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #f59e0b;
    }

    /* ── Stat trends ────────────────────────────────────────── */
    .stat-trend { font-size: .72rem; margin-top: 4px; min-height: 1.1em; }
    .trend-up   { color: #2e7d32; font-weight: 600; }
    .trend-down { color: #c62828; font-weight: 600; }
    .trend-flat { color: #9aa0a6; }

    /* ── 7-day chart ────────────────────────────────────────── */
    .chart-section { background: #fff; border: 1px solid #e8eaed; border-radius: 10px; padding: 14px 18px; margin-bottom: 16px; }
    .chart-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; gap: 12px; }
    .chart-title { font-size: .78rem; font-weight: 700; color: #3c4043; white-space: nowrap; }
    .chart-legend { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .chart-legend-item { display: flex; align-items: center; gap: 3px; font-size: .67rem; color: #6d7280; }
    .chart-legend-item span { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; display: inline-block; }
    .chart-bars { display: flex; gap: 8px; align-items: flex-end; height: 96px; }
    .chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
    .chart-bar-stack { width: 100%; display: flex; flex-direction: column-reverse; border-radius: 3px 3px 0 0; overflow: hidden; }
    .chart-bar-seg { width: 100%; }
    .chart-day-label { font-size: .65rem; color: #9aa0a6; margin-top: 5px; text-align: center; }
    .chart-day-count { font-size: .67rem; color: #5f6368; font-weight: 600; margin-bottom: 3px; line-height: 1; min-height: 1em; }

    /* ── Feed context column ────────────────────────────────── */
    .feed-context {
      flex-shrink: 0; width: 150px; display: flex; flex-direction: column;
      align-items: flex-end; justify-content: flex-start; padding-top: 3px; gap: 5px;
    }
    @media (max-width: 768px) { .feed-context { display: none; } }
    .event-badge {
      display: inline-block; max-width: 148px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; padding: 2px 9px; border-radius: 8px;
      font-size: .68rem; font-weight: 600; background: #e8f0fe; color: #1a73e8; border: 1px solid #d2e3fc;
    }
    .entity-id-hint {
      font-size: .67rem; color: #b8bfc9; font-family: monospace; max-width: 148px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    /* ── Git commit rows ────────────────────────────────────────── */
    .feed-item.git-commit {
      background: linear-gradient(90deg, #f0f4ff 0%, #f8f9ff 100%);
      border-left: 4px solid #4f46e5;
      border-radius: 8px;
      margin-bottom: 4px;
    }
    .feed-item.git-commit .feed-icon { background: #e0e7ff; color: #4f46e5; }
    .feed-item.git-commit .feed-entity-name { color: #312e81; font-family: 'Courier New', monospace; font-size: .78rem; }
    .action-git_commit { background: #e0e7ff; color: #312e81; border: 1px solid #a5b4fc; }
    .git-commit-subject { font-size: .8rem; color: #1e1b4b; margin-top: 3px; line-height: 1.4; }
    .git-commit-prefix { font-weight: 700; }
    .git-commit-prefix.feat { color: #059669; }
    .git-commit-prefix.fix  { color: #dc2626; }
    .git-commit-prefix.style{ color: #7c3aed; }
    .git-commit-prefix.refactor{ color: #d97706; }
    .git-commit-prefix.chore{ color: #6b7280; }
  </style>
</head>
<body class="page-history light-mode">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid py-3">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-end mb-3 pb-2 border-bottom">
      <div>
        <h1 class="h4 mb-1" style="color:#202124">Activity History</h1>
        <div class="text-secondary" style="font-size:.85rem">System-wide audit log — every action, login and change across the platform.</div>
      </div>
      <button class="btn btn-sm btn-outline-secondary" id="btnExportCsv"><svg width="13" height="13" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.1em;margin-right:4px"><path d="M10 3v10"/><polyline points="5 13 10 18 15 13"/><line x1="3" y1="18" x2="17" y2="18"/></svg>Export CSV</button>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
      <div class="stat-card stat-login">
        <div class="stat-value" id="statLogins">–</div>
        <div class="stat-trend" id="trendLogins"></div>
        <div class="stat-label"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="10" cy="6" r="3.5"/><path d="M3 19v-.5a7 7 0 0 1 14 0v.5"/></svg>Logins Today</div>
      </div>
      <div class="stat-card stat-total">
        <div class="stat-value" id="statTotal">–</div>
        <div class="stat-trend" id="trendTotal"></div>
        <div class="stat-label"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M12 2L5 11h6l-3 7 9-9h-6z"/></svg>Actions Today</div>
      </div>
      <div class="stat-card stat-week">
        <div class="stat-value" id="statWeek">–</div>
        <div class="stat-label"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><rect x="2" y="4" width="16" height="14" rx="1.5"/><path d="M2 9h16M6 2v4M14 2v4"/></svg>Actions This Week</div>
      </div>
      <div class="stat-card stat-users">
        <div class="stat-value" id="statUsers">–</div>
        <div class="stat-trend" id="trendUsers"></div>
        <div class="stat-label"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><circle cx="7" cy="6" r="3"/><path d="M1 19v-.5a6 6 0 0 1 12 0v.5"/><circle cx="14" cy="7" r="2.5"/><path d="M18 19v-.5a5.5 5.5 0 0 0-4-5.3"/></svg>Active Users Today</div>
      </div>
    </div>

    <!-- 7-day Activity Chart -->
    <div class="chart-section">
      <div class="chart-header">
        <span class="chart-title">Activity — Last 7 Days</span>
        <div class="chart-legend" id="chartLegend"></div>
      </div>
      <div class="chart-bars" id="chartBars">
        <div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#9aa0a6">Loading chart…</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <div class="row g-2 align-items-end">
        <div class="col-md-2">
          <label class="form-label mb-1" style="font-size:.78rem;font-weight:600">Entity Type</label>
          <select class="form-select form-select-sm" id="fEntityType">
            <option value="">All Types</option>
            <option value="user">User Sessions</option>
            <option value="item">Asset</option>
            <option value="inventory">Inventory</option>
            <option value="race_fleet">Race Fleet</option>
            <option value="box">Box</option>
            <option value="truck">Truck</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label mb-1" style="font-size:.78rem;font-weight:600">Action</label>
          <select class="form-select form-select-sm" id="fAction">
            <option value="">All Actions</option>
            <option value="login">Login</option>
            <option value="logout">Logout</option>
            <option value="created">Created</option>
            <option value="updated">Updated</option>
            <option value="packed">Packed</option>
            <option value="unpacked">Unpacked</option>
            <option value="retired">Retired</option>
            <option value="checked_out">Checked Out</option>
            <option value="returned">Returned</option>
            <option value="note_added">Note Added</option>
            <option value="mileage_added">Mileage Logged</option>
            <option value="used">Used (Race)</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label mb-1" style="font-size:.78rem;font-weight:600">From</label>
          <input type="date" class="form-control form-control-sm" id="fFrom">
        </div>
        <div class="col-md-2">
          <label class="form-label mb-1" style="font-size:.78rem;font-weight:600">To</label>
          <input type="date" class="form-control form-control-sm" id="fTo">
        </div>
        <div class="col-md-3">
          <label class="form-label mb-1" style="font-size:.78rem;font-weight:600">Search Person / Item</label>
          <input type="text" class="form-control form-control-sm" id="fEntityId" placeholder="Name or entity ID…">
        </div>
        <div class="col-md-1 d-flex align-items-end gap-1">
          <button class="btn btn-sm btn-primary flex-fill" id="btnFilter">Filter</button>
          <button class="btn btn-sm btn-outline-secondary" id="btnClear" title="Clear filters">✕</button>
        </div>
        <div class="col-12" style="margin-top:4px">
          <div class="form-check form-switch d-inline-flex align-items-center gap-2" style="margin:0">
            <input class="form-check-input" type="checkbox" id="toggleCommits" checked style="cursor:pointer">
            <label class="form-check-label" for="toggleCommits" style="font-size:.78rem;cursor:pointer;color:#4f46e5;font-weight:600">
              <svg width="12" height="12" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-.1em;margin-right:3px"><circle cx="10" cy="10" r="2.5"/><path d="M2 10h5.5M12.5 10H18"/></svg>
              Show git commits
            </label>
          </div>
        </div>
      </div>
    </div>

    <!-- Results header -->
    <div class="results-header">
      <span id="logCount">Loading…</span>
      <div class="pagination-row" id="paginationRow" style="margin:0;padding:0;"></div>
    </div>

    <div id="feedContainer">
      <div class="text-center py-5 text-muted">
        <div class="spinner-border text-primary" role="status"></div>
        <div class="mt-2">Loading activity log…</div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script>
    const API    = window.RTS_CONFIG?.api?.baseURL || '/api';
    const LIMIT  = 50;
    let currentOffset = 0;
    let currentTotal  = 0;
    let currentParams = {};

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + (localStorage.getItem('auth_token') || '') };
    }

    // ── Icons (branded SVG, stroke-based) ────────────────────────────────────
    const _I = p => `<svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${p}</svg>`;
    const ACTION_SVGS = {
      login:         _I('<path d="M8 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h4"/><path d="M13 14l3-4-3-4"/><path d="M16 10H7"/>'),
      logout:        _I('<path d="M12 3h4a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1h-4"/><path d="M7 14l-3-4 3-4"/><path d="M4 10h9"/>'),
      created:       _I('<circle cx="10" cy="10" r="7.5"/><path d="M10 6.5v7M6.5 10h7"/>'),
      updated:       _I('<path d="M3 17l4-1 10-10-3-3L4 14 3 17z"/><path d="M14 3l3 3"/>'),
      packed:        _I('<path d="M10 2L2 6v8l8 4 8-4V6L10 2z"/><path d="M2 6l8 4 8-4"/><path d="M10 10v8"/>'),
      unpacked:      _I('<path d="M10 12L2 7v7l8 4 8-4V7L10 12z"/><path d="M2 7l8 5 8-5"/><path d="M10 2v8"/><path d="M7.5 4.5L10 2l2.5 2.5"/>'),
      retired:       _I('<path d="M3 6h14"/><path d="M5 6l1 11h8l1-11"/><path d="M8 6V4a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v2"/><path d="M8 10v4M12 10v4"/>'),
      checked_out:   _I('<rect x="5" y="3" width="10" height="14" rx="1"/><path d="M8 3V2a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1"/><path d="M7.5 10.5l2 2 3-3.5"/>'),
      returned:      _I('<path d="M4 10c0-3.3 2.7-6 6-6h4"/><path d="M4 6v4h4"/>'),
      note_added:    _I('<path d="M12 2H5a1 1 0 0 0-1 1v14a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6L12 2z"/><path d="M12 2v4h4"/><path d="M7 9h6M7 12h6M7 15h4"/>'),
      mileage_added: _I('<path d="M3 14.5a7 7 0 0 1 14 0"/><line x1="10" y1="14.5" x2="14" y2="8.5"/><circle cx="10" cy="14.5" r="1.25" fill="currentColor" stroke="none"/>'),
      used:          _I('<path d="M3 18V3"/><path d="M3 3l14 5-14 5"/>'),
      software_update: _I('<path d="M4 16l4-8 2 4 2-2 4 6"/><circle cx="15" cy="5" r="2.5"/><path d="M12.5 5H4"/>'),
      git_commit:      _I('<circle cx="10" cy="10" r="2.5"/><path d="M2 10h5.5M12.5 10H18"/><circle cx="10" cy="10" r="5.5" stroke-dasharray="2 2"/>'),
    };
    const ACTION_SVGS_DEFAULT = _I('<circle cx="10" cy="10" r="5"/>');

    // ── Date helpers ───────────────────────────────────────────────────────────
    function fmtTime(d) {
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    }
    function fmtDateShort(d) {
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    }
    function fmtDayHeading(d) {
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(today.getDate() - 1);
      const same = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      if (same(d, today))     return 'Today';
      if (same(d, yesterday)) return 'Yesterday';
      return d.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }
    function dayKey(d) { return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

    // ── HTML escape ────────────────────────────────────────────────────────────
    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Details rendering ──────────────────────────────────────────────────────
    function renderDetails(log) {
      const d = log.details;
      if (!d || typeof d !== 'object') return '';

      // Login / Logout: IP + browser pills
      if (log.action === 'login' || log.action === 'logout') {
        const pills = [];
        if (d.ip) pills.push({ key: 'IP', val: d.ip });
        if (d.userAgent) {
          const ua = String(d.userAgent);
          const browser = /Edg\//.test(ua) ? 'Edge'
                        : /Chrome\//.test(ua) ? 'Chrome'
                        : /Firefox\//.test(ua) ? 'Firefox'
                        : /Safari\//.test(ua) ? 'Safari'
                        : ua.slice(0, 40);
          pills.push({ key: 'Browser', val: browser });
        }
        if (!pills.length) return '';
        return `<div class="detail-pills">${pills.map(p =>
          `<span class="detail-pill"><span class="pill-key">${esc(p.key)}:</span><span class="pill-val">${esc(p.val)}</span></span>`
        ).join('')}</div>`;
      }

      // Before / After diff (two-column card)
      if (d.before !== undefined && d.after !== undefined &&
          typeof d.before === 'object' && typeof d.after === 'object') {
        const allKeys     = [...new Set([...Object.keys(d.before || {}), ...Object.keys(d.after || {})])];
        const changedKeys = allKeys.filter(k => JSON.stringify(d.before?.[k]) !== JSON.stringify(d.after?.[k]));
        const keys = changedKeys.length ? changedKeys : allKeys;
        const bRows = keys.map(k =>
          `<div class="diff-row"><span class="diff-field">${esc(k.replace(/_/g,' '))}</span><span class="diff-val">${esc(d.before?.[k] ?? '—')}</span></div>`
        ).join('');
        const aRows = keys.map(k =>
          `<div class="diff-row"><span class="diff-field">${esc(k.replace(/_/g,' '))}</span><span class="diff-val">${esc(d.after?.[k] ?? '—')}</span></div>`
        ).join('');
        return `<div class="diff-card"><div class="diff-col diff-before"><div class="diff-label">Before</div>${bRows}</div><div class="diff-col diff-after"><div class="diff-label">After</div>${aRows}</div></div>`;
      }

      // Single old → new value
      if (d.old_value !== undefined || d.new_value !== undefined) {
        return `<div class="detail-pills">
          <span class="detail-pill"><span class="pill-key" style="color:#c62828">Before:</span><span class="pill-val">${esc(d.old_value ?? '—')}</span></span>
          <span style="color:#9aa0a6;font-size:.85rem">→</span>
          <span class="detail-pill"><span class="pill-key" style="color:#2e7d32">After:</span><span class="pill-val">${esc(d.new_value ?? '—')}</span></span>
        </div>`;
      }

      // Flat pills fallback
      const entries = Object.entries(d).filter(([, v]) => v != null && v !== '');
      if (!entries.length) return '';
      return `<div class="detail-pills">${entries.map(([k, v]) =>
        `<span class="detail-pill"><span class="pill-key">${esc(k.replace(/_/g,' '))}:</span><span class="pill-val">${esc(v)}</span></span>`
      ).join('')}</div>`;
    }

    // ── Entity page links ──────────────────────────────────────────────────────
    const ENTITY_LINKS = {
      item:       () => 'assets.html',
      inventory:  () => 'inventory.html',
      race_fleet: () => 'race-fleet.html',
      box:        () => 'box-packing.html',
      truck:      () => 'vehicles.html',
    };

    // ── Git commits ────────────────────────────────────────────────────────────
    let gitCommits = [];  // populated once on load

    async function loadGitCommits() {
      try {
        const resp = await fetch('git-log.json?v=' + Date.now());
        if (!resp.ok) return;
        gitCommits = await resp.json();
      } catch (e) {
        console.warn('git-log.json not available', e);
      }
    }

    function buildCommitRow(commit) {
      const ts = new Date(commit.date);
      const iconSvg = ACTION_SVGS.git_commit;
      const subject = commit.subject || '';
      // Detect conventional commit prefix (feat:, fix:, style:, etc.)
      const prefixMatch = subject.match(/^(feat|fix|style|refactor|chore|docs|test|perf)(\(.+?\))?(!)?:/);
      let subjectHtml;
      if (prefixMatch) {
        const tag = prefixMatch[1];
        const rest = esc(subject.slice(prefixMatch[0].length).trim());
        subjectHtml = `<span class="git-commit-prefix ${tag}">${esc(prefixMatch[0])}</span> ${rest}`;
      } else {
        subjectHtml = esc(subject);
      }
      return `
        <li class="feed-item git-commit">
          <div class="feed-icon icon-git_commit">${iconSvg}</div>
          <div class="feed-body">
            <div class="feed-headline">
              <span class="action-badge action-git_commit">git commit</span>
              <span class="feed-entity-name">${esc(commit.hash)}</span>
            </div>
            <div class="git-commit-subject">${subjectHtml}</div>
          </div>
          <div class="feed-context"></div>
          <div class="feed-time" title="${esc(ts.toISOString())}">
            <span class="time-hhmm">${fmtTime(ts)}</span>
            <span class="time-date">${fmtDateShort(ts)}</span>
          </div>
        </li>`;
    }

    // ── Software update banner ─────────────────────────────────────────────────
    function buildSoftwareUpdateRow() {
      const cfg = window.RTS_CONFIG;
      if (!cfg?.buildVersion) return '';
      const seenKey = 'rts.history.seenBuild';
      const lastSeen = localStorage.getItem(seenKey);
      // Mark as seen so it dims after first view (still shown, just no "NEW" ring)
      const isNew = lastSeen !== cfg.buildVersion;
      if (isNew) localStorage.setItem(seenKey, cfg.buildVersion);

      const buildDate = cfg.buildDate ? new Date(cfg.buildDate + 'T12:00:00') : new Date();
      const iconSvg = ACTION_SVGS.software_update;
      const note = esc(cfg.buildNote || 'Software updated');
      const ver  = esc(cfg.buildVersion);
      const newBadge = isNew ? `<span style="display:inline-block;background:#f59e0b;color:#fff;font-size:.62rem;font-weight:800;padding:1px 7px;border-radius:8px;letter-spacing:.4px;text-transform:uppercase;margin-left:4px">NEW</span>` : '';
      return `
        <li class="feed-item software-update">
          <div class="feed-icon icon-software_update">${iconSvg}</div>
          <div class="feed-body">
            <div class="feed-headline">
              <span class="action-badge action-software_update">software update</span>
              <span class="feed-entity-name">v${ver}</span>
              ${newBadge}
            </div>
            <div class="feed-meta">${note}</div>
          </div>
          <div class="feed-context"></div>
          <div class="feed-time">
            <span class="time-hhmm">${fmtTime(buildDate)}</span>
            <span class="time-date">${fmtDateShort(buildDate)}</span>
          </div>
        </li>`;
    }

    // ── Feed rendering ─────────────────────────────────────────────────────────
    function renderFeed(logs) {
      const container = document.getElementById('feedContainer');
      const showCommits = document.getElementById('toggleCommits')?.checked !== false;

      // Merge audit logs + git commits into one sorted array (newest first)
      const combined = [...logs.map(l => ({ type: 'log', ts: new Date(l.created_at), data: l }))];
      if (showCommits) {
        // Filter commits to date range of current logs page OR show all if no logs
        const logStart = logs.length ? new Date(logs[logs.length - 1].created_at) : null;
        const logEnd   = logs.length ? new Date(logs[0].created_at) : null;
        gitCommits.forEach(c => {
          const ct = new Date(c.date);
          // Always include if no logs; otherwise include if commit falls in the displayed date window
          if (!logStart || (ct >= logStart && ct <= new Date(logEnd.getTime() + 86400000))) {
            combined.push({ type: 'commit', ts: ct, data: c });
          }
        });
      }
      combined.sort((a, b) => b.ts - a.ts);

      if (!combined.length) {
        container.innerHTML = '<div class="empty-state"><div style="display:flex;justify-content:center;margin-bottom:12px"><svg width="52" height="52" viewBox="0 0 20 20" fill="none" stroke="#c0c4cc" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13h4l2 3h4l2-3h4"/><path d="M2 13V5a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v8"/></svg></div><h5 class="mt-0">No activity found</h5><p>Try adjusting the filters above.</p></div>';
        return;
      }

      let html = '<ul class="timeline-feed">';
      // Always show the software update banner at the top
      html += buildSoftwareUpdateRow();
      let lastDay = null;

      for (const entry of combined) {
        const ts = entry.ts;
        const dk = dayKey(ts);
        if (dk !== lastDay) {
          lastDay = dk;
          html += `<li class="day-divider"><span>${esc(fmtDayHeading(ts))}</span></li>`;
        }
        if (entry.type === 'commit') {
          html += buildCommitRow(entry.data);
          continue;
        }
        const log = entry.data;

        const iconSvg    = ACTION_SVGS[log.action] || ACTION_SVGS_DEFAULT;
        const entityName = esc(log.entity_name || log.entity_id || '—');
        const linkFn     = log.entity_type !== 'user' && ENTITY_LINKS[log.entity_type];
        const nameHtml   = linkFn
          ? `<a href="${linkFn()}" class="feed-entity-name">${entityName}</a>`
          : `<span class="feed-entity-name">${entityName}</span>`;

        const metaParts = [];
        if (log.performed_by_name || log.performed_by_user_id) {
          metaParts.push(`by <strong>${esc(log.performed_by_name || log.performed_by_user_id)}</strong>`);
        }

        // Context column: event badge + short entity ID
        const ctxParts = [];
        if (log.event_name || log.event_id) {
          ctxParts.push(`<span class="event-badge">${esc(log.event_name || log.event_id)}</span>`);
        }
        // Show entity_id only when it's a human-readable code (not a long UUID)
        const eid = log.entity_id || '';
        if (eid && eid !== log.entity_name && eid.length < 20 && !/^[0-9a-f]{8}-/i.test(eid)) {
          ctxParts.push(`<span class="entity-id-hint">${esc(eid)}</span>`);
        }

        const detailHtml = renderDetails(log);

        html += `
          <li class="feed-item">
            <div class="feed-icon icon-${esc(log.action)}">${iconSvg}</div>
            <div class="feed-body">
              <div class="feed-headline">
                <span class="action-badge action-${esc(log.action)}">${esc(log.action.replace(/_/g,' '))}</span>
                <span class="entity-badge">${esc(log.entity_type.replace(/_/g,' '))}</span>
                ${nameHtml}
              </div>
              ${metaParts.length ? `<div class="feed-meta">${metaParts.join(' ')}</div>` : ''}
              ${detailHtml}
            </div>
            <div class="feed-context">${ctxParts.join('')}</div>
            <div class="feed-time" title="${esc(ts.toISOString())}">
              <span class="time-hhmm">${fmtTime(ts)}</span>
              <span class="time-date">${fmtDateShort(ts)}</span>
            </div>
          </li>`;
      }

      html += '</ul>';
      container.innerHTML = html;
    }

    // ── Pagination ─────────────────────────────────────────────────────────────
    function renderPagination() {
      const row = document.getElementById('paginationRow');
      const totalPages  = Math.ceil(currentTotal / LIMIT);
      const currentPage = Math.floor(currentOffset / LIMIT);
      if (totalPages <= 1) { row.innerHTML = ''; return; }
      row.innerHTML =
        `<button class="btn btn-sm btn-outline-secondary" ${currentPage === 0 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">‹ Prev</button>` +
        `<span style="font-size:.8rem;color:#5f6368;">Page ${currentPage + 1} of ${totalPages}</span>` +
        `<button class="btn btn-sm btn-outline-secondary" ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">Next ›</button>`;
    }

    function goPage(page) { loadLogs(currentParams, page * LIMIT); }

    // ── Load logs ──────────────────────────────────────────────────────────────
    async function loadLogs(params = {}, offset = 0) {
      const container = document.getElementById('feedContainer');
      container.innerHTML = '<div class="text-center py-4 text-muted"><div class="spinner-border spinner-border-sm"></div></div>';

      const q = new URLSearchParams();
      if (params.entity_type) q.set('entity_type', params.entity_type);
      if (params.entity_id)   q.set('entity_id',   params.entity_id);
      if (params.action)      q.set('action',       params.action);
      if (params.from)        q.set('from', params.from + 'T00:00:00Z');
      if (params.to)          q.set('to',   params.to   + 'T23:59:59Z');
      q.set('limit',  LIMIT);
      q.set('offset', offset);

      try {
        const resp   = await fetch(`${API}/activity-log?${q}`, { headers: authHeaders() });
        if (!resp.ok) { container.innerHTML = '<div class="alert alert-danger m-3">Failed to load logs.</div>'; return; }
        const result = await resp.json();
        // `total` from updated server; fall back to `count` for safety
        const total  = result.total ?? result.count ?? 0;
        currentTotal  = total;
        currentOffset = offset;
        lastLogs = result.logs || [];
        renderFeed(lastLogs);
        renderPagination();
        const pageEnd = offset + (result.logs?.length || 0);
        const range   = total > LIMIT ? ` (showing ${offset + 1}–${pageEnd})` : '';
        document.getElementById('logCount').textContent = `${total} result${total !== 1 ? 's' : ''}${range}`;
      } catch (e) {
        container.innerHTML = '<div class="alert alert-danger m-3">Error: ' + e.message + '</div>';
      }
    }

    // ── Stats bar (today's system-wide numbers) ────────────────────────────────
    async function loadStats() {
      try {
        const now      = new Date();
        const todayStr = now.toISOString().slice(0, 10);
        const yest     = new Date(now); yest.setDate(now.getDate() - 1);
        const yestStr  = yest.toISOString().slice(0, 10);
        const dow      = now.getDay();
        const monday   = new Date(now);
        monday.setDate(now.getDate() - (dow === 0 ? 6 : dow - 1));
        monday.setHours(0, 0, 0, 0);

        const [todayResp, yestResp, weekResp] = await Promise.all([
          fetch(`${API}/activity-log?from=${todayStr}T00:00:00Z&to=${todayStr}T23:59:59Z&limit=500`, { headers: authHeaders() }),
          fetch(`${API}/activity-log?from=${yestStr}T00:00:00Z&to=${yestStr}T23:59:59Z&limit=500`,   { headers: authHeaders() }),
          fetch(`${API}/activity-log?from=${monday.toISOString()}&limit=1`, { headers: authHeaders() }),
        ]);
        const todayData = await todayResp.json();
        const yestData  = await yestResp.json();
        const weekData  = await weekResp.json();

        const todayLogs   = todayData.logs || [];
        const yestLogs    = yestData.logs  || [];
        const loginsToday = todayLogs.filter(l => l.action === 'login').length;
        const loginsYest  = yestLogs.filter(l =>  l.action === 'login').length;
        const totalToday  = todayData.total ?? todayData.count ?? 0;
        const totalYest   = yestData.total  ?? yestData.count  ?? 0;
        const uniqueToday = new Set(todayLogs.map(l => l.performed_by_user_id || l.performed_by_name).filter(Boolean)).size;
        const uniqueYest  = new Set(yestLogs.map(l =>  l.performed_by_user_id || l.performed_by_name).filter(Boolean)).size;
        const actionsWeek = weekData.total  ?? weekData.count  ?? 0;

        document.getElementById('statLogins').textContent = loginsToday;
        document.getElementById('statTotal').textContent  = totalToday;
        document.getElementById('statWeek').textContent   = actionsWeek;
        document.getElementById('statUsers').textContent  = uniqueToday;
        setTrend('trendLogins', loginsToday, loginsYest);
        setTrend('trendTotal',  totalToday,  totalYest);
        setTrend('trendUsers',  uniqueToday, uniqueYest);
      } catch (e) {
        console.warn('Stats bar failed:', e);
      }
    }

    function setTrend(elId, todayVal, yestVal) {
      const el = document.getElementById(elId);
      if (!el) return;
      if (yestVal === 0 && todayVal === 0) { el.textContent = ''; return; }
      if (yestVal === 0) { el.innerHTML = '<span class="trend-up">Active today</span>'; return; }
      const pct = Math.round(((todayVal - yestVal) / yestVal) * 100);
      if (Math.abs(pct) < 5) { el.innerHTML = '<span class="trend-flat">same as yesterday</span>'; return; }
      const up = pct > 0;
      el.innerHTML = `<span class="${up ? 'trend-up' : 'trend-down'}">${up ? '↑' : '↓'} ${Math.abs(pct)}% vs yesterday</span>`;
    }

    // ── 7-day activity chart ───────────────────────────────────────────────────
    async function loadChart() {
      try {
        const now  = new Date();
        const from = new Date(now);
        from.setDate(now.getDate() - 6); from.setHours(0, 0, 0, 0);

        const resp = await fetch(`${API}/activity-log?from=${from.toISOString()}&limit=1000`, { headers: authHeaders() });
        const data = await resp.json();
        const logs = data.logs || [];

        // Build day buckets for last 7 days
        const dayMap = {};
        for (let i = 6; i >= 0; i--) {
          const d = new Date(now); d.setDate(now.getDate() - i); d.setHours(12, 0, 0, 0);
          dayMap[dayKey(d)] = { date: d, actions: {}, total: 0 };
        }
        for (const log of logs) {
          const k = dayKey(new Date(log.created_at));
          if (!dayMap[k]) continue;
          dayMap[k].actions[log.action] = (dayMap[k].actions[log.action] || 0) + 1;
          dayMap[k].total++;
        }

        const ACTION_COLORS = {
          created: '#4ade80', updated: '#60a5fa', packed: '#fb923c', unpacked: '#f87171',
          login: '#34d399', logout: '#fb7185', returned: '#6ee7b7', checked_out: '#fbbf24',
          note_added: '#a78bfa', mileage_added: '#93c5fd', used: '#fdba74', retired: '#d1d5db',
        };
        const CLR_DEFAULT = '#cbd5e1';
        const BAR_H = 80;
        const maxTotal = Math.max(1, ...Object.values(dayMap).map(d => d.total));

        let barsHtml = '';
        for (const dk of Object.keys(dayMap).sort()) {
          const day = dayMap[dk];
          const barH = Math.round((day.total / maxTotal) * BAR_H);
          const isToday = dayKey(new Date()) === dk;
          const label = isToday ? 'Today' : day.date.toLocaleDateString('en-GB', { weekday: 'short' });
          let segs = '';
          for (const [a, c] of Object.entries(day.actions).sort((x, y) => y[1] - x[1])) {
            const h = Math.round((c / maxTotal) * BAR_H);
            segs += `<div class="chart-bar-seg" style="height:${h}px;background:${ACTION_COLORS[a] || CLR_DEFAULT}" title="${esc(a)}: ${c}"></div>`;
          }
          barsHtml += `
            <div class="chart-col">
              <div class="chart-day-count">${day.total || ''}</div>
              <div class="chart-bar-stack" style="height:${Math.max(barH, 2)}px;">${segs}</div>
              <div class="chart-day-label" style="${isToday ? 'color:#1a73e8;font-weight:700' : ''}">${label}</div>
            </div>`;
        }

        document.getElementById('chartBars').innerHTML = barsHtml ||
          '<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#9aa0a6">No data for this period</div>';

        // Legend — only action types that appear in the data (max 8)
        const usedActions = [...new Set(logs.map(l => l.action))].slice(0, 8);
        document.getElementById('chartLegend').innerHTML = usedActions.map(a =>
          `<span class="chart-legend-item"><span style="background:${ACTION_COLORS[a] || CLR_DEFAULT}"></span>${esc(a.replace(/_/g,' '))}</span>`
        ).join('');
      } catch (e) {
        console.warn('Chart load failed:', e);
      }
    }

    // ── Filters ────────────────────────────────────────────────────────────────
    function getFilters() {
      return {
        entity_type: document.getElementById('fEntityType').value,
        action:      document.getElementById('fAction').value,
        entity_id:   document.getElementById('fEntityId').value.trim(),
        from:        document.getElementById('fFrom').value,
        to:          document.getElementById('fTo').value,
      };
    }

    document.getElementById('btnFilter').addEventListener('click', () => {
      currentParams = getFilters();
      loadLogs(currentParams, 0);
    });

    document.getElementById('btnClear').addEventListener('click', () => {
      ['fEntityType','fAction','fEntityId','fFrom','fTo'].forEach(id => {
        document.getElementById(id).value = '';
      });
      currentParams = {};
      loadLogs({}, 0);
    });

    document.getElementById('fEntityId').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btnFilter').click();
    });

    // ── CSV Export ─────────────────────────────────────────────────────────────
    document.getElementById('btnExportCsv').addEventListener('click', async () => {
      const q = new URLSearchParams();
      if (currentParams.entity_type) q.set('entity_type', currentParams.entity_type);
      if (currentParams.entity_id)   q.set('entity_id',   currentParams.entity_id);
      if (currentParams.action)      q.set('action',       currentParams.action);
      if (currentParams.from)        q.set('from', currentParams.from + 'T00:00:00Z');
      if (currentParams.to)          q.set('to',   currentParams.to   + 'T23:59:59Z');
      q.set('limit', 500);
      q.set('offset', 0);
      const resp   = await fetch(`${API}/activity-log?${q}`, { headers: authHeaders() });
      const result = await resp.json();
      const rows   = (result.logs || []).map(l => [
        l.id, l.entity_type, l.entity_name || l.entity_id,
        l.action, l.performed_by_name || '', l.event_name || '',
        new Date(l.created_at).toLocaleString('en-GB'), JSON.stringify(l.details || {})
      ]);
      rows.unshift(['id','entity_type','entity_name','action','performed_by','event','timestamp','details']);
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
      const a   = document.createElement('a');
      a.href    = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
      a.download = 'activity-log-' + new Date().toISOString().slice(0, 10) + '.csv';
      a.click();
    });

    // ── Deep-link from other pages ─────────────────────────────────────────────
    const urlParams = new URLSearchParams(location.search);
    if (urlParams.get('entity_id')) {
      document.getElementById('fEntityId').value = urlParams.get('entity_id');
      if (urlParams.get('entity_type')) document.getElementById('fEntityType').value = urlParams.get('entity_type');
      currentParams = getFilters();
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    document.getElementById('toggleCommits').addEventListener('change', () => {
      renderFeed(lastLogs);
    });

    let lastLogs = [];

    loadStats();
    loadChart();
    loadGitCommits().then(() => loadLogs(currentParams, 0));
  </script>
</body>
</html>
