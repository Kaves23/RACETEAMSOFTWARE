<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Compliance & Scrutineering</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css?v=20260420" rel="stylesheet" />
  <style>
    #compTbody td, #compTbody th { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    /* Dropzone highlight for doc uploads */
    .comp-dropzone { border: 1px dashed rgba(255,255,255,0.2); border-radius: 4px; padding: 6px; }
    .comp-dropzone.dragover { border-color: var(--rts-accent); background: rgba(166,77,255,0.08); }
    /* Inline-edit visual cues */
    .comp-line-edit input.form-control.form-control-sm { min-width: 140px; }
    .comp-line-edit select.form-select.form-select-sm { min-width: 120px; }
  </style>
</head>
<body>
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <h1 class="my-3">Compliance & Scrutineering</h1>

    <div class="mlo-shell" id="compShell">
      <!-- LEFT -->
      <section class="mlo-pane mlo-pane-left" aria-label="Compliance navigation">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Register</div>
            <span class="badge text-bg-secondary" id="compCountBadge">0</span>
          </div>
        </div>
        <div class="mlo-pane-content">
          <div class="mlo-section-label">Filters</div>
          <ul class="mlo-tree pastel-tree" id="compFilterList">
            <li class="active" data-filter="">All</li>
            <li data-filter="expiring">Expiring</li>
            <li data-filter="expired">Expired</li>
            <li data-filter="critical">Critical</li>
            <li data-filter="vehicle">Vehicle</li>
            <li data-filter="safety">Safety</li>
          </ul>

          <div class="mlo-section-label mt-3">Checklists</div>
          <ul class="mlo-tree pastel-tree" id="chkList"></ul>
        </div>
      </section>

      <div class="mlo-resizer" data-resize="left" title="Drag to resize"></div>

      <!-- MIDDLE -->
      <section class="mlo-pane mlo-pane-mid" aria-label="Compliance list">
        <div class="mlo-pane-header">
          <div class="d-flex align-items-center flex-nowrap gap-1" style="overflow:hidden;">
            <input id="compSearch" type="text" class="form-control form-control-sm" placeholder="Search…" style="flex:1 1 180px; min-width:160px; max-width:220px;">
            <select id="compCategory" class="form-select form-select-sm" style="flex:1 1 180px; min-width:150px; max-width:200px;">
              <option value="">Category: All</option>
            </select>
            <select id="compStatus" class="form-select form-select-sm" style="flex:0 1 160px; min-width:140px; max-width:180px;">
              <option value="">Status: All</option>
              <option>Valid</option>
              <option>Expiring</option>
              <option>Expired</option>
              <option>Out of Service</option>
            </select>
            <button class="btn btn-sm btn-outline-light mlo-btn" id="btnAddComp" type="button" style="white-space:nowrap;">Add Item</button>
            <button class="btn btn-sm btn-outline-light mlo-btn" id="btnExportComp" type="button" title="Export compliance register as JSON">Export</button>
            <button class="btn btn-sm btn-outline-light mlo-btn" id="btnImportComp" type="button" title="Import compliance register from JSON">Import</button>
            <input id="compImportFile" type="file" accept="application/json" style="display:none;" />
          </div>
        </div>
        <div class="mlo-pane-content" style="padding:0;">
          <table class="table table-dark table-hover mlo-table" style="margin:0;">
            <thead>
              <tr>
                <th style="width:60px;">#</th>
                <th>Name</th>
                <th style="width:160px;">Type</th>
                <th style="width:140px;">Status</th>
                <th style="width:150px;">Expires</th>
                <th style="width:150px;">Linked</th>
              </tr>
            </thead>
            <tbody id="compTbody"></tbody>
          </table>
          <!-- Bottom half: documents & line items for selected compliance entry -->
          <div class="mlo-subpane-bottom border-top border-secondary" style="padding:0.5rem 0.75rem;">
            <div class="row g-2">
              <div class="col-6">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="mlo-title">Documents</div>
                  <div class="d-flex gap-1 align-items-center">
                    <button class="btn btn-sm btn-outline-light mlo-btn" id="btnAddCompDocs" type="button">Upload Documents</button>
                    <button class="btn btn-sm btn-outline-light mlo-btn" id="btnDriveCompDocs" type="button">Attach from Drive</button>
                    <input id="compDocFiles" type="file" multiple style="display:none;" />
                  </div>
                </div>
                <div id="compDocDropzone" class="comp-dropzone">
                  <div id="compDocList" class="list-group list-group-flush mt-2" style="max-height:180px; overflow:auto;"></div>
                  <div class="text-secondary small mt-1">Drag & drop files here to upload</div>
                </div>
              </div>
              <div class="col-6">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="mlo-title">Line Items</div>
                  <div class="d-flex gap-1 align-items-center" style="width:100%;">
                    <input id="compLineDesc" class="form-control form-control-sm" type="text" placeholder="Description" style="flex:1 1 auto;">
                    <select id="compLineStatus" class="form-select form-select-sm" style="flex:0 1 140px;">
                      <option>OK</option>
                      <option>WARN</option>
                      <option>FAIL</option>
                    </select>
                    <button class="btn btn-sm btn-outline-light mlo-btn" id="btnAddCompLine" type="button">Add</button>
                    <button class="btn btn-sm btn-outline-light mlo-btn" id="btnApplyCompTemplate" type="button" title="Insert checklist items based on Category/Type">Apply Template</button>
                  </div>
                </div>
                <table class="table table-dark table-hover table-sm mt-2" style="margin:0;">
                  <thead>
                    <tr>
                      <th style="width:40px;">#</th>
                      <th>Description</th>
                      <th style="width:120px;">Status</th>
                      <th style="width:60px;"></th>
                    </tr>
                  </thead>
                  <tbody id="compLineTbody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div class="mlo-resizer" data-resize="right" title="Drag to resize"></div>

      <!-- RIGHT -->
      <section class="mlo-pane mlo-pane-right mlo-inspector" aria-label="Compliance inspector">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Inspector</div>
            <span class="badge text-bg-secondary" id="compInspectorBadge">No selection</span>
          </div>
        </div>
        <div class="mlo-pane-content">
          <form id="compForm" autocomplete="off">
            <ul class="nav nav-tabs nav-dark mb-2" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-comp-details" data-bs-toggle="tab" data-bs-target="#pane-comp-details" type="button" role="tab" aria-controls="pane-comp-details" aria-selected="true">Details</button>
              </li>
            </ul>
            <div class="tab-content">
              <div class="tab-pane fade show active" id="pane-comp-details" role="tabpanel" aria-labelledby="tab-comp-details">
                <div class="row g-2">
              <div class="col-6">
                <label class="form-label">Name / Label</label>
                <input id="f_comp_name" class="form-control form-control-sm" type="text" placeholder="Spill kit #1">
              </div>
              <div class="col-6">
                <label class="form-label">Category</label>
                <select id="f_comp_category" class="form-select form-select-sm"></select>
              </div>

              <div class="col-6">
                <label class="form-label">Type</label>
                <input id="f_comp_type" class="form-control form-control-sm" type="text" placeholder="Fire extinguisher / Calibration / ...">
              </div>
              <div class="col-6">
                <label class="form-label">Status</label>
                <select id="f_comp_status" class="form-select form-select-sm">
                  <option>Valid</option>
                  <option>Expiring</option>
                  <option>Expired</option>
                  <option>Out of Service</option>
                </select>
              </div>

              <div class="col-6">
                <label class="form-label">Issued at</label>
                <input id="f_comp_issue" class="form-control form-control-sm" type="date">
              </div>
              <div class="col-6">
                <label class="form-label">Expires at</label>
                <input id="f_comp_expiry" class="form-control form-control-sm" type="date">
              </div>

              <div class="col-6">
                <label class="form-label">Linked asset</label>
                <input id="f_comp_asset" class="form-control form-control-sm" type="text" list="compAssetOptions" placeholder="Asset ID/name">
                <datalist id="compAssetOptions"></datalist>
              </div>
              <div class="col-6">
                <label class="form-label">Serial / Evidence</label>
                <input id="f_comp_serial" class="form-control form-control-sm" type="text" placeholder="Serial / certificate / photo link">
              </div>

              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea id="f_comp_notes" class="form-control form-control-sm" rows="3" placeholder="Evidence, verification, location, criticality"></textarea>
              </div>

              <div class="col-12 d-flex gap-1 mt-1">
                <button class="btn btn-sm btn-primary mlo-btn" id="btnSaveComp" type="button">Save</button>
                <button class="btn btn-sm btn-outline-light mlo-btn" id="btnDupComp" type="button">Duplicate</button>
                <button class="btn btn-sm btn-outline-danger mlo-btn" id="btnDelComp" type="button">Delete</button>
              </div>
            </div>
          </form>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script>
  (function(){
    RTS.setActiveNav();
    const LS_COMP = 'rts.compliance.v1';
    const LS_UI = 'rts.compliance.ui.v1';
    const LS_PANES = 'rts.compliance.panes.v1';

    const assetsStore = RTS.safeLoadJSON('rts.assets.v4', []);
    const ASSET_OPTIONS = Array.isArray(assetsStore) ? assetsStore.map(a=>({ id:a.id, label:a.name||a.id })) : [];
    const assetMap = new Map(ASSET_OPTIONS.map(a=>[String(a.id), a.label]));

    const CATEGORIES = ['Safety','Measurement','Regulatory','Vehicle','Tools','Fuel','Other'];

    function escapeHtml(str){ return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;').replace(/'/g,'&#39;'); }
    function nowISO(){ return new Date().toISOString(); }

    function seed(){
      const out = [];
      const names = ['Fire Extinguisher','Torque Wrench Calib','Spill Kit','Fuel Jug Spec','Seat Belts','Helmet Scrut','Brake Fluid'];
      for (let i=0;i<12;i++){
        const n = names[i % names.length];
        out.push({
          id: RTS.uid('comp'),
          name: `${n} ${i+1}`,
          category: CATEGORIES[i % CATEGORIES.length],
          type: n,
          status: (i%5===0)?'Expired':((i%3===0)?'Expiring':'Valid'),
          issuedAt: '2025-01-01',
          expiresAt: `2025-0${(i%8)+2}-15`,
          assetId: ASSET_OPTIONS[i % ASSET_OPTIONS.length]?.id || '',
          serial: `SN-${1000+i}`,
          notes: 'Evidence/ref in checklist',
          updatedAt: nowISO(),
          docs: [],
          lines: []
        });
      }
      return out;
    }

    let items = RTS.safeLoadJSON(LS_COMP, null);
    if (!Array.isArray(items) || items.length===0) items = seed();
    let ui = RTS.deepMerge({ filter:'', search:'', category:'', status:'', selectedId:null }, RTS.safeLoadJSON(LS_UI, {}));

    const el = {
      shell: document.getElementById('compShell'),
      count: document.getElementById('compCountBadge'),
      filterList: document.getElementById('compFilterList'),
      chkList: document.getElementById('chkList'),
      tbody: document.getElementById('compTbody'),
      search: document.getElementById('compSearch'),
      category: document.getElementById('compCategory'),
      status: document.getElementById('compStatus'),
      add: document.getElementById('btnAddComp'),
      inspectorBadge: document.getElementById('compInspectorBadge'),
      assetOptions: document.getElementById('compAssetOptions'),
      btnSave: document.getElementById('btnSaveComp'),
      btnDup: document.getElementById('btnDupComp'),
      btnDel: document.getElementById('btnDelComp'),
      // Bottom pane elements
      btnAddDocs: document.getElementById('btnAddCompDocs'),
      btnDriveDocs: document.getElementById('btnDriveCompDocs'),
      docFiles: document.getElementById('compDocFiles'),
      docDropzone: document.getElementById('compDocDropzone'),
      docList: document.getElementById('compDocList'),
      lineDesc: document.getElementById('compLineDesc'),
      lineStatus: document.getElementById('compLineStatus'),
      btnAddLine: document.getElementById('btnAddCompLine'),
      btnApplyTemplate: document.getElementById('btnApplyCompTemplate'),
      lineTbody: document.getElementById('compLineTbody'),
      f: {
        name: document.getElementById('f_comp_name'),
        category: document.getElementById('f_comp_category'),
        type: document.getElementById('f_comp_type'),
        status: document.getElementById('f_comp_status'),
        issue: document.getElementById('f_comp_issue'),
        expiry: document.getElementById('f_comp_expiry'),
        asset: document.getElementById('f_comp_asset'),
        serial: document.getElementById('f_comp_serial'),
        notes: document.getElementById('f_comp_notes')
      }
    };

    const LINE_TEMPLATES = {
      Safety: [
        { desc:'Fire extinguisher present & charged', status:'OK' },
        { desc:'Spill kit complete', status:'OK' },
        { desc:'First aid kit stocked', status:'OK' }
      ],
      Vehicle: [
        { desc:'Helmet scrutineering sticker', status:'OK' },
        { desc:'Seat belts condition', status:'OK' },
        { desc:'Fuel jug spec compliant', status:'OK' }
      ],
      Measurement: [
        { desc:'Torque wrench calibration certificate', status:'OK' },
        { desc:'Scales zero check', status:'OK' }
      ],
      Regulatory: [
        { desc:'Homologation documents attached', status:'OK' },
        { desc:'Event-specific forms completed', status:'OK' }
      ]
    };

    function applyTemplate(){
      const sel = items.find(x=>x.id===ui.selectedId);
      if (!sel) return;
      const base = LINE_TEMPLATES[sel.category] || [];
      const typed = (sel.type||'').toLowerCase().includes('tyre') ? [{ desc:'Tyre spec check', status:'OK' }] : [];
      const all = [...base, ...typed];
      sel.lines = Array.isArray(sel.lines) ? sel.lines : [];
      const existingDesc = new Set(sel.lines.map(l=>String(l.desc||'').toLowerCase()));
      all.forEach(x=>{
        if (!existingDesc.has(String(x.desc).toLowerCase())) sel.lines.push({ id: RTS.uid('line'), desc:x.desc, status:x.status });
      });
      persist();
      renderLines(sel);
    }

    function setupDocDnD(){
      if (!el.docDropzone) return;
      const dz = el.docDropzone;
      const onDrag = (e) => { e.preventDefault(); e.stopPropagation(); dz.classList.add('dragover'); };
      const onLeave = (e) => { e.preventDefault(); e.stopPropagation(); dz.classList.remove('dragover'); };
      const onDrop = (e) => {
        e.preventDefault(); e.stopPropagation(); dz.classList.remove('dragover');
        const files = e.dataTransfer?.files; if (files && files.length) addDocs(files);
      };
      ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, onDrag));
      ['dragleave','dragend','drop'].forEach(ev => dz.addEventListener(ev, onLeave));
      dz.addEventListener('drop', onDrop);
    }

    async function addDriveDocsViaPicker(){
      if (!(window.RTS && typeof window.RTS.pickDriveFiles === 'function')){ alert('Drive picker not available in this build.'); return; }
      const sel = items.find(x=>x.id===ui.selectedId);
      if (!sel) return;
      try{
        const picks = await window.RTS.pickDriveFiles({ multiple:true });
        if (!Array.isArray(picks) || picks.length===0) return;
        sel.docs = Array.isArray(sel.docs) ? sel.docs : [];
        picks.forEach(p => {
          sel.docs.push({ id: RTS.uid('doc'), name: p.name||p.title||'Drive file', mime: p.mimeType||'', size: p.sizeBytes||0, url: p.webViewLink||p.url||'' });
        });
        persist();
        renderDocs(sel);
      }catch(err){ console.warn('Drive picker failed', err); }
    }

    RTS.initTriPaneResizers(el.shell, LS_PANES);

    function persist(){
      RTS.safeSaveJSON(LS_COMP, items);
      RTS.safeSaveJSON(LS_UI, ui);
    }

    function buildFilters(){
      el.category.innerHTML = '<option value="">Category: All</option>' + CATEGORIES.map(c=>`<option>${c}</option>`).join('');
      el.f.category.innerHTML = CATEGORIES.map(c=>`<option>${c}</option>`).join('');
      el.assetOptions.innerHTML = ASSET_OPTIONS.map(a=>`<option value="${a.id}">${escapeHtml(a.label)}</option>`).join('');
    }

    function applyFilters(list){
      let out = list.slice();
      if (ui.filter==='expiring') out = out.filter(i=>i.status==='Expiring');
      if (ui.filter==='expired') out = out.filter(i=>i.status==='Expired');
      if (ui.filter==='critical') out = out.filter(i=>i.category==='Safety' || i.type?.toLowerCase().includes('scrut'));
      if (ui.filter==='vehicle') out = out.filter(i=>i.category==='Vehicle');
      if (ui.filter==='safety') out = out.filter(i=>i.category==='Safety');
      if (ui.category) out = out.filter(i=>i.category===ui.category);
      if (ui.status) out = out.filter(i=>i.status===ui.status);
      if (ui.search){
        const q = ui.search.toLowerCase();
        out = out.filter(i => (`${i.name} ${i.type} ${i.category} ${i.serial}`).toLowerCase().includes(q));
      }
      return out;
    }

    function render(){
      el.search.value = ui.search || '';
      el.category.value = ui.category || '';
      el.status.value = ui.status || '';

      const filtered = applyFilters(items);
      el.count.textContent = String(filtered.length);

      el.tbody.innerHTML = '';
      let idx=0;
      filtered.forEach(i=>{
        idx++;
        const tr = document.createElement('tr');
        tr.dataset.id = i.id;
        if (ui.selectedId===i.id) tr.classList.add('mlo-row-selected');
        tr.innerHTML = `
          <td>${idx}</td>
          <td>${escapeHtml(i.name||'')}</td>
          <td>${escapeHtml(i.type||'')}</td>
          <td>${escapeHtml(i.status||'')}</td>
          <td>${escapeHtml(i.expiresAt||'')}</td>
          <td>${escapeHtml(assetMap.get(String(i.assetId))||'')}</td>
        `;
        tr.addEventListener('click', ()=>{ ui.selectedId = i.id; render(); });
        el.tbody.appendChild(tr);
      });

      hydrate(items.find(x=>x.id===ui.selectedId) || null);
      persist();
    }

    function hydrate(i){
      if (!i){
        el.inspectorBadge.textContent = 'No selection';
        Object.values(el.f).forEach(f=> f.value='');
        if (el.docList) el.docList.innerHTML = '';
        if (el.lineTbody) el.lineTbody.innerHTML = '';
        return;
      }
      el.inspectorBadge.textContent = i.name || i.id;
      el.f.name.value = i.name || '';
      el.f.category.value = i.category || CATEGORIES[0];
      el.f.type.value = i.type || '';
      el.f.status.value = i.status || 'Valid';
      el.f.issue.value = i.issuedAt || '';
      el.f.expiry.value = i.expiresAt || '';
      el.f.asset.value = i.assetId || '';
      el.f.serial.value = i.serial || '';
      el.f.notes.value = i.notes || '';
      // Ensure arrays exist
      i.docs = Array.isArray(i.docs) ? i.docs : [];
      i.lines = Array.isArray(i.lines) ? i.lines : [];
      renderDocs(i);
      renderLines(i);
    }
    function renderDocs(i){
      if (!el.docList) return;
      el.docList.innerHTML = '';
      if (!i || !Array.isArray(i.docs) || i.docs.length===0){
        const empty = document.createElement('div');
        empty.className = 'text-secondary';
        empty.style.fontSize = '0.85rem';
        empty.textContent = 'No documents uploaded.';
        el.docList.appendChild(empty);
        return;
      }
      i.docs.forEach((d, idx) => {
        const row = document.createElement('div');
        row.className = 'list-group-item d-flex justify-content-between align-items-center';
        row.innerHTML = `<div class="text-truncate" style="max-width:70%;"><a href="#" class="link-light text-decoration-none" data-open="${d.id}">${escapeHtml(d.name||'')}</a></div>
                         <div class="text-secondary small">${escapeHtml(d.mime||'')} • ${d.size||0} bytes</div>
                         <button class="btn btn-sm btn-outline-danger" data-docid="${d.id}">Delete</button>`;
        const link = row.querySelector('a[data-open]');
        link.addEventListener('click', (e)=>{
          e.preventDefault(); e.stopPropagation();
          const url = d.url || d.dataUrl || '';
          if (url) window.open(url, '_blank', 'noopener');
        });
        const btn = row.querySelector('button[data-docid]');
        btn.addEventListener('click', ()=>{
          i.docs = i.docs.filter(x=>x.id!==d.id);
          persist();
          renderDocs(i);
        });
        el.docList.appendChild(row);
      });
    }

    function addDocs(files){
      const sel = items.find(x=>x.id===ui.selectedId);
      if (!sel || !files || files.length===0) return;
      const list = Array.from(files);
      let pending = list.length;
      list.forEach(f => {
        const reader = new FileReader();
        reader.onload = () => {
          sel.docs.push({ id: RTS.uid('doc'), name: f.name, mime: f.type, size: f.size, dataUrl: reader.result });
          pending -= 1;
          if (pending===0){ persist(); renderDocs(sel); }
        };
        reader.onerror = () => {
          sel.docs.push({ id: RTS.uid('doc'), name: f.name, mime: f.type, size: f.size });
          pending -= 1;
          if (pending===0){ persist(); renderDocs(sel); }
        };
        // Read small files inline; for large ones this may exceed localStorage
        try { reader.readAsDataURL(f); } catch(err){ reader.onerror(); }
      });
    }

    function renderLines(i){
      if (!el.lineTbody) return;
      el.lineTbody.innerHTML = '';
      if (!i || !Array.isArray(i.lines) || i.lines.length===0){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="4" class="text-secondary">No line items.</td>`;
        el.lineTbody.appendChild(tr);
        return;
      }
      i.lines.forEach((ln, idx) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${idx+1}</td>
                        <td class="text-truncate" data-edit="desc">${escapeHtml(ln.desc||'')}</td>
                        <td data-edit="status">${escapeHtml(ln.status||'')}</td>
                        <td><button class="btn btn-sm btn-outline-danger" data-del="${ln.id}">Del</button></td>`;
        const btn = tr.querySelector('button[data-del]');
        btn.addEventListener('click', ()=>{
          i.lines = i.lines.filter(x=>x.id!==ln.id);
          persist();
          renderLines(i);
        });
        // Inline edit handlers
        const descCell = tr.querySelector('[data-edit="desc"]');
        const statusCell = tr.querySelector('[data-edit="status"]');
        if (descCell){
          descCell.addEventListener('click', ()=>{
            const cur = ln.desc||'';
            descCell.innerHTML = '';
            const inp = document.createElement('input');
            inp.className = 'form-control form-control-sm'; inp.value = cur; descCell.classList.add('comp-line-edit');
            descCell.appendChild(inp); inp.focus();
            const commit = () => { ln.desc = inp.value.trim()||cur; persist(); renderLines(i); };
            inp.addEventListener('blur', commit);
            inp.addEventListener('keydown', (e)=>{ if (e.key==='Enter') commit(); });
          });
        }
        if (statusCell){
          statusCell.addEventListener('click', ()=>{
            const cur = ln.status||'OK';
            statusCell.innerHTML = '';
            const sel = document.createElement('select'); sel.className = 'form-select form-select-sm';
            ['OK','WARN','FAIL'].forEach(s=>{ const o=document.createElement('option'); o.textContent=s; if (s===cur) o.selected=true; sel.appendChild(o); });
            statusCell.classList.add('comp-line-edit'); statusCell.appendChild(sel); sel.focus();
            const commit = () => { ln.status = sel.value||cur; persist(); renderLines(i); };
            sel.addEventListener('blur', commit);
            sel.addEventListener('change', commit);
            sel.addEventListener('keydown', (e)=>{ if (e.key==='Enter') commit(); });
          });
        }
        el.lineTbody.appendChild(tr);
      });
    }

    function addLine(){
      const sel = items.find(x=>x.id===ui.selectedId);
      if (!sel) return;
      const desc = (el.lineDesc?.value||'').trim();
      const status = (el.lineStatus?.value||'OK');
      if (!desc) return;
      sel.lines = Array.isArray(sel.lines) ? sel.lines : [];
      sel.lines.push({ id: RTS.uid('line'), desc, status });
      el.lineDesc.value = '';
      persist();
      renderLines(sel);
    }

    function readInspector(){
      const i = items.find(x=>x.id===ui.selectedId);
      if (!i) return;
      i.name = el.f.name.value.trim() || i.name;
      i.category = el.f.category.value;
      i.type = el.f.type.value.trim();
      i.status = el.f.status.value;
      i.issuedAt = el.f.issue.value;
      i.expiresAt = el.f.expiry.value;
      i.assetId = el.f.asset.value;
      i.serial = el.f.serial.value.trim();
      i.notes = el.f.notes.value;
      i.updatedAt = nowISO();
      persist();
      render();
    }

    function addItem(){
      const id = RTS.uid('comp');
      const i = {
        id,
        name:`Compliance ${items.length+1}`,
        category:CATEGORIES[0],
        type:'',
        status:'Valid',
        issuedAt:'',
        expiresAt:'',
        assetId:'',
        serial:'',
        notes:'',
        updatedAt: nowISO()
      };
      items.unshift(i);
      ui.selectedId = id;
      render();
    }

    function duplicateItem(){
      const src = items.find(x=>x.id===ui.selectedId);
      if (!src) return;
      const copy = JSON.parse(JSON.stringify(src));
      copy.id = RTS.uid('comp');
      copy.name = `${src.name} (Copy)`;
      copy.status = 'Valid';
      items.unshift(copy);
      ui.selectedId = copy.id;
      render();
    }

    function deleteItem(){
      const idx = items.findIndex(x=>x.id===ui.selectedId);
      if (idx<0) return;
      items.splice(idx,1);
      ui.selectedId = items[0]?.id || null;
      render();
    }

    function buildChecklists(){
      el.chkList.innerHTML = '';
      const checks = [
        { id:'chk-ktm', name:'Kart Scrutineering – OK-J' },
        { id:'chk-tyres', name:'Tyre Spec Check' },
        { id:'chk-fuel', name:'Fuel / Oil Spec' }
      ];
      checks.forEach(c=>{
        const li = document.createElement('li');
        li.textContent = c.name;
        li.dataset.id = c.id;
        el.chkList.appendChild(li);
      });
    }

    function bind(){
      el.filterList.addEventListener('click', (e)=>{
        const li = e.target.closest('li[data-filter]');
        if (!li) return;
        el.filterList.querySelectorAll('li').forEach(x=>x.classList.remove('active'));
        li.classList.add('active');
        ui.filter = li.dataset.filter || '';
        render();
      });
      el.search.addEventListener('input', ()=>{ ui.search = el.search.value; render(); });
      el.category.addEventListener('change', ()=>{ ui.category = el.category.value; render(); });
      el.status.addEventListener('change', ()=>{ ui.status = el.status.value; render(); });
      el.add.addEventListener('click', addItem);
      el.btnSave.addEventListener('click', readInspector);
      el.btnDup.addEventListener('click', duplicateItem);
      // Use modal-backed async confirmation for delete (falls back to window.confirm)
      el.btnDel.addEventListener('click', async (e)=>{
        const msg = 'Delete selected compliance item? This cannot be undone.';
        let ok = false;
        try{
          if (window.RTS && typeof window.RTS.confirmPrompt === 'function') {
            ok = await window.RTS.confirmPrompt(msg);
          } else {
            ok = window.confirm(msg);
          }
        }catch(err){ ok = window.confirm(msg); }
        if (ok) deleteItem();
      });
      if (el.btnAddDocs && el.docFiles){
        el.btnAddDocs.addEventListener('click', ()=> el.docFiles.click());
        el.docFiles.addEventListener('change', (e)=>{
          addDocs(e.target.files);
          e.target.value = '';
        });
      }
      if (el.btnDriveDocs){
        el.btnDriveDocs.addEventListener('click', addDriveDocsViaPicker);
      }
      setupDocDnD();
      if (el.btnAddLine){
        el.btnAddLine.addEventListener('click', addLine);
      }
      if (el.btnApplyTemplate){
        el.btnApplyTemplate.addEventListener('click', applyTemplate);
      }
      const btnExport = document.getElementById('btnExportComp');
      const btnImport = document.getElementById('btnImportComp');
      const fileImport = document.getElementById('compImportFile');
      if (btnExport){
        btnExport.addEventListener('click', ()=>{
          try {
            const blob = new Blob([JSON.stringify(items, null, 2)], { type:'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `compliance_${new Date().toISOString().slice(0,10)}.json`;
            document.body.appendChild(a); a.click();
            setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 0);
          } catch(_e){}
        });
      }
      if (btnImport && fileImport){
        btnImport.addEventListener('click', ()=> fileImport.click());
        fileImport.addEventListener('change', (e)=>{
          try {
            const f = e.target.files && e.target.files[0]; if (!f) return; const reader = new FileReader();
            reader.onload = () => {
              try {
                const data = JSON.parse(String(reader.result||'[]'));
                if (Array.isArray(data)){ items = data; ui.selectedId = items[0]?.id || null; render(); }
              } catch(_e){ alert('Invalid JSON file.'); }
            };
            reader.readAsText(f);
          } finally {
            e.target.value = '';
          }
        });
      }
    }

    function init(){
      buildFilters();
      buildChecklists();
      bind();
      render();
      if (!ui.selectedId && items[0]) { ui.selectedId = items[0].id; render(); }
    }
    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
