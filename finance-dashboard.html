<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Finance Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); }
    .fin-kpi-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:20px; }
    .fin-kpi       { background:#fff; border:1px solid rgba(0,0,0,.1); border-radius:8px; padding:14px 16px; box-shadow:0 2px 4px rgba(0,0,0,.06); }
    .fin-kpi-label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#6c757d; margin-bottom:4px; }
    .fin-kpi-value { font-size:1.6rem; font-weight:700; color:#1a1d24; line-height:1.1; }
    .fin-kpi-sub   { font-size:.72rem; color:#6c757d; margin-top:3px; }
    .fin-kpi.danger  .fin-kpi-value { color:#dc3545; }
    .fin-kpi.warning .fin-kpi-value { color:#f97316; }
    .fin-kpi.success .fin-kpi-value { color:#16a34a; }
    .fin-section-title { font-size:.85rem; font-weight:700; color:#1a1d24; text-transform:uppercase; letter-spacing:.04em; margin-bottom:8px; padding-bottom:4px; border-bottom:2px solid #e9ecef; }
    .budget-bar-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f0f0f0; }
    .budget-bar-label { flex:0 0 180px; font-size:.82rem; font-weight:600; color:#1a1d24; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .budget-bar-track { flex:1; height:8px; background:#e9ecef; border-radius:4px; overflow:hidden; }
    .budget-bar-fill  { height:100%; border-radius:4px; transition:width .4s; }
    .budget-bar-fill.ok      { background:#16a34a; }
    .budget-bar-fill.warn    { background:#f97316; }
    .budget-bar-fill.danger  { background:#dc3545; }
    .budget-bar-pct  { flex:0 0 46px; text-align:right; font-size:.78rem; font-weight:700; color:#6c757d; }
    .budget-bar-amt  { flex:0 0 120px; text-align:right; font-size:.78rem; color:#6c757d; }
    .recent-table    { width:100%; font-size:.82rem; border-collapse:collapse; }
    .recent-table th { background:#f8f9fa; padding:6px 10px; font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; color:#6c757d; border-bottom:2px solid #dee2e6; text-align:left; }
    .recent-table td { padding:6px 10px; border-bottom:1px solid #f0f0f0; color:#1a1d24; }
    .status-badge    { display:inline-block; padding:2px 8px; border-radius:3px; font-size:.7rem; font-weight:700; text-transform:uppercase; }
    .s-pending   { background:#fff3cd; color:#92400e; }
    .s-approved  { background:#d1fae5; color:#065f46; }
    .s-paid      { background:#dbeafe; color:#1e40af; }
    .s-cancelled { background:#fee2e2; color:#991b1b; }
    .card-fin    { background:#fff; border:1px solid rgba(0,0,0,.1); border-radius:8px; padding:16px 18px; box-shadow:0 2px 4px rgba(0,0,0,.06); margin-bottom:16px; }
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
      <div>
        <h1 class="h4 mb-1">Finance Dashboard</h1>
        <div class="text-secondary" style="font-size:.85rem;">Budget overview, payment pipeline and financial KPIs.</div>
      </div>
      <div class="d-flex gap-2">
        <a href="budgets.html" class="btn btn-sm btn-outline-primary">📊 Budgets</a>
        <a href="expenses.html" class="btn btn-sm btn-outline-secondary">🧾 Expenses</a>
        <a href="invoice.html" class="btn btn-sm btn-outline-secondary">📄 Invoices</a>
      </div>
    </div>

    <!-- KPI Cards -->
    <div class="fin-kpi-grid" id="kpiGrid">
      <div class="fin-kpi"><div class="fin-kpi-label">Active Budgets</div><div class="fin-kpi-value" id="kpiBudgets">—</div></div>
      <div class="fin-kpi"><div class="fin-kpi-label">Total Allocated</div><div class="fin-kpi-value" id="kpiAllocated">—</div></div>
      <div class="fin-kpi success"><div class="fin-kpi-label">Total Spent</div><div class="fin-kpi-value" id="kpiSpent">—</div></div>
      <div class="fin-kpi"><div class="fin-kpi-label">Remaining</div><div class="fin-kpi-value" id="kpiRemaining">—</div></div>
      <div class="fin-kpi warning"><div class="fin-kpi-label">Payments Pending</div><div class="fin-kpi-value" id="kpiPending">—</div></div>
      <div class="fin-kpi danger"><div class="fin-kpi-label">Over Budget</div><div class="fin-kpi-value" id="kpiOverBudget">—</div></div>
    </div>

    <div class="row g-3">
      <!-- Budget utilisation bars -->
      <div class="col-lg-7">
        <div class="card-fin">
          <div class="fin-section-title">Budget Utilisation</div>
          <div id="budgetBars"><div class="text-secondary" style="font-size:.82rem;padding:12px 0;">Loading…</div></div>
        </div>
      </div>
      <!-- Recent Payments -->
      <div class="col-lg-5">
        <div class="card-fin">
          <div class="fin-section-title">Recent Payments</div>
          <table class="recent-table">
            <thead><tr><th>Payee</th><th>Amount</th><th>Status</th><th>Date</th></tr></thead>
            <tbody id="recentPayments"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script>
  (async () => {
    const API = (window.RTS_CONFIG?.api?.baseURL) || '/api';
    const fmt = (n) => '£' + parseFloat(n||0).toLocaleString('en-GB',{minimumFractionDigits:0,maximumFractionDigits:0});

    // Load KPI summary
    try {
      const r = await fetch(`${API}/fin-budgets/summary`);
      const d = await r.json();
      document.getElementById('kpiBudgets').textContent    = d.active_budgets || 0;
      document.getElementById('kpiAllocated').textContent  = fmt(d.total_allocated);
      document.getElementById('kpiSpent').textContent      = fmt(d.total_spent);
      document.getElementById('kpiRemaining').textContent  = fmt(d.total_remaining);
      document.getElementById('kpiOverBudget').textContent = d.over_budget || 0;
      if (+d.over_budget > 0) document.querySelector('#kpiGrid .fin-kpi:last-child').classList.add('danger');
    } catch(e) { console.error(e); }

    // Load payment pending count
    try {
      const r = await fetch(`${API}/fin-payments/summary`);
      const d = await r.json();
      document.getElementById('kpiPending').textContent = d.pending_count || 0;
    } catch(e) {}

    // Load budgets for bars
    try {
      const r  = await fetch(`${API}/fin-budgets?status=active`);
      const bs = await r.json();
      const el = document.getElementById('budgetBars');
      if (!bs.length) { el.innerHTML = '<div class="text-secondary" style="font-size:.82rem;">No active budgets</div>'; return; }
      el.innerHTML = bs.map(b => {
        const pct  = Math.min(Math.round(b.pct_spent || 0), 100);
        const cls  = pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : 'ok';
        return `<div class="budget-bar-row">
          <div class="budget-bar-label" title="${b.name}">${b.name}</div>
          <div class="budget-bar-track"><div class="budget-bar-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="budget-bar-pct">${pct}%</div>
          <div class="budget-bar-amt">${fmt(b.spent_amount)} / ${fmt(b.total_amount)}</div>
        </div>`;
      }).join('');
    } catch(e) { console.error(e); }

    // Load recent payments
    try {
      const r  = await fetch(`${API}/fin-payments`);
      const ps = await r.json();
      const el  = document.getElementById('recentPayments');
      const recent = ps.slice(0,12);
      if (!recent.length) { el.innerHTML = '<tr><td colspan="4" class="text-secondary">No payments yet</td></tr>'; return; }
      el.innerHTML = recent.map(p => {
        const sCls = { pending:'s-pending', approved:'s-approved', paid:'s-paid', cancelled:'s-cancelled' }[p.status] || 's-pending';
        const date = p.payment_date ? new Date(p.payment_date).toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) : '—';
        return `<tr>
          <td>${p.payee}</td>
          <td>£${parseFloat(p.amount||0).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2})}</td>
          <td><span class="status-badge ${sCls}">${p.status}</span></td>
          <td>${date}</td>
        </tr>`;
      }).join('');
    } catch(e) { console.error(e); }
  })();
  </script>
</body>
</html>
