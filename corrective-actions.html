<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Corrective Actions</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .rts-main{padding:1.5rem;}
    .ev-stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;}
    .ev-stat-card{background:#fff;border-radius:10px;padding:1rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);min-width:120px;border-top:4px solid #f97316;}
    .ev-stat-label{font-size:.72rem;text-transform:uppercase;color:#6b7280;font-weight:600;letter-spacing:.05em;}
    .ev-stat-value{font-size:1.8rem;font-weight:800;color:#1f2937;line-height:1.1;}
    .filter-bar{background:#fff;border-radius:10px;padding:.75rem 1rem;box-shadow:0 2px 8px rgba(0,0,0,.08);margin-bottom:1rem;display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;}
    .filter-bar .flabel{font-size:.7rem;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:.2rem;}
    .table-wrapper{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;}
    .data-table{width:100%;font-size:.83rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:9px 12px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6b7280;border-bottom:2px solid #e5e7eb;white-space:nowrap;}
    .data-table td{padding:7px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle;color:#1f2937;}
    .data-table tbody tr{cursor:pointer;transition:background .12s;}
    .data-table tbody tr:hover{background:#fff7ed;}
    .data-table tbody tr.table-selected{background:rgba(249,115,22,.07)!important;outline:2px solid #f97316;outline-offset:-2px;}
    .data-table tbody tr.row-overdue{background:#fee2e2!important;}
    .data-table tbody tr.row-overdue:hover{background:#fecaca!important;}
    .priority-group-header td{background:#f9fafb;font-size:.72rem;font-weight:700;text-transform:uppercase;color:#6b7280;padding:6px 12px;letter-spacing:.06em;}
    .bp{display:inline-block;padding:.2rem .65rem;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;}
    .st-open{background:#fee2e2;color:#991b1b;}
    .st-in_progress{background:#fef3c7;color:#92400e;}
    .st-completed{background:#d1fae5;color:#065f46;}
    .st-cancelled{background:#f3f4f6;color:#6b7280;}
    .st-overdue{background:#7f1d1d;color:#fff;}
    .p-low{background:#f0fdf4;color:#166534;}
    .p-medium{background:#eff6ff;color:#1d4ed8;}
    .p-high{background:#fef3c7;color:#92400e;}
    .p-critical{background:#fee2e2;color:#991b1b;}
    .page-title{font-weight:800;color:#f97316;letter-spacing:-.01em;}
    .modal-header-accent{background:#f97316;color:#fff;}
    .modal-header-accent .btn-close{filter:invert(1);}
    .empty-row td{text-align:center;padding:2.5rem;color:#9ca3af;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="page-title mb-0">Corrective Actions</h2>
      <div class="text-secondary small mt-1">Track corrective and preventive actions arising from incidents and RCAs.</div>
    </div>
    <button class="btn btn-sm fw-semibold" style="background:#f97316;color:#fff;padding:.4rem 1.1rem" onclick="openModal()">+ New Action</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Open</div><div class="ev-stat-value" style="color:#ef4444" id="kpiOpen">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Overdue</div><div class="ev-stat-value" style="color:#ef4444" id="kpiOverdue">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Completed</div><div class="ev-stat-value" style="color:#10b981" id="kpiCompleted">—</div></div>
  </div>

  <div class="filter-bar">
    <div>
      <span class="flabel">Status</span>
      <select class="form-select form-select-sm" id="fltStatus" onchange="applyFilters()">
        <option value="">All</option>
        <option value="open">Open</option>
        <option value="in_progress">In Progress</option>
        <option value="completed">Completed</option>
        <option value="cancelled">Cancelled</option>
        <option value="overdue">Overdue</option>
      </select>
    </div>
    <div>
      <span class="flabel">Priority</span>
      <select class="form-select form-select-sm" id="fltPriority" onchange="applyFilters()">
        <option value="">All</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div>
      <span class="flabel">Assigned To</span>
      <select class="form-select form-select-sm" id="fltAssigned" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>
    <div>
      <span class="flabel">Search</span>
      <input type="text" class="form-control form-control-sm" id="fltSearch" placeholder="Action title…" oninput="applyFilters()" style="min-width:180px;">
    </div>
    <div style="margin-top:auto;">
      <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table">
      <thead>
        <tr>
          <th>Action</th><th>Priority</th><th>Assigned To</th><th>Due Date</th>
          <th>Completed</th><th>Status</th><th>Verify Method</th><th></th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="8" class="text-center text-muted py-4">Loading…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="crudModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header modal-header-accent">
        <h5 class="modal-title" id="modalTitle">New Corrective Action</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="crudForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold small">RCA ID <span class="text-muted">(if linked)</span></label>
              <input type="text" class="form-control form-control-sm" id="fRcaId"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Incident ID <span class="text-muted">(if linked)</span></label>
              <input type="text" class="form-control form-control-sm" id="fIncidentId"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Priority</label>
              <select class="form-select form-select-sm" id="fPriority">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Action Title <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="fActionTitle" required/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Description</label>
              <textarea class="form-control form-control-sm" id="fDescription" rows="3"></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Assigned To</label>
              <input type="text" class="form-control form-control-sm" id="fAssignedTo"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Due Date</label>
              <input type="date" class="form-control form-control-sm" id="fDueDate"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Completed Date</label>
              <input type="date" class="form-control form-control-sm" id="fCompletedDate"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="open">Open</option>
                <option value="in_progress">In Progress</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
                <option value="overdue">Overdue</option>
              </select>
            </div>
            <div class="col-md-8">
              <label class="form-label fw-semibold small">Verification Method</label>
              <input type="text" class="form-control form-control-sm" id="fVerificationMethod"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Created By</label>
              <input type="text" class="form-control form-control-sm" id="fCreatedBy"/>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#f97316;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API = '/api/corrective-actions';
let allData = [], filtered = [], selectedId = null;
const bsModal = new bootstrap.Modal(document.getElementById('crudModal'));
const TODAY = new Date().toISOString().split('T')[0];
const PRIORITY_ORDER = ['critical','high','medium','low'];

async function load() {
  try { const r = await fetch(API); allData = await r.json(); } catch(e) { allData = []; }
  updateKPIs(); populateAssignedFilter(); applyFilters();
}

function isOverdue(r) {
  return r.due_date && r.due_date.split('T')[0] < TODAY && !['completed','cancelled'].includes(r.status);
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent = allData.length;
  document.getElementById('kpiOpen').textContent = allData.filter(x=>x.status==='open').length;
  document.getElementById('kpiOverdue').textContent = allData.filter(isOverdue).length;
  document.getElementById('kpiCompleted').textContent = allData.filter(x=>x.status==='completed').length;
}

function populateAssignedFilter() {
  const sel = document.getElementById('fltAssigned');
  const stored = sel.value;
  const people = [...new Set(allData.map(x=>x.assigned_to).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All</option>' + people.map(p=>`<option value="${esc(p)}">${esc(p)}</option>`).join('');
  sel.value = stored;
}

function applyFilters() {
  const st = document.getElementById('fltStatus').value;
  const pr = document.getElementById('fltPriority').value;
  const as = document.getElementById('fltAssigned').value;
  const q = document.getElementById('fltSearch').value.toLowerCase();
  filtered = allData.filter(r => {
    if (st && r.status !== st) return false;
    if (pr && r.priority !== pr) return false;
    if (as && r.assigned_to !== as) return false;
    if (q && !(r.action_title||'').toLowerCase().includes(q)) return false;
    return true;
  });
  renderTable();
}

function clearFilters() {
  ['fltStatus','fltPriority','fltAssigned','fltSearch'].forEach(id=>{document.getElementById(id).value='';});
  applyFilters();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return '—';return String(d).split('T')[0];}

function pBadge(s){
  const m={low:'p-low',medium:'p-medium',high:'p-high',critical:'p-critical'};
  const l={low:'Low',medium:'Medium',high:'High',critical:'Critical'};
  return `<span class="bp ${m[s]||'p-medium'}">${l[s]||esc(s)||'—'}</span>`;
}
function stBadge(s){
  const m={open:'st-open',in_progress:'st-in_progress',completed:'st-completed',cancelled:'st-cancelled',overdue:'st-overdue'};
  const l={open:'Open',in_progress:'In Progress',completed:'Completed',cancelled:'Cancelled',overdue:'Overdue'};
  return `<span class="bp ${m[s]||'st-open'}">${l[s]||esc(s)||'—'}</span>`;
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">No actions match your filters.</td></tr>';
    return;
  }
  // Sort by priority order then by due_date
  const sorted = [...filtered].sort((a,b)=>{
    const pi = PRIORITY_ORDER.indexOf(a.priority);
    const pj = PRIORITY_ORDER.indexOf(b.priority);
    if (pi !== pj) return pi - pj;
    if (a.due_date && b.due_date) return a.due_date.localeCompare(b.due_date);
    return 0;
  });
  let html = '';
  let lastPriority = null;
  sorted.forEach(r => {
    if (r.priority !== lastPriority) {
      lastPriority = r.priority;
      const labels={critical:'CRITICAL',high:'HIGH',medium:'MEDIUM',low:'LOW'};
      html += `<tr class="priority-group-header"><td colspan="8">${labels[r.priority]||String(r.priority||'').toUpperCase()}</td></tr>`;
    }
    const overdue = isOverdue(r);
    html += `<tr data-id="${r.id}" onclick="selectRow(${r.id})" class="${selectedId===r.id?'table-selected':''} ${overdue?'row-overdue':''}">
      <td><strong>${esc(r.action_title)||'—'}</strong></td>
      <td>${pBadge(r.priority)}</td>
      <td>${esc(r.assigned_to)||'—'}</td>
      <td>${fmtDate(r.due_date)}${overdue?' <span class="badge bg-danger ms-1">Overdue</span>':''}</td>
      <td>${fmtDate(r.completed_date)}</td>
      <td>${stBadge(r.status)}</td>
      <td>${esc(r.verification_method)||'—'}</td>
      <td>
        <button class="btn btn-xs btn-outline-secondary" style="padding:.1rem .4rem;font-size:.72rem" onclick="event.stopPropagation();editById(${r.id})">Edit</button>
      </td>
    </tr>`;
  });
  tbody.innerHTML = html;
}

function selectRow(id) {
  selectedId = id;
  document.querySelectorAll('.data-table tbody tr[data-id]').forEach(tr=>tr.classList.toggle('table-selected',parseInt(tr.dataset.id)===id));
}

function editById(id) { const r=allData.find(x=>x.id===id); if(r) openModal(r); }

function openModal(r) {
  document.getElementById('crudForm').reset();
  document.getElementById('fId').value = '';
  document.getElementById('modalTitle').textContent = r ? 'Edit Corrective Action' : 'New Corrective Action';
  if (r) {
    document.getElementById('fId').value = r.id||'';
    document.getElementById('fRcaId').value = r.rca_id||'';
    document.getElementById('fIncidentId').value = r.incident_id||'';
    document.getElementById('fActionTitle').value = r.action_title||'';
    document.getElementById('fDescription').value = r.description||'';
    document.getElementById('fAssignedTo').value = r.assigned_to||'';
    document.getElementById('fDueDate').value = r.due_date?r.due_date.split('T')[0]:'';
    document.getElementById('fCompletedDate').value = r.completed_date?r.completed_date.split('T')[0]:'';
    document.getElementById('fPriority').value = r.priority||'medium';
    document.getElementById('fStatus').value = r.status||'open';
    document.getElementById('fVerificationMethod').value = r.verification_method||'';
    document.getElementById('fNotes').value = r.notes||'';
    document.getElementById('fCreatedBy').value = r.created_by||'';
  }
  bsModal.show();
}

async function saveRecord() {
  const title = document.getElementById('fActionTitle');
  if (!title.value.trim()) { title.classList.add('is-invalid'); title.focus(); return; }
  title.classList.remove('is-invalid');
  const id = document.getElementById('fId').value;
  const body = {
    rca_id: document.getElementById('fRcaId').value||null,
    incident_id: document.getElementById('fIncidentId').value||null,
    action_title: document.getElementById('fActionTitle').value.trim(),
    description: document.getElementById('fDescription').value||null,
    assigned_to: document.getElementById('fAssignedTo').value||null,
    due_date: document.getElementById('fDueDate').value||null,
    completed_date: document.getElementById('fCompletedDate').value||null,
    priority: document.getElementById('fPriority').value,
    status: document.getElementById('fStatus').value,
    verification_method: document.getElementById('fVerificationMethod').value||null,
    notes: document.getElementById('fNotes').value||null,
    created_by: document.getElementById('fCreatedBy').value||null
  };
  try {
    const r = await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    bsModal.hide();
    await load();
  } catch(e) { alert('Save failed: '+e.message); }
}

load();
</script>
</body>
</html>
