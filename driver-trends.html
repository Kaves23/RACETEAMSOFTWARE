<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Driver Trends</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css?v=20260420">
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); min-height:100vh; }
    .rts-main { padding:1.5rem; }
    .ev-stats-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .ev-stat-card { background:#fff; border-radius:10px; padding:1rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.08); min-width:130px; border-top:4px solid #10b981; }
    .ev-stat-label { font-size:.72rem; text-transform:uppercase; color:#6b7280; font-weight:600; letter-spacing:.05em; }
    .ev-stat-value { font-size:1.8rem; font-weight:800; color:#1f2937; line-height:1.1; }

    .page-body { display:flex; gap:1.25rem; align-items:flex-start; }
    .driver-sidebar { width:200px; flex-shrink:0; background:#fff; border-radius:10px; padding:1rem; box-shadow:0 2px 8px rgba(0,0,0,.08); position:sticky; top:1rem; }
    .driver-sidebar h6 { font-weight:700; color:#374151; margin-bottom:.75rem; font-size:.85rem; text-transform:uppercase; letter-spacing:.05em; }
    .driver-list-item { padding:.45rem .65rem; border-radius:6px; cursor:pointer; font-size:.875rem; transition:background .15s; color:#374151; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .driver-list-item:hover { background:#d1fae5; }
    .driver-list-item.active { background:#10b981; color:#fff; font-weight:600; }

    .main-content { flex:1; min-width:0; }
    .top-bar { display:flex; align-items:center; gap:.75rem; margin-bottom:1rem; flex-wrap:wrap; }

    .table-wrapper { background:#fff; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,.08); overflow:hidden; }
    .table { margin:0; }
    .table thead th { background:#10b981; color:#fff; font-size:.75rem; text-transform:uppercase; letter-spacing:.05em; border:none; padding:.7rem 1rem; white-space:nowrap; }
    .table tbody tr { cursor:pointer; transition:background .15s; }
    .table tbody tr:hover { background:#ecfdf5; }
    .table tbody tr.selected { background:#d1fae5 !important; }
    .table tbody td { padding:.6rem 1rem; vertical-align:middle; font-size:.875rem; border-color:#f3f4f6; }

    .trend-improving { color:#16a34a; font-weight:700; font-size:1.1em; }
    .trend-stable    { color:#9ca3af; font-weight:600; }
    .trend-declining { color:#dc2626; font-weight:700; font-size:1.1em; }

    .page-title { font-weight:800; color:#10b981; letter-spacing:-.01em; }
  </style>
</head>
<body>
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="page-title mb-0">Driver Trends</h2>
    <button class="btn btn-sm fw-semibold" style="background:#10b981;color:#fff;padding:.4rem 1rem" onclick="openModal()">+ Add Metric</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Drivers Tracked</div><div class="ev-stat-value" id="kpiDrivers">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Metrics</div><div class="ev-stat-value" id="kpiMetrics">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Improving</div><div class="ev-stat-value" id="kpiImproving">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Declining</div><div class="ev-stat-value" id="kpiDeclining">—</div></div>
  </div>

  <div class="page-body">
    <aside class="driver-sidebar">
      <h6>Drivers</h6>
      <div id="driverList"></div>
    </aside>

    <div class="main-content">
      <div class="top-bar">
        <span class="text-muted small" id="filterLabel">All Drivers</span>
        <div class="ms-auto d-flex gap-2">
          <input type="text" class="form-control form-control-sm" id="searchBox" placeholder="Search metric…" oninput="applyFilters()" style="width:200px">
        </div>
      </div>
      <div class="table-wrapper">
        <table class="table table-hover" id="mainTable">
          <thead>
            <tr>
              <th>Driver</th>
              <th>Event / Session</th>
              <th>Metric</th>
              <th>Value</th>
              <th>Target</th>
              <th>Trend</th>
              <th>Recorded</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody id="mainTbody">
            <tr><td colspan="8" class="text-center text-muted py-5">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="trendModal" tabindex="-1" aria-labelledby="trendModalTitle" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#10b981">
        <h5 class="modal-title text-white fw-bold" id="trendModalTitle">Add Metric</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="trendForm" onsubmit="return false">
          <input type="hidden" id="fId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Driver Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fDriverName" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Metric Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fMetricName" required placeholder="e.g. Lap Time, Braking Point">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Event ID</label>
              <input type="text" class="form-control" id="fEventId" placeholder="e.g. EVT-001">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Session Name</label>
              <input type="text" class="form-control" id="fSessionName" placeholder="e.g. FP1">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Metric Value</label>
              <input type="number" class="form-control" id="fMetricValue" step="0.0001">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Target Value</label>
              <input type="number" class="form-control" id="fTargetValue" step="0.0001">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Trend Direction</label>
              <select class="form-select" id="fTrendDirection">
                <option value="improving">Improving</option>
                <option value="stable">Stable</option>
                <option value="declining">Declining</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Recorded At</label>
              <input type="datetime-local" class="form-control" id="fRecordedAt">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notes</label>
              <textarea class="form-control" id="fNotes" rows="3"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm d-none me-auto" id="btnDelete" onclick="deleteRecord()">Delete</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#10b981;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="core.js?v=20260420"></script>
<script src="topnav.js?v=20260420"></script>
<script>
let allData       = [];
let activeDriver  = null;
let bsModal;

window.addEventListener('DOMContentLoaded', () => {
  bsModal = new bootstrap.Modal(document.getElementById('trendModal'));
  loadData();
});

async function loadData() {
  try {
    const res = await fetch('/api/driver-trends');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) { allData = []; }
  buildDriverSidebar();
  updateKPIs();
  applyFilters();
}

function buildDriverSidebar() {
  const drivers = [...new Set(allData.map(r => r.driver_name).filter(Boolean))].sort();
  const list    = document.getElementById('driverList');
  list.innerHTML =
    `<div class="driver-list-item ${activeDriver === null ? 'active' : ''}" onclick="selectDriver(null)">All Drivers</div>` +
    drivers.map(d => `<div class="driver-list-item ${activeDriver === d ? 'active' : ''}" onclick="selectDriver('${escAttr(d)}')" title="${escAttr(d)}">${esc(d)}</div>`).join('');
}

function selectDriver(name) {
  activeDriver = name;
  buildDriverSidebar();
  applyFilters();
  document.getElementById('filterLabel').textContent = name ? name : 'All Drivers';
}

function updateKPIs() {
  document.getElementById('kpiDrivers').textContent   = new Set(allData.map(r => r.driver_name).filter(Boolean)).size;
  document.getElementById('kpiMetrics').textContent   = allData.length;
  document.getElementById('kpiImproving').textContent = allData.filter(r => r.trend_direction === 'improving').length;
  document.getElementById('kpiDeclining').textContent = allData.filter(r => r.trend_direction === 'declining').length;
}

function applyFilters() {
  const search = (document.getElementById('searchBox').value || '').toLowerCase();
  const filtered = allData.filter(r =>
    (!activeDriver || r.driver_name === activeDriver) &&
    (!search || (r.metric_name || '').toLowerCase().includes(search) ||
                (r.driver_name || '').toLowerCase().includes(search))
  );
  renderTable(filtered);
}

function trendIcon(t) {
  if (t === 'improving') return '<span class="trend-improving" title="Improving">↑ Improving</span>';
  if (t === 'declining') return '<span class="trend-declining" title="Declining">↓ Declining</span>';
  return '<span class="trend-stable" title="Stable">→ Stable</span>';
}

function fmtDate(v) {
  if (!v) return '—';
  try {
    return new Date(v).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
  } catch(e) { return v; }
}

function renderTable(data) {
  const tbody = document.getElementById('mainTbody');
  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-5">No records found</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr onclick="openModal(${r.id})">
      <td class="fw-semibold">${esc(r.driver_name)}</td>
      <td>${esc(r.event_id)}${r.session_name ? ' / ' + esc(r.session_name) : ''}</td>
      <td>${esc(r.metric_name)}</td>
      <td>${r.metric_value != null ? Number(r.metric_value).toFixed(4) : '—'}</td>
      <td>${r.target_value != null ? Number(r.target_value).toFixed(4) : '—'}</td>
      <td>${trendIcon(r.trend_direction)}</td>
      <td>${fmtDate(r.recorded_at)}</td>
      <td><button class="btn btn-sm btn-outline-secondary py-0 px-1" style="font-size:.7rem" onclick="event.stopPropagation();openModal(${r.id})">Edit</button></td>
    </tr>`).join('');
}

function esc(v)     { return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'; }
function escAttr(v) { return v ? String(v).replace(/'/g,"&#39;").replace(/"/g,'&quot;') : ''; }
function numOrNull(id) { const v = document.getElementById(id).value; return v !== '' ? Number(v) : null; }

function openModal(id = null) {
  const rec = id ? allData.find(r => r.id === id) : null;
  document.getElementById('trendModalTitle').textContent = rec ? 'Edit Metric' : 'Add Metric';
  document.getElementById('btnDelete').classList.toggle('d-none', !rec);
  document.getElementById('fId').value             = rec ? rec.id : '';
  document.getElementById('fDriverName').value     = rec ? (rec.driver_name      || '') : (activeDriver || '');
  document.getElementById('fMetricName').value     = rec ? (rec.metric_name      || '') : '';
  document.getElementById('fEventId').value        = rec ? (rec.event_id         || '') : '';
  document.getElementById('fSessionName').value    = rec ? (rec.session_name     || '') : '';
  document.getElementById('fMetricValue').value    = rec ? (rec.metric_value  ?? '') : '';
  document.getElementById('fTargetValue').value    = rec ? (rec.target_value  ?? '') : '';
  document.getElementById('fTrendDirection').value = rec ? (rec.trend_direction  || 'stable') : 'stable';
  document.getElementById('fNotes').value          = rec ? (rec.notes            || '') : '';
  if (rec && rec.recorded_at) {
    const d = new Date(rec.recorded_at);
    const local = new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,16);
    document.getElementById('fRecordedAt').value = local;
  } else {
    document.getElementById('fRecordedAt').value = '';
  }
  bsModal.show();
}

async function saveRecord() {
  const payload = {
    driver_name     : document.getElementById('fDriverName').value.trim(),
    metric_name     : document.getElementById('fMetricName').value.trim(),
    event_id        : document.getElementById('fEventId').value.trim(),
    session_name    : document.getElementById('fSessionName').value.trim(),
    metric_value    : numOrNull('fMetricValue'),
    target_value    : numOrNull('fTargetValue'),
    trend_direction : document.getElementById('fTrendDirection').value,
    notes           : document.getElementById('fNotes').value.trim(),
    recorded_at     : document.getElementById('fRecordedAt').value || null
  };
  if (!payload.driver_name || !payload.metric_name) { alert('Driver Name and Metric Name are required'); return; }
  const id = document.getElementById('fId').value;
  try {
    const res = await fetch(id ? `/api/driver-trends/${id}` : '/api/driver-trends', {
      method : id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    await loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Delete this trend record?')) return;
  try {
    const res = await fetch(`/api/driver-trends/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    await loadData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}
</script>
</body>
</html>
