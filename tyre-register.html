<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Tyre Register</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="style.css?v=20260420">
  <style>
    body { background: linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%); min-height:100vh; }
    .rts-main { padding:1.5rem; }
    .ev-stats-bar { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.5rem; }
    .ev-stat-card { background:#fff; border-radius:10px; padding:1rem 1.5rem; box-shadow:0 2px 8px rgba(0,0,0,.08); min-width:120px; border-top:4px solid #f59e0b; }
    .ev-stat-label { font-size:.72rem; text-transform:uppercase; color:#6b7280; font-weight:600; letter-spacing:.05em; }
    .ev-stat-value { font-size:1.8rem; font-weight:800; color:#1f2937; line-height:1.1; }

    .filter-bar { background:#fff; border-radius:10px; padding:1rem 1.25rem; box-shadow:0 2px 8px rgba(0,0,0,.08); margin-bottom:1.5rem; display:flex; gap:1rem; flex-wrap:wrap; align-items:flex-end; }

    .tyre-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1.25rem; }
    @media(max-width:1200px) { .tyre-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:900px)  { .tyre-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:576px)  { .tyre-grid { grid-template-columns:1fr; } }

    .tyre-card { background:#fff; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); padding:1.25rem; cursor:pointer; transition:box-shadow .2s,transform .2s; border-top:4px solid #f59e0b; position:relative; }
    .tyre-card:hover { box-shadow:0 8px 24px rgba(0,0,0,.13); transform:translateY(-2px); }
    .tyre-card .set-number { font-size:1.5rem; font-weight:800; color:#1f2937; margin-bottom:.4rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .tyre-card .data-row { display:flex; justify-content:space-between; font-size:.8rem; padding:.22rem 0; border-bottom:1px solid #f3f4f6; color:#374151; }
    .tyre-card .data-row:last-child { border:none; }
    .tyre-card .data-key { color:#9ca3af; }

    .bp { display:inline-block; padding:.2rem .6rem; border-radius:20px; font-size:.72rem; font-weight:700; white-space:nowrap; }
    .bp-new      { background:#d1fae5; color:#065f46; }
    .bp-good     { background:#dbeafe; color:#1d4ed8; }
    .bp-worn     { background:#fef3c7; color:#b45309; }
    .bp-scrapped { background:#fee2e2; color:#dc2626; }

    .page-title { font-weight:800; color:#f59e0b; letter-spacing:-.01em; }
  </style>
</head>
<body>
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h2 class="page-title mb-0">Tyre Register</h2>
    <button class="btn btn-sm fw-semibold" style="background:#f59e0b;color:#fff;padding:.4rem 1rem" onclick="openModal()">+ New Tyre Set</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">New</div><div class="ev-stat-value" id="kpiNew">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Good</div><div class="ev-stat-value" id="kpiGood">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Worn</div><div class="ev-stat-value" id="kpiWorn">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Scrapped</div><div class="ev-stat-value" id="kpiScrapped">—</div></div>
  </div>

  <div class="filter-bar">
    <div>
      <label class="form-label small fw-semibold mb-1">Compound</label>
      <select class="form-select form-select-sm" id="filterCompound" onchange="applyFilters()" style="min-width:150px">
        <option value="">All Compounds</option>
      </select>
    </div>
    <div>
      <label class="form-label small fw-semibold mb-1">Condition</label>
      <select class="form-select form-select-sm" id="filterCondition" onchange="applyFilters()" style="min-width:130px">
        <option value="">All Conditions</option>
        <option value="new">New</option>
        <option value="good">Good</option>
        <option value="worn">Worn</option>
        <option value="scrapped">Scrapped</option>
      </select>
    </div>
    <div>
      <label class="form-label small fw-semibold mb-1">Car #</label>
      <select class="form-select form-select-sm" id="filterCar" onchange="applyFilters()" style="min-width:120px">
        <option value="">All Cars</option>
      </select>
    </div>
    <div class="ms-auto d-flex align-items-end gap-2">
      <span id="resultCount" class="text-muted small"></span>
      <button class="btn btn-outline-secondary btn-sm" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="tyre-grid" id="tyreGrid">
    <div class="text-center text-muted py-5" style="grid-column:1/-1">Loading…</div>
  </div>

</div>

<!-- Modal -->
<div class="modal fade" id="tyreModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:#f59e0b">
        <h5 class="modal-title text-white fw-bold" id="modalTitle">New Tyre Set</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="tyreForm" onsubmit="return false">
          <input type="hidden" id="fId">
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label fw-semibold">Set Number <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fSetNumber" required placeholder="e.g. SET-001">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Compound <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="fCompound" required placeholder="e.g. Soft">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Specification</label>
              <input type="text" class="form-control" id="fSpecification" placeholder="e.g. 305/660-18">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Car #</label>
              <input type="text" class="form-control" id="fCarNumber">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Driver Name</label>
              <input type="text" class="form-control" id="fDriverName">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Session Fitted</label>
              <input type="text" class="form-control" id="fSessionFitted" placeholder="e.g. FP2">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Laps Used</label>
              <input type="number" class="form-control" id="fLapsUsed" min="0">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Condition</label>
              <select class="form-select" id="fCondition">
                <option value="new">New</option>
                <option value="good">Good</option>
                <option value="worn">Worn</option>
                <option value="scrapped">Scrapped</option>
              </select>
            </div>
            <div class="col-12">
              <p class="text-muted small fw-semibold mb-0 mt-1">Temperature (°C) — Inner / Middle / Outer</p>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Temperature Inner</label>
              <input type="number" class="form-control" id="fTempInner" step="0.1">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Temperature Middle</label>
              <input type="number" class="form-control" id="fTempMiddle" step="0.1">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Temperature Outer</label>
              <input type="number" class="form-control" id="fTempOuter" step="0.1">
            </div>
            <div class="col-12">
              <p class="text-muted small fw-semibold mb-0 mt-1">Pressure (bar) — Hot / Cold</p>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Pressure Hot</label>
              <input type="number" class="form-control" id="fPressureHot" step="0.1">
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold">Pressure Cold</label>
              <input type="number" class="form-control" id="fPressureCold" step="0.1">
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Notes</label>
              <textarea class="form-control" id="fNotes" rows="3"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-danger btn-sm d-none me-auto" id="btnDelete" onclick="deleteRecord()">Delete</button>
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#f59e0b;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="core.js?v=20260420"></script>
<script src="topnav.js?v=20260420"></script>
<script>
let allData = [];
let bsModal;

window.addEventListener('DOMContentLoaded', () => {
  bsModal = new bootstrap.Modal(document.getElementById('tyreModal'));
  loadData();
});

async function loadData() {
  try {
    const res = await fetch('/api/tyre-register');
    if (!res.ok) throw new Error(res.status);
    allData = await res.json();
  } catch(e) { allData = []; }
  populateFilters();
  updateKPIs();
  applyFilters();
}

function populateFilters() {
  const compounds = [...new Set(allData.map(r => r.compound).filter(Boolean))].sort();
  const cars      = [...new Set(allData.map(r => r.car_number).filter(Boolean))].sort();
  const fComp = document.getElementById('filterCompound');
  const curComp = fComp.value;
  fComp.innerHTML = '<option value="">All Compounds</option>' + compounds.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  fComp.value = curComp;
  const fCar  = document.getElementById('filterCar');
  const curCar = fCar.value;
  fCar.innerHTML  = '<option value="">All Cars</option>'      + cars.map(c => `<option value="${esc(c)}">${esc(c)}</option>`).join('');
  fCar.value = curCar;
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent    = allData.length;
  document.getElementById('kpiNew').textContent      = allData.filter(r => r.condition === 'new').length;
  document.getElementById('kpiGood').textContent     = allData.filter(r => r.condition === 'good').length;
  document.getElementById('kpiWorn').textContent     = allData.filter(r => r.condition === 'worn').length;
  document.getElementById('kpiScrapped').textContent = allData.filter(r => r.condition === 'scrapped').length;
}

function condBadge(c) {
  const map = { new:'bp-new', good:'bp-good', worn:'bp-worn', scrapped:'bp-scrapped' };
  return `<span class="bp ${map[c] || 'bp-worn'}">${c || '—'}</span>`;
}

function applyFilters() {
  const comp = document.getElementById('filterCompound').value;
  const cond = document.getElementById('filterCondition').value;
  const car  = document.getElementById('filterCar').value;
  const filtered = allData.filter(r =>
    (!comp || r.compound  === comp) &&
    (!cond || r.condition === cond) &&
    (!car  || r.car_number === car)
  );
  document.getElementById('resultCount').textContent = `${filtered.length} set${filtered.length !== 1 ? 's' : ''}`;
  renderGrid(filtered);
}

function clearFilters() {
  document.getElementById('filterCompound').value = '';
  document.getElementById('filterCondition').value = '';
  document.getElementById('filterCar').value = '';
  applyFilters();
}

function renderGrid(data) {
  const grid = document.getElementById('tyreGrid');
  if (!data.length) {
    grid.innerHTML = '<div class="text-center text-muted py-5" style="grid-column:1/-1">No tyre sets found</div>';
    return;
  }
  grid.innerHTML = data.map(r => `
    <div class="tyre-card" onclick="openModal(${r.id})">
      <div class="set-number">${esc(r.set_number)}</div>
      <div class="d-flex gap-2 mb-2 flex-wrap">
        <span class="badge bg-dark bg-opacity-10 text-dark">${esc(r.compound)}</span>
        ${condBadge(r.condition)}
      </div>
      <div class="data-row"><span class="data-key">Car #</span><span>${esc(r.car_number)}</span></div>
      <div class="data-row"><span class="data-key">Driver</span><span>${esc(r.driver_name)}</span></div>
      <div class="data-row"><span class="data-key">Laps Used</span><span>${r.laps_used ?? '—'}</span></div>
      <div class="data-row"><span class="data-key">Spec</span><span>${esc(r.specification)}</span></div>
      <div class="data-row"><span class="data-key">Temp I/M/O</span><span>${fmt(r.temperature_inner)} / ${fmt(r.temperature_middle)} / ${fmt(r.temperature_outer)}</span></div>
      <div class="data-row"><span class="data-key">Pres H/C</span><span>${fmt(r.pressure_hot)} / ${fmt(r.pressure_cold)}</span></div>
    </div>`).join('');
}

function esc(v) { return v ? String(v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'; }
function fmt(v) { return v != null ? Number(v).toFixed(1) : '—'; }
function numOrNull(id) { const v = document.getElementById(id).value; return v !== '' ? Number(v) : null; }

function openModal(id = null) {
  const rec = id ? allData.find(r => r.id === id) : null;
  document.getElementById('modalTitle').textContent = rec ? 'Edit Tyre Set' : 'New Tyre Set';
  document.getElementById('btnDelete').classList.toggle('d-none', !rec);
  document.getElementById('fId').value           = rec ? rec.id : '';
  document.getElementById('fSetNumber').value    = rec ? (rec.set_number     || '') : '';
  document.getElementById('fCompound').value     = rec ? (rec.compound       || '') : '';
  document.getElementById('fSpecification').value= rec ? (rec.specification  || '') : '';
  document.getElementById('fCarNumber').value    = rec ? (rec.car_number     || '') : '';
  document.getElementById('fDriverName').value   = rec ? (rec.driver_name    || '') : '';
  document.getElementById('fSessionFitted').value= rec ? (rec.session_fitted || '') : '';
  document.getElementById('fLapsUsed').value     = rec ? (rec.laps_used      ?? '') : '';
  document.getElementById('fCondition').value    = rec ? (rec.condition      || 'new') : 'new';
  document.getElementById('fTempInner').value    = rec ? (rec.temperature_inner  ?? '') : '';
  document.getElementById('fTempMiddle').value   = rec ? (rec.temperature_middle ?? '') : '';
  document.getElementById('fTempOuter').value    = rec ? (rec.temperature_outer  ?? '') : '';
  document.getElementById('fPressureHot').value  = rec ? (rec.pressure_hot   ?? '') : '';
  document.getElementById('fPressureCold').value = rec ? (rec.pressure_cold  ?? '') : '';
  document.getElementById('fNotes').value        = rec ? (rec.notes          || '') : '';
  bsModal.show();
}

async function saveRecord() {
  const payload = {
    set_number         : document.getElementById('fSetNumber').value.trim(),
    compound           : document.getElementById('fCompound').value.trim(),
    specification      : document.getElementById('fSpecification').value.trim(),
    car_number         : document.getElementById('fCarNumber').value.trim(),
    driver_name        : document.getElementById('fDriverName').value.trim(),
    session_fitted     : document.getElementById('fSessionFitted').value.trim(),
    laps_used          : numOrNull('fLapsUsed'),
    condition          : document.getElementById('fCondition').value,
    temperature_inner  : numOrNull('fTempInner'),
    temperature_middle : numOrNull('fTempMiddle'),
    temperature_outer  : numOrNull('fTempOuter'),
    pressure_hot       : numOrNull('fPressureHot'),
    pressure_cold      : numOrNull('fPressureCold'),
    notes              : document.getElementById('fNotes').value.trim()
  };
  if (!payload.set_number || !payload.compound) { alert('Set Number and Compound are required'); return; }
  const id = document.getElementById('fId').value;
  try {
    const res = await fetch(id ? `/api/tyre-register/${id}` : '/api/tyre-register', {
      method : id ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body   : JSON.stringify(payload)
    });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    await loadData();
  } catch(e) { alert('Save failed: ' + e.message); }
}

async function deleteRecord() {
  const id = document.getElementById('fId').value;
  if (!id || !confirm('Delete this tyre set? This cannot be undone.')) return;
  try {
    const res = await fetch(`/api/tyre-register/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    bsModal.hide();
    await loadData();
  } catch(e) { alert('Delete failed: ' + e.message); }
}
</script>
</body>
</html>
