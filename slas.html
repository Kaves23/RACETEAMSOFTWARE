<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – SLAs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 18px;min-width:120px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .ev-stat-value{font-size:1.6rem;font-weight:700;color:#1a1d24;}
    .main-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;overflow:hidden;}
    .main-card-hdr{padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#fffbeb;}
    .supplier-group-hdr{background:#f8f9fa;font-weight:700;font-size:.78rem;color:#374151;padding:8px 10px;border-top:2px solid #f3f4f6;letter-spacing:.3px;}
    .supplier-group-hdr td{border-bottom:1px solid #e5e7eb!important;}
    .filter-pill{padding:4px 12px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid #dee2e6;background:#fff;color:#495057;transition:all .15s;}
    .filter-pill.active{background:#f59e0b;border-color:#f59e0b;color:#fff;font-weight:600;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Service Level Agreements</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Track supplier SLA metrics and compliance status</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#f59e0b;border-color:#f59e0b;">+ New SLA</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #10b981;"><div class="ev-stat-label">Met</div><div class="ev-stat-value" id="kpiMet">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #f59e0b;"><div class="ev-stat-label">At Risk</div><div class="ev-stat-value" id="kpiAtRisk">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #ef4444;"><div class="ev-stat-label">Breached</div><div class="ev-stat-value" id="kpiBreached">—</div></div>
  </div>

  <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
    <span class="filter-pill active" data-val="">All</span>
    <span class="filter-pill" data-val="met">Met</span>
    <span class="filter-pill" data-val="at_risk">At Risk</span>
    <span class="filter-pill" data-val="breached">Breached</span>
    <span class="filter-pill" data-val="not_measured">Not Measured</span>
    <input type="search" class="form-control form-control-sm ms-auto" id="searchBox" placeholder="Search…" style="width:200px;"/>
  </div>

  <div class="main-card">
    <div class="main-card-hdr">
      <small style="font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;letter-spacing:.5px;">SLA Metrics — Grouped by Supplier</small>
      <small id="rowCount" class="text-muted" style="font-size:.75rem;">0 records</small>
    </div>
    <div style="overflow-y:auto;max-height:calc(100vh - 380px);">
      <table class="data-table">
        <thead><tr><th>Metric</th><th>Target</th><th>Actual</th><th>Period</th><th>Review Date</th><th>Status</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="slaModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background:#f59e0b;color:#fff;">
        <h5 class="modal-title" id="modalTitle">New SLA</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="slaForm" class="vstack gap-2" onsubmit="return false">
          <div><label class="form-label small fw-semibold">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId"/></div>
          <div><label class="form-label small fw-semibold">Supplier Name *</label><input class="form-control form-control-sm" id="fSupplierName"/></div>
          <div><label class="form-label small fw-semibold">Metric Name *</label><input class="form-control form-control-sm" id="fMetricName"/></div>
          <div><label class="form-label small fw-semibold">Target Value *</label><input class="form-control form-control-sm" id="fTargetValue" placeholder="e.g. 99% or 48h"/></div>
          <div><label class="form-label small fw-semibold">Measurement Period</label><input class="form-control form-control-sm" id="fMeasurementPeriod" placeholder="e.g. Monthly, Q1 2026"/></div>
          <div><label class="form-label small fw-semibold">Actual Value</label><input class="form-control form-control-sm" id="fActualValue"/></div>
          <div><label class="form-label small fw-semibold">Status</label>
            <select class="form-select form-select-sm" id="fStatus">
              <option value="met">Met</option><option value="at_risk">At Risk</option>
              <option value="breached">Breached</option><option value="not_measured">Not Measured</option>
            </select>
          </div>
          <div><label class="form-label small fw-semibold">Review Date</label><input type="date" class="form-control form-control-sm" id="fReviewDate"/></div>
          <div><label class="form-label small fw-semibold">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="3"></textarea></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-danger me-auto" id="btnDel" style="display:none;">Delete</button>
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm text-white" id="btnSave" style="background:#f59e0b;border-color:#f59e0b;">Save SLA</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/slas';
let all=[],sel=null,filtStatus='';
const modal=new bootstrap.Modal(document.getElementById('slaModal'));
const gv=id=>(document.getElementById(id)||{}).value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};
const statusBadge=s=>{const m={met:'success',at_risk:'warning',breached:'danger',not_measured:'secondary'};return`<span class="badge bg-${m[s]||'secondary'}">${(s||'—').replace('_',' ')}</span>`;};

async function load(){
  try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();render();}
  catch(e){console.error(e);}
}

function updateKPIs(){
  document.getElementById('kpiTotal').textContent=all.length;
  document.getElementById('kpiMet').textContent=all.filter(x=>x.status==='met').length;
  document.getElementById('kpiAtRisk').textContent=all.filter(x=>x.status==='at_risk').length;
  document.getElementById('kpiBreached').textContent=all.filter(x=>x.status==='breached').length;
}

function render(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  let d=filtStatus?all.filter(x=>x.status===filtStatus):[...all];
  if(q) d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
  document.getElementById('rowCount').textContent=d.length+' records';

  // Group by supplier_name
  const groups={};
  d.forEach(row=>{const k=row.supplier_name||'Unknown Supplier';if(!groups[k])groups[k]=[];groups[k].push(row);});

  let html='';
  Object.keys(groups).sort().forEach(supplier=>{
    html+=`<tr class="supplier-group-hdr"><td colspan="7"><i class="bi bi-building me-2"></i>${supplier} <span class="text-muted fw-normal">(${groups[supplier].length})</span></td></tr>`;
    groups[supplier].forEach(row=>{
      html+=`<tr data-id="${row.id}">
        <td class="fw-semibold">${row.metric_name||'—'}</td>
        <td>${row.target_value||'—'}</td>
        <td>${row.actual_value||'—'}</td>
        <td>${row.measurement_period||'—'}</td>
        <td>${row.review_date||'—'}</td>
        <td>${statusBadge(row.status)}</td>
        <td><button class="btn btn-sm btn-outline-secondary py-0 px-2" style="font-size:.72rem;" onclick="openEdit(${row.id})">Edit</button></td>
      </tr>`;
    });
  });

  document.getElementById('tbody').innerHTML=html||'<tr><td colspan="7" class="text-center text-muted py-4">No SLAs found</td></tr>';
}

function openNew(){
  sel=null;document.getElementById('slaForm').reset();sv('fStatus','met');
  document.getElementById('modalTitle').textContent='New SLA';
  document.getElementById('btnDel').style.display='none';
  modal.show();
}

function openEdit(id){
  const item=all.find(x=>x.id===id||String(x.id)===String(id));
  if(!item)return;
  sel=item;
  document.getElementById('modalTitle').textContent='Edit SLA';
  document.getElementById('btnDel').style.display='';
  sv('fSupplierId',item.supplier_id);sv('fSupplierName',item.supplier_name);
  sv('fMetricName',item.metric_name);sv('fTargetValue',item.target_value);
  sv('fMeasurementPeriod',item.measurement_period);sv('fActualValue',item.actual_value);
  sv('fStatus',item.status||'met');sv('fReviewDate',item.review_date);sv('fNotes',item.notes);
  modal.show();
}

async function save(){
  const body={supplier_id:gv('fSupplierId')||null,supplier_name:gv('fSupplierName'),
    metric_name:gv('fMetricName'),target_value:gv('fTargetValue'),
    measurement_period:gv('fMeasurementPeriod'),actual_value:gv('fActualValue'),
    status:gv('fStatus')||'met',review_date:gv('fReviewDate')||null,notes:gv('fNotes')};
  if(!body.supplier_name||!body.metric_name||!body.target_value){alert('Supplier Name, Metric Name and Target are required');return;}
  try{
    const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){modal.hide();await load();}else alert('Save failed');
  }catch(e){console.error(e);alert('Save failed');}
}

async function del(){
  if(!sel||!confirm('Delete this SLA?'))return;
  try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){modal.hide();await load();}else alert('Delete failed');}
  catch(e){console.error(e);}
}

document.getElementById('btnAdd').onclick=openNew;
document.getElementById('btnSave').onclick=save;
document.getElementById('btnDel').onclick=del;
document.getElementById('searchBox').addEventListener('input',render);
document.querySelectorAll('.filter-pill').forEach(p=>p.onclick=()=>{
  document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');filtStatus=p.dataset.val;render();
});
load();
</script>
</body>
</html>
