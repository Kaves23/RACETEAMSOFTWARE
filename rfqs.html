<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – RFQs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 18px;min-width:120px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .ev-stat-value{font-size:1.6rem;font-weight:700;color:#1a1d24;}
    .shell{display:flex;gap:10px;height:calc(100vh - 220px);}
    .pane{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;}
    .pane-hdr{padding:8px 12px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;}
    .pane-hdr small{font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;letter-spacing:.5px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#f0f9ff;}
    .data-table tbody tr.selected{background:rgba(14,165,233,.1);outline:2px solid #0ea5e9;outline-offset:-2px;}
    .drawer{width:380px;min-width:320px;}
    .drawer form label{font-size:.78rem;font-weight:600;color:#374151;margin-bottom:2px;}
    .drawer .form-control,.drawer .form-select{font-size:.82rem;}
    .filter-pill{padding:4px 12px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid #dee2e6;background:#fff;color:#495057;transition:all .15s;}
    .filter-pill.active{background:#0ea5e9;border-color:#0ea5e9;color:#fff;font-weight:600;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Request for Quotations</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Track supplier RFQs from draft through to award</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#0ea5e9;border-color:#0ea5e9;">+ New RFQ</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #9ca3af;"><div class="ev-stat-label">Draft</div><div class="ev-stat-value" id="kpiDraft">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #0ea5e9;"><div class="ev-stat-label">Sent</div><div class="ev-stat-value" id="kpiSent">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #f59e0b;"><div class="ev-stat-label">Received</div><div class="ev-stat-value" id="kpiReceived">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #10b981;"><div class="ev-stat-label">Awarded</div><div class="ev-stat-value" id="kpiAwarded">—</div></div>
  </div>

  <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
    <span class="filter-pill active" data-val="">All</span>
    <span class="filter-pill" data-val="draft">Draft</span>
    <span class="filter-pill" data-val="sent">Sent</span>
    <span class="filter-pill" data-val="received">Received</span>
    <span class="filter-pill" data-val="awarded">Awarded</span>
    <span class="filter-pill" data-val="cancelled">Cancelled</span>
    <input type="search" class="form-control form-control-sm ms-auto" id="searchBox" placeholder="Search…" style="width:200px;"/>
  </div>

  <div class="shell">
    <div class="pane" style="flex:1 1 0;min-width:0;">
      <div class="pane-hdr"><small>RFQ List</small><small id="rowCount" class="text-muted">0 records</small></div>
      <div style="overflow-y:auto;flex:1;">
        <table class="data-table">
          <thead><tr><th>RFQ #</th><th>Title</th><th>Supplier</th><th>Required By</th><th>Response Due</th><th>Priority</th><th>Status</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="pane drawer" id="drawerPane">
      <div class="pane-hdr">
        <small id="drawerTitle">New RFQ</small>
        <button class="btn btn-sm btn-danger" id="btnDel" style="display:none;font-size:.75rem;">Delete</button>
      </div>
      <div style="overflow-y:auto;flex:1;padding:14px;">
        <form id="rfqForm" class="vstack gap-2" onsubmit="return false">
          <div><label class="form-label">RFQ Number</label><input class="form-control form-control-sm" id="fRfqNumber"/></div>
          <div><label class="form-label">Title *</label><input class="form-control form-control-sm" id="fTitle"/></div>
          <div><label class="form-label">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId" placeholder="Supplier ID"/></div>
          <div><label class="form-label">Supplier Name</label><input class="form-control form-control-sm" id="fSupplierName"/></div>
          <div><label class="form-label">Items Description</label><textarea class="form-control form-control-sm" id="fItemsDescription" rows="3"></textarea></div>
          <div><label class="form-label">Quantity</label><input type="number" class="form-control form-control-sm" id="fQuantity" min="0"/></div>
          <div class="row g-2">
            <div class="col-6"><label class="form-label">Required By</label><input type="date" class="form-control form-control-sm" id="fRequiredBy"/></div>
            <div class="col-6"><label class="form-label">Issued Date</label><input type="date" class="form-control form-control-sm" id="fIssuedDate"/></div>
          </div>
          <div><label class="form-label">Response Due</label><input type="date" class="form-control form-control-sm" id="fResponseDue"/></div>
          <div><label class="form-label">Status</label>
            <select class="form-select form-select-sm" id="fStatus">
              <option value="draft">Draft</option><option value="sent">Sent</option>
              <option value="received">Received</option><option value="awarded">Awarded</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div><label class="form-label">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="3"></textarea></div>
          <div><label class="form-label">Created By</label><input class="form-control form-control-sm" id="fCreatedBy"/></div>
        </form>
        <button class="btn btn-sm text-white mt-2 w-100" id="btnSave" style="background:#0ea5e9;border-color:#0ea5e9;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/rfqs';
let all=[],sel=null,filt='';
const gv=id=>(document.getElementById(id)||{}).value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};
const statusBadge=s=>{const m={draft:'secondary',sent:'primary',received:'warning',awarded:'success',cancelled:'danger'};return`<span class="badge bg-${m[s]||'secondary'}">${s||'—'}</span>`;};

async function load(){
  try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();render();}
  catch(e){console.error(e);}
}

function updateKPIs(){
  document.getElementById('kpiTotal').textContent=all.length;
  ['draft','sent','received','awarded'].forEach(s=>{
    const el=document.getElementById('kpi'+s.charAt(0).toUpperCase()+s.slice(1));
    if(el) el.textContent=all.filter(x=>x.status===s).length;
  });
}

function render(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  let d=filt?all.filter(x=>x.status===filt):[...all];
  if(q) d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
  document.getElementById('rowCount').textContent=d.length+' records';
  document.getElementById('tbody').innerHTML=d.length
    ?d.map(row=>`<tr data-id="${row.id}" class="${sel&&String(sel.id)===String(row.id)?'selected':''}">
        <td class="fw-semibold">${row.rfq_number||'—'}</td>
        <td>${row.title||'—'}</td>
        <td>${row.supplier_name||'—'}</td>
        <td>${row.required_by||'—'}</td>
        <td>${row.response_due||'—'}</td>
        <td>${row.priority||'—'}</td>
        <td>${statusBadge(row.status)}</td>
      </tr>`).join('')
    :'<tr><td colspan="7" class="text-center text-muted py-4">No RFQs found</td></tr>';
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
    const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)pick(item);
  });
}

function pick(item){
  sel=item;
  document.getElementById('drawerTitle').textContent=item.rfq_number||item.title||'RFQ Detail';
  document.getElementById('btnDel').style.display='';
  sv('fRfqNumber',item.rfq_number);sv('fTitle',item.title);sv('fSupplierId',item.supplier_id);
  sv('fSupplierName',item.supplier_name);sv('fItemsDescription',item.items_description);
  sv('fQuantity',item.quantity);sv('fRequiredBy',item.required_by);sv('fIssuedDate',item.issued_date);
  sv('fResponseDue',item.response_due);sv('fStatus',item.status||'draft');
  sv('fNotes',item.notes);sv('fCreatedBy',item.created_by);
  render();
}

function clearForm(){
  sel=null;document.getElementById('rfqForm').reset();sv('fStatus','draft');
  document.getElementById('btnDel').style.display='none';
  document.getElementById('drawerTitle').textContent='New RFQ';
  render();
}

async function save(){
  const body={rfq_number:gv('fRfqNumber'),title:gv('fTitle'),supplier_id:gv('fSupplierId')||null,
    supplier_name:gv('fSupplierName'),items_description:gv('fItemsDescription'),
    quantity:gv('fQuantity')||null,required_by:gv('fRequiredBy')||null,issued_date:gv('fIssuedDate')||null,
    response_due:gv('fResponseDue')||null,status:gv('fStatus')||'draft',notes:gv('fNotes'),created_by:gv('fCreatedBy')};
  if(!body.title){alert('Title is required');return;}
  try{
    const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const saved=await r.json();sel=saved.data||saved;await load();pick(sel);}
    else alert('Save failed');
  }catch(e){console.error(e);alert('Save failed');}
}

async function del(){
  if(!sel||!confirm('Delete this RFQ?'))return;
  try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){clearForm();await load();}else alert('Delete failed');}
  catch(e){console.error(e);}
}

document.getElementById('btnAdd').onclick=clearForm;
document.getElementById('btnSave').onclick=save;
document.getElementById('btnDel').onclick=del;
document.getElementById('searchBox').addEventListener('input',render);
document.querySelectorAll('.filter-pill').forEach(p=>p.onclick=()=>{
  document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');filt=p.dataset.val;render();
});
load();
</script>
</body>
</html>
