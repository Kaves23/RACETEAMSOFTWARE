<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Runbooks — Race Team Software</title>
  <link rel="stylesheet" href="style.css?v=20260420">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* compact tri-pane tweaks (rely on site-wide rules where possible) */
    .rts-tri { display:flex; gap:12px; }
    .rts-left, .rts-mid, .rts-right { background:#fff; border-radius:6px; padding:8px; }
    .rts-left { width:220px; min-width:180px; }
    .rts-mid { flex:1 1 360px; }
    .rts-right { width:420px; min-width:300px; }
    .pastel-tree li { cursor:pointer; }
    .runbook-title { font-weight:600; }
    .rts-new-highlight { background:#ff66cc; color:#111; }
    .small-note { font-size:0.85rem; color:#666; }
  </style>
</head>
<body>
  <div class="container-fluid mt-2">
    <div class="d-flex align-items-center mb-2">
      <h3 class="me-3">Runbooks</h3>
      <div class="btn-group">
        <button id="btnAdd" class="btn btn-sm btn-primary">Add Runbook</button>
        <button id="btnExport" class="btn btn-sm btn-outline-secondary">Export JSON</button>
      </div>
      <div class="ms-auto small-note">Runbooks are templates for event ops. Instantiate into Events.</div>
    </div>

    <div class="rts-tri">
      <div class="rts-left shadow-sm">
        <ul id="leftList" class="pastel-tree list-unstyled mb-0"></ul>
      </div>

      <div class="rts-mid shadow-sm">
        <div id="midList"></div>
      </div>

      <div class="rts-right shadow-sm">
        <nav>
          <div class="nav nav-tabs nav-dark" id="inspectorTabs" role="tablist">
            <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tabDetails" type="button">Details</button>
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabSteps" type="button">Steps</button>
            <button class="nav-link" data-bs-toggle="tab" data-bs-target="#tabAttachments" type="button">Attachments</button>
          </div>
        </nav>
        <div class="tab-content mt-2">
          <div class="tab-pane fade show active" id="tabDetails">
            <div class="mb-2">
              <label class="form-label">Title</label>
              <input id="inpTitle" class="form-control form-control-sm">
            </div>
            <div class="mb-2">
              <label class="form-label">Summary</label>
              <textarea id="inpSummary" class="form-control form-control-sm" rows="3"></textarea>
            </div>
            <div class="d-flex gap-2">
              <button id="btnSave" class="btn btn-sm btn-success">Save</button>
              <button id="btnDelete" class="btn btn-sm btn-danger">Delete</button>
              <button id="btnInstantiate" class="btn btn-sm btn-outline-primary">Create Event from Runbook</button>
            </div>
          </div>

          <div class="tab-pane fade" id="tabSteps">
            <div id="stepsWrapper"></div>
            <div class="mt-2">
              <button id="btnAddStep" class="btn btn-sm btn-outline-secondary">Add Step</button>
            </div>
          </div>

          <div class="tab-pane fade" id="tabAttachments">
            <div id="attachmentsWrapper"></div>
            <div class="mt-2">
              <button id="btnAttach" class="btn btn-sm btn-outline-secondary">Attach File</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Minimal runbooks page scaffold with localStorage persistence
    const LS_KEY = 'rts.runbooks.v1';
    let runbooks = [];
    let ui = { selectedId: null };

    function uid(prefix='rb'){
      return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
    }

    function load(){
      try{ runbooks = JSON.parse(localStorage.getItem(LS_KEY) || '[]'); }catch(e){ runbooks = []; }
      if(!runbooks || !Array.isArray(runbooks)) runbooks = [];
      if(runbooks.length===0) createSample();
      renderAll();
    }

    function saveAll(){
      localStorage.setItem(LS_KEY, JSON.stringify(runbooks,null,2));
      renderAll();
    }

    function createSample(){
      const sample = { id: uid(), title:'Weekend Club Race', summary:'Template for a typical weekend race', eventType:'race', version:1, steps:[{id:uid('s'),'title':'Set up startline','description':'Tape, flags, radios',required:true}], attachments:[] };
      runbooks.push(sample);
      ui.selectedId = sample.id;
      saveAll();
    }

    function renderAll(){ renderLeft(); renderMid(); renderInspector(); }

    function renderLeft(){
      const el = document.getElementById('leftList'); el.innerHTML='';
      runbooks.forEach(rb=>{
        const li = document.createElement('li'); li.className='py-1 px-1 d-flex align-items-center';
        if(rb.id===ui.selectedId) li.classList.add('bg-light');
        li.innerHTML = `<div class="flex-grow-1"><div class="runbook-title">${escapeHtml(rb.title||'Untitled')}</div><div class="small-note">${escapeHtml(rb.eventType||'')}</div></div>`;
        li.onclick = ()=>{ ui.selectedId = rb.id; renderAll(); };
        el.appendChild(li);
      });
    }

    function renderMid(){
      const el = document.getElementById('midList');
      el.innerHTML = '';
      const list = document.createElement('div');
      runbooks.forEach(rb=>{
        const row = document.createElement('div');
        row.className = 'd-flex justify-content-between align-items-center py-1 border-bottom';
        row.innerHTML = `<div><strong>${escapeHtml(rb.title)}</strong><div class="small-note">${escapeHtml(rb.summary||'')}</div></div><div><button class='btn btn-sm btn-link'>Open</button></div>`;
        row.querySelector('button').onclick = ()=>{ ui.selectedId = rb.id; renderAll(); };
        list.appendChild(row);
      });
      el.appendChild(list);
    }

    function renderInspector(){
      const rb = runbooks.find(r=>r.id===ui.selectedId) || null;
      document.getElementById('inpTitle').value = rb?rb.title:'';
      document.getElementById('inpSummary').value = rb?rb.summary:'';
      renderSteps(rb);
      renderAttachments(rb);
    }

    function renderSteps(rb){
      const wrap = document.getElementById('stepsWrapper'); wrap.innerHTML='';
      if(!rb){ wrap.innerHTML='<div class="small-note">No runbook selected</div>'; return; }
      rb.steps = rb.steps || [];
      rb.steps.forEach((s,idx)=>{
        const div = document.createElement('div'); div.className='border rounded p-2 mb-2';
        div.innerHTML = `<div class='d-flex justify-content-between'><strong>${escapeHtml(s.title||'Step')}</strong><div><button class='btn btn-sm btn-outline-danger'>Remove</button></div></div><div class='small-note'>${escapeHtml(s.description||'')}</div>`;
        div.querySelector('button').onclick = ()=>{ rb.steps.splice(idx,1); saveAll(); };
        wrap.appendChild(div);
      });
      if(rb.steps.length===0) wrap.innerHTML = '<div class="small-note">No steps yet</div>';
    }

    function renderAttachments(rb){
      const wrap = document.getElementById('attachmentsWrapper'); wrap.innerHTML='';
      if(!rb){ wrap.innerHTML='<div class="small-note">No runbook selected</div>'; return; }
      rb.attachments = rb.attachments || [];
      rb.attachments.forEach(a=>{
        const div = document.createElement('div'); div.className='py-1 border-bottom'; div.textContent = a.name || a.driveId || 'attachment'; wrap.appendChild(div);
      });
      if(rb.attachments.length===0) wrap.innerHTML = '<div class="small-note">No attachments</div>';
    }

    function addRunbook(){
      const rb = { id: uid(), title:'New Runbook', summary:'', version:1, steps:[], attachments:[] };
      runbooks.unshift(rb);
      ui.selectedId = rb.id; saveAll();
      // highlight briefly
      setTimeout(()=>{ renderLeft(); },50);
    }

    function saveCurrent(){
      const rb = runbooks.find(r=>r.id===ui.selectedId); if(!rb) return;
      rb.title = document.getElementById('inpTitle').value.trim();
      rb.summary = document.getElementById('inpSummary').value.trim();
      rb.version = (rb.version||1)+1;
      saveAll();
    }

    function deleteCurrent(){
      const rb = runbooks.find(r=>r.id===ui.selectedId); if(!rb) return;
      const doDelete = (window.RTS && window.RTS.confirmPrompt) ? window.RTS.confirmPrompt('Delete runbook?','This will remove the runbook template.') : Promise.resolve(window.confirm('Delete runbook?'));
      doDelete.then(ok=>{
        if(!ok) return;
        runbooks = runbooks.filter(r=>r.id!==rb.id);
        ui.selectedId = runbooks[0]?runbooks[0].id:null;
        saveAll();
      });
    }

    function addStep(){
      const rb = runbooks.find(r=>r.id===ui.selectedId); if(!rb) return;
      rb.steps = rb.steps || [];
      rb.steps.push({ id: uid('s'), title:'New Step', description:'' });
      saveAll();
    }

    function attachFake(){
      const rb = runbooks.find(r=>r.id===ui.selectedId); if(!rb) return;
      rb.attachments = rb.attachments || [];
      rb.attachments.push({ id: uid('a'), name:'example.pdf', driveId:null, uploadedAt:new Date().toISOString() });
      saveAll();
    }

    // small helpers
    function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

    // wire buttons
    document.addEventListener('DOMContentLoaded', ()=>{
      document.getElementById('btnAdd').onclick = addRunbook;
      document.getElementById('btnSave').onclick = saveCurrent;
      document.getElementById('btnDelete').onclick = deleteCurrent;
      document.getElementById('btnAddStep').onclick = addStep;
      document.getElementById('btnAttach').onclick = attachFake;
      document.getElementById('btnExport').onclick = ()=>{
        const data = JSON.stringify(runbooks, null, 2);
        const blob = new Blob([data], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'runbooks.json'; a.click();
        URL.revokeObjectURL(url);
      };
      document.getElementById('btnInstantiate').onclick = ()=>{
        const rb = runbooks.find(r=>r.id===ui.selectedId); if(!rb) return;
        // open events.html with fromRunbook param and baked title
        const params = new URLSearchParams({fromRunbook:rb.id, title: rb.title});
        if(window.RTS && window.RTS.openWithTab) window.RTS.openWithTab('events.html', 'inspector', '?'+params.toString());
        else window.location.href = 'events.html?'+params.toString();
      };
      load();
    });
  </script>
</body>
</html>
