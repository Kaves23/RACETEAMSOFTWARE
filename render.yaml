services:
  - type: web
    name: raceteamsoftware
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: server
    buildCommand: npm install
    startCommand: mkdir -p /tmp/aim && curl -fsSL https://github.com/bmc-labs/xdrk/raw/trunk/aim/libxdrk-x86_64.so -o /tmp/aim/libxdrk-x86_64.so; npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AIM_XRK_LIB
        value: /tmp/aim/libxdrk-x86_64.so
      - key: DATABASE_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
    autoDeploy: true
