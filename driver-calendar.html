<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Race Team OS – Driver Calendar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;}
    #mainShell.mlo-shell{background:transparent;border:none;gap:10px;}
    #mainShell .mlo-pane-left,#mainShell .mlo-pane-mid,#mainShell .mlo-pane-right{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;}
    .data-table td{padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.05);}
    .data-table tbody tr{cursor:pointer;}
    .data-table tbody tr:hover{background:#f8f9fa;}
    .data-table tbody tr.selected{background:rgba(236,72,153,.08);outline:2px solid #ec4899;outline-offset:-2px;}
    .filter-item{padding:5px 8px;border-radius:4px;cursor:pointer;font-size:.8rem;margin-bottom:2px;display:block;color:#495057;text-decoration:none;}
    .filter-item:hover{background:#fdf2f8;color:#ec4899;}
    .filter-item.active{background:rgba(236,72,153,.12);color:#ec4899;font-weight:600;}
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
      <div>
        <h1 class="h4 mb-1">Driver Calendar</h1>
        <p class="text-secondary mb-0" style="font-size:.85rem;">Driver schedule — races, tests, media, fitness and travel</p>
      </div>
      <button class="btn btn-sm" id="btnAdd" style="background:#ec4899;border-color:#ec4899;color:#fff">+ New Event</button>
    </div>
    <div class="ev-stats-bar">
      <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpi0">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">This Month</div><div class="ev-stat-value" id="kpi1">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Races</div><div class="ev-stat-value" id="kpi2">—</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Tests</div><div class="ev-stat-value" id="kpi3">—</div></div>
    </div>
    <div class="mlo-shell" id="mainShell">
      <div class="mlo-pane mlo-pane-left" style="width:180px;min-width:140px;">
        <div class="mlo-pane-header p-2 border-bottom"><small class="fw-bold text-muted">EVENT TYPE</small></div>
        <div class="mlo-pane-content p-2" id="filterList"></div>
      </div>
      <div class="mlo-resizer"></div>
      <div class="mlo-pane mlo-pane-mid" style="flex:1 1 0;min-width:200px;">
        <div class="mlo-pane-header p-2 border-bottom d-flex justify-content-between align-items-center">
          <small class="fw-bold text-muted">CALENDAR LIST</small>
          <input type="search" class="form-control form-control-sm" id="searchBox" placeholder="Search…" style="width:160px"/>
        </div>
        <div class="mlo-pane-content p-0" style="overflow-y:auto;max-height:calc(100vh - 260px);">
          <table class="data-table">
            <thead><tr><th>Driver</th><th>Type</th><th>Title</th><th>Start Date</th><th>Location</th><th>Status</th></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
      <div class="mlo-resizer"></div>
      <div class="mlo-pane mlo-pane-right" style="width:320px;min-width:260px;">
        <div class="mlo-pane-header p-2 border-bottom d-flex justify-content-between align-items-center">
          <small class="fw-bold text-muted">INSPECTOR</small>
          <button class="btn btn-sm btn-danger" id="btnDel" style="display:none">Delete</button>
        </div>
        <div class="mlo-pane-content p-3" style="overflow-y:auto;max-height:calc(100vh - 260px);">
          <form id="form" class="vstack gap-2" onsubmit="return false">
            <div><label class="form-label small fw-semibold mb-1">Driver Name *</label><input class="form-control form-control-sm" id="fDriver"/></div>
            <div><label class="form-label small fw-semibold mb-1">Driver ID</label><input class="form-control form-control-sm" id="fDriverId"/></div>
            <div><label class="form-label small fw-semibold mb-1">Event Type</label>
              <select class="form-select form-select-sm" id="fType">
                <option value="race">Race</option><option value="test">Test</option>
                <option value="media">Media</option><option value="fitness">Fitness</option>
                <option value="simulator">Simulator</option><option value="travel">Travel</option><option value="other">Other</option>
              </select>
            </div>
            <div><label class="form-label small fw-semibold mb-1">Title *</label><input class="form-control form-control-sm" id="fTitle"/></div>
            <div><label class="form-label small fw-semibold mb-1">Start Date/Time</label><input type="datetime-local" class="form-control form-control-sm" id="fStart"/></div>
            <div><label class="form-label small fw-semibold mb-1">End Date/Time</label><input type="datetime-local" class="form-control form-control-sm" id="fEnd"/></div>
            <div><label class="form-label small fw-semibold mb-1">Location</label><input class="form-control form-control-sm" id="fLocation"/></div>
            <div><label class="form-label small fw-semibold mb-1">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="confirmed">Confirmed</option><option value="tentative">Tentative</option><option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div><label class="form-label small fw-semibold mb-1">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="3"></textarea></div>
          </form>
          <button class="btn btn-sm mt-2 w-100" id="btnSave" style="background:#ec4899;color:#fff">Save</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="topnav.js?v=20260420"></script>
  <script src="core.js?v=20260420"></script>
  <script>
  const API='/api/driver-calendar';
  const TYPES=['race','test','media','fitness','simulator','travel','other'];
  let all=[],sel=null,filt='all';
  const gv=id=>(document.getElementById(id)||{}).value||'';
  const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};

  async function load(){
    try{const r=await fetch(API);const j=await r.json();all=Array.isArray(j)?j:(j.data||[]);updateKPIs();buildFilters();render();}
    catch(e){console.error(e);}
  }

  function updateKPIs(){
    const now=new Date();const ym=now.getFullYear()+'-'+(String(now.getMonth()+1).padStart(2,'0'));
    document.getElementById('kpi0').textContent=all.length;
    document.getElementById('kpi1').textContent=all.filter(x=>x.start_date&&x.start_date.startsWith(ym)).length;
    document.getElementById('kpi2').textContent=all.filter(x=>x.event_type==='race').length;
    document.getElementById('kpi3').textContent=all.filter(x=>x.event_type==='test').length;
  }

  function buildFilters(){
    document.getElementById('filterList').innerHTML=
      [['all','All'],...TYPES.map(t=>[t,t.charAt(0).toUpperCase()+t.slice(1)])].map(([v,l])=>
        `<a class="filter-item${filt===v?' active':''}" data-val="${v}" href="#">${l} <small class="text-muted">(${v==='all'?all.length:all.filter(x=>x.event_type===v).length})</small></a>`
      ).join('');
    document.querySelectorAll('#filterList .filter-item').forEach(a=>a.onclick=e=>{e.preventDefault();filt=a.dataset.val;buildFilters();render();});
  }

  function render(){
    const q=document.getElementById('searchBox').value.toLowerCase();
    let d=filt==='all'?[...all]:all.filter(x=>x.event_type===filt);
    if(q)d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
    d.sort((a,b)=>(a.start_date||'').localeCompare(b.start_date||''));
    const TypeColors={race:'danger',test:'primary',media:'info',fitness:'success',simulator:'warning',travel:'secondary',other:'secondary'};
    const SB={confirmed:'success',tentative:'warning',cancelled:'secondary'};
    document.getElementById('tbody').innerHTML=d.length
      ?d.map(row=>`<tr data-id="${row.id}" class="${sel&&String(sel.id)===String(row.id)?'selected':''}">
          <td class="fw-semibold">${row.driver_name||'—'}</td>
          <td><span class="badge bg-${TypeColors[row.event_type]||'secondary'}">${row.event_type||'—'}</span></td>
          <td>${row.title||'—'}</td>
          <td>${row.start_date?row.start_date.replace('T',' ').substring(0,16):'—'}</td>
          <td>${row.location||'—'}</td>
          <td><span class="badge bg-${SB[row.status]||'secondary'}">${row.status||'—'}</span></td>
        </tr>`).join('')
      :'<tr><td colspan="6" class="text-center text-muted py-4">No calendar events found</td></tr>';
    document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
      const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)pick(item);
    });
  }

  function pick(item){
    sel=item;
    sv('fDriver',item.driver_name);sv('fDriverId',item.driver_id);sv('fType',item.event_type||'race');
    sv('fTitle',item.title);sv('fStart',item.start_date);sv('fEnd',item.end_date);
    sv('fLocation',item.location);sv('fStatus',item.status||'confirmed');sv('fNotes',item.notes);
    document.getElementById('btnDel').style.display='';render();
  }

  function clearForm(){
    sel=null;document.getElementById('form').reset();
    sv('fType','race');sv('fStatus','confirmed');
    document.getElementById('btnDel').style.display='none';render();
  }

  async function save(){
    const body={driver_name:gv('fDriver'),driver_id:gv('fDriverId')||null,event_type:gv('fType'),
      title:gv('fTitle'),start_date:gv('fStart')||null,end_date:gv('fEnd')||null,
      location:gv('fLocation'),status:gv('fStatus'),notes:gv('fNotes')};
    if(!body.driver_name||!body.title){alert('Driver name and title are required');return;}
    try{
      const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
      const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){const saved=await r.json();if(!sel){sel=saved.data||saved;}await load();}
      else alert('Save failed');
    }catch(e){console.error(e);alert('Save failed');}
  }

  async function del(){
    if(!sel||!confirm('Delete this calendar event? This cannot be undone.'))return;
    try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){clearForm();await load();}else alert('Delete failed');}
    catch(e){console.error(e);}
  }

  document.getElementById('btnAdd').onclick=clearForm;
  document.getElementById('btnSave').onclick=save;
  document.getElementById('btnDel').onclick=del;
  document.getElementById('searchBox').addEventListener('input',render);
  load();
  </script>
</body>
</html>
