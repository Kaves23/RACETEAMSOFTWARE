<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Assets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
</head>
<body class="page-assets">
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
      

      
        <h1 class="my-3">Assets</h1>

        <div class="mlo-shell" id="assetShell">
          <!-- LEFT -->
          <section class="mlo-pane mlo-pane-left" aria-label="Asset navigation">
            <div class="mlo-pane-header">
              <div class="d-flex justify-content-between align-items-center">
                <div class="mlo-title">Perspectives</div>
                <span class="badge text-bg-secondary" id="asCountBadge">0</span>
              </div>
            </div>
            <div class="mlo-pane-content">
              <div class="mlo-section-label">Smart lists</div>
              <ul class="mlo-tree pastel-tree" id="asPerspectiveList">
                <li class="active" data-perspective="all">All Assets</li>
                <li data-perspective="assigned">Assigned</li>
                <li data-perspective="unassigned">Unassigned</li>
                <li data-perspective="needs_service">Needs Service</li>
                <li data-perspective="out_of_service">Out of Service</li>
                <li data-perspective="overdue_return">Overdue Return</li>
              </ul>

              <div class="mlo-section-label mt-3">Types</div>
              <ul class="mlo-tree pastel-tree" id="asTypeList"></ul>
            </div>
          </section>

          <div class="mlo-resizer" data-resize="left" title="Drag to resize"></div>

          <!-- MIDDLE -->
          <section class="mlo-pane mlo-pane-mid" aria-label="Asset list">
            <div class="mlo-pane-header">
              <div class="d-flex flex-wrap align-items-center gap-1">
                <input id="asSearch" type="text" class="form-control form-control-sm" placeholder="Search…" style="max-width: 220px;">
                <select id="asType" class="form-select form-select-sm" style="max-width: 200px;"></select>
                <select id="asStatus" class="form-select form-select-sm" style="max-width: 180px;">
                  <option value="">Status: All</option>
                  <option>OK</option>
                  <option>Needs Service</option>
                  <option>Out of Service</option>
                </select>
                <select id="asCustodian" class="form-select form-select-sm" style="max-width: 190px;"></select>
                <select id="asGroup" class="form-select form-select-sm" style="max-width: 190px;">
                  <option value="">Group: None</option>
                  <option value="type">Group: Type</option>
                  <option value="status">Group: Status</option>
                  <option value="custodian">Group: Custodian</option>
                  <option value="location">Group: Location</option>
                </select>
                <button class="btn btn-sm btn-outline-light mlo-btn" id="btnAddAs" type="button">Add Asset</button>
              </div>
            </div>
            <div class="mlo-pane-content" style="padding:0;">
              <table class="table table-dark table-hover mlo-table" style="margin:0;">
                <thead>
                  <tr>
                    <th style="width:60px;">#</th>
                    <th style="width:110px;">Asset ID</th>
                    <th>Name</th>
                    <th style="width:160px;">Type</th>
                    <th style="width:140px;">Status</th>
                    <th style="width:170px;">Custodian</th>
                    <th style="width:170px;">Location</th>
                  </tr>
                </thead>
                <tbody id="asTbody"></tbody>
              </table>
            </div>
          </section>

          <div class="mlo-resizer" data-resize="right" title="Drag to resize"></div>

          <!-- RIGHT -->
          <section class="mlo-pane mlo-pane-right mlo-inspector" aria-label="Asset inspector">
          <div class="mlo-pane-header">
            <div class="d-flex justify-content-between align-items-center">
              <div class="mlo-title">Inspector</div>
              <span class="badge text-bg-secondary" id="asInspectorBadge">No selection</span>
            </div>
          </div>
          <div class="mlo-pane-content">
              <ul class="nav nav-tabs nav-dark mb-2" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="tab-as-main" data-bs-toggle="tab" data-bs-target="#pane-as-main" type="button" role="tab" aria-controls="pane-as-main" aria-selected="true">Details</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="tab-as-history" data-bs-toggle="tab" data-bs-target="#pane-as-history" type="button" role="tab" aria-controls="pane-as-history" aria-selected="false">Timeline</button>
                </li>
              </ul>
              <div class="tab-content">
                <div class="tab-pane fade show active" id="pane-as-main" role="tabpanel" aria-labelledby="tab-as-main">
              <form id="asForm" autocomplete="off">
                <div class="row g-2">
                  <div class="col-5">
                    <label class="form-label">Asset ID</label>
                    <input id="f_as_id" class="form-control form-control-sm" type="text" readonly>
                  </div>
                  <div class="col-7">
                    <label class="form-label">Name</label>
                    <input id="f_as_name" class="form-control form-control-sm" type="text" placeholder="e.g. Chassis 01">
                  </div>

                  <div class="col-6">
                    <label class="form-label">Type</label>
                    <input id="f_as_type" class="form-control form-control-sm" type="text" placeholder="Engine / Kart / Tool / Electronics …">
                  </div>
                  <div class="col-6">
                    <label class="form-label">Status</label>
                    <select id="f_as_status" class="form-select form-select-sm">
                      <option>OK</option>
                      <option>Needs Service</option>
                      <option>Out of Service</option>
                    </select>
                  </div>

                  <div class="col-6">
                    <label class="form-label">Custodian</label>
                    <select id="f_as_custodian" class="form-select form-select-sm"></select>
                  </div>
                  <div class="col-6">
                    <label class="form-label">Location</label>
                    <select id="f_as_location" class="form-select form-select-sm"></select>
                  </div>

                  <div class="col-12">
                    <label class="form-label">Serial / Tag</label>
                    <input id="f_as_serial" class="form-control form-control-sm" type="text" placeholder="Serial number / barcode / QR label ID">
                  </div>

                  <div class="col-6">
                    <label class="form-label">Make</label>
                    <input id="f_as_make" class="form-control form-control-sm" type="text" placeholder="OTK / Vortex / Stilo …">
                  </div>
                  <div class="col-6">
                    <label class="form-label">Model</label>
                    <input id="f_as_model" class="form-control form-control-sm" type="text" placeholder="Model / spec">
                  </div>

                  <div class="col-6">
                    <label class="form-label">Purchase date</label>
                    <input id="f_as_purchase" class="form-control form-control-sm" type="date">
                  </div>
                  <div class="col-6">
                    <label class="form-label">Purchase cost (ZAR)</label>
                    <input id="f_as_cost" class="form-control form-control-sm" type="number" step="0.01" min="0">
                  </div>

                  <div class="col-6">
                    <label class="form-label">Service interval (days)</label>
                    <input id="f_as_interval" class="form-control form-control-sm" type="number" min="0" step="1">
                  </div>
                  <div class="col-6">
                    <label class="form-label">Last service</label>
                    <input id="f_as_last" class="form-control form-control-sm" type="date">
                  </div>

                  <div class="col-12">
                    <label class="form-label">Condition / damage notes</label>
                    <textarea id="f_as_condition" class="form-control form-control-sm" rows="3" placeholder="Condition, damage reports, photos reference, measurements…"></textarea>
                  </div>

                  <div class="col-12">
                    <label class="form-label">Tags</label>
                    <input id="f_as_tags" class="form-control form-control-sm" type="text" placeholder="#engine #tools #radio">
                  </div>

                  <div class="col-12 d-flex gap-1 mt-1">
                    <button class="btn btn-sm btn-primary mlo-btn" id="btnSaveAs" type="button">Save</button>
                    <button class="btn btn-sm btn-outline-light mlo-btn" id="btnDupAs" type="button">Duplicate</button>
                    <button class="btn btn-sm btn-outline-danger mlo-btn" id="btnDelAs" type="button">Delete</button>
                  </div>
                </div>
              </form>
                </div>
                <div class="tab-pane fade" id="pane-as-history" role="tabpanel" aria-labelledby="tab-as-history">
                  <div id="asHistory" class="d-grid gap-1" style="font-size:0.85rem;"></div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script src="topnav.js"></script>
  <script>
  (function(){
    RTS.setActiveNav();
    const LS_DATA = 'rts.assets.v4';
    const LS_UI = 'rts.assets.ui.v4';
    const LS_PANES = 'rts.assets.panes.v4';

    const TYPES = ['Kart / Chassis','Engine','Data Logger','Radio','Tool','Laptop / Tablet','Generator','Awning','Trolley / Stand','Safety'];
    const STATUSES = ['OK','Needs Service','Out of Service'];
    let settings = RTS.getSettings();
    let LOCS = (settings.locations||[]).slice();
    let STAFF = (settings.staff||[]).filter(s=>s.active!==false).map(s=>s.name);
    const CUST = ['—'].concat(STAFF);

    function iso(d){
      const dt = new Date(d);
      const y = dt.getFullYear();
      const m = String(dt.getMonth()+1).padStart(2,'0');
      const da = String(dt.getDate()).padStart(2,'0');
      return `${y}-${m}-${da}`;
    }

    function seed(){
      const out = [];
      const base = new Date();
      for (let i=1;i<=50;i++){
        const t = TYPES[i % TYPES.length];
        const s = (i % 11 === 0) ? 'Out of Service' : ((i % 5 === 0) ? 'Needs Service' : 'OK');
        const cust = CUST[i % CUST.length];
        const loc = LOCS[i % LOCS.length];
        const pd = new Date(base.getTime());
        pd.setDate(pd.getDate() - i*18);
        const last = new Date(base.getTime());
        last.setDate(last.getDate() - (i % 90));
        out.push({
          id: `AS-${String(i).padStart(4,'0')}`,
          name: (t==='Kart / Chassis') ? `Chassis ${String(i).padStart(2,'0')}` : `${t} ${String(i).padStart(2,'0')}`,
          type: t,
          status: s,
          custodian: cust,
          location: loc,
          history:[{ at: nowISO(), by:'system', action:'seeded', changes:{} }],
          serial: `SN-${Math.abs(100000 + i*177)}`,
          make: (i%3===0)?'OTK':(i%3===1)?'Vortex':'Stilo',
          model: (i%2===0)?'Spec A':'Spec B',
          purchaseDate: iso(pd),
          cost: Math.round(3500 + i*420),
          intervalDays: (t==='Engine')? 30 : 90,
          lastService: iso(last),
          condition: '',
          tags: (t==='Engine')?'#engine #power':'#asset'
        });
      }
      return out;
    }

    const defaultUI = { perspective:'all', typePick:'', search:'', type:'', status:'', custodian:'', groupBy:'', selectedId:null };

    let items = RTS.safeLoadJSON(LS_DATA, null);
    if (!Array.isArray(items) || !items.length) items = seed();
    let ui = RTS.deepMerge(defaultUI, RTS.safeLoadJSON(LS_UI, {}));

    const el = {
      shell: document.getElementById('assetShell'),
      badge: document.getElementById('asCountBadge'),
      inspectorBadge: document.getElementById('asInspectorBadge'),
      perspectives: document.getElementById('asPerspectiveList'),
      typesTree: document.getElementById('asTypeList'),
      tbody: document.getElementById('asTbody'),
      search: document.getElementById('asSearch'),
      type: document.getElementById('asType'),
      status: document.getElementById('asStatus'),
      cust: document.getElementById('asCustodian'),
      group: document.getElementById('asGroup'),
      add: document.getElementById('btnAddAs'),
      save: document.getElementById('btnSaveAs'),
      dup: document.getElementById('btnDupAs'),
      del: document.getElementById('btnDelAs'),
      history: document.getElementById('asHistory'),
      f: {
        id: document.getElementById('f_as_id'),
        name: document.getElementById('f_as_name'),
        type: document.getElementById('f_as_type'),
        status: document.getElementById('f_as_status'),
        custodian: document.getElementById('f_as_custodian'),
        location: document.getElementById('f_as_location'),
        serial: document.getElementById('f_as_serial'),
        make: document.getElementById('f_as_make'),
        model: document.getElementById('f_as_model'),
        purchase: document.getElementById('f_as_purchase'),
        cost: document.getElementById('f_as_cost'),
        interval: document.getElementById('f_as_interval'),
        last: document.getElementById('f_as_last'),
        condition: document.getElementById('f_as_condition'),
        tags: document.getElementById('f_as_tags')
      }
    };

    function persist(){ RTS.safeSaveJSON(LS_DATA, items); RTS.safeSaveJSON(LS_UI, ui); }

    function buildTypeLists(){
      settings = RTS.getSettings();
      STAFF = (settings.staff||[]).filter(s=>s.active!==false).map(s=>s.name);
      const uniq = Array.from(new Set(items.map(a => a.type))).sort();
      el.typesTree.innerHTML = '';
      const allLi = document.createElement('li');
      allLi.textContent = 'All types';
      allLi.dataset.type = '';
      if (!ui.typePick) allLi.classList.add('active');
      el.typesTree.appendChild(allLi);
      uniq.forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        li.dataset.type = t;
        if (ui.typePick === t) li.classList.add('active');
        el.typesTree.appendChild(li);
      });
      el.type.innerHTML = '<option value="">Type: All</option>' + uniq.map(t=>`<option>${t}</option>`).join('');
      const cu = Array.from(new Set(items.map(a => a.custodian).concat(STAFF))).filter(Boolean).sort();
      el.cust.innerHTML = '<option value="">Custodian: All</option>' + cu.map(c=>`<option>${c}</option>`).join('');
      // inspector custodian options
      el.f.custodian.innerHTML = cu.length
        ? cu.map(c=>`<option value="${c}">${c}</option>`).join('')
        : '<option value="—">—</option>';
      // location dropdown
      const locs = Array.isArray(settings.locations) ? settings.locations.map(l=> (typeof l === 'string' ? { name:l, color:null } : l)) : [];
      el.f.location.innerHTML = locs.map(l=>`<option value="${l.name}">${l.name}</option>`).join('') || '<option value="">Unassigned</option>';
    }

    function applyFilters(list){
      let out = list.slice();
      // perspective
      if (ui.perspective === 'assigned') out = out.filter(a => (a.custodian||'') && a.custodian !== '—');
      if (ui.perspective === 'unassigned') out = out.filter(a => (a.custodian||'—') === '—');
      if (ui.perspective === 'needs_service') out = out.filter(a => a.status === 'Needs Service');
      if (ui.perspective === 'out_of_service') out = out.filter(a => a.status === 'Out of Service');
      if (ui.perspective === 'overdue_return') out = out.filter(a => (a.custodian||'') && a.custodian !== '—' && (a.location||'').toLowerCase().includes('track'));
      // type tree
      if (ui.typePick) out = out.filter(a => a.type === ui.typePick);
      // controls
      if (ui.search){
        const q = ui.search.toLowerCase();
        out = out.filter(a => (`${a.id} ${a.name} ${a.type} ${a.status} ${a.custodian} ${a.location} ${a.serial}`).toLowerCase().includes(q));
      }
      if (ui.type) out = out.filter(a => a.type === ui.type);
      if (ui.status) out = out.filter(a => a.status === ui.status);
      if (ui.custodian) out = out.filter(a => a.custodian === ui.custodian);
      return out;
    }

    function groupKey(a){
      switch(ui.groupBy){
        case 'type': return a.type || '—';
        case 'status': return a.status || '—';
        case 'custodian': return a.custodian || '—';
        case 'location': return a.location || '—';
        default: return '';
      }
    }

    function hydrate(a){
      if (!a){
        el.inspectorBadge.textContent = 'No selection';
        Object.values(el.f).forEach(inp => inp.value = '');
        if (el.history) el.history.innerHTML = '';
        return;
      }
      el.inspectorBadge.textContent = a.id;
      el.f.id.value = a.id;
      el.f.name.value = a.name || '';
      el.f.type.value = a.type || '';
      el.f.status.value = a.status || 'OK';
      const custVal = a.custodian || '';
      const hasOpt = Array.from(el.f.custodian.options).some(o => o.value === custVal);
      if (!hasOpt && custVal){
        const opt = document.createElement('option');
        opt.value = custVal;
        opt.textContent = custVal;
        el.f.custodian.appendChild(opt);
      }
      el.f.custodian.value = custVal;
      el.f.location.value = a.location || '';
      el.f.serial.value = a.serial || '';
      el.f.make.value = a.make || '';
      el.f.model.value = a.model || '';
      el.f.purchase.value = a.purchaseDate || '';
      el.f.cost.value = a.cost || 0;
      el.f.interval.value = a.intervalDays || 0;
      el.f.last.value = a.lastService || '';
      el.f.condition.value = a.condition || '';
      el.f.tags.value = a.tags || '';
      renderHistory(a);
    }

    function renderHistory(a){
      if (!el.history) return;
      const history = Array.isArray(a.history) ? a.history.slice().sort((x,y)=> (y.at||'').localeCompare(x.at||'')) : [];
      el.history.innerHTML = '';
      if (history.length===0){
        el.history.innerHTML = '<div class="text-secondary" style="font-size:0.85rem;">No history recorded.</div>';
        return;
      }
      history.forEach(h=>{
        const div = document.createElement('div');
        div.className = 'p-2 border';
        div.style.borderColor = 'rgba(255,255,255,0.10)';
        const changes = h.changes && Object.keys(h.changes).length ? Object.entries(h.changes).map(([k,v])=>`${k}: ${v[0]} → ${v[1]}`).join(', ') : (h.action||'');
        div.innerHTML = `<div style="font-weight:600;">${h.action||'Updated'} • ${h.at ? h.at.replace('T',' ').slice(0,16) : ''}</div><div class="text-secondary" style="font-size:0.82rem;">${changes}</div>`;
        el.history.appendChild(div);
      });
    }

    function appendHistory(after, before, action){
      if (!after) return;
      const changes = {};
      if (before){
        ['name','type','status','custodian','location','serial','make','model','purchaseDate','cost','intervalDays','lastService','condition','tags'].forEach(key=>{
          if (before[key] !== after[key]){
            changes[key] = [before[key]||'', after[key]||''];
          }
        });
      }
      after.history = Array.isArray(after.history) ? after.history : [];
      after.history.push({
        at: nowISO(),
        by: 'user',
        action: action || 'Updated',
        changes
      });
    }

    function typeColor(t){
      const palette = ['#9be5f0','#c0f4a6','#ffc48a','#fcb0c3','#b5c2ff','#d3b4ff'];
      if (!t) return '#9be5f0';
      const idx = Math.abs(t.split('').reduce((s,ch)=> s+ch.charCodeAt(0),0)) % palette.length;
      return palette[idx];
    }
    function statusColor(s){
      const map = { 'OK':'#c0f4a6','Needs Service':'#ffc48a','Out of Service':'#fcb0c3' };
      return map[s] || '#9be5f0';
    }
    function locationColor(loc){
      if (!loc) return '#9be5f0';
      const palette = ['#9be5f0','#c0f4a6','#ffc48a','#fcb0c3','#b5c2ff','#d3b4ff'];
      const idx = Math.abs(loc.split('').reduce((s,ch)=> s+ch.charCodeAt(0),0)) % palette.length;
      return palette[idx];
    }

    function render(){
      el.search.value = ui.search || '';
      el.type.value = ui.type || '';
      el.status.value = ui.status || '';
      el.cust.value = ui.custodian || '';
      el.group.value = ui.groupBy || '';

      const filtered = applyFilters(items);
      el.badge.textContent = String(filtered.length);
      el.tbody.innerHTML = '';
      let rows = filtered.slice();
      if (ui.groupBy){
        rows.sort((a,b)=>{
          const ga = groupKey(a); const gb = groupKey(b);
          if (ga !== gb) return ga.localeCompare(gb);
          return (a.id||'').localeCompare(b.id||'');
        });
      } else {
        rows.sort((a,b)=> (a.id||'').localeCompare(b.id||''));
      }
      let idx = 0;
      let last = null;
      rows.forEach(a => {
        const g = ui.groupBy ? groupKey(a) : '';
        if (ui.groupBy && g !== last){
          last = g;
          const trG = document.createElement('tr');
          trG.className = 'mlo-group-row';
          trG.innerHTML = `<td colspan="7">${g}</td>`;
          el.tbody.appendChild(trG);
        }
        idx += 1;
        const tr = document.createElement('tr');
        tr.dataset.id = a.id;
        if (ui.selectedId === a.id) tr.classList.add('mlo-row-selected');
        const typeCol = typeColor(a.type);
        const statusCol = statusColor(a.status);
        const locCol = locationColor(a.location);
        tr.innerHTML = `
          <td>${idx}</td>
          <td>${a.id}</td>
          <td>${a.name}</td>
          <td><span class="ev-type-pill" style="background:${typeCol};">${a.type||''}</span></td>
          <td><span class="ev-type-pill" style="background:${statusCol};">${a.status||''}</span></td>
          <td>${a.custodian}</td>
          <td><span class="ev-type-pill" style="background:${locCol};">${a.location||''}</span></td>
        `;
        tr.addEventListener('click', () => { ui.selectedId = a.id; render(); });
        el.tbody.appendChild(tr);
      });
      hydrate(items.find(x => x.id === ui.selectedId) || null);
      persist();
    }

    function nextId(){
      const n = items.length + 1;
      return `AS-${String(n).padStart(4,'0')}`;
    }

    function add(){
      const id = nextId();
      const now = nowISO();
      items.unshift({
        id,
        name:`New Asset ${id}`,
        type:'Tool',
        status:'OK',
        custodian:'—',
        location:'Workshop',
        serial:'',
        make:'',
        model:'',
        purchaseDate:'',
        cost:0,
        intervalDays:90,
        lastService:'',
        condition:'',
        tags:'#asset',
        history:[{ at: now, by:'system', action:'created asset', changes:{} }]
      });
      buildTypeLists();
      ui.selectedId = id;
      render();
    }

    function save(){
      const id = el.f.id.value;
      const idx = items.findIndex(a => a.id === id);
      if (idx < 0) return;
      const cur = items[idx];
      const before = {...cur};
      items[idx] = {
        ...cur,
        name: el.f.name.value.trim() || cur.name,
        type: el.f.type.value.trim() || cur.type,
        status: el.f.status.value,
        custodian: el.f.custodian.value || '—',
        location: el.f.location.value || cur.location,
        serial: el.f.serial.value.trim(),
        make: el.f.make.value.trim(),
        model: el.f.model.value.trim(),
        purchaseDate: el.f.purchase.value,
        cost: parseFloat(el.f.cost.value || 0),
        intervalDays: parseInt(el.f.interval.value || 0, 10),
        lastService: el.f.last.value,
        condition: el.f.condition.value,
        tags: el.f.tags.value
      };
      appendHistory(items[idx], before);
      buildTypeLists();
      render();
    }

    function duplicate(){
      const sel = items.find(a => a.id === ui.selectedId);
      if (!sel) return;
      const id = nextId();
      const copy = {...sel, id, name: sel.name + ' (Copy)'};
      copy.history = (sel.history||[]).slice();
      items.unshift(copy);
      buildTypeLists();
      ui.selectedId = id;
      render();
    }

    function del(){
      const sel = items.find(a => a.id === ui.selectedId);
      if (!sel) return;
      appendHistory(sel, sel, 'Deleted');
      items = items.filter(a => a.id !== sel.id);
      ui.selectedId = null;
      buildTypeLists();
      render();
    }

    function bind(){
      el.perspectives.querySelectorAll('li').forEach(li => {
        li.addEventListener('click', () => {
          el.perspectives.querySelectorAll('li').forEach(x=>x.classList.remove('active'));
          li.classList.add('active');
          ui.perspective = li.dataset.perspective;
          render();
        });
      });
      el.typesTree.addEventListener('click', (e) => {
        const li = e.target.closest('li');
        if (!li) return;
        el.typesTree.querySelectorAll('li').forEach(x=>x.classList.remove('active'));
        li.classList.add('active');
        ui.typePick = li.dataset.type || '';
        render();
      });
      function onInputs(){
        ui.search = el.search.value;
        ui.type = el.type.value;
        ui.status = el.status.value;
        ui.custodian = el.cust.value;
        ui.groupBy = el.group.value;
        render();
      }
      el.search.addEventListener('input', onInputs);
      el.type.addEventListener('change', onInputs);
      el.status.addEventListener('change', onInputs);
      el.cust.addEventListener('change', onInputs);
      el.group.addEventListener('change', onInputs);
      el.add.addEventListener('click', add);
      el.save.addEventListener('click', save);
      el.dup.addEventListener('click', duplicate);
      el.del.addEventListener('click', del);
    }

    function init(){
      buildTypeLists();
      bind();
      RTS.initTriPaneResizers(el.shell, LS_PANES);
      render();
    }
    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>
</body>
</html>
