<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Driver Contracts</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    .shell{display:flex;gap:12px;}
    .pane-table{flex:1 1 0;min-width:0;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);overflow:hidden;}
    .pane-detail{width:320px;min-width:280px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);}
    .pane-header{padding:10px 16px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;align-items:center;justify-content:space-between;}
    .pane-title{font-size:.8rem;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.04em;}
    .pane-body{overflow-y:auto;max-height:calc(100vh - 240px);}
    .detail-body{padding:16px;overflow-y:auto;max-height:calc(100vh - 220px);}

    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;box-shadow:0 1px 3px rgba(0,0,0,.06);}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;color:#1a1d24;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#f0f9ff;}
    .data-table tbody tr.selected{background:rgba(14,165,233,.08);outline:2px solid #0ea5e9;outline-offset:-2px;}
    .data-table tbody tr.row-expiring{background:#fffbeb;}
    .data-table tbody tr.row-expiring:hover{background:#fef3c7;}
    .data-table tbody tr.row-expiring.selected{background:rgba(245,158,11,.1);}

    .season-header{background:#eef9ff;font-size:.72rem;font-weight:700;color:#0ea5e9;text-transform:uppercase;letter-spacing:.06em;padding:6px 10px;border-bottom:1px solid rgba(14,165,233,.2);}

    .badge-s{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.65rem;font-weight:700;white-space:nowrap;}
    .bs-draft{background:#f3f4f6;color:#6b7280;}
    .bs-signed{background:#dbeafe;color:#1d4ed8;}
    .bs-active{background:#d1fae5;color:#065f46;}
    .bs-expired{background:#fee2e2;color:#991b1b;}
    .bs-terminated{background:#fce7f3;color:#9d174d;}

    .dl-row{display:flex;justify-content:space-between;border-bottom:1px solid #f0f0f0;padding:6px 0;font-size:.82rem;}
    .dl-label{color:#6c757d;font-weight:600;}
    .dl-val{color:#1a1d24;text-align:right;max-width:55%;}

    .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
    .filter-bar select,.filter-bar input{font-size:.8rem;padding:4px 8px;border:1px solid #dee2e6;border-radius:6px;background:#fff;color:#1a1d24;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Driver Contracts</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Race fees, retainers, bonus terms and image rights by season</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#0ea5e9;border-color:#0ea5e9;">+ New Contract</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Active</div><div class="ev-stat-value" id="kpiActive">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Expiring Soon</div><div class="ev-stat-value" id="kpiExpiring">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Expired</div><div class="ev-stat-value" id="kpiExpired">—</div></div>
  </div>

  <div class="filter-bar">
    <label class="fw-semibold me-1" style="font-size:.8rem;color:#6c757d;">Filter:</label>
    <input type="search" id="fSearch" placeholder="Search driver/series…" style="width:180px;"/>
    <select id="fStatus">
      <option value="">All Status</option>
      <option value="draft">Draft</option>
      <option value="signed">Signed</option>
      <option value="active">Active</option>
      <option value="expired">Expired</option>
      <option value="terminated">Terminated</option>
    </select>
    <select id="fSeason"><option value="">All Seasons</option></select>
  </div>

  <div class="shell">
    <div class="pane-table">
      <div class="pane-body">
        <table class="data-table">
          <thead><tr><th>Driver</th><th>Season</th><th>Series</th><th>Type</th><th>Value</th><th>Cur</th><th>Start</th><th>End</th><th>Status</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
    <div class="pane-detail">
      <div class="pane-header">
        <span class="pane-title">Detail</span>
        <div id="detailActions" class="d-none gap-2 d-flex">
          <button class="btn btn-sm btn-outline-primary" style="font-size:.75rem;padding:2px 10px;" id="btnEdit">Edit</button>
          <button class="btn btn-sm btn-outline-danger" style="font-size:.75rem;padding:2px 10px;" id="btnDel">Delete</button>
        </div>
      </div>
      <div class="detail-body" id="detailBody">
        <p class="text-secondary" style="font-size:.82rem;">Select a contract to view details.</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="cModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#0ea5e9;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">New Contract</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="cForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver ID</label>
              <input type="text" class="form-control form-control-sm" id="fDriverId"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Season *</label>
              <input type="text" class="form-control form-control-sm" id="fSeason" required/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Series</label>
              <input type="text" class="form-control form-control-sm" id="fSeriesF"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Contract Type</label>
              <select class="form-select form-select-sm" id="fContractType">
                <option value="">Select…</option>
                <option value="race">Race</option>
                <option value="test">Test</option>
                <option value="development">Development</option>
                <option value="reserve">Reserve</option>
                <option value="other">Other</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Value</label>
              <input type="number" step="0.01" class="form-control form-control-sm" id="fValue"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Currency</label>
              <input type="text" class="form-control form-control-sm" id="fCurrency" value="GBP"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Option Years</label>
              <input type="number" class="form-control form-control-sm" id="fOptionYears"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Start Date</label>
              <input type="date" class="form-control form-control-sm" id="fStartDate"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">End Date</label>
              <input type="date" class="form-control form-control-sm" id="fEndDate"/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Status</label>
              <select class="form-select form-select-sm" id="fStatus2">
                <option value="draft">Draft</option>
                <option value="signed">Signed</option>
                <option value="active">Active</option>
                <option value="expired">Expired</option>
                <option value="terminated">Terminated</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Management Company</label>
              <input type="text" class="form-control form-control-sm" id="fManagementCompany"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Document URL</label>
              <input type="url" class="form-control form-control-sm" id="fDocumentUrl" placeholder="https://…"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#0ea5e9;border-color:#0ea5e9;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/driver-contracts';
let allContracts=[],selId=null;
const modal=new bootstrap.Modal(document.getElementById('cModal'));

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){if(!s)return'—';const d=new Date(s);return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}
function daysUntil(s){if(!s)return null;const diff=new Date(s)-new Date();return Math.ceil(diff/86400000);}

function statusBadge(s){const m={draft:'bs-draft',signed:'bs-signed',active:'bs-active',expired:'bs-expired',terminated:'bs-terminated'};return`<span class="badge-s ${m[s]||'bs-draft'}">${esc(s)}</span>`;}
function fmtVal(v,c){if(v==null||v==='')return'—';return`${c||'GBP'} ${Number(v).toLocaleString('en-GB',{minimumFractionDigits:2})}`;}

async function load(){
  try{const r=await fetch(API);if(r.ok)allContracts=await r.json();}catch(e){allContracts=[];}
  populateSeasonFilter();
  renderKPIs();
  renderTable();
}

function populateSeasonFilter(){
  const sel=document.getElementById('fSeason'),cur=sel.value;
  const seasons=[...new Set(allContracts.map(c=>c.season).filter(Boolean))].sort((a,b)=>b.localeCompare(a));
  sel.innerHTML='<option value="">All Seasons</option>'+seasons.map(s=>`<option value="${esc(s)}"${s===cur?' selected':''}>${esc(s)}</option>`).join('');
}

function renderKPIs(){
  const today=new Date();
  document.getElementById('kpiTotal').textContent=allContracts.length;
  document.getElementById('kpiActive').textContent=allContracts.filter(c=>c.status==='active').length;
  document.getElementById('kpiExpiring').textContent=allContracts.filter(c=>{
    if(c.status!=='active'||!c.end_date)return false;
    const d=daysUntil(c.end_date);
    return d!==null&&d>=0&&d<=90;
  }).length;
  document.getElementById('kpiExpired').textContent=allContracts.filter(c=>c.status==='expired').length;
}

function filtered(){
  const q=document.getElementById('fSearch').value.toLowerCase();
  const st=document.getElementById('fStatus').value;
  const sn=document.getElementById('fSeason').value;
  return allContracts.filter(c=>{
    if(st&&c.status!==st)return false;
    if(sn&&c.season!==sn)return false;
    if(q&&!`${c.driver_name} ${c.series}`.toLowerCase().includes(q))return false;
    return true;
  });
}

function renderTable(){
  const data=filtered();
  const today=new Date();
  // Group by season
  const seasons=[...new Set(data.map(c=>c.season||'Unknown'))].sort((a,b)=>b.localeCompare(a));
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  seasons.forEach(s=>{
    const hdr=document.createElement('tr');
    hdr.innerHTML=`<td colspan="9" class="season-header">Season ${esc(s)}</td>`;
    tbody.appendChild(hdr);
    data.filter(c=>(c.season||'Unknown')===s).forEach(c=>{
      const d=daysUntil(c.end_date);
      const expiring=c.status==='active'&&d!==null&&d>=0&&d<=90;
      const tr=document.createElement('tr');
      tr.className=(c.id===selId?'selected ':'')+(expiring?'row-expiring':'');
      tr.innerHTML=`
        <td class="fw-semibold">${esc(c.driver_name||'')}</td>
        <td>${esc(c.season||'')}</td>
        <td>${esc(c.series||'')}</td>
        <td>${esc(c.contract_type||'')}</td>
        <td>${fmtVal(c.value,c.currency)}</td>
        <td>${esc(c.currency||'')}</td>
        <td>${fmtDate(c.start_date)}</td>
        <td>${fmtDate(c.end_date)}${expiring?` <span class="badge-s" style="background:#fef3c7;color:#92400e;">${d}d</span>`:''}</td>
        <td>${statusBadge(c.status)}</td>`;
      tr.addEventListener('click',()=>selectRow(c.id));
      tbody.appendChild(tr);
    });
  });
  if(!data.length) tbody.innerHTML='<tr><td colspan="9" class="text-center text-secondary py-4">No contracts found</td></tr>';
}

function selectRow(id){
  selId=id;
  renderTable();
  const c=allContracts.find(x=>x.id===id);if(!c)return;
  document.getElementById('detailActions').classList.remove('d-none');
  const d=daysUntil(c.end_date);
  document.getElementById('detailBody').innerHTML=`
    <div class="fw-bold mb-1" style="font-size:.95rem;">${esc(c.driver_name||'')}</div>
    <div class="mb-3">${statusBadge(c.status)}</div>
    ${[
      ['Season',c.season],['Series',c.series],['Type',c.contract_type],
      ['Value',fmtVal(c.value,c.currency)],['Currency',c.currency],
      ['Start',fmtDate(c.start_date)],['End',fmtDate(c.end_date)],
      ['Days Until Expiry',d!==null?`${d} days`:'—'],
      ['Option Years',c.option_years],['Management',c.management_company],
      ['Document',c.document_url?`<a href="${esc(c.document_url)}" target="_blank" rel="noopener">Open</a>`:'—'],
      ['Notes',c.notes]
    ].map(([l,v])=>`<div class="dl-row"><span class="dl-label">${l}</span><span class="dl-val">${v!=null&&v!==''?esc(String(v)):'—'}</span></div>`).join('')}`;
  document.getElementById('btnEdit').onclick=()=>openEdit(id);
  document.getElementById('btnDel').onclick=()=>del(id);
}

function openNew(){
  document.getElementById('cForm').reset();
  document.getElementById('fId').value='';
  document.getElementById('fCurrency').value='GBP';
  document.getElementById('fStatus2').value='draft';
  document.getElementById('modalTitle').textContent='New Contract';
  modal.show();
}

function openEdit(id){
  const c=allContracts.find(x=>x.id===id);if(!c)return;
  document.getElementById('fId').value=c.id;
  document.getElementById('fDriverName').value=c.driver_name||'';
  document.getElementById('fDriverId').value=c.driver_id||'';
  document.getElementById('fSeason').value=c.season||'';
  document.getElementById('fSeriesF').value=c.series||'';
  document.getElementById('fContractType').value=c.contract_type||'';
  document.getElementById('fValue').value=c.value??'';
  document.getElementById('fCurrency').value=c.currency||'GBP';
  document.getElementById('fOptionYears').value=c.option_years??'';
  document.getElementById('fStartDate').value=c.start_date?c.start_date.slice(0,10):'';
  document.getElementById('fEndDate').value=c.end_date?c.end_date.slice(0,10):'';
  document.getElementById('fStatus2').value=c.status||'draft';
  document.getElementById('fManagementCompany').value=c.management_company||'';
  document.getElementById('fDocumentUrl').value=c.document_url||'';
  document.getElementById('fNotes').value=c.notes||'';
  document.getElementById('modalTitle').textContent='Edit Contract';
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    driver_id:document.getElementById('fDriverId').value.trim(),
    season:document.getElementById('fSeason').value.trim(),
    series:document.getElementById('fSeriesF').value.trim(),
    contract_type:document.getElementById('fContractType').value,
    value:document.getElementById('fValue').value||null,
    currency:document.getElementById('fCurrency').value||'GBP',
    option_years:document.getElementById('fOptionYears').value||null,
    start_date:document.getElementById('fStartDate').value||null,
    end_date:document.getElementById('fEndDate').value||null,
    status:document.getElementById('fStatus2').value,
    management_company:document.getElementById('fManagementCompany').value.trim(),
    document_url:document.getElementById('fDocumentUrl').value.trim(),
    notes:document.getElementById('fNotes').value.trim()
  };
  if(!body.driver_name||!body.season){alert('Driver Name and Season are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(id){
  if(!confirm('Delete this contract?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  selId=null;
  document.getElementById('detailBody').innerHTML='<p class="text-secondary" style="font-size:.82rem;">Select a contract to view details.</p>';
  document.getElementById('detailActions').classList.add('d-none');
  load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('fSearch').addEventListener('input',renderTable);
document.getElementById('fStatus').addEventListener('change',renderTable);
document.getElementById('fSeason').addEventListener('change',renderTable);
load();
</script>
</body>
</html>
