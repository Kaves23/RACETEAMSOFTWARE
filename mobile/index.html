<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <style>
    body { background: #fff; }
    .login-form { display:flex; flex-direction:column; gap:12px; width:100%; }
    .login-field { display:flex; flex-direction:column; gap:5px; }
    .login-label { font-size:11px; font-weight:600; color:var(--text-2); letter-spacing:0.06em; text-transform:uppercase; }
    .login-input {
      width:100%; padding:11px 13px;
      border:1px solid var(--border-2); border-radius:var(--r);
      font-size:15px; font-family:inherit; color:var(--text);
      background:#fff; outline:none;
      -webkit-appearance:none;
      transition:border-color 0.12s;
    }
    .login-input:focus { border-color:var(--text); }
    .login-btn {
      width:100%; padding:13px;
      background:var(--text); color:#fff;
      border:none; border-radius:var(--r);
      font-size:15px; font-weight:600; font-family:inherit;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:opacity 0.1s;
    }
    .login-btn:active { opacity:0.75; }
    .login-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .login-err { font-size:12px; color:var(--danger); font-weight:500; text-align:center; min-height:16px; }
  </style>
</head>
<body>

<div class="pin-page" id="pinPage">
  <div class="pin-wrap">

    <div class="pin-logo-wrap">
      <div class="pin-mark">RT</div>
      <div class="pin-app-name">Race Team OS</div>
      <div class="pin-app-sub">Mobile · Race day toolkit</div>
    </div>

    <div id="mainContent" style="width:100%">

      <!-- Login form — shown when no valid token -->
      <div id="loginContent" style="display:none;width:100%;">
        <form class="login-form" id="loginForm" autocomplete="on">
          <div class="login-field">
            <label class="login-label" for="inputUser">Username</label>
            <input class="login-input" id="inputUser" type="text" name="username"
                   autocomplete="username" inputmode="text" spellcheck="false" autocapitalize="off" placeholder="admin">
          </div>
          <div class="login-field">
            <label class="login-label" for="inputPass">Password</label>
            <input class="login-input" id="inputPass" type="password" name="password"
                   autocomplete="current-password" placeholder="••••••••">
          </div>
          <p class="login-err" id="loginErr"></p>
          <button class="login-btn" id="loginBtn" type="submit">Sign in</button>
        </form>
      </div>

      <!-- PIN UI — shown once logged in -->
      <div id="pinContent" style="display:none;flex-direction:column;align-items:center;gap:22px;">
        <p class="pin-label">Enter PIN</p>
        <div class="pin-dots" id="pinDots">
          <div class="pin-dot" id="dot0"></div>
          <div class="pin-dot" id="dot1"></div>
          <div class="pin-dot" id="dot2"></div>
          <div class="pin-dot" id="dot3"></div>
        </div>
        <p class="pin-error-msg" id="pinError"></p>
        <div class="pin-pad" id="pinPad">
          <button class="pin-key" data-digit="1">1</button>
          <button class="pin-key" data-digit="2">2</button>
          <button class="pin-key" data-digit="3">3</button>
          <button class="pin-key" data-digit="4">4</button>
          <button class="pin-key" data-digit="5">5</button>
          <button class="pin-key" data-digit="6">6</button>
          <button class="pin-key" data-digit="7">7</button>
          <button class="pin-key" data-digit="8">8</button>
          <button class="pin-key" data-digit="9">9</button>
          <button class="pin-key pin-key-empty" aria-hidden="true" tabindex="-1"></button>
          <button class="pin-key" data-digit="0">0</button>
          <button class="pin-key pin-key-back" id="backBtn" aria-label="Delete">⌫</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
  var CORRECT_PIN = '1234';
  var entered = '';

  // ── Service Worker ─────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/mobile/sw.js', { scope: '/mobile/' })
      .catch(function(e) { console.warn('SW registration failed:', e); });
  }

  // ── Init: decide which screen to show ────────────────────────────────────
  (function init() {
    // Already fully auth'd this session
    if (sessionStorage.getItem('mobile_pin_ok') === '1' && localStorage.getItem('auth_token')) {
      window.location.replace('load.html');
      return;
    }
    var token = localStorage.getItem('auth_token');
    if (token) {
      // Verify token is still valid on the server
      fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.success) {
            showPin();
          } else {
            localStorage.removeItem('auth_token');
            showLogin();
          }
        })
        .catch(function() {
          // Network error — if token exists assume ok, show pin
          showPin();
        });
    } else {
      showLogin();
    }
  })();

  function showLogin() {
    document.getElementById('loginContent').style.display = 'block';
    document.getElementById('pinContent').style.display = 'none';
    setTimeout(function() { document.getElementById('inputUser').focus(); }, 100);
  }

  function showPin() {
    document.getElementById('loginContent').style.display = 'none';
    document.getElementById('pinContent').style.display = 'flex';
  }

  // ── Login form ─────────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('inputUser').value.trim();
    var password = document.getElementById('inputPass').value;
    var btn = document.getElementById('loginBtn');
    var err = document.getElementById('loginErr');

    if (!username || !password) {
      err.textContent = 'Please enter username and password.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.textContent = '';

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success && data.token) {
        localStorage.setItem('auth_token', data.token);
        showPin();
      } else {
        err.textContent = data.error || 'Invalid username or password.';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    })
    .catch(function() {
      err.textContent = 'Connection error. Try again.';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    });
  });

  // ── PIN logic ──────────────────────────────────────────────────────────────
  function updateDots() {
    for (var i = 0; i < 4; i++) {
      document.getElementById('dot' + i).classList.toggle('filled', i < entered.length);
    }
  }

  function handleDigit(d) {
    if (entered.length >= 4) return;
    entered += d;
    updateDots();
    if (entered.length === 4) {
      setTimeout(checkPin, 80);
    }
  }

  function handleBack() {
    if (entered.length === 0) return;
    entered = entered.slice(0, -1);
    updateDots();
    document.getElementById('pinError').textContent = '';
  }

  function checkPin() {
    if (entered === CORRECT_PIN) {
      sessionStorage.setItem('mobile_pin_ok', '1');
      window.location.replace('load.html');
    } else {
      var dots = document.getElementById('pinDots');
      dots.classList.remove('shake');
      // Force reflow so animation re-triggers
      void dots.offsetWidth;
      dots.classList.add('shake');
      document.getElementById('pinError').textContent = 'Incorrect PIN — try again';
      entered = '';
      setTimeout(function() {
        updateDots();
        dots.classList.remove('shake');
      }, 500);
    }
  }

  // ── Pad events ─────────────────────────────────────────────────────────────
  document.getElementById('pinPad').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-digit]');
    if (btn) handleDigit(btn.getAttribute('data-digit'));
  });
  document.getElementById('backBtn').addEventListener('click', handleBack);

  // Hardware keyboard support
  document.addEventListener('keydown', function(e) {
    if (e.key >= '0' && e.key <= '9') handleDigit(e.key);
    else if (e.key === 'Backspace') handleBack();
  });
</script>
</body>
</html>
