<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <style>
    body { background: #fff; }
    .login-form { display:flex; flex-direction:column; gap:12px; width:100%; }
    .login-field { display:flex; flex-direction:column; gap:5px; }
    .login-label { font-size:11px; font-weight:600; color:var(--text-2); letter-spacing:0.06em; text-transform:uppercase; }
    .login-input {
      width:100%; padding:11px 13px;
      border:1px solid var(--border-2); border-radius:var(--r);
      font-size:15px; font-family:inherit; color:var(--text);
      background:#fff; outline:none;
      -webkit-appearance:none;
      transition:border-color 0.12s;
    }
    .login-input:focus { border-color:var(--text); }
    .login-btn {
      width:100%; padding:13px;
      background:var(--text); color:#fff;
      border:none; border-radius:var(--r);
      font-size:15px; font-weight:600; font-family:inherit;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:opacity 0.1s;
    }
    .login-btn:active { opacity:0.75; }
    .login-btn:disabled { opacity:0.45; cursor:not-allowed; }
    .login-err { font-size:12px; color:var(--danger); font-weight:500; text-align:center; min-height:16px; }
  </style>
</head>
<body>

<div class="pin-page" id="pinPage">
  <div class="pin-wrap">

    <div class="pin-logo-wrap">
      <div class="pin-mark">RT</div>
      <div class="pin-app-name">Race Team OS</div>
      <div class="pin-app-sub">Mobile · Race day toolkit</div>
    </div>

    <div id="mainContent" style="width:100%">

      <!-- Login form — shown when no valid token -->
      <div id="loginContent" style="display:none;width:100%;">
        <form class="login-form" id="loginForm" autocomplete="on">
          <div class="login-field">
            <label class="login-label" for="inputUser">Username</label>
            <input class="login-input" id="inputUser" type="text" name="username"
                   autocomplete="username" inputmode="text" spellcheck="false" autocapitalize="off" placeholder="admin">
          </div>
          <div class="login-field">
            <label class="login-label" for="inputPass">Password</label>
            <input class="login-input" id="inputPass" type="password" name="password"
                   autocomplete="current-password" placeholder="••••••••">
          </div>
          <p class="login-err" id="loginErr"></p>
          <button class="login-btn" id="loginBtn" type="submit">Sign in</button>
        </form>
      </div>



    </div>
  </div>
</div>

<script>
  // ── Service Worker ─────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/mobile/sw.js', { scope: '/mobile/' })
      .catch(function(e) { console.warn('SW registration failed:', e); });
  }

  // ── Init: redirect if already logged in ──────────────────────────────────
  (function init() {
    var token = localStorage.getItem('auth_token');
    if (token) {
      fetch('/api/auth/verify', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.success) {
            window.location.replace('browse.html');
          } else {
            localStorage.removeItem('auth_token');
            showLogin();
          }
        })
        .catch(function() {
          // Network error — assume token ok, proceed
          window.location.replace('browse.html');
        });
    } else {
      showLogin();
    }
  })();

  function showLogin() {
    document.getElementById('loginContent').style.display = 'block';
    setTimeout(function() { document.getElementById('inputUser').focus(); }, 100);
  }

  // ── Login form ─────────────────────────────────────────────────────────────
  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var username = document.getElementById('inputUser').value.trim();
    var password = document.getElementById('inputPass').value;
    var btn = document.getElementById('loginBtn');
    var err = document.getElementById('loginErr');

    if (!username || !password) {
      err.textContent = 'Please enter username and password.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Signing in…';
    err.textContent = '';

    fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: username, password: password })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success && data.token) {
        localStorage.setItem('auth_token', data.token);
        window.location.replace('browse.html');
      } else {
        err.textContent = data.error || 'Invalid username or password.';
        btn.disabled = false;
        btn.textContent = 'Sign in';
      }
    })
    .catch(function() {
      err.textContent = 'Connection error. Try again.';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    });
  });
</script>
</body>
</html>
