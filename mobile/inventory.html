<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Inventory · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">⚡ Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Inventory</span>
      </div>
      <span id="itemCount" style="font-size:12px;color:var(--text-3);font-weight:500;"></span>
    </div>
    <!-- Search -->
    <div style="padding:0 16px 12px;display:flex;gap:8px;align-items:center;">
      <div style="position:relative;flex:1;">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Search inventory…" autocomplete="off"
          style="width:100%;box-sizing:border-box;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 32px;font-size:14px;background:var(--bg-2,#f5f5f5);outline:none;-webkit-appearance:none;">
      </div>
    </div>
    <!-- Category filter chips -->
    <div class="pill-strip" id="categoryStrip" style="padding-bottom:12px;">
      <button class="pill pill-active" data-cat="">All</button>
    </div>
  </header>

  <!-- Body -->
  <main class="app-body" id="appBody">
    <div id="inventoryList"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="tasks.html" class="nav-item">📋 <span>Lists</span><div class="nav-dot"></div></a>
      <a href="load.html" class="nav-item">🚛 <span>Load Plan</span><div class="nav-dot"></div></a>
      <a href="browse.html" class="nav-item nav-item--active">📦 <span>Browse</span><div class="nav-dot"></div></a>
      <a href="scan.html" class="nav-item">📡 <span>Scan</span><div class="nav-dot"></div></a>
    </div>
  </nav>

</div>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawerName">—</div>
      <div id="drawerSku" style="font-size:12px;color:var(--text-3);font-family:ui-monospace,monospace;margin-top:2px;">—</div>
    </div>
    <div id="drawerQtyBadge" class="tag" style="font-size:13px;font-weight:700;flex-shrink:0;">—</div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<style>
  .inv-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    background: var(--bg);
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .inv-row:active { background: var(--bg-2, #f5f5f5); }
  .inv-icon {
    width: 38px;
    height: 38px;
    border-radius: var(--r);
    background: var(--bg-2, #f5f5f5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }
  .inv-info { flex: 1; min-width: 0; }
  .inv-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .inv-meta {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .inv-sku {
    font-family: ui-monospace, monospace;
    font-size: 11px;
  }
  .qty-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .qty-ok    { background: #dcfce7; color: #16a34a; }
  .qty-low   { background: #fef3c7; color: #d97706; }
  .qty-zero  { background: #fee2e2; color: #dc2626; }

  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 12px; color: var(--text-3); font-weight: 500; flex-shrink: 0; }
  .detail-value { font-size: 13px; color: var(--text); text-align: right; word-break: break-word; }
  .detail-value.mono { font-family: ui-monospace, monospace; font-size: 12px; }

  /* Packed boxes section */
  .boxes-section { margin-top: 20px; }
  .boxes-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 10px;
  }
  .box-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-2, #f5f5f5);
    border: 1px solid var(--border);
    border-radius: var(--r-sm);
    padding: 6px 10px;
    font-size: 12px;
    margin: 0 6px 6px 0;
  }

  /* Skeletons */
  .skel-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .skel-icon { width: 38px; height: 38px; border-radius: var(--r); background: var(--border); flex-shrink: 0; }
  .skel-lines { flex: 1; }
  .skel-line { height: 12px; border-radius: 4px; background: var(--border); margin-bottom: 6px; }
  @keyframes shimmer { 0%{opacity:.5} 50%{opacity:1} 100%{opacity:.5} }
  .skel-icon, .skel-line { animation: shimmer 1.4s ease-in-out infinite; }
</style>

<script>
  // Auth guard
  if (!localStorage.getItem('auth_token') || sessionStorage.getItem('mobile_pin_ok') !== '1') {
    window.location.replace('index.html');
  }

  const API = window.location.origin;
  const authHeaders = () => ({ 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') });

  let allItems = [];
  let activeCategory = '';
  let searchQuery = '';

  // ── Offline banner ──────────────────────────────────────────────
  window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  if (!navigator.onLine) document.getElementById('offlineBanner').style.display = 'block';

  // ── Load inventory ───────────────────────────────────────────────
  async function loadInventory() {
    renderSkeletons();
    try {
      const res = await fetch(`${API}/api/collections/inventory`, { headers: authHeaders() });
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      allItems = data.items || [];
      buildCategoryChips();
      renderList();
      document.getElementById('itemCount').textContent = allItems.length + ' items';
    } catch (err) {
      document.getElementById('inventoryList').innerHTML =
        `<div style="padding:40px 16px;text-align:center;color:var(--text-3);font-size:13px;">Failed to load inventory.<br><button onclick="loadInventory()" style="margin-top:12px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px;cursor:pointer;">Retry</button></div>`;
    }
  }

  function renderSkeletons() {
    let html = '';
    for (let i = 0; i < 8; i++) {
      html += `<div class="skel-row"><div class="skel-icon"></div><div class="skel-lines"><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:35%"></div></div></div>`;
    }
    document.getElementById('inventoryList').innerHTML = html;
  }

  // ── Category chips ───────────────────────────────────────────────
  function buildCategoryChips() {
    const cats = [...new Set(allItems.map(i => i.category).filter(Boolean))].sort();
    const strip = document.getElementById('categoryStrip');
    strip.innerHTML = `<button class="pill ${!activeCategory ? 'pill-active' : ''}" data-cat="">All</button>`;
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'pill' + (activeCategory === cat ? ' pill-active' : '');
      btn.dataset.cat = cat;
      btn.textContent = cat;
      strip.appendChild(btn);
    });
    strip.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        strip.querySelectorAll('.pill').forEach(b => b.classList.remove('pill-active'));
        btn.classList.add('pill-active');
        renderList();
      });
    });
  }

  // ── Render list ──────────────────────────────────────────────────
  function renderList() {
    const q = searchQuery.toLowerCase();
    const filtered = allItems.filter(item => {
      const matchCat = !activeCategory || item.category === activeCategory;
      const matchQ = !q ||
        (item.name || '').toLowerCase().includes(q) ||
        (item.sku  || '').toLowerCase().includes(q) ||
        (item.description || '').toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    if (filtered.length === 0) {
      document.getElementById('inventoryList').innerHTML =
        `<div style="padding:60px 16px;text-align:center;color:var(--text-3);font-size:13px;">No items match your search.</div>`;
      return;
    }

    document.getElementById('inventoryList').innerHTML = filtered.map(item => {
      const qty = item.quantity ?? 0;
      const minQty = item.min_quantity ?? 0;
      const qtyClass = qty === 0 ? 'qty-zero' : (minQty > 0 && qty <= minQty ? 'qty-low' : 'qty-ok');
      const qtyLabel = qty + (item.unit ? ' ' + item.unit : '');
      return `<div class="inv-row" onclick="openItem('${esc(item.id)}')">
        <div class="inv-icon">${iconFor(item.category)}</div>
        <div class="inv-info">
          <div class="inv-name">${esc(item.name)}</div>
          <div class="inv-meta">
            ${item.category ? `<span>${esc(item.category)}</span>` : ''}
            ${item.sku ? `<span>·</span><span class="inv-sku">${esc(item.sku)}</span>` : ''}
          </div>
        </div>
        <span class="qty-badge ${qtyClass}">${esc(qtyLabel)}</span>
      </div>`;
    }).join('');
  }

  function iconFor(cat) {
    const c = (cat || '').toLowerCase();
    if (c.includes('fuel') || c.includes('oil')) return '⛽';
    if (c.includes('tire') || c.includes('tyre')) return '🛞';
    if (c.includes('tool')) return '🔧';
    if (c.includes('safety') || c.includes('ppe')) return '🦺';
    if (c.includes('food') || c.includes('drink') || c.includes('beverage')) return '🥤';
    if (c.includes('spare') || c.includes('part')) return '⚙️';
    if (c.includes('medical') || c.includes('first aid')) return '🩺';
    if (c.includes('electrical') || c.includes('cable') || c.includes('wire')) return '🔌';
    return '📦';
  }

  // ── Open item drawer ─────────────────────────────────────────────
  function openItem(id) {
    const item = allItems.find(i => String(i.id) === String(id));
    if (!item) return;

    document.getElementById('drawerName').textContent = item.name || '—';
    document.getElementById('drawerSku').textContent = item.sku || '';

    const qty = item.quantity ?? 0;
    const minQty = item.min_quantity ?? 0;
    const qtyClass = qty === 0 ? 'qty-zero' : (minQty > 0 && qty <= minQty ? 'qty-low' : 'qty-ok');
    const qtyBadge = document.getElementById('drawerQtyBadge');
    qtyBadge.textContent = qty + (item.unit ? ' ' + item.unit : ' units');
    qtyBadge.className = 'tag ' + qtyClass;

    const details = [
      ['Category', esc(item.category)],
      ['SKU', item.sku ? `<span style="font-family:ui-monospace,monospace;font-size:12px;">${esc(item.sku)}</span>` : null],
      ['Unit', esc(item.unit)],
      ['Unit cost', item.unit_cost ? '$' + Number(item.unit_cost).toFixed(2) : null],
      ['Reorder level', item.min_quantity != null ? item.min_quantity + (item.unit ? ' ' + item.unit : '') : null],
      ['Supplier', esc(item.supplier)],
      ['Last restocked', item.last_restocked_date ? formatDate(item.last_restocked_date) : null],
      ['Description', esc(item.description)],
      ['Notes', esc(item.notes)],
    ].filter(([, v]) => v);

    const rows = details.map(([label, val]) =>
      `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${val}</span></div>`
    ).join('');

    // Stock indicator
    let stockNote = '';
    if (qty === 0) {
      stockNote = `<div style="margin-bottom:16px;padding:10px 12px;background:#fee2e2;border-radius:var(--r-sm);color:#dc2626;font-size:13px;font-weight:500;">⚠️ Out of stock</div>`;
    } else if (minQty > 0 && qty <= minQty) {
      stockNote = `<div style="margin-bottom:16px;padding:10px 12px;background:#fef3c7;border-radius:var(--r-sm);color:#d97706;font-size:13px;font-weight:500;">⚠️ Low stock — reorder soon</div>`;
    }

    document.getElementById('drawerBody').innerHTML = stockNote + `<div>${rows}</div>`;
    showDrawer();
  }

  function formatDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
  }

  // ── Drawer ───────────────────────────────────────────────────────
  function showDrawer() {
    document.getElementById('drawerOverlay').classList.add('active');
    document.getElementById('detailDrawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('active');
    document.getElementById('detailDrawer').classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── Search ───────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderList();
  });

  // ── SW ───────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadInventory();
</script>

</body>
</html>
