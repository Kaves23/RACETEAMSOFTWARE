<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Projects Dashboard · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=projects'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Projects Dashboard</span>
      </div>
    </div>
    <div class="pill-strip" id="projectNav" style="padding-top:10px;padding-bottom:12px;">
      <a href="projects-dashboard.html" class="pill pill-active" style="text-decoration:none;">Overview</a>
      <a href="projects-list.html" class="pill" style="text-decoration:none;">Projects</a>
      <a href="projects-gantt.html" class="pill" style="text-decoration:none;">Gantt</a>
      <a href="milestones.html" class="pill" style="text-decoration:none;">Milestones</a>
      <a href="projects-workload.html" class="pill" style="text-decoration:none;">Workload</a>
      <a href="projects-reports.html" class="pill" style="text-decoration:none;">Reports</a>
      <a href="runbooks.html" class="pill" style="text-decoration:none;">Runbooks</a>
    </div>
  </header>
  <main class="app-body">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="statTotal">0</div></div>
      <div class="stat-card"><div class="stat-label">Active</div><div class="stat-value" id="statActive">0</div></div>
      <div class="stat-card"><div class="stat-label">At Risk</div><div class="stat-value" id="statRisk">0</div></div>
      <div class="stat-card"><div class="stat-label">Overdue</div><div class="stat-value" id="statOverdue">0</div></div>
    </div>
    <div style="padding:0 16px 10px;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">Health</div>
    <div id="healthList"></div>
    <div style="padding:18px 16px 10px;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;">Upcoming milestones</div>
    <div id="milestoneList"></div>
  </main>
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a>
      <a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=sporting" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=projects" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a>
      <a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a>
      <a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a>
    </div>
  </nav>
</div>

<style>
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:12px 16px 18px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:12px; }
  .stat-label { font-size:10px; text-transform:uppercase; color:var(--text-3); font-weight:700; letter-spacing:.06em; }
  .stat-value { font-size:22px; font-weight:800; color:var(--text); margin-top:6px; }
  .project-card, .milestone-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .project-name, .milestone-name { font-size:14px; font-weight:700; color:var(--text); }
  .project-meta, .milestone-meta { font-size:12px; color:var(--text-3); margin-top:4px; line-height:1.45; }
  .progress { height:6px; border-radius:999px; background:#ececec; overflow:hidden; margin-top:10px; }
  .progress > div { height:100%; background:#111827; }
  .risk-pill { display:inline-block; margin-top:8px; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .risk-high { background:#fee2e2; color:#991b1b; }
  .risk-medium { background:#fef3c7; color:#92400e; }
  .risk-low { background:#dcfce7; color:#166534; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  let plans = [];
  let milestones = [];
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function fmtDate(v){ if (!v) return '—'; return new Date(String(v).slice(0,10) + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' }); }
  function calcRisk(plan){ const over = Number(plan.overdue_tasks || 0); const blocked = Number(plan.blocked_tasks || 0); if (over > 3 || blocked > 2) return 'high'; if (over > 0 || blocked > 0) return 'medium'; return 'low'; }
  function renderStats(){
    const total = plans.length;
    const active = plans.filter(p => p.status === 'active').length;
    const risk = plans.filter(p => calcRisk(p) !== 'low').length;
    const today = new Date().toISOString().slice(0,10);
    const overdue = plans.filter(p => p.end_date && String(p.end_date).slice(0,10) < today && p.status !== 'completed' && p.status !== 'cancelled').length;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statActive').textContent = active;
    document.getElementById('statRisk').textContent = risk;
    document.getElementById('statOverdue').textContent = overdue;
  }
  function renderHealth(){
    const sorted = plans.slice().sort((a,b) => (Number(b.overdue_tasks || 0) + Number(b.blocked_tasks || 0)) - (Number(a.overdue_tasks || 0) + Number(a.blocked_tasks || 0))).slice(0, 8);
    document.getElementById('healthList').innerHTML = sorted.length ? sorted.map(plan => {
      const pct = Math.round(parseFloat(plan.avg_progress || 0));
      const risk = calcRisk(plan);
      return '<div class="project-card">' +
        '<div class="project-name">' + esc(plan.name || 'Untitled project') + '</div>' +
        '<div class="project-meta">' + esc(plan.project_type || 'Project') + ' · ' + esc(plan.status || 'unknown') + ' · End ' + esc(fmtDate(plan.end_date)) + '</div>' +
        '<div class="progress"><div style="width:' + esc(pct) + '%"></div></div>' +
        '<div class="project-meta" style="margin-top:6px;">' + esc(String(pct)) + '% complete · ' + esc(String(plan.task_count || 0)) + ' tasks · ' + esc(String(plan.overdue_tasks || 0)) + ' overdue</div>' +
        '<span class="risk-pill risk-' + esc(risk) + '">' + esc(risk) + ' risk</span>' +
      '</div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-title">No project plans found</div></div>';
  }
  function renderMilestones(){
    const today = new Date(); today.setHours(0,0,0,0);
    const soon = milestones.filter(m => m.status !== 'completed').sort((a,b) => String(a.start_date || '').localeCompare(String(b.start_date || ''))).slice(0, 8);
    document.getElementById('milestoneList').innerHTML = soon.length ? soon.map(m => {
      const isOver = m.start_date && new Date(String(m.start_date).slice(0,10) + 'T12:00:00') < today;
      return '<div class="milestone-card">' +
        '<div class="milestone-name">' + esc(m.title || 'Untitled milestone') + '</div>' +
        '<div class="milestone-meta">' + esc(m.plan_name || 'Unknown project') + ' · ' + esc(fmtDate(m.start_date)) + (isOver ? ' · overdue' : '') + '</div>' +
      '</div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-title">No milestones</div></div>';
  }
  Promise.all([
    mobileFetch('/api/project-plans').catch(() => ({ data: [] })),
    mobileFetch('/api/project-plans/milestones').catch(() => ({ data: [] }))
  ]).then(([planRes, msRes]) => {
    plans = Array.isArray(planRes) ? planRes : (planRes.data || []);
    milestones = Array.isArray(msRes) ? msRes : (msRes.data || []);
    renderStats(); renderHealth(); renderMilestones();
  });
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
