<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <title>Academy Data · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=academy'" style="cursor:pointer;"><div class="page-bar-mark">RT</div><span class="page-bar-title">Academy Data</span></div>
      <a href="../academy-data.html" class="btn-mini" style="text-decoration:none;">Desktop Tool</a>
    </div>
    <div class="pill-strip" style="padding-top:8px;padding-bottom:10px;">
      <a href="academy-pipeline.html" class="pill" style="text-decoration:none;">Pipeline</a>
      <a href="academy-sessions.html" class="pill" style="text-decoration:none;">Sessions</a>
      <a href="academy-reports.html" class="pill" style="text-decoration:none;">Reports</a>
      <a href="academy-data.html" class="pill active" style="text-decoration:none;">Data</a>
    </div>
    <div style="padding:10px 16px 12px;"><input id="q" type="search" placeholder="Search driver/session/venue..." style="width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;"></div>
  </header>
  <main class="app-body"><div id="list"></div></main>
  <nav class="app-nav"><div class="nav-bar">
    <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a>
    <a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a>
    <a href="browse.html?tab=sporting" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a>
    <a href="browse.html?tab=projects" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a>
    <a href="browse.html?tab=academy" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a>
    <a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a>
    <a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a>
  </div></nav>
</div>
<style>
  .row{padding:12px 16px;border-bottom:1px solid var(--border);background:#fff}
  .r1{font-size:14px;font-weight:700;color:var(--text)}
  .r2{font-size:12px;color:var(--text-3);margin-top:2px}
  .actions{display:flex;gap:8px;margin-top:8px}
  .btn-mini{border:1px solid var(--border);background:#fff;border-radius:7px;padding:6px 10px;font-size:12px;font-weight:700}
</style>
<script>
(function(){
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  function setOffline(){ var b=document.getElementById('offlineBanner'); if (b) b.classList.toggle('visible', !navigator.onLine); }
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(function(){});
  var rows = [];
  function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
  function load(){
    mobileFetch('/api/academy/prospects').then(function(ps){
      rows = [];
      (Array.isArray(ps)?ps:[]).forEach(function(p){
        (Array.isArray(p.sessions)?p.sessions:[]).forEach(function(s){
          rows.push({driver:p.driver_name||'Unknown', date:s.date||'', venue:s.venue||'', coach:s.coach||'', link:s.cloud_link||'', notes:s.notes||''});
        });
      });
      rows.sort(function(a,b){ return String(b.date).localeCompare(String(a.date)); });
      render();
    }).catch(function(){ document.getElementById('list').innerHTML='<div style="padding:20px;color:var(--danger)">Could not load data sessions.</div>'; });
  }
  function render(){
    var q = (document.getElementById('q').value||'').toLowerCase().trim();
    var out = rows.filter(function(r){
      if (!q) return true;
      return r.driver.toLowerCase().includes(q) || r.venue.toLowerCase().includes(q) || r.coach.toLowerCase().includes(q) || r.notes.toLowerCase().includes(q);
    });
    document.getElementById('list').innerHTML = out.length ? out.map(function(r,i){
      var id = 'open'+i;
      return '<div class="row"><div class="r1">'+esc(r.driver)+'</div><div class="r2">'+esc(r.date||'—')+' · '+esc(r.venue||'—')+' · Coach: '+esc(r.coach||'—')+'</div>'+
      '<div class="actions">'+(r.link?('<a class="btn-mini" href="'+esc(r.link)+'" target="_blank" rel="noopener" style="text-decoration:none;">Open Data Files</a>'):'<span class="btn-mini" style="opacity:.45;">No file link</span>')+'</div></div>';
    }).join('') : '<div style="padding:20px;color:var(--text-3)">No session data found.</div>';
  }
  document.getElementById('q').addEventListener('input', render);
  load();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
