<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Race Control · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=sporting'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Race Control</span>
      </div>
    </div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Incidents</div><div class="stat-value" id="statIncidents">0</div></div>
      <div class="stat-card"><div class="stat-label">Open</div><div class="stat-value" id="statOpen">0</div></div>
      <div class="stat-card"><div class="stat-label">Penalties</div><div class="stat-value" id="statPenalties">0</div></div>
      <div class="stat-card"><div class="stat-label">High</div><div class="stat-value" id="statHigh">0</div></div>
    </div>
    <div style="padding:0 16px 10px;">
      <input id="searchInput" type="search" placeholder="Search incident or event..." autocomplete="off" style="width:100%;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 12px;font-size:14px;background:var(--surface);outline:none;">
    </div>
    <div class="pill-strip" id="filterStrip" style="padding-top:0;padding-bottom:12px;">
      <button class="pill pill-active" data-filter="all">All</button>
      <button class="pill" data-filter="open">Open</button>
      <button class="pill" data-filter="incidents">Incidents</button>
      <button class="pill" data-filter="penalties">Penalties</button>
    </div>
  </header>
  <main class="app-body">
    <div id="list"></div>
  </main>
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a>
      <a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=sporting" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=projects" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a>
      <a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/><line x1="9" y1="17" x2="15" y2="17"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a>
      <a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a>
    </div>
  </nav>
</div>

<style>
  .stat-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:8px; padding:12px 16px; }
  .stat-card { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:10px; }
  .stat-label { font-size:10px; text-transform:uppercase; color:var(--text-3); font-weight:700; letter-spacing:.06em; }
  .stat-value { font-size:18px; font-weight:800; color:var(--text); margin-top:4px; }
  .rc-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .rc-title { font-size:14px; font-weight:700; color:var(--text); }
  .rc-sub { font-size:12px; color:var(--text-3); margin-top:3px; }
  .chip-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }
  .tag { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:10px; font-weight:700; background:var(--surface); color:var(--text-2); }
  .tag.high { background:#fee2e2; color:#b91c1c; }
  .tag.medium { background:#fef3c7; color:#92400e; }
  .tag.open { background:#dbeafe; color:#1d4ed8; }
  .empty { padding:28px 18px; text-align:center; color:var(--text-3); font-size:13px; }
  @media (max-width: 420px) { .stat-grid { grid-template-columns:repeat(2, 1fr); } }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');

  let incidents = [];
  let penalties = [];
  let events = [];
  let filter = 'all';
  let query = '';

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function itemsFrom(payload){ return Array.isArray(payload) ? payload : (payload && Array.isArray(payload.items) ? payload.items : (payload && Array.isArray(payload.incidents) ? payload.incidents : [])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function eventName(id){ const event = events.find(row => String(row.id) === String(id)); return event ? (event.name || event.title || 'Untitled event') : 'No event'; }
  function allRows(){
    return incidents.map(row => ({ kind:'incident', title:row.title || row.name || 'Untitled incident', status:row.status || 'Open', severity:row.severity || 'Low', event_id:row.event_id, updated_at:row.updated_at || row.created_at, notes:row.summary || row.notes || '' }))
      .concat(penalties.map(row => ({ kind:'penalty', title:row.title || row.driver_name || row.penalty_type || 'Penalty', status:row.status || 'Open', severity:row.severity || 'Medium', event_id:row.event_id, updated_at:row.updated_at || row.created_at, notes:row.notes || row.reason || '' })));
  }
  function visible(){
    return allRows().filter(row => {
      const hay = [row.title, row.notes, eventName(row.event_id)].join(' ').toLowerCase();
      if (query && !hay.includes(query)) return false;
      if (filter === 'open' && !/open|review|progress/i.test(row.status || '')) return false;
      if (filter === 'incidents' && row.kind !== 'incident') return false;
      if (filter === 'penalties' && row.kind !== 'penalty') return false;
      return true;
    }).sort((a, b) => String(b.updated_at || '').localeCompare(String(a.updated_at || '')));
  }
  function renderStats(){
    document.getElementById('statIncidents').textContent = incidents.length;
    document.getElementById('statOpen').textContent = allRows().filter(row => /open|review|progress/i.test(row.status || '')).length;
    document.getElementById('statPenalties').textContent = penalties.length;
    document.getElementById('statHigh').textContent = allRows().filter(row => /high|critical/i.test(row.severity || '')).length;
  }
  function render(){
    renderStats();
    const rows = visible();
    document.getElementById('list').innerHTML = rows.length ? rows.map(row => {
      const sev = String(row.severity || '').toLowerCase();
      const stat = String(row.status || '').toLowerCase();
      return '<div class="rc-card">' +
        '<div class="rc-title">' + esc(row.title) + '</div>' +
        '<div class="rc-sub">' + esc(eventName(row.event_id)) + (row.updated_at ? ' · ' + esc(String(row.updated_at).slice(0, 16).replace('T', ' ')) : '') + '</div>' +
        (row.notes ? '<div class="rc-sub" style="margin-top:6px;">' + esc(String(row.notes).slice(0, 140)) + '</div>' : '') +
        '<div class="chip-row">' +
          '<span class="tag">' + esc(row.kind) + '</span>' +
          '<span class="tag ' + esc(sev) + '">' + esc(row.severity || 'Low') + '</span>' +
          '<span class="tag ' + esc(stat) + '">' + esc(row.status || 'Open') + '</span>' +
        '</div>' +
      '</div>';
    }).join('') : '<div class="empty">No race control records match the current filter.</div>';
  }
  async function load(){
    const [incidentRows, penaltyRows, eventRows] = await Promise.all([
      mobileFetch('/api/incidents').catch(() => []),
      mobileFetch('/api/penalties').catch(() => []),
      mobileFetch('/api/collections/events').catch(() => ({ items: [] }))
    ]);
    incidents = itemsFrom(incidentRows);
    penalties = Array.isArray(penaltyRows) ? penaltyRows : [];
    events = itemsFrom(eventRows);
    render();
  }
  document.getElementById('searchInput').addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); render(); });
  document.getElementById('filterStrip').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    filter = btn.dataset.filter;
    document.querySelectorAll('#filterStrip .pill').forEach(node => node.classList.remove('pill-active'));
    btn.classList.add('pill-active');
    render();
  });
  window.addEventListener('online', setOffline);
  window.addEventListener('offline', setOffline);
  setOffline();
  load();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
