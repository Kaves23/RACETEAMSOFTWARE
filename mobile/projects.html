<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Projects · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=projects'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title" id="pageTitle">Projects</span>
      </div>
      <span id="countLabel" style="font-size:12px;color:var(--text-3);font-weight:500;"></span>
    </div>
    <div style="padding:0 16px 10px;display:flex;gap:8px;align-items:center;">
      <div style="position:relative;flex:1;">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        <input id="searchInput" type="search" placeholder="Search projects..." autocomplete="off" style="width:100%;box-sizing:border-box;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 32px;font-size:14px;background:var(--surface-2);outline:none;-webkit-appearance:none;">
      </div>
    </div>
    <div class="pill-strip" id="tabStrip" style="padding-top:0;padding-bottom:12px;">
      <button class="pill" data-tab="dashboard">Dashboard</button>
      <button class="pill" data-tab="projects">Projects</button>
      <button class="pill" data-tab="gantt">Gantt</button>
      <button class="pill" data-tab="workload">Workload</button>
      <button class="pill" data-tab="reports">Reports</button>
    </div>
  </header>

  <main class="app-body">
    <div id="content"></div>
  </main>

  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"></path><polyline points="9 21 9 12 15 12 15 21"></polyline></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a>
      <a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=sporting" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=projects" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"></line><rect x="4" y="8" width="9" height="3" rx="1"></rect><rect x="8" y="14" width="8" height="3" rx="1"></rect><line x1="3" y1="20" x2="21" y2="20"></line></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"></path><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"></path></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a>
      <a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"></path><circle cx="7" cy="17" r="1.5"></circle><circle cx="17" cy="17" r="1.5"></circle><line x1="9" y1="17" x2="15" y2="17"></line></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a>
      <a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"></path><line x1="7" y1="12" x2="17" y2="12"></line></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a>
    </div>
  </nav>
</div>

<style>
  .proj-stat-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; padding:12px 16px; }
  .proj-stat { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:12px; }
  .proj-stat-label { font-size:10px; text-transform:uppercase; color:var(--text-3); font-weight:700; letter-spacing:.06em; }
  .proj-stat-value { font-size:22px; font-weight:800; color:var(--text); margin-top:4px; }
  .proj-card, .proj-row, .proj-report-row, .proj-workload-row, .proj-milestone-row { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .proj-card-title, .proj-row-title { font-size:14px; font-weight:700; color:var(--text); }
  .proj-meta { font-size:12px; color:var(--text-3); margin-top:4px; line-height:1.45; }
  .proj-progress-track { margin-top:8px; height:6px; background:var(--surface-2); border-radius:99px; overflow:hidden; }
  .proj-progress-fill { height:100%; background:#111827; }
  .proj-badges { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .proj-badge { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:#eef2ff; color:#4338ca; }
  .proj-badge.risk-high, .proj-badge.risk-critical { background:#fee2e2; color:#991b1b; }
  .proj-badge.risk-medium, .proj-badge.at-risk { background:#fef3c7; color:#92400e; }
  .proj-badge.status-completed { background:#dcfce7; color:#166534; }
  .proj-badge.status-on_hold, .proj-badge.status-cancelled { background:#e5e7eb; color:#4b5563; }
  .proj-workload-top { display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
  .proj-workload-load { font-size:18px; font-weight:800; color:var(--text); }
  .empty { padding:28px 18px; text-align:center; color:var(--text-3); font-size:13px; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');

  const params = new URLSearchParams(window.location.search);
  let activeTab = params.get('tab') || 'dashboard';
  let search = '';
  let plans = [];
  let workloadRows = [];

  const TAB_TITLES = {
    dashboard: 'Project Dashboard',
    projects: 'Projects',
    gantt: 'Gantt Plans',
    workload: 'Workload',
    reports: 'Project Reports'
  };

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function fmtDate(v){ if (!v) return '—'; return new Date(String(v).slice(0,10) + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function pct(plan){ return Math.round(parseFloat(plan.avg_progress || plan.progress || 0) || 0); }
  function overdue(plan){ return parseInt(plan.overdue_tasks || 0, 10) || 0; }
  function blocked(plan){ return parseInt(plan.blocked_tasks || 0, 10) || 0; }
  function critical(plan){ return parseInt(plan.critical_tasks || 0, 10) || 0; }
  function riskLevel(plan){ return String(plan.risk_level || '').toLowerCase() || (overdue(plan) > 3 || blocked(plan) > 2 ? 'high' : overdue(plan) > 0 || blocked(plan) > 0 ? 'medium' : 'low'); }
  function todayIso(){ return new Date().toISOString().slice(0,10); }
  function isPlanOverdue(plan){ return !!(plan.end_date && String(plan.end_date).slice(0,10) < todayIso() && plan.status !== 'completed' && plan.status !== 'cancelled'); }
  function filteredPlans(){
    return plans.filter(plan => {
      if (!search) return true;
      const hay = [plan.name, plan.project_type, plan.event_name, plan.status, plan.priority].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(search.toLowerCase());
    });
  }
  function updateTitle(){
    document.getElementById('pageTitle').textContent = TAB_TITLES[activeTab] || 'Projects';
    Array.prototype.forEach.call(document.querySelectorAll('#tabStrip .pill'), node => node.classList.toggle('pill-active', node.dataset.tab === activeTab));
    const next = new URL(window.location.href);
    next.searchParams.set('tab', activeTab);
    history.replaceState(null, '', next.toString());
  }
  function renderDashboard(list){
    const active = list.filter(plan => plan.status === 'active').length;
    const atRisk = list.filter(plan => ['high','critical'].includes(riskLevel(plan)) || overdue(plan) > 0 || blocked(plan) > 0).length;
    const overdueCount = list.filter(isPlanOverdue).length;
    const done = list.filter(plan => plan.status === 'completed').length;
    const milestones = list
      .filter(plan => plan.end_date)
      .sort((a, b) => String(a.end_date).localeCompare(String(b.end_date)))
      .slice(0, 6);
    return '<div class="proj-stat-grid">' +
      '<div class="proj-stat"><div class="proj-stat-label">Active</div><div class="proj-stat-value">' + active + '</div></div>' +
      '<div class="proj-stat"><div class="proj-stat-label">At Risk</div><div class="proj-stat-value">' + atRisk + '</div></div>' +
      '<div class="proj-stat"><div class="proj-stat-label">Overdue</div><div class="proj-stat-value">' + overdueCount + '</div></div>' +
      '<div class="proj-stat"><div class="proj-stat-label">Completed</div><div class="proj-stat-value">' + done + '</div></div>' +
    '</div>' +
    (milestones.length ? milestones.map(plan => '<div class="proj-milestone-row"><div class="proj-row-title">' + esc(plan.name || 'Unnamed project') + '</div><div class="proj-meta">Target end ' + esc(fmtDate(plan.end_date)) + (plan.event_name ? ' · ' + esc(plan.event_name) : '') + '</div><div class="proj-badges"><span class="proj-badge risk-' + esc(riskLevel(plan)) + '">' + esc(riskLevel(plan)) + ' risk</span><span class="proj-badge">' + esc(String(pct(plan))) + '% complete</span></div></div>').join('') : '<div class="empty">No project milestones found.</div>');
  }
  function renderProjects(list){
    return list.length ? list.map(plan => '<div class="proj-card"><div class="proj-card-title">' + esc(plan.name || 'Unnamed project') + '</div><div class="proj-meta">' + esc(plan.project_type || 'General') + (plan.event_name ? ' · ' + esc(plan.event_name) : '') + '</div><div class="proj-badges"><span class="proj-badge status-' + esc(String(plan.status || 'active').replace(/[^a-z0-9]+/g,'_')) + '">' + esc(plan.status || 'active') + '</span><span class="proj-badge risk-' + esc(riskLevel(plan)) + '">' + esc(riskLevel(plan)) + ' risk</span><span class="proj-badge">' + esc(String(plan.task_count || 0)) + ' tasks</span></div><div class="proj-progress-track"><div class="proj-progress-fill" style="width:' + pct(plan) + '%"></div></div><div class="proj-meta">' + esc(String(pct(plan))) + '% complete · Target end ' + esc(fmtDate(plan.end_date)) + '</div></div>').join('') : '<div class="empty">No projects match the current search.</div>';
  }
  function renderGantt(list){
    return list.length ? list.sort((a, b) => String(a.start_date || '').localeCompare(String(b.start_date || ''))).map(plan => '<div class="proj-row"><div class="proj-row-title">' + esc(plan.name || 'Unnamed project') + '</div><div class="proj-meta">' + esc(fmtDate(plan.start_date)) + ' to ' + esc(fmtDate(plan.end_date)) + '</div><div class="proj-progress-track"><div class="proj-progress-fill" style="width:' + pct(plan) + '%"></div></div><div class="proj-meta">' + esc(String(plan.task_count || 0)) + ' tasks · ' + esc(String(plan.avg_duration_days || plan.duration_days || '—')) + ' day span</div></div>').join('') : '<div class="empty">No gantt plans available.</div>';
  }
  function renderWorkload(){
    if (!workloadRows.length) return '<div class="empty">No workload data available.</div>';
    const grouped = {};
    workloadRows.forEach(task => {
      const name = task.assignee_name || ('User ' + task.assignee_user_id);
      if (!grouped[name]) grouped[name] = { total: 0, overdue: 0, blocked: 0, tasks: [] };
      grouped[name].total += 1;
      if (task.status === 'blocked' || task.status === 'waiting_on') grouped[name].blocked += 1;
      if (task.end_date && String(task.end_date).slice(0,10) < todayIso() && task.status !== 'completed' && task.status !== 'cancelled') grouped[name].overdue += 1;
      grouped[name].tasks.push(task);
    });
    const rows = Object.keys(grouped).sort().filter(name => !search || name.toLowerCase().includes(search.toLowerCase()));
    return rows.length ? rows.map(name => {
      const item = grouped[name];
      return '<div class="proj-workload-row"><div class="proj-workload-top"><div><div class="proj-row-title">' + esc(name) + '</div><div class="proj-meta">' + esc(String(item.tasks.slice(0,3).map(t => t.title || t.name || 'Task').join(', '))) + (item.tasks.length > 3 ? '...' : '') + '</div></div><div class="proj-workload-load">' + esc(String(item.total)) + '</div></div><div class="proj-badges"><span class="proj-badge">' + esc(String(item.total)) + ' assigned</span><span class="proj-badge risk-medium">' + esc(String(item.overdue)) + ' overdue</span><span class="proj-badge risk-high">' + esc(String(item.blocked)) + ' blocked</span></div></div>';
    }).join('') : '<div class="empty">No workload rows match the current search.</div>';
  }
  function renderReports(list){
    return list.length ? list.map(plan => '<div class="proj-report-row"><div class="proj-row-title">' + esc(plan.name || 'Unnamed project') + '</div><div class="proj-meta">' + esc(plan.project_type || 'General') + (plan.priority ? ' · Priority ' + esc(plan.priority) : '') + '</div><div class="proj-badges"><span class="proj-badge">' + esc(String(plan.task_count || 0)) + ' tasks</span><span class="proj-badge risk-medium">' + esc(String(overdue(plan))) + ' overdue</span><span class="proj-badge risk-high">' + esc(String(blocked(plan))) + ' blocked</span><span class="proj-badge risk-high">' + esc(String(critical(plan))) + ' critical</span></div></div>').join('') : '<div class="empty">No reports available.</div>';
  }
  function render(){
    updateTitle();
    const list = filteredPlans();
    document.getElementById('countLabel').textContent = activeTab === 'workload' ? (workloadRows.length ? workloadRows.length + ' workload rows' : '') : (list.length ? list.length + ' plans' : '');
    const html = activeTab === 'dashboard' ? renderDashboard(list)
      : activeTab === 'projects' ? renderProjects(list)
      : activeTab === 'gantt' ? renderGantt(list)
      : activeTab === 'workload' ? renderWorkload()
      : renderReports(list);
    document.getElementById('content').innerHTML = html;
  }
  async function load(){
    const [planRes, workloadRes] = await Promise.all([
      mobileFetch('/api/project-plans').catch(() => ({ data: [] })),
      fetch('/api/project-plans/workload?weeks=8', { headers: { Authorization: 'Bearer ' + (localStorage.getItem('auth_token') || '') } }).then(r => r.ok ? r.json() : { data: [] }).catch(() => ({ data: [] }))
    ]);
    plans = Array.isArray(planRes) ? planRes : ((planRes && planRes.data) || []);
    workloadRows = (workloadRes && workloadRes.data) || [];
    render();
  }
  document.getElementById('searchInput').addEventListener('input', e => { search = e.target.value.trim(); render(); });
  document.getElementById('tabStrip').addEventListener('click', e => {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    activeTab = btn.dataset.tab;
    render();
  });
  window.addEventListener('online', setOffline);
  window.addEventListener('offline', setOffline);
  setOffline();
  load();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
