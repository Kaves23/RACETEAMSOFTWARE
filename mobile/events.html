<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Events · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:5px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=sporting'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Events</span>
      </div>
      <span id="evCount" style="font-size:12px;color:var(--text-3);font-weight:500;"></span>
    </div>
    <!-- Search -->
    <div style="padding:0 16px 10px;display:flex;gap:8px;align-items:center;">
      <div style="position:relative;flex:1;">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Search events…" autocomplete="off"
          style="width:100%;box-sizing:border-box;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 32px;font-size:14px;background:var(--bg-2,#f5f5f5);outline:none;-webkit-appearance:none;">
      </div>
    </div>
    <!-- Filter chips: Upcoming / Past / All -->
    <div class="pill-strip" id="filterStrip" style="padding-bottom:12px;">
      <button class="pill pill-active" data-filter="upcoming">Upcoming</button>
      <button class="pill" data-filter="all">All</button>
      <button class="pill" data-filter="past">Past</button>
    </div>
  </header>

  <!-- Body -->
  <main class="app-body" id="appBody">
    <div id="eventList"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span>
        <span class="nav-label">Dashboard</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span class="nav-label">Logistics</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=sporting" class="nav-item active">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Sporting</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=projects" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span>
        <span class="nav-label">Projects</span>
        <div class="nav-dot"></div>
      </a>
      <a href="scan.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span>
        <span class="nav-label">Scan</span>
        <div class="nav-dot"></div>
      </a>
    </div>
  </nav>

</div>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <!-- Drag handle -->
  <div class="drawer-handle" onclick="closeDrawer()"></div>

  <!-- Header: colour bar + title + close -->
  <div class="drawer-header" id="drawerHeader">
    <div class="drawer-ev-bar" id="drawerBar"></div>
    <div style="display:flex;align-items:flex-start;gap:10px;padding:12px 16px 0;">
      <div style="flex:1;min-width:0;">
        <div class="drawer-title" id="drawerName" style="white-space:normal;line-height:1.3;font-size:16px;font-weight:700;color:var(--text);">—</div>
        <div id="drawerDate" style="font-size:12px;color:var(--text-3);margin-top:2px;">—</div>
      </div>
      <span id="drawerTypePill" class="tag" style="flex-shrink:0;font-size:10px;font-weight:700;color:#fff;border-radius:20px;padding:2px 9px;">—</span>
    </div>
    <!-- Tab strip -->
    <div class="ev-drawer-tabs" id="drawerTabStrip">
      <button class="ev-drawer-tab active" data-tab="details">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:4px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Details
      </button>
      <button class="ev-drawer-tab" data-tab="runplans">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:4px;"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        Run Plans
        <span class="ev-rp-count" id="drawerRPCount" style="display:none;">0</span>
      </button>
    </div>
  </div>

  <!-- Body panels -->
  <div class="drawer-body" id="drawerBody">
    <!-- Details panel -->
    <div id="panelDetails" style="padding:16px;">
      <div style="text-align:center;padding:28px;color:var(--text-3);font-size:13px;">Loading…</div>
    </div>
    <!-- Run Plans panel -->
    <div id="panelRunPlans" style="display:none;"></div>
  </div>
</div>

<style>
  /* ── Event card ──────────────────────────────────────────────────────── */
  .ev-card {
    display: flex;
    align-items: flex-start;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    background: var(--bg);
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .ev-card:active { background: var(--bg-2, #f5f5f5); }

  .ev-accent {
    width: 4px;
    border-radius: 2px;
    align-self: stretch;
    flex-shrink: 0;
    min-height: 40px;
  }

  .ev-info { flex: 1; min-width: 0; }
  .ev-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }
  .ev-meta {
    font-size: 12px;
    color: var(--text-3);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  .ev-type-pill {
    display: inline-block;
    padding: 1px 7px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .ev-venue-chip {
    font-size: 11px;
    color: var(--text-3);
    background: var(--bg-2, #f5f5f5);
    border-radius: 4px;
    padding: 1px 6px;
  }
  .ev-status-dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── Section divider (month/date group) ─────────────────────────────── */
  .ev-group-header {
    padding: 10px 16px 5px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    background: var(--bg-2, #f5f5f5);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 2;
  }

  /* ── Today / next marker ─────────────────────────────────────────────── */
  .ev-upcoming-divider {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    background: #e8f7ff;
    border-bottom: 1px solid #b3dff4;
    font-size: 11px;
    font-weight: 700;
    color: #0072a3;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── Empty state ─────────────────────────────────────────────────────── */
  .ev-empty {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-3);
    font-size: 14px;
  }
  .ev-empty-icon { font-size: 40px; margin-bottom: 12px; }

  /* ── Drawer colour bar ───────────────────────────────────────────────── */
  .drawer-ev-bar {
    height: 4px;
    width: 100%;
    border-radius: 0;
    flex-shrink: 0;
  }

  /* ── Drawer tab strip ────────────────────────────────────────────────── */
  .ev-drawer-tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-top: 10px;
  }
  .ev-drawer-tab {
    flex: 1;
    padding: 9px 8px;
    border: none;
    background: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-3);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ev-drawer-tab.active {
    color: var(--accent, #0078ff);
    border-bottom-color: var(--accent, #0078ff);
  }
  .ev-rp-count {
    margin-left: 5px;
    background: var(--accent, #0078ff);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 20px;
  }

  /* ── Edit form ───────────────────────────────────────────────────────── */
  .ev-field-group { margin-bottom: 14px; }
  .ev-field-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--text-3);
    margin-bottom: 5px;
  }
  .ev-field-input,
  .ev-field-select,
  .ev-field-textarea {
    width: 100%;
    box-sizing: border-box;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    font-size: 14px;
    color: var(--text);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  .ev-field-input:focus,
  .ev-field-select:focus,
  .ev-field-textarea:focus { border-color: var(--accent, #0078ff); }
  .ev-field-textarea { resize: vertical; min-height: 70px; }
  .ev-field-row { display: flex; gap: 10px; }
  .ev-field-row .ev-field-group { flex: 1; }

  .ev-save-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    background: var(--accent, #0078ff);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 6px;
    transition: opacity 0.15s;
  }
  .ev-save-btn:disabled { opacity: 0.5; }
  .ev-save-btn.saving { opacity: 0.7; }
  .ev-save-msg {
    text-align: center;
    font-size: 12px;
    margin-top: 8px;
    min-height: 16px;
    color: var(--text-3);
  }
  .ev-save-msg.ok  { color: #00c853; }
  .ev-save-msg.err { color: #e53935; }

  /* ── Run plan cards ──────────────────────────────────────────────────── */
  .rp-add-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .rp-add-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
  }
  .rp-add-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1.5px solid var(--accent, #0078ff);
    background: none;
    color: var(--accent, #0078ff);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
  }
  .rp-card {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    cursor: pointer;
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .rp-card:active { background: var(--bg-2, #f5f5f5); }
  .rp-card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 5px;
  }
  .rp-session-name {
    font-size: 14px; font-weight: 700; color: var(--text);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .rp-status-pill {
    font-size: 10px; font-weight: 700;
    padding: 2px 8px; border-radius: 20px;
    color: #fff; flex-shrink: 0;
  }
  .rp-card-meta {
    font-size: 11px; color: var(--text-3);
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .rp-meta-chip {
    display: flex; align-items: center; gap: 3px;
  }
  .rp-empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-3);
    font-size: 13px;
  }

  /* ── New run plan form (inline) ──────────────────────────────────────── */
  .rp-form {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2, #f5f5f5);
  }
  .rp-form-title {
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-3); margin-bottom: 10px;
  }
  .rp-form-cancel {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: none;
    color: var(--text-2);
    font-size: 13px; font-weight: 600;
    cursor: pointer;
  }
  .rp-form-submit {
    flex: 2;
    padding: 11px;
    border-radius: 8px;
    border: none;
    background: var(--accent, #0078ff);
    color: #fff;
    font-size: 13px; font-weight: 700;
    cursor: pointer;
  }

  /* ── Detail read-only rows (legacy fallback) ─────────────────────────── */
  .detail-section { margin-bottom: 18px; }
  .detail-section-title {
    font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text-3); margin-bottom: 8px;
    padding-bottom: 5px; border-bottom: 1px solid var(--border);
  }
  .detail-row {
    display: flex; justify-content: space-between;
    align-items: flex-start; gap: 10px;
    padding: 5px 0; border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: var(--text-3); font-weight: 500; flex-shrink: 0; min-width: 70px; }
  .detail-value { color: var(--text); font-weight: 600; text-align: right; }
</style>

<script>
  // Auth guard
  if (!localStorage.getItem('auth_token')) {
    window.location.replace('index.html');
  }

  const API = window.location.origin;

  // Offline banner
  window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  if (!navigator.onLine) document.getElementById('offlineBanner').style.display = 'block';

  const TYPE_COLORS = {
    'Practice':         '#3b82f6',
    'Race/Event':       '#e32636',
    'Travel':           '#6b7280',
    'Camp':             '#16a34a',
    'Regional Weekend': '#f59e0b',
    'National Weekend': '#7c3aed',
    'International Trip':'#0891b2',
    'Test Day':         '#10b981',
    'Travel Day':       '#f59e0b',
    'Promo / Media':    '#ec4899',
  };
  const STATUS_COLORS = {
    'Elapsed': '#9ca3af', 'Upcoming': '#3b82f6', 'Open': '#10b981',
    'Closed': '#6b7280', 'Planned': '#6b7280',
  };
  const RP_STATUS_COLORS = {
    'planned': '#3b82f6', 'in_progress': '#f59e0b', 'completed': '#10b981',
    'cancelled': '#9ca3af',
  };

  let allEvents = [];
  let currentFilter = 'upcoming';
  let currentSearch = '';
  let activeDrawerEventId = null;
  let activeDrawerTab = 'details';
  let drawerRunPlans = [];
  let showNewRPForm = false;

  // ── Helpers ───────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function toISO(v) {
    if (!v) return '';
    if (v.includes('T')) return v.slice(0,10);
    return v;
  }
  function formatDate(v) {
    if (!v) return '—';
    const s = toISO(v);
    const [y, m, d] = s.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(d,10)} ${months[parseInt(m,10)-1]} ${y}`;
  }
  function formatDateRange(ev) {
    const s = toISO(ev.start_date || ev.start || '');
    const e = toISO(ev.end_date || ev.end || '');
    if (!s) return '—';
    if (!e || e === s) return formatDate(s);
    const [sy, sm, sd] = s.split('-');
    const [ey, em, ed] = e.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    if (sy === ey && sm === em) return `${parseInt(sd,10)}–${parseInt(ed,10)} ${months[parseInt(sm,10)-1]} ${sy}`;
    if (sy === ey) return `${parseInt(sd,10)} ${months[parseInt(sm,10)-1]} – ${parseInt(ed,10)} ${months[parseInt(em,10)-1]} ${sy}`;
    return `${formatDate(s)} – ${formatDate(e)}`;
  }
  function monthLabel(isoDate) {
    if (!isoDate) return 'No date';
    const [y, m] = isoDate.split('-');
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    return `${months[parseInt(m,10)-1]} ${y}`;
  }
  function typeColor(type) { return TYPE_COLORS[type] || '#6b7280'; }

  // ── Event list ────────────────────────────────────────────────────────
  function getFilteredEvents() {
    const today = todayISO();
    let list = allEvents.slice().sort((a, b) => {
      const as = toISO(a.start_date || a.start || '');
      const bs = toISO(b.start_date || b.start || '');
      return as.localeCompare(bs);
    });
    if (currentFilter === 'upcoming') {
      list = list.filter(e => toISO(e.start_date || e.start || '') >= today);
    } else if (currentFilter === 'past') {
      list = list.filter(e => toISO(e.start_date || e.start || '') < today);
      list.reverse();
    }
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      list = list.filter(e =>
        (e.name || e.title || '').toLowerCase().includes(q) ||
        (e.circuit || e.venue || '').toLowerCase().includes(q) ||
        (e.event_type || e.type || '').toLowerCase().includes(q)
      );
    }
    return list;
  }

  function renderEvents() {
    const list = getFilteredEvents();
    const today = todayISO();
    const container = document.getElementById('eventList');
    document.getElementById('evCount').textContent = list.length + ' event' + (list.length !== 1 ? 's' : '');
    if (list.length === 0) {
      container.innerHTML = `<div class="ev-empty"><div class="ev-empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><div>No events found</div></div>`;
      return;
    }
    let html = '';
    let lastMonth = null;
    let nextInserted = false;
    list.forEach((ev, idx) => {
      const startISO = toISO(ev.start_date || ev.start || '');
      const month = startISO ? monthLabel(startISO) : 'No date';
      const color = typeColor(ev.event_type || ev.type || '');
      const statusColor = STATUS_COLORS[ev.status] || '#6b7280';
      const title = ev.name || ev.title || 'Untitled';
      const venue = ev.circuit || ev.venue || '';
      const type = ev.event_type || ev.type || '';
      const status = ev.status || '';
      const dateStr = formatDateRange(ev);
      if (month !== lastMonth) {
        lastMonth = month;
        html += `<div class="ev-group-header">${month}</div>`;
      }
      if (!nextInserted && currentFilter !== 'past' && startISO >= today) {
        const nextIdx = list.findIndex(e => toISO(e.start_date || e.start || '') >= today);
        if (nextIdx === idx) {
          html += `<div class="ev-upcoming-divider">Next upcoming</div>`;
          nextInserted = true;
        }
      }
      html += `<div class="ev-card" onclick="openDrawer(${JSON.stringify(ev.id)})">
          <div class="ev-accent" style="background:${color};"></div>
          <div class="ev-info">
            <div class="ev-title">${escHtml(title)}</div>
            <div class="ev-meta">
              <span>${dateStr}</span>
              ${venue ? `<span class="ev-venue-chip">${escHtml(venue)}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;">
            <span class="ev-type-pill" style="background:${color};">${escHtml(type)}</span>
            <span style="font-size:10px;font-weight:600;color:${statusColor};">${escHtml(status)}</span>
          </div>
        </div>`;
    });
    container.innerHTML = html;
  }

  // ── Drawer open / close ───────────────────────────────────────────────
  function openDrawer(id) {
    const ev = allEvents.find(e => String(e.id) === String(id));
    if (!ev) return;
    activeDrawerEventId = String(id);
    activeDrawerTab = 'details';
    drawerRunPlans = [];
    showNewRPForm = false;

    const title = ev.name || ev.title || 'Untitled';
    const type  = ev.event_type || ev.type || '';
    const color = typeColor(type);
    const dateStr = formatDateRange(ev);

    document.getElementById('drawerBar').style.background = color;
    document.getElementById('drawerName').textContent = title;
    document.getElementById('drawerDate').textContent = dateStr;
    document.getElementById('drawerTypePill').textContent = type;
    document.getElementById('drawerTypePill').style.background = color;

    // Tab strip active state
    document.querySelectorAll('.ev-drawer-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'details'));
    document.getElementById('panelDetails').style.display = '';
    document.getElementById('panelRunPlans').style.display = 'none';

    renderDetailsPanel(ev);

    document.getElementById('drawerOverlay').classList.add('active');
    document.getElementById('detailDrawer').classList.add('open');

    // Load run plans in background
    loadRunPlans(id);
  }

  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('active');
    document.getElementById('detailDrawer').classList.remove('open');
    activeDrawerEventId = null;
  }

  // ── Tab switching ─────────────────────────────────────────────────────
  document.getElementById('drawerTabStrip').addEventListener('click', e => {
    const btn = e.target.closest('[data-tab]');
    if (!btn) return;
    activeDrawerTab = btn.dataset.tab;
    document.querySelectorAll('.ev-drawer-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === activeDrawerTab));
    document.getElementById('panelDetails').style.display   = activeDrawerTab === 'details'  ? '' : 'none';
    document.getElementById('panelRunPlans').style.display  = activeDrawerTab === 'runplans' ? '' : 'none';
    if (activeDrawerTab === 'runplans') renderRunPlansPanel();
  });

  // ── Details panel (editable form) ─────────────────────────────────────
  const EVENT_TYPES = ['Practice','Race/Event','Regional Weekend','National Weekend','International Trip','Test Day','Travel Day','Promo / Media','Camp','Travel','Other'];
  const EVENT_STATUSES = ['Planned','Upcoming','Open','Closed','Elapsed'];

  function renderDetailsPanel(ev) {
    const sd = toISO(ev.start_date || ev.start || '');
    const ed = toISO(ev.end_date || ev.end || '');
    const typeOpts = EVENT_TYPES.map(t =>
      `<option value="${escHtml(t)}" ${(ev.event_type || ev.type || '') === t ? 'selected' : ''}>${escHtml(t)}</option>`
    ).join('');
    const statusOpts = EVENT_STATUSES.map(s =>
      `<option value="${escHtml(s)}" ${(ev.status || '') === s ? 'selected' : ''}>${escHtml(s)}</option>`
    ).join('');

    document.getElementById('panelDetails').innerHTML = `
      <div class="ev-field-group">
        <div class="ev-field-label">Event Name</div>
        <input class="ev-field-input" id="ef_name" type="text" value="${escHtml(ev.name || ev.title || '')}" placeholder="Event name">
      </div>
      <div class="ev-field-row">
        <div class="ev-field-group">
          <div class="ev-field-label">Start Date</div>
          <input class="ev-field-input" id="ef_start" type="date" value="${escHtml(sd)}">
        </div>
        <div class="ev-field-group">
          <div class="ev-field-label">End Date</div>
          <input class="ev-field-input" id="ef_end" type="date" value="${escHtml(ed)}">
        </div>
      </div>
      <div class="ev-field-group">
        <div class="ev-field-label">Venue / Circuit</div>
        <input class="ev-field-input" id="ef_venue" type="text" value="${escHtml(ev.circuit || ev.venue || '')}" placeholder="Circuit or venue name">
      </div>
      <div class="ev-field-row">
        <div class="ev-field-group">
          <div class="ev-field-label">Type</div>
          <select class="ev-field-select" id="ef_type">${typeOpts}</select>
        </div>
        <div class="ev-field-group">
          <div class="ev-field-label">Status</div>
          <select class="ev-field-select" id="ef_status">${statusOpts}</select>
        </div>
      </div>
      <div class="ev-field-group">
        <div class="ev-field-label">Notes / Brief</div>
        <textarea class="ev-field-textarea" id="ef_brief" placeholder="Event brief, notes…">${escHtml(ev.brief || ev.notes || '')}</textarea>
      </div>
      <button class="ev-save-btn" id="efSaveBtn" onclick="saveEventDetails()">Save Changes</button>
      <div class="ev-save-msg" id="efSaveMsg"></div>
    `;
  }

  function saveEventDetails() {
    const ev = allEvents.find(e => String(e.id) === String(activeDrawerEventId));
    if (!ev) return;
    const btn = document.getElementById('efSaveBtn');
    const msg = document.getElementById('efSaveMsg');
    btn.disabled = true;
    btn.classList.add('saving');
    msg.textContent = '';
    msg.className = 'ev-save-msg';

    const nameField  = document.getElementById('ef_name');
    const startField = document.getElementById('ef_start');
    const endField   = document.getElementById('ef_end');
    const venueField = document.getElementById('ef_venue');
    const typeField  = document.getElementById('ef_type');
    const statusField= document.getElementById('ef_status');
    const briefField = document.getElementById('ef_brief');

    // Build payload with same field names as the existing event
    const hasNameCol    = 'name'    in ev;
    const hasTitleCol   = 'title'   in ev;
    const hasStartDate  = 'start_date' in ev;
    const hasStartCol   = 'start'   in ev;
    const hasEndDate    = 'end_date' in ev;
    const hasEndCol     = 'end'     in ev;
    const hasCircuit    = 'circuit' in ev;
    const hasVenueCol   = 'venue'   in ev;
    const hasEventType  = 'event_type' in ev;
    const hasTypeCol    = 'type'    in ev;
    const hasBriefCol   = 'brief'   in ev;
    const hasNotesCol   = 'notes'   in ev;

    const payload = {};
    if (hasNameCol)   payload.name       = nameField.value.trim();
    if (hasTitleCol)  payload.title      = nameField.value.trim();
    if (hasStartDate) payload.start_date = startField.value || null;
    if (hasStartCol)  payload.start      = startField.value || null;
    if (hasEndDate)   payload.end_date   = endField.value || null;
    if (hasEndCol)    payload.end        = endField.value || null;
    if (hasCircuit)   payload.circuit    = venueField.value.trim();
    if (hasVenueCol)  payload.venue      = venueField.value.trim();
    if (hasEventType) payload.event_type = typeField.value;
    if (hasTypeCol)   payload.type       = typeField.value;
    if (hasBriefCol)  payload.brief      = briefField.value.trim();
    if (hasNotesCol)  payload.notes      = briefField.value.trim();
    payload.status = statusField.value;

    mobileFetch(`/api/collections/events/${ev.id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(data => {
      // Update local cache
      const idx = allEvents.findIndex(e => String(e.id) === String(ev.id));
      if (idx >= 0) allEvents[idx] = Object.assign({}, allEvents[idx], payload);
      renderEvents();
      // Update drawer header
      const updEv = allEvents[idx] || ev;
      const newTitle = updEv.name || updEv.title || 'Untitled';
      document.getElementById('drawerName').textContent = newTitle;
      document.getElementById('drawerDate').textContent = formatDateRange(updEv);
      const newColor = typeColor(updEv.event_type || updEv.type || '');
      document.getElementById('drawerBar').style.background = newColor;
      document.getElementById('drawerTypePill').textContent = updEv.event_type || updEv.type || '';
      document.getElementById('drawerTypePill').style.background = newColor;
      btn.disabled = false;
      btn.classList.remove('saving');
      msg.textContent = 'Saved ✓';
      msg.className = 'ev-save-msg ok';
      setTimeout(() => { if (msg) msg.textContent = ''; }, 3000);
    }).catch(err => {
      btn.disabled = false;
      btn.classList.remove('saving');
      msg.textContent = 'Save failed — check connection';
      msg.className = 'ev-save-msg err';
    });
  }

  // ── Run plans panel ───────────────────────────────────────────────────
  function loadRunPlans(eventId) {
    mobileFetch(`/api/run-plans?event_id=${encodeURIComponent(eventId)}`).then(rows => {
      drawerRunPlans = Array.isArray(rows) ? rows : [];
      updateRPCountBadge();
      if (activeDrawerTab === 'runplans') renderRunPlansPanel();
    }).catch(() => {
      drawerRunPlans = [];
      updateRPCountBadge();
      if (activeDrawerTab === 'runplans') renderRunPlansPanel();
    });
  }

  function updateRPCountBadge() {
    const badge = document.getElementById('drawerRPCount');
    if (drawerRunPlans.length > 0) {
      badge.style.display = '';
      badge.textContent = drawerRunPlans.length;
    } else {
      badge.style.display = 'none';
    }
  }

          </div>
          ${rp.objectives ? `<div style="font-size:11px;color:var(--text-3);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${escHtml(rp.objectives)}</div>` : ''}

  function toggleNewRPForm() {
    showNewRPForm = !showNewRPForm;
    renderRunPlansPanel();
    if (showNewRPForm) {
      setTimeout(() => {
        const el = document.getElementById('rp_session');
        if (el) el.focus();
      }, 80);
    }
  }

  function createRunPlan() {
    const session = (document.getElementById('rp_session')?.value || '').trim();
    const msg = document.getElementById('rpFormMsg');
    if (!session) {
      if (msg) { msg.textContent = 'Session name is required'; msg.className = 'ev-save-msg err'; }
      return;
    }
    const payload = {
      event_id:      activeDrawerEventId,
      session_name:  session,
      car_number:    (document.getElementById('rp_car')?.value || '').trim() || null,
      driver_name:   (document.getElementById('rp_driver')?.value || '').trim() || null,
      planned_laps:  parseInt(document.getElementById('rp_planned_laps')?.value || '0', 10) || 0,
      tyre_compound: (document.getElementById('rp_tyre')?.value || '').trim() || null,
      objectives:    (document.getElementById('rp_objectives')?.value || '').trim() || null,
      status:        'planned'
    };

    const submitBtn = document.querySelector('.rp-form-submit');
    if (submitBtn) submitBtn.disabled = true;

    mobileFetch('/api/run-plans', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(newRP => {
      drawerRunPlans.unshift(newRP);
      showNewRPForm = false;
      updateRPCountBadge();
      renderRunPlansPanel();
    }).catch(() => {
      if (submitBtn) submitBtn.disabled = false;
      if (msg) { msg.textContent = 'Failed to create — try again'; msg.className = 'ev-save-msg err'; }
    });
  }

  function saveRunPlan(rpId) {
    const rp = drawerRunPlans.find(r => String(r.id) === String(rpId));
    if (!rp) return;
    const btn = document.querySelector(`#panelRunPlans .ev-save-btn`);
    const msg = document.getElementById('rpeSaveMsg');
    if (btn) btn.disabled = true;

    const payload = {
      event_id:      activeDrawerEventId,
      session_name:  document.getElementById('rpe_session')?.value.trim() || rp.session_name,
      car_number:    document.getElementById('rpe_car')?.value.trim() || null,
      driver_name:   document.getElementById('rpe_driver')?.value.trim() || null,
      planned_laps:  parseInt(document.getElementById('rpe_planned')?.value || '0', 10) || 0,
      actual_laps:   parseInt(document.getElementById('rpe_actual')?.value  || '0', 10) || 0,
      tyre_compound: document.getElementById('rpe_tyre')?.value.trim() || null,
      fuel_load:     document.getElementById('rpe_fuel')?.value.trim() || null,
      status:        document.getElementById('rpe_status')?.value || rp.status,
      objectives:    document.getElementById('rpe_objectives')?.value.trim() || null,
      notes:         document.getElementById('rpe_notes')?.value.trim() || null,
    };

    mobileFetch(`/api/run-plans/${rpId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(updated => {
      const idx = drawerRunPlans.findIndex(r => String(r.id) === String(rpId));
      if (idx >= 0) drawerRunPlans[idx] = updated;
      updateRPCountBadge();
      if (msg) { msg.textContent = 'Saved ✓'; msg.className = 'ev-save-msg ok'; }
      setTimeout(() => renderRunPlansPanel(), 1200);
    }).catch(() => {
      if (btn) btn.disabled = false;
      if (msg) { msg.textContent = 'Save failed — try again'; msg.className = 'ev-save-msg err'; }
    });
  }

  // ── Filter chips ──────────────────────────────────────────────────────
  document.getElementById('filterStrip').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('#filterStrip .pill').forEach(p => p.classList.remove('pill-active'));
    btn.classList.add('pill-active');
    renderEvents();
  });

  // ── Search ────────────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    currentSearch = e.target.value.trim();
    renderEvents();
  });

  // ── Load events ───────────────────────────────────────────────────────
  async function loadEvents() {
    try {
      const resp = await fetch(`${API}/api/collections/events`, {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') }
      });
      if (mobileHandle401(resp)) return;
      const data = await resp.json();
      if (data.success) {
        allEvents = data.items || [];
        renderEvents();
      }
    } catch (err) {
      console.error('Failed to load events:', err);
      document.getElementById('eventList').innerHTML = `<div class="ev-empty"><div class="ev-empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div>Failed to load events</div></div>`;
    }
  }

  loadEvents();
</script>
</body>
</html>
