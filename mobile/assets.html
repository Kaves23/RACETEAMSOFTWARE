<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Assets · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:5px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='dashboard.html'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Assets</span>
      </div>
      <span id="assetCount" style="font-size:12px;color:var(--text-3);font-weight:500;"></span>
    </div>
    <!-- Search + filter -->
    <div style="padding:0 16px 12px;display:flex;gap:8px;align-items:center;">
      <div style="position:relative;flex:1;">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Search assets…" autocomplete="off"
          style="width:100%;box-sizing:border-box;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 32px;font-size:14px;background:var(--bg-2,#f5f5f5);outline:none;-webkit-appearance:none;">
      </div>
    </div>
    <!-- Category filter chips -->
    <div class="pill-strip" id="categoryStrip" style="padding-bottom:12px;">
      <button class="pill pill-active" data-cat="">All</button>
    </div>
  </header>

  <!-- Body -->
  <main class="app-body" id="appBody">
    <div id="assetList"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span>
        <span class="nav-label">Dashboard</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html" class="nav-item active">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span class="nav-label">Logistics</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=sporting" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Sporting</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=projects" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span>
        <span class="nav-label">Projects</span>
        <div class="nav-dot"></div>
      </a>
      <a href="scan.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span>
        <span class="nav-label">Scan</span>
        <div class="nav-dot"></div>
      </a>
    </div>
  </nav>

</div>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawerName">—</div>
      <div class="drawer-subtitle" id="drawerCategory" style="font-size:12px;color:var(--text-3);margin-top:2px;">—</div>
    </div>
    <span id="drawerStatus" class="tag">—</span>
  </div>
  <div class="drawer-body" id="drawerBody">
    <!-- Detail rows injected here -->
  </div>
</div>

<style>
  .asset-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    cursor: pointer;
    background: var(--bg);
    transition: background 0.12s;
    -webkit-tap-highlight-color: transparent;
  }
  .asset-row:active { background: var(--bg-2, #f5f5f5); }
  .asset-icon {
    width: 38px;
    height: 38px;
    border-radius: var(--r);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .cat-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: var(--r-sm);
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.04em;
  }
  .cat-vehicle { background: #e8f0fe; color: #1a73e8; }
  .cat-elec    { background: #e8eaf6; color: #3949ab; }
  .cat-tool    { background: #dbeafe; color: #1d4ed8; }
  .cat-safety  { background: #fde68a; color: #92400e; }
  .cat-camera  { background: #f3e8fd; color: #6a1b9a; }
  .cat-fuel    { background: #fef3c7; color: #b45309; }
  .cat-default { background: #f1f3f4; color: #5f6368; }
  .asset-info { flex: 1; min-width: 0; }
  .asset-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .asset-meta {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 2px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .asset-barcode {
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--text-3);
  }

  /* Status badge colours */
  .status-available  { background: #dcfce7; color: #16a34a; }
  .status-in-use     { background: #dbeafe; color: #1d4ed8; }
  .status-maintenance{ background: #fef3c7; color: #d97706; }
  .status-retired    { background: #f3f4f6; color: #6b7280; }
  .status-missing    { background: #fee2e2; color: #dc2626; }

  /* Detail drawer layout */
  .detail-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { font-size: 12px; color: var(--text-3); font-weight: 500; flex-shrink: 0; }
  .detail-value { font-size: 13px; color: var(--text); text-align: right; word-break: break-word; }
  .detail-value.mono { font-family: ui-monospace, monospace; font-size: 12px; }

  /* History feed */
  .history-section { margin-top: 20px; }
  .history-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-3);
    margin-bottom: 10px;
  }
  .history-item {
    display: flex;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .history-item:last-child { border-bottom: none; }
  .history-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-3);
    flex-shrink: 0;
    margin-top: 4px;
  }
  .history-action { font-size: 13px; font-weight: 500; color: var(--text); }
  .history-time { font-size: 11px; color: var(--text-3); margin-top: 2px; }

  /* Skeleton rows */
  .skel-row {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
  }
  .skel-icon { width: 38px; height: 38px; border-radius: var(--r); background: var(--border); flex-shrink: 0; }
  .skel-lines { flex: 1; }
  .skel-line { height: 12px; border-radius: 4px; background: var(--border); margin-bottom: 6px; }

  @keyframes shimmer {
    0%   { opacity: 0.5; }
    50%  { opacity: 1; }
    100% { opacity: 0.5; }
  }
  .skel-icon, .skel-line { animation: shimmer 1.4s ease-in-out infinite; }
</style>

<script>
  // Auth guard
  if (!localStorage.getItem('auth_token') || sessionStorage.getItem('mobile_pin_ok') !== '1') {
    window.location.replace('index.html');
  }

  const API = window.location.origin;
  const authHeaders = () => ({ 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') });

  let allAssets = [];
  let activeCategory = '';
  let searchQuery = '';
  let currentAsset = null;

  // ── Offline banner ──────────────────────────────────────────────
  window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  if (!navigator.onLine) document.getElementById('offlineBanner').style.display = 'block';

  // ── Load assets ─────────────────────────────────────────────────
  async function loadAssets() {
    renderSkeletons();
    try {
      const res = await fetch(`${API}/api/items`, { headers: authHeaders() });
      if (mobileHandle401(res)) return;
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      allAssets = data.items || [];
      buildCategoryChips();
      renderList();
      document.getElementById('assetCount').textContent = allAssets.length + ' assets';
    } catch (err) {
      document.getElementById('assetList').innerHTML =
        `<div style="padding:40px 16px;text-align:center;color:var(--text-3);font-size:13px;">Failed to load assets.<br><button onclick="loadAssets()" style="margin-top:12px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px;cursor:pointer;">Retry</button></div>`;
    }
  }

  function renderSkeletons() {
    let html = '';
    for (let i = 0; i < 8; i++) {
      html += `<div class="skel-row"><div class="skel-icon"></div><div class="skel-lines"><div class="skel-line" style="width:60%"></div><div class="skel-line" style="width:40%"></div></div></div>`;
    }
    document.getElementById('assetList').innerHTML = html;
  }

  // ── Category chips ───────────────────────────────────────────────
  function buildCategoryChips() {
    const cats = [...new Set(allAssets.map(a => a.category).filter(Boolean))].sort();
    const strip = document.getElementById('categoryStrip');
    strip.innerHTML = `<button class="pill ${activeCategory === '' ? 'pill-active' : ''}" data-cat="">All</button>`;
    cats.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'pill' + (activeCategory === cat ? ' pill-active' : '');
      btn.dataset.cat = cat;
      btn.textContent = cat;
      strip.appendChild(btn);
    });
    strip.querySelectorAll('.pill').forEach(btn => {
      btn.addEventListener('click', () => {
        activeCategory = btn.dataset.cat;
        strip.querySelectorAll('.pill').forEach(b => b.classList.remove('pill-active'));
        btn.classList.add('pill-active');
        renderList();
      });
    });
  }

  // ── Render list ──────────────────────────────────────────────────
  function renderList() {
    const q = searchQuery.toLowerCase();
    const filtered = allAssets.filter(a => {
      const matchCat = !activeCategory || a.category === activeCategory;
      const matchQ = !q || (a.name || '').toLowerCase().includes(q) || (a.barcode || '').toLowerCase().includes(q) || (a.serial_number || '').toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    if (filtered.length === 0) {
      document.getElementById('assetList').innerHTML =
        `<div style="padding:60px 16px;text-align:center;color:var(--text-3);font-size:13px;">No assets match your search.</div>`;
      return;
    }

    document.getElementById('assetList').innerHTML = filtered.map(a => {
      const icon = iconFor(a.item_type, a.category);
      const statusClass = 'status-' + (a.status || 'available').toLowerCase().replace(/\s+/g, '-');
      const statusLabel = a.status || 'Available';
      return `<div class="asset-row" onclick="openAsset('${a.id}')">
        <div class="asset-icon">${icon}</div>
        <div class="asset-info">
          <div class="asset-name">${esc(a.name)}</div>
          <div class="asset-meta">
            ${a.category ? `<span>${esc(a.category)}</span><span>·</span>` : ''}
            <span class="asset-barcode">${esc(a.barcode || a.id)}</span>
          </div>
        </div>
        <span class="tag ${statusClass}" style="font-size:11px;flex-shrink:0;">${esc(statusLabel)}</span>
      </div>`;
    }).join('');
  }

  function iconFor(type, cat) {
    const t = (type || '').toLowerCase();
    const c = (cat || '').toLowerCase();
    if (t.includes('vehicle') || c.includes('vehicle')) return '<span class="cat-badge cat-vehicle">VEH</span>';
    if (t.includes('electronic') || c.includes('electronic') || c.includes('tech')) return '<span class="cat-badge cat-elec">ELC</span>';
    if (t.includes('tool') || c.includes('tool'))       return '<span class="cat-badge cat-tool">TLS</span>';
    if (t.includes('safety') || c.includes('safety'))   return '<span class="cat-badge cat-safety">PPE</span>';
    if (c.includes('camera') || c.includes('photo'))    return '<span class="cat-badge cat-camera">CAM</span>';
    if (c.includes('fuel') || c.includes('tire') || c.includes('tyre')) return '<span class="cat-badge cat-fuel">FUL</span>';
    return '<span class="cat-badge cat-default">AST</span>';
  }

  // ── Open asset drawer ────────────────────────────────────────────
  async function openAsset(id) {
    const asset = allAssets.find(a => a.id === id);
    if (!asset) return;
    currentAsset = asset;

    document.getElementById('drawerName').textContent = asset.name || '—';
    document.getElementById('drawerCategory').textContent = [asset.item_type, asset.category].filter(Boolean).join(' · ') || '—';
    const statusClass = 'status-' + (asset.status || 'available').toLowerCase().replace(/\s+/g, '-');
    const drawerStatus = document.getElementById('drawerStatus');
    drawerStatus.textContent = asset.status || 'Available';
    drawerStatus.className = 'tag ' + statusClass;

    // Show drawer immediately with basic details
    const bodyEl = document.getElementById('drawerBody');
    bodyEl.innerHTML = renderDetailRows(asset) + `<div id="historyArea"><div style="padding:20px 0;text-align:center;color:var(--text-3);font-size:13px;">Loading history…</div></div>`;
    showDrawer();

    // Load history async
    try {
      const res = await fetch(`${API}/api/items/${id}/history`, { headers: authHeaders() });
      if (mobileHandle401(res)) return;
      const data = await res.json();
      document.getElementById('historyArea').innerHTML = renderHistory(data.history || []);
    } catch (_) {
      document.getElementById('historyArea').innerHTML = `<div style="padding:12px 0;color:var(--text-3);font-size:12px;">History unavailable.</div>`;
    }
  }

  function renderDetailRows(a) {
    const rows = [
      ['Barcode', `<span class="mono">${esc(a.barcode || '—')}</span>`],
      ['Serial #', esc(a.serial_number || '—')],
      ['Weight', a.weight_kg ? a.weight_kg + ' kg' : '—'],
      ['Value', a.value_usd ? '$' + Number(a.value_usd).toLocaleString() : '—'],
      ['Assigned to', esc(a.assigned_staff_name || '—')],
      ['Description', esc(a.description || '—')],
    ].filter(([, v]) => v && v !== '—' && v !== 'undefined');

    return `<div>${rows.map(([label, val]) =>
      `<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-value">${val}</span></div>`
    ).join('')}</div>`;
  }

  function renderHistory(history) {
    if (!history.length) {
      return `<div class="history-section"><div class="history-title">History</div><div style="color:var(--text-3);font-size:13px;">No history recorded yet.</div></div>`;
    }
    const items = history.slice(0, 30).map(h => {
      const label = formatAction(h);
      const time = formatTime(h.timestamp);
      return `<div class="history-item"><div class="history-dot"></div><div><div class="history-action">${esc(label)}</div><div class="history-time">${time}</div></div></div>`;
    }).join('');
    return `<div class="history-section"><div class="history-title">History (${history.length})</div>${items}</div>`;
  }

  function formatAction(h) {
    const action = (h.action || '').toLowerCase();
    if (action === 'packed') return `Packed into box`;
    if (action === 'unpacked') return `Removed from box`;
    if (action === 'status_change') return `Status: ${h.previous_status || '?'} → ${h.new_status || '?'}`;
    if (action === 'moved') return `Moved location`;
    if (action === 'created') return `Asset created`;
    if (h.details) {
      try { const d = typeof h.details === 'string' ? JSON.parse(h.details) : h.details; return d.action || d.description || action; }
      catch (_) {}
    }
    return h.action || 'Update';
  }

  function formatTime(ts) {
    if (!ts) return '—';
    const d = new Date(ts);
    const now = new Date();
    const diff = now - d;
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
    if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
    if (diff < 604800000) return Math.floor(diff / 86400000) + 'd ago';
    return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: d.getFullYear() !== now.getFullYear() ? 'numeric' : undefined });
  }

  // ── Drawer ───────────────────────────────────────────────────────
  function showDrawer() {
    document.getElementById('drawerOverlay').classList.add('active');
    document.getElementById('detailDrawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('active');
    document.getElementById('detailDrawer').classList.remove('open');
    document.body.style.overflow = '';
    currentAsset = null;
  }

  // ── Search ───────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderList();
  });

  // ── SW ───────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── Helpers ──────────────────────────────────────────────────────
  function esc(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Boot ─────────────────────────────────────────────────────────
  loadAssets();
</script>

</body>
</html>
