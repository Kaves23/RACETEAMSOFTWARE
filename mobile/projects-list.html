<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Projects · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar"><div class="page-bar-brand" onclick="window.location.href='browse.html?tab=projects'" style="cursor:pointer;"><div class="page-bar-mark">RT</div><span class="page-bar-title">Projects</span></div></div>
    <div class="pill-strip" style="padding-top:10px;padding-bottom:12px;">
      <a href="projects-dashboard.html" class="pill" style="text-decoration:none;">Overview</a>
      <a href="projects-list.html" class="pill pill-active" style="text-decoration:none;">Projects</a>
      <a href="projects-gantt.html" class="pill" style="text-decoration:none;">Gantt</a>
      <a href="milestones.html" class="pill" style="text-decoration:none;">Milestones</a>
      <a href="projects-workload.html" class="pill" style="text-decoration:none;">Workload</a>
      <a href="projects-reports.html" class="pill" style="text-decoration:none;">Reports</a>
      <a href="runbooks.html" class="pill" style="text-decoration:none;">Runbooks</a>
    </div>
    <div style="padding:0 16px 10px;"><input id="searchInput" type="search" placeholder="Search projects..." autocomplete="off" style="width:100%;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 12px;background:var(--surface-2);font-size:14px;outline:none;"></div>
    <div class="pill-strip" id="filterStrip" style="padding-top:0;padding-bottom:12px;"><button class="pill pill-active" data-filter="all">All</button><button class="pill" data-filter="active">Active</button><button class="pill" data-filter="at_risk">At Risk</button><button class="pill" data-filter="overdue">Overdue</button><button class="pill" data-filter="mine">Mine</button></div>
  </header>
  <main class="app-body"><div id="projectList"></div></main>
  <nav class="app-nav"><div class="nav-bar"><a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a><a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a><a href="browse.html?tab=sporting" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a><a href="browse.html?tab=projects" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a><a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a><a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a><a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a></div></nav>
</div>

<style>
  .project-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .project-name { font-size:14px; font-weight:700; color:var(--text); }
  .project-meta { font-size:12px; color:var(--text-3); margin-top:4px; line-height:1.45; }
  .project-pill { display:inline-block; margin-top:8px; margin-right:6px; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:#eef2ff; color:#4338ca; }
  .progress { height:6px; border-radius:999px; background:#ececec; overflow:hidden; margin-top:10px; }
  .progress > div { height:100%; background:#111827; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  let plans = [];
  let filter = 'all';
  let query = '';
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function pct(plan){ return Math.round(parseFloat(plan.avg_progress || 0)); }
  function overdue(plan){ return !!(plan.end_date && String(plan.end_date).slice(0,10) < new Date().toISOString().slice(0,10) && plan.status !== 'completed' && plan.status !== 'cancelled'); }
  function atRisk(plan){ return Number(plan.overdue_tasks || 0) > 0 || Number(plan.blocked_tasks || 0) > 0; }
  function visible(){ return plans.filter(plan => {
    if (filter === 'active' && plan.status !== 'active') return false;
    if (filter === 'at_risk' && !atRisk(plan)) return false;
    if (filter === 'overdue' && !overdue(plan)) return false;
    if (filter === 'mine' && !(plan.owner_name || plan.owner_user_id)) return false;
    if (query) {
      const hay = [plan.name, plan.project_type, plan.event_name, plan.owner_name, plan.status].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(query.toLowerCase())) return false;
    }
    return true;
  }); }
  function render(){
    const rows = visible();
    document.getElementById('projectList').innerHTML = rows.length ? rows.map(plan => {
      const progress = pct(plan);
      return '<div class="project-card">' +
        '<div class="project-name">' + esc(plan.name || 'Untitled project') + '</div>' +
        '<div class="project-meta">' + esc(plan.project_type || 'Project') + ' · ' + esc(plan.status || 'unknown') + (plan.owner_name ? ' · ' + esc(plan.owner_name) : '') + '</div>' +
        '<div class="project-meta">' + esc(plan.event_name || 'No linked event') + ' · End ' + esc(plan.end_date ? new Date(String(plan.end_date).slice(0,10) + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—') + '</div>' +
        '<span class="project-pill">' + esc(String(plan.task_count || 0)) + ' tasks</span>' +
        '<span class="project-pill">' + esc(String(plan.overdue_tasks || 0)) + ' overdue</span>' +
        '<div class="progress"><div style="width:' + esc(progress) + '%"></div></div>' +
        '<div class="project-meta" style="margin-top:6px;">' + esc(String(progress)) + '% complete</div>' +
      '</div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-title">No projects match</div><div class="empty-state-sub">Adjust the filter or search term.</div></div>';
  }
  document.getElementById('searchInput').addEventListener('input', e => { query = e.target.value.trim(); render(); });
  document.getElementById('filterStrip').addEventListener('click', e => { const btn = e.target.closest('[data-filter]'); if (!btn) return; filter = btn.dataset.filter; document.querySelectorAll('#filterStrip .pill').forEach(p => p.classList.remove('pill-active')); btn.classList.add('pill-active'); render(); });
  mobileFetch('/api/project-plans').then(data => { plans = Array.isArray(data) ? data : (data.data || []); render(); });
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
