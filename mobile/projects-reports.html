<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Project Reports · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar"><div class="page-bar-brand" onclick="window.location.href='browse.html?tab=projects'" style="cursor:pointer;"><div class="page-bar-mark">RT</div><span class="page-bar-title">Reports</span></div></div>
    <div class="pill-strip" style="padding-top:10px;padding-bottom:12px;"><a href="projects-dashboard.html" class="pill" style="text-decoration:none;">Overview</a><a href="projects-list.html" class="pill" style="text-decoration:none;">Projects</a><a href="projects-gantt.html" class="pill" style="text-decoration:none;">Gantt</a><a href="milestones.html" class="pill" style="text-decoration:none;">Milestones</a><a href="projects-workload.html" class="pill" style="text-decoration:none;">Workload</a><a href="projects-reports.html" class="pill pill-active" style="text-decoration:none;">Reports</a><a href="runbooks.html" class="pill" style="text-decoration:none;">Runbooks</a></div>
    <div style="padding:12px 16px 14px;display:grid;gap:8px;"><select id="statusFilter" style="width:100%;height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;background:#fff;font-size:14px;"><option value="">All statuses</option><option value="active">Active</option><option value="planned">Planned</option><option value="on_hold">On Hold</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select><input id="typeFilter" type="text" placeholder="Filter by type..." autocomplete="off" style="width:100%;height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 12px;background:#fff;font-size:14px;outline:none;"></div>
  </header>
  <main class="app-body"><div id="reportList"></div></main>
  <nav class="app-nav"><div class="nav-bar"><a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a><a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a><a href="browse.html?tab=sporting" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a><a href="browse.html?tab=projects" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a><a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a><a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a><a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a></div></nav>
</div>

<style>
  .report-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .report-name { font-size:14px; font-weight:700; color:var(--text); }
  .report-meta { font-size:12px; color:var(--text-3); margin-top:4px; line-height:1.45; }
  .report-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:10px; }
  .metric { background:#fafafa; border:1px solid var(--border); border-radius:10px; padding:8px; }
  .metric-label { font-size:10px; color:var(--text-3); text-transform:uppercase; }
  .metric-value { font-size:14px; font-weight:800; color:var(--text); margin-top:4px; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  let plans = [];
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function visible(){
    const status = document.getElementById('statusFilter').value;
    const type = document.getElementById('typeFilter').value.trim().toLowerCase();
    return plans.filter(plan => {
      if (status && plan.status !== status) return false;
      if (type && String(plan.project_type || '').toLowerCase().indexOf(type) === -1) return false;
      return true;
    });
  }
  function render(){
    const rows = visible();
    document.getElementById('reportList').innerHTML = rows.length ? rows.map(plan => {
      const pct = Math.round(parseFloat(plan.avg_progress || 0));
      return '<div class="report-card">' +
        '<div class="report-name">' + esc(plan.name || 'Untitled project') + '</div>' +
        '<div class="report-meta">' + esc(plan.project_type || 'Project') + ' · ' + esc(plan.status || 'unknown') + '</div>' +
        '<div class="report-grid">' +
          '<div class="metric"><div class="metric-label">Progress</div><div class="metric-value">' + esc(String(pct)) + '%</div></div>' +
          '<div class="metric"><div class="metric-label">Tasks</div><div class="metric-value">' + esc(String(plan.task_count || 0)) + '</div></div>' +
          '<div class="metric"><div class="metric-label">Overdue</div><div class="metric-value">' + esc(String(plan.overdue_tasks || 0)) + '</div></div>' +
        '</div>' +
      '</div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-title">No report rows</div><div class="empty-state-sub">Adjust the status or type filters.</div></div>';
  }
  document.getElementById('statusFilter').addEventListener('change', render);
  document.getElementById('typeFilter').addEventListener('input', render);
  mobileFetch('/api/project-plans').then(data => { plans = Array.isArray(data) ? data : (data.data || []); render(); });
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
