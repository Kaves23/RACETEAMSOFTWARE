<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Scan · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">⚡ Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Scan</span>
      </div>
    </div>
  </header>

  <main class="app-body">
    <div class="coming-soon">
      <div class="cs-icon">📡</div>
      <div class="cs-title">Scanner</div>
      <div class="cs-sub">Scan barcodes to confirm loads, check-in assets, and run repeatable workflows on the go.</div>
      <div class="cs-badge">Coming in Phase 3</div>
    </div>
  </main>

  <nav class="app-nav">
    <div class="nav-bar">
      <a href="tasks.html" class="nav-item">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Lists</span>
        <div class="nav-dot"></div>
      </a>
      <a href="load.html" class="nav-item">
        <span class="nav-icon">🚛</span>
        <span class="nav-label">Load Plan</span>
        <div class="nav-dot"></div>
      </a>
      <a href="scan.html" class="nav-item active">
        <span class="nav-icon">📡</span>
        <span class="nav-label">Scan</span>
        <div class="nav-dot"></div>
      </a>
    </div>
  </nav>

</div>

<script>
  // Auth guard
  if (!localStorage.getItem('auth_token') || sessionStorage.getItem('mobile_pin_ok') !== '1') {
    window.location.replace('index.html');
  }
  // Offline banner
  function updateBanner() {
    document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine);
  }
  window.addEventListener('online', updateBanner);
  window.addEventListener('offline', updateBanner);
  updateBanner();
</script>
</body>
</html>
