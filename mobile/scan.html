<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Scan · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
  <style>
    /* ── Mode toggle ─────────────────────────────────────────────── */
    .mode-toggle {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .mode-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 18px 12px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .mode-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    .mode-btn svg { display: block; }

    /* ── Truck list ──────────────────────────────────────────────── */
    .setup-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 8px;
    }
    .truck-picker {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    .truck-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
    }
    .truck-row.active {
      border-color: var(--accent);
      background: rgba(0,120,255,0.06);
    }
    .truck-row-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--text-2);
      flex-shrink: 0;
    }
    .truck-row-icon.active-icon { background: var(--accent); color: #fff; }
    .truck-row-name { font-size: 14px; font-weight: 600; color: var(--text-1); }
    .truck-row-reg  { font-size: 11px; color: var(--text-3); margin-top: 1px; }
    .truck-radio {
      margin-left: auto;
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .truck-radio.checked { border-color: var(--accent); background: var(--accent); }
    .truck-radio.checked::after {
      content: '';
      width: 7px; height: 7px;
      background: #fff;
      border-radius: 50%;
    }

    /* ── Start button ────────────────────────────────────────────── */
    .start-btn {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      opacity: 0.4;
      pointer-events: none;
      transition: opacity 0.15s;
    }
    .start-btn.ready { opacity: 1; pointer-events: all; }

    /* ── Scan phase header ───────────────────────────────────────── */
    .scan-mode-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
    }
    .scan-mode-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .scan-truck-label { font-size: 12px; opacity: 0.85; }
    .scan-count-badge {
      font-size: 13px; font-weight: 700;
      background: rgba(255,255,255,0.22);
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── Camera viewfinder ───────────────────────────────────────── */
    .camera-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #111;
      overflow: hidden;
    }
    .camera-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .viewfinder-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .vf-frame {
      width: 62%;
      aspect-ratio: 1/1;
      border: 2.5px solid rgba(255,255,255,0.9);
      border-radius: 14px;
      box-shadow: 0 0 0 2000px rgba(0,0,0,0.42);
    }
    .vf-line {
      position: absolute;
      left: 19%; right: 19%;
      top: 50%;
      height: 2px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: vf-scan 2s linear infinite;
      pointer-events: none;
    }
    @keyframes vf-scan {
      0%   { transform: translateY(-60px); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(60px); opacity: 0.4; }
    }
    .camera-no-support {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 28px 20px;
      color: var(--text-2);
      font-size: 13px;
      text-align: center;
      gap: 8px;
      background: var(--surface-2);
    }
    .camera-flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.06s;
    }
    .camera-flash.green  { background: #00c853; }
    .camera-flash.red    { background: #e53935; }
    .camera-flash.orange { background: #ff9800; }
    .camera-flash.show   { opacity: 0.45; }

    /* ── Manual barcode input ────────────────────────────────────── */
    .barcode-input-row {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .barcode-input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      font-size: 15px;
      color: var(--text-1);
      outline: none;
    }
    .barcode-input:focus { border-color: var(--accent); }
    .barcode-submit {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
    }

    /* ── Scan log ────────────────────────────────────────────────── */
    .scan-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 14px;
    }
    .scan-log-empty {
      text-align: center;
      padding: 36px 20px;
      color: var(--text-3);
      font-size: 13px;
    }
    .scan-entry {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 8px;
      animation: entry-in 0.22s ease-out;
    }
    @keyframes entry-in {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .scan-entry-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .scan-entry-dot.ok       { background: #00c853; }
    .scan-entry-dot.dupe     { background: #ff9800; }
    .scan-entry-dot.err      { background: #e53935; }
    .scan-entry-name {
      flex: 1;
      font-size: 13px; font-weight: 600; color: var(--text-1);
    }
    .scan-entry-sub {
      font-size: 11px; color: var(--text-3); margin-top: 2px;
    }
    .scan-entry-time {
      font-size: 11px; color: var(--text-3); flex-shrink: 0;
    }
    .scan-zone-badge {
      font-size: 10px; font-weight: 700;
      padding: 2px 7px;
      border-radius: 20px;
      background: rgba(0,120,255,0.12);
      color: var(--accent);
      flex-shrink: 0;
    }

    /* ── Finish button (sticky bottom) ──────────────────────────── */
    .scan-footer {
      padding: 10px 14px 14px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .finish-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #1a1a2e;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── Receipt ─────────────────────────────────────────────────── */
    .receipt-wrap {
      padding: 16px;
    }
    .receipt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .receipt-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #1a1a2e;
      color: #fff;
    }
    .receipt-mark {
      width: 40px; height: 40px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800;
      flex-shrink: 0;
    }
    .receipt-title { font-size: 16px; font-weight: 700; }
    .receipt-sub   { font-size: 11px; opacity: 0.72; margin-top: 2px; }
    .receipt-summary {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .receipt-stat {
      flex: 1;
      padding: 14px 10px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .receipt-stat:last-child { border-right: none; }
    .receipt-stat-value {
      font-size: 22px; font-weight: 800; color: var(--text-1);
      line-height: 1;
    }
    .receipt-stat-label {
      font-size: 10px; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-top: 4px;
    }
    .receipt-list {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .receipt-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px;
      border-radius: 8px;
      background: var(--surface-2);
    }
    .receipt-row-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .receipt-row-dot.ok   { background: #00c853; }
    .receipt-row-dot.dupe { background: #ff9800; }
    .receipt-row-dot.err  { background: #e53935; }
    .receipt-row-name {
      flex: 1; font-size: 12px; font-weight: 600; color: var(--text-1);
    }
    .receipt-row-bc {
      font-size: 10px; color: var(--text-3); margin-top: 1px;
    }
    .receipt-row-zone {
      font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 20px;
      background: rgba(0,120,255,0.1); color: var(--accent);
      flex-shrink: 0;
    }
    .receipt-row-time {
      font-size: 10px; color: var(--text-3); flex-shrink: 0;
    }
    .share-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .new-session-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--text-2);
      font-size: 15px; font-weight: 700;
      cursor: pointer;
    }

    /* ── Session history ─────────────────────────────────────────── */
    .history-session-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      cursor: pointer;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .history-session-item:active { background: var(--surface-2); }
    .history-session-icon {
      width: 36px; height: 36px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.04em;
    }
    .history-session-icon.load-icon   { background: rgba(0,120,255,0.12); color: var(--accent); }
    .history-session-icon.unload-icon { background: rgba(245,158,11,0.12); color: #f59e0b; }
  </style>
</head>
<body>

<div class="app" id="app">

  <header class="app-header" id="mainHeader">
    <div class="offline-banner" id="offlineBanner"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:5px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Offline — showing cached data</div>
    <div class="page-bar" id="pageBar">
      <div class="page-bar-brand" onclick="window.location.href='dashboard.html'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title" id="pageTitle">Scan</span>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════════════════════════════════════
       PHASE 1 — SETUP
  ═══════════════════════════════════════════════════════════════ -->
  <main class="app-body" id="phaseSetup" style="padding:20px;">

    <div class="setup-label" style="margin-bottom:10px;">Select Mode</div>
    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="load" id="btnLoad">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/><polyline points="8 10 10 12 14 8"/></svg>
        Load Truck
      </button>
      <button class="mode-btn" data-mode="unload" id="btnUnload">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/><line x1="10" y1="8" x2="10" y2="14"/><polyline points="7 11 10 14 13 11"/></svg>
        Unload Truck
      </button>
    </div>

    <div class="setup-label">Select Vehicle</div>
    <div class="truck-picker" id="truckPicker">
      <div style="color:var(--text-3);font-size:13px;padding:12px 0;">Loading vehicles…</div>
    </div>

    <button class="start-btn" id="startBtn">Start Session</button>

    <!-- Recent Sessions -->
    <div style="margin-top:28px;">
      <div class="setup-label" style="margin-bottom:8px;">Recent Sessions</div>
      <div id="recentSessions" style="display:flex;flex-direction:column;gap:8px;">
        <div style="color:var(--text-3);font-size:13px;padding:4px 0;">Loading…</div>
      </div>
    </div>

  </main>

  <!-- ══════════════════════════════════════════════════════════════
       PHASE 2 — SCANNING
  ═══════════════════════════════════════════════════════════════ -->
  <div id="phaseScan" style="display:none; flex-direction:column; height:100%;">

    <!-- Mode + truck banner -->
    <div class="scan-mode-bar" id="scanModeBanner">
      <div>
        <div class="scan-mode-label" id="scanModeLabel">Loading</div>
        <div class="scan-truck-label" id="scanTruckLabel">—</div>
      </div>
      <div class="scan-count-badge" id="scanCountBadge">0 scanned</div>
    </div>

    <!-- Progress bar (load mode only) -->
    <div id="scanProgressWrap" style="padding:8px 14px 4px; background:var(--surface); border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:11px;color:var(--text-3);">Plan progress</span>
        <span style="font-size:11px;color:var(--text-3);" id="scanProgressText">—</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="scanProgressFill" style="width:0%;transition:width 0.3s;"></div>
      </div>
    </div>

    <!-- Camera viewfinder -->
    <div class="camera-wrap" id="cameraWrap">
      <video id="cameraFeed" autoplay playsinline muted></video>
      <div class="viewfinder-overlay">
        <div class="vf-frame"></div>
        <div class="vf-line"></div>
      </div>
      <div class="camera-flash" id="cameraFlash"></div>
    </div>
    <div class="camera-no-support" id="cameraNoSupport" style="display:none;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      Camera unavailable — type or paste barcodes below
    </div>

    <!-- Manual input -->
    <div class="barcode-input-row">
      <input id="barcodeInput" class="barcode-input" type="text" inputmode="none"
             placeholder="Scan or type barcode…" autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="barcode-submit" id="barcodeSubmit">↵</button>
    </div>

    <!-- Scan log (scrollable) -->
    <div class="scan-log" id="scanLog">
      <div class="scan-log-empty" id="scanLogEmpty">Point camera at a barcode, or type it above</div>
    </div>

    <!-- Finish -->
    <div class="scan-footer">
      <button class="finish-btn" id="finishBtn">Finish &amp; View Receipt</button>
    </div>

  </div>

  <!-- ══════════════════════════════════════════════════════════════
       PHASE 3 — RECEIPT
  ═══════════════════════════════════════════════════════════════ -->
  <main class="app-body" id="phaseReceipt" style="display:none; padding:0;">
    <div class="receipt-wrap">
      <div class="receipt-card">
        <div class="receipt-header">
          <div class="receipt-mark">RT</div>
          <div>
            <div class="receipt-title" id="receiptTitle">Load Receipt</div>
            <div class="receipt-sub" id="receiptSub">—</div>
          </div>
        </div>
        <div class="receipt-summary" id="receiptSummary"></div>
        <div class="receipt-list" id="receiptList"></div>
      </div>
      <button class="share-btn" id="shareBtn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:6px;"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share Receipt
      </button>
      <button class="new-session-btn" id="newSessionBtn">New Session</button>
    </div>
  </main>

  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span>
        <span class="nav-label">Dashboard</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span class="nav-label">Logistics</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=sporting" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Sporting</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=projects" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span>
        <span class="nav-label">Projects</span>
        <div class="nav-dot"></div>
      </a>
      <a href="scan.html" class="nav-item active">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span>
        <span class="nav-label">Scan</span>
        <div class="nav-dot"></div>
      </a>
    </div>
  </nav>

</div>

<script>
'use strict';

// ── Auth guard ────────────────────────────────────────────────────────────
(function() {
  if (!localStorage.getItem('auth_token')) {
    window.location.replace('index.html');
  }
})();

// ── Offline banner ────────────────────────────────────────────────────────
function updateBanner() {
  document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine);
}
window.addEventListener('online',  updateBanner);
window.addEventListener('offline', updateBanner);
updateBanner();

// ── Service worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/mobile/sw.js', { scope: '/mobile/' })
    .catch(function(e) { console.warn('SW reg failed:', e); });
}

// ── Session state ─────────────────────────────────────────────────────────
var session = {
  mode: 'load',
  truck: null,       // { id, name, registration }
  planBoxes: [],     // boxes from manifest
  scans: [],         // { barcode, name, type, status, zone, time }
  startTime: null,
  finishedAt: null,  // Date when receipt was generated
  savedId: null      // DB id of saved session (null = unsaved / new)
};

var trucks = [];
var barcodeDetector = null;
var cameraStream = null;
var lastScannedBarcode = '';
var lastScanTime = 0;
var scanning = false;

// ── Helpers ───────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function fmtTime(d) {
  var dt = (d instanceof Date) ? d : new Date(d);
  if (isNaN(dt.getTime())) return '—';
  return dt.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function buzz(ok) {
  if (!navigator.vibrate) return;
  if (ok === 'ok')   navigator.vibrate(60);
  if (ok === 'dupe') navigator.vibrate([40, 30, 40]);
  if (ok === 'err')  navigator.vibrate([80, 40, 80]);
}

function flashCamera(type) {
  var el = document.getElementById('cameraFlash');
  el.className = 'camera-flash ' + type;
  requestAnimationFrame(function() {
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 180);
  });
}

// ── Phase management ──────────────────────────────────────────────────────
function showSetup() {
  document.getElementById('phaseSetup').style.display = '';
  document.getElementById('phaseScan').style.display  = 'none';
  document.getElementById('phaseReceipt').style.display = 'none';
  document.getElementById('pageTitle').textContent = 'Scan';
  stopCamera();
  loadRecentSessions();
}

function showScan() {
  document.getElementById('phaseSetup').style.display   = 'none';
  document.getElementById('phaseScan').style.display    = 'flex';
  document.getElementById('phaseReceipt').style.display = 'none';
  document.getElementById('pageTitle').textContent = session.mode === 'load' ? 'Loading' : 'Unloading';

  // Banner
  document.getElementById('scanModeLabel').textContent  = session.mode === 'load' ? 'LOADING' : 'UNLOADING';
  document.getElementById('scanTruckLabel').textContent = session.truck.name || session.truck.registration || 'Vehicle';

  // Progress bar: only meaningful for load mode with a plan
  document.getElementById('scanProgressWrap').style.display = session.mode === 'load' ? '' : 'none';
  updateProgress();

  // Camera
  startCamera();
  document.getElementById('barcodeInput').focus();
}

function showReceipt() {
  stopCamera();
  session.finishedAt = session.finishedAt || new Date();
  document.getElementById('phaseSetup').style.display   = 'none';
  document.getElementById('phaseScan').style.display    = 'none';
  document.getElementById('phaseReceipt').style.display = '';
  document.getElementById('pageTitle').textContent = 'Receipt';
  renderReceipt();
  saveScanSession();
}

// ── Phase 1: Setup ────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  loadTrucks();

  // Mode buttons
  document.getElementById('btnLoad').addEventListener('click', function() {
    setMode('load');
  });
  document.getElementById('btnUnload').addEventListener('click', function() {
    setMode('unload');
  });

  // Start
  document.getElementById('startBtn').addEventListener('click', function() {
    if (!session.truck) return;
    session.scans = [];
    session.startTime = new Date();
    loadManifest();
    showScan();
  });

  // Barcode input
  var barcodeInput = document.getElementById('barcodeInput');
  document.getElementById('barcodeSubmit').addEventListener('click', function() {
    submitBarcode();
  });
  barcodeInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitBarcode();
  });

  // Finish button
  document.getElementById('finishBtn').addEventListener('click', function() {
    showReceipt();
  });

  // Share button
  document.getElementById('shareBtn').addEventListener('click', shareReceipt);

  // New session
  document.getElementById('newSessionBtn').addEventListener('click', function() {
    session.truck = null;
    session.scans = [];
    session.planBoxes = [];
    session.startTime = null;
    session.finishedAt = null;
    session.savedId = null;
    showSetup();
  });

  // Recent sessions — delegated click handler (set once, innerHTML can change safely)
  document.getElementById('recentSessions').addEventListener('click', function(e) {
    var item = e.target.closest('[data-sid]');
    if (!item) return;
    viewSavedSession(item.getAttribute('data-sid'));
  });

  // Load session history on page open
  loadRecentSessions();
});

function setMode(mode) {
  session.mode = mode;
  document.getElementById('btnLoad').classList.toggle('active',   mode === 'load');
  document.getElementById('btnUnload').classList.toggle('active', mode === 'unload');
}

function loadTrucks() {
  mobileFetch('/api/trucks').then(function(data) {
    trucks = (data.trucks || []).filter(function(t) { return t.status !== 'archived'; });
    renderTruckPicker();
  }).catch(function() {
    document.getElementById('truckPicker').innerHTML =
      '<div style="color:var(--text-3);font-size:13px;padding:12px 0;">Could not load vehicles</div>';
  });
}

function renderTruckPicker() {
  var picker = document.getElementById('truckPicker');
  if (!trucks.length) {
    picker.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:12px 0;">No vehicles found</div>';
    return;
  }
  picker.innerHTML = trucks.map(function(t) {
    var isActive = session.truck && String(session.truck.id) === String(t.id);
    return '<div class="truck-row' + (isActive ? ' active' : '') + '" data-id="' + esc(String(t.id)) + '">' +
      '<div class="truck-row-icon' + (isActive ? ' active-icon' : '') + '">' +
        '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>' +
      '</div>' +
      '<div><div class="truck-row-name">' + esc(t.name || 'Vehicle ' + t.id) + '</div>' +
      '<div class="truck-row-reg">' + esc(t.registration || '') + '</div></div>' +
      '<div class="truck-radio' + (isActive ? ' checked' : '') + '"></div>' +
    '</div>';
  }).join('');

  picker.addEventListener('click', function(e) {
    var row = e.target.closest('[data-id]');
    if (!row) return;
    var id = row.getAttribute('data-id');
    session.truck = trucks.find(function(t) { return String(t.id) === id; });
    renderTruckPicker();
    document.getElementById('startBtn').classList.add('ready');
  });
}

// ── Manifest ──────────────────────────────────────────────────────────────
function loadManifest() {
  if (session.mode !== 'load' || !session.truck) return;
  mobileFetch('/api/scan/manifest/' + session.truck.id).then(function(data) {
    session.planBoxes = data.boxes || [];
    updateProgress();
  }).catch(function() { /* non-fatal */ });
}

function updateProgress() {
  if (session.mode !== 'load') return;
  var total   = session.planBoxes.length;
  var scanned = session.scans.filter(function(s) { return s.status === 'loaded' || s.status === 'already_loaded'; }).length;
  var pct = total > 0 ? Math.round((scanned / total) * 100) : 0;
  document.getElementById('scanProgressFill').style.width = pct + '%';
  document.getElementById('scanProgressText').textContent =
    total > 0 ? scanned + ' / ' + total + ' boxes (' + pct + '%)' : scanned + ' confirmed';
  document.getElementById('scanCountBadge').textContent = session.scans.length +
    (session.scans.length === 1 ? ' scanned' : ' scanned');
}

// ── Camera + BarcodeDetector ──────────────────────────────────────────────
async function startCamera() {
  var wrap   = document.getElementById('cameraWrap');
  var noSup  = document.getElementById('cameraNoSupport');

  if (!('BarcodeDetector' in window)) {
    wrap.style.display  = 'none';
    noSup.style.display = '';
    return;
  }

  try {
    var formats = ['code_128', 'qr_code', 'ean_13', 'ean_8', 'code_39', 'aztec', 'data_matrix'];
    try {
      var supported = await BarcodeDetector.getSupportedFormats();
      formats = formats.filter(function(f) { return supported.includes(f); });
      if (!formats.length) formats = supported;
    } catch(e2) { /* use default list */ }

    barcodeDetector = new BarcodeDetector({ formats: formats });
    var stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 960 } }
    });
    var video = document.getElementById('cameraFeed');
    video.srcObject = stream;
    cameraStream = stream;
    wrap.style.display  = '';
    noSup.style.display = 'none';
    scanning = true;
    scanLoop();
  } catch(e) {
    wrap.style.display  = 'none';
    noSup.style.display = '';
  }
}

function stopCamera() {
  scanning = false;
  if (cameraStream) {
    cameraStream.getTracks().forEach(function(t) { t.stop(); });
    cameraStream = null;
  }
}

function scanLoop() {
  if (!scanning || !barcodeDetector) return;
  var video = document.getElementById('cameraFeed');
  if (!video.readyState || video.readyState < 2) {
    requestAnimationFrame(scanLoop);
    return;
  }
  barcodeDetector.detect(video).then(function(codes) {
    if (codes.length > 0) {
      var val = codes[0].rawValue;
      if (val && (val !== lastScannedBarcode || Date.now() - lastScanTime > 2500)) {
        lastScannedBarcode = val;
        lastScanTime = Date.now();
        processBarcode(val);
      }
    }
    if (scanning) requestAnimationFrame(scanLoop);
  }).catch(function() {
    if (scanning) requestAnimationFrame(scanLoop);
  });
}

// ── Barcode processing ────────────────────────────────────────────────────
function submitBarcode() {
  var input = document.getElementById('barcodeInput');
  var val = (input.value || '').trim();
  if (!val) return;
  input.value = '';
  processBarcode(val);
}

function processBarcode(barcode) {
  var payload = {
    barcode: barcode,
    truck_id: session.truck.id,
    mode: session.mode
  };

  mobileFetch('/api/scan/confirm', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).then(function(data) {
    var dotClass = data.status === 'already_loaded' ? 'dupe' : 'ok';
    buzz('ok');
    flashCamera(dotClass === 'dupe' ? 'orange' : 'green');
    addScanEntry({
      barcode: barcode,
      name:   data.name || barcode,
      type:   data.type || 'box',
      status: data.status,
      zone:   data.zone || null,
      time:   new Date()
    });
  }).catch(function(err) {
    // 404 = not found, other = network/server error
    var isNotFound = err && err.status === 404;
    buzz('err');
    flashCamera('red');
    addScanEntry({
      barcode: barcode,
      name:   isNotFound ? 'Unknown: ' + barcode : 'Error — try again',
      type:   'unknown',
      status: 'not_found',
      zone:   null,
      time:   new Date()
    });
  });
}

function addScanEntry(entry) {
  session.scans.unshift(entry); // newest first in display

  var log   = document.getElementById('scanLog');
  var empty = document.getElementById('scanLogEmpty');
  if (empty) empty.style.display = 'none';

  var dotClass = entry.status === 'already_loaded' ? 'dupe'
               : entry.status === 'not_found'      ? 'err'
               : 'ok';

  var statusText = entry.status === 'loaded'         ? (session.mode === 'load' ? 'Loaded' : 'Unloaded')
                 : entry.status === 'unloaded'       ? 'Unloaded'
                 : entry.status === 'already_loaded' ? 'Already on truck'
                 : 'Not found';

  var zoneHtml = entry.zone
    ? '<span class="scan-zone-badge">' + esc(entry.zone) + '</span>'
    : '';

  var html = '<div class="scan-entry">' +
    '<div class="scan-entry-dot ' + dotClass + '"></div>' +
    '<div style="flex:1;min-width:0;">' +
      '<div class="scan-entry-name">' + esc(entry.name) + '</div>' +
      '<div class="scan-entry-sub">' + esc(statusText) + ' · ' + esc(entry.barcode) + '</div>' +
    '</div>' +
    zoneHtml +
    '<div class="scan-entry-time">' + fmtTime(entry.time) + '</div>' +
  '</div>';

  log.insertAdjacentHTML('afterbegin', html);
  updateProgress();
}

// ── Session persistence ───────────────────────────────────────────────────

function saveScanSession() {
  if (session.savedId) return; // already saved (e.g. replaying a past session)
  var id = 'ss_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
  session.savedId = id;
  var payload = {
    id: id,
    mode: session.mode,
    truck_id:    session.truck ? session.truck.id   : null,
    truck_name:  session.truck ? (session.truck.name || session.truck.registration || null) : null,
    started_at:  session.startTime  ? session.startTime.toISOString()  : new Date().toISOString(),
    finished_at: session.finishedAt ? session.finishedAt.toISOString() : new Date().toISOString(),
    scans: session.scans.map(function(s) {
      return {
        barcode: s.barcode,
        name:    s.name,
        type:    s.type  || 'box',
        status:  s.status,
        zone:    s.zone  || null,
        time:    (s.time instanceof Date) ? s.time.toISOString() : s.time
      };
    })
  };
  mobileFetch('/api/scan/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(function(e) {
    console.warn('Could not save scan session:', e);
  });
}

function loadRecentSessions() {
  var el = document.getElementById('recentSessions');
  el.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:4px 0;">Loading\u2026</div>';
  mobileFetch('/api/scan/sessions?limit=20').then(function(data) {
    renderRecentSessions(data.sessions || []);
  }).catch(function() {
    el.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:4px 0;">Could not load history</div>';
  });
}

function renderRecentSessions(sessions) {
  var el = document.getElementById('recentSessions');
  if (!sessions.length) {
    el.innerHTML = '<div style="color:var(--text-3);font-size:13px;padding:4px 0;">No sessions yet</div>';
    return;
  }
  el.innerHTML = sessions.slice(0, 15).map(function(s) {
    var iconClass = s.mode === 'load' ? 'load-icon' : 'unload-icon';
    var modeLabel = s.mode === 'load' ? 'LOAD' : 'UNLOD';
    var date = s.finished_at ? new Date(s.finished_at) : null;
    var dateStr = date
      ? date.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' +
        date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      : '\u2014';
    var stats = s.ok_count + ' \u2713';
    if (s.duplicate_count) stats += '  ' + s.duplicate_count + ' dup';
    if (s.not_found_count) stats += '  ' + s.not_found_count + ' ?';
    return '<div class="history-session-item" data-sid="' + esc(s.id) + '">' +
      '<div class="history-session-icon ' + iconClass + '">' + modeLabel + '</div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:13px;font-weight:600;color:var(--text-1);">' + esc(s.truck_name || 'Vehicle') + '</div>' +
        '<div style="font-size:11px;color:var(--text-3);margin-top:2px;">' +
          esc(dateStr) + ' \xb7 ' + esc(stats) +
        '</div>' +
      '</div>' +
      '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--text-3);flex-shrink:0;"><polyline points="9 18 15 12 9 6"/></svg>' +
    '</div>';
  }).join('');
}

function viewSavedSession(id) {
  mobileFetch('/api/scan/sessions/' + id).then(function(data) {
    var s = data.session;
    session.mode  = s.mode;
    session.truck = s.truck_name ? { id: s.truck_id, name: s.truck_name } : null;
    session.scans = (s.scans || []).map(function(entry) {
      return {
        barcode: entry.barcode,
        name:    entry.name,
        type:    entry.type   || 'box',
        status:  entry.status,
        zone:    entry.zone   || null,
        time:    entry.time   ? new Date(entry.time) : new Date()
      };
    });
    session.startTime  = s.started_at  ? new Date(s.started_at)  : null;
    session.finishedAt = s.finished_at ? new Date(s.finished_at) : null;
    session.savedId    = s.id; // prevents re-save
    showReceipt();
  }).catch(function() {
    showToast('Could not load session');
  });
}

// ── Receipt ───────────────────────────────────────────────────────────────
function renderReceipt() {
  var mode     = session.mode === 'load' ? 'Load' : 'Unload';
  var truckStr = session.truck ? (session.truck.name || session.truck.registration || 'Vehicle') : '—';
  var now      = session.finishedAt || new Date();

  document.getElementById('receiptTitle').textContent = mode + ' Receipt';
  document.getElementById('receiptSub').textContent   =
    truckStr + ' · ' +
    now.toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' +
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  // Stats
  var ok   = session.scans.filter(function(s) { return s.status === 'loaded' || s.status === 'unloaded'; }).length;
  var dupe = session.scans.filter(function(s) { return s.status === 'already_loaded'; }).length;
  var err  = session.scans.filter(function(s) { return s.status === 'not_found'; }).length;

  document.getElementById('receiptSummary').innerHTML =
    statCard(ok,            mode === 'Load' ? 'Loaded'  : 'Unloaded') +
    statCard(dupe,          'Duplicates') +
    statCard(err,           'Not Found');

  // List (in scan order — session.scans is already newest-first, reverse for receipt)
  var rows = session.scans.slice().reverse().map(function(s) {
    var dotClass = s.status === 'already_loaded' ? 'dupe'
                 : s.status === 'not_found'      ? 'err'
                 : 'ok';
    var zoneHtml = s.zone ? '<span class="receipt-row-zone">' + esc(s.zone) + '</span>' : '';
    return '<div class="receipt-row">' +
      '<div class="receipt-row-dot ' + dotClass + '"></div>' +
      '<div style="flex:1;min-width:0;">' +
        '<div class="receipt-row-name">' + esc(s.name) + '</div>' +
        '<div class="receipt-row-bc">' + esc(s.barcode) + '</div>' +
      '</div>' +
      zoneHtml +
      '<div class="receipt-row-time">' + fmtTime(s.time) + '</div>' +
    '</div>';
  }).join('');

  document.getElementById('receiptList').innerHTML = rows ||
    '<div style="text-align:center;padding:20px;color:var(--text-3);font-size:13px;">Nothing scanned this session</div>';
}

function statCard(n, label) {
  return '<div class="receipt-stat">' +
    '<div class="receipt-stat-value">' + n + '</div>' +
    '<div class="receipt-stat-label">' + esc(label) + '</div>' +
  '</div>';
}

function shareReceipt() {
  var mode     = session.mode === 'load' ? 'Load' : 'Unload';
  var truckStr = session.truck ? (session.truck.name || session.truck.registration || 'Vehicle') : '—';
  var now      = new Date();
  var dateStr  = now.toLocaleDateString([], { day: '2-digit', month: 'short', year: 'numeric' }) +
                 ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  var ok   = session.scans.filter(function(s) { return s.status === 'loaded' || s.status === 'unloaded'; }).length;
  var dupe = session.scans.filter(function(s) { return s.status === 'already_loaded'; }).length;
  var err  = session.scans.filter(function(s) { return s.status === 'not_found'; }).length;

  var lines = ['RT Race Team OS — ' + mode + ' Receipt',
               truckStr + ' · ' + dateStr,
               '---',
               ok + ' ' + (mode === 'Load' ? 'loaded' : 'unloaded') + ', ' + dupe + ' duplicates, ' + err + ' not found',
               ''];

  session.scans.slice().reverse().forEach(function(s, i) {
    var prefix = s.status === 'not_found' ? '[?]' : s.status === 'already_loaded' ? '[=]' : '[✓]';
    lines.push((i + 1) + '. ' + prefix + ' ' + s.name + (s.zone ? ' → ' + s.zone : '') + '  ' + fmtTime(s.time));
  });

  var text = lines.join('\n');

  if (navigator.share) {
    navigator.share({ title: 'RT ' + mode + ' Receipt — ' + truckStr, text: text })
      .catch(function() { copyToClipboard(text); });
  } else {
    copyToClipboard(text);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showToast('Copied to clipboard');
    }).catch(function() { showToast('Could not copy'); });
  } else {
    showToast('Share not supported on this device');
  }
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);' +
    'background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;' +
    'font-weight:600;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.2s;';
  document.body.appendChild(t);
  requestAnimationFrame(function() {
    t.style.opacity = '1';
    setTimeout(function() {
      t.style.opacity = '0';
      setTimeout(function() { t.remove(); }, 300);
    }, 2200);
  });
}
</script>
