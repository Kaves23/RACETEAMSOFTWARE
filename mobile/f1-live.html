<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>F1 Live · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=sporting'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">F1 Live</span>
      </div>
      <span style="font-size:11px;color:var(--text-3);font-weight:600;">OpenF1</span>
    </div>
    <div style="padding:0 16px 12px;display:grid;gap:8px;">
      <select id="yearSelect" style="height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;background:#fff;font-size:14px;"></select>
      <select id="meetingSelect" style="height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;background:#fff;font-size:14px;"></select>
      <select id="sessionSelect" style="height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;background:#fff;font-size:14px;"></select>
    </div>
  </header>
  <main class="app-body"><div id="content"></div></main>
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a>
      <a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=sporting" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=projects" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a>
      <a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/><line x1="9" y1="17" x2="15" y2="17"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a>
      <a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a>
    </div>
  </nav>
</div>

<style>
  .wx-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; padding:12px 16px; }
  .wx-card { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:12px; }
  .wx-label { font-size:10px; text-transform:uppercase; color:var(--text-3); font-weight:700; letter-spacing:.06em; }
  .wx-value { font-size:20px; font-weight:800; color:var(--text); margin-top:4px; }
  .wx-sub { font-size:12px; color:var(--text-3); margin-top:3px; }
  .rc-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .rc-title { font-size:13px; font-weight:700; color:var(--text); }
  .rc-sub { font-size:12px; color:var(--text-3); margin-top:3px; }
  .empty { padding:28px 18px; text-align:center; color:var(--text-3); font-size:13px; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  const API = '/api/openf1';

  let meetings = [];
  let sessions = [];

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function items(payload){ return Array.isArray(payload) ? payload : []; }
  function fetchApi(path, params){
    const qs = new URLSearchParams(params || {}).toString();
    return mobileFetch(API + '/' + path + (qs ? '?' + qs : '')).catch(() => []);
  }
  async function loadMeetings(){
    const year = document.getElementById('yearSelect').value;
    meetings = items(await fetchApi('meetings', { year: year }));
    const meetingSelect = document.getElementById('meetingSelect');
    meetingSelect.innerHTML = meetings.length ? meetings.map(row => '<option value="' + esc(row.meeting_key) + '">' + esc(row.meeting_name || row.location || row.country_name || 'Meeting') + '</option>').join('') : '<option value="">No meetings</option>';
    if (meetings[0]) meetingSelect.value = meetings[meetings.length - 1].meeting_key;
    loadSessions();
  }
  async function loadSessions(){
    const meetingKey = document.getElementById('meetingSelect').value;
    sessions = meetingKey ? items(await fetchApi('sessions', { meeting_key: meetingKey })) : [];
    const sessionSelect = document.getElementById('sessionSelect');
    sessionSelect.innerHTML = sessions.length ? sessions.map(row => '<option value="' + esc(row.session_key) + '">' + esc(row.session_name || row.session_type || 'Session') + '</option>').join('') : '<option value="">No sessions</option>';
    if (sessions[0]) sessionSelect.value = sessions[sessions.length - 1].session_key;
    loadDetail();
  }
  async function loadDetail(){
    const sessionKey = document.getElementById('sessionSelect').value;
    if (!sessionKey) return document.getElementById('content').innerHTML = '<div class="empty">No OpenF1 session selected.</div>';
    const [weather, raceControl] = await Promise.all([
      fetchApi('weather', { session_key: sessionKey }),
      fetchApi('race_control', { session_key: sessionKey })
    ]);
    const wx = items(weather);
    const rc = items(raceControl).slice(-12).reverse();
    const last = wx[wx.length - 1];
    document.getElementById('content').innerHTML =
      (last ? '<div class="wx-grid">' +
        '<div class="wx-card"><div class="wx-label">Air</div><div class="wx-value">' + esc(last.air_temperature != null ? Number(last.air_temperature).toFixed(1) : '—') + '°C</div><div class="wx-sub">Track ' + esc(last.track_temperature != null ? Number(last.track_temperature).toFixed(1) : '—') + '°C</div></div>' +
        '<div class="wx-card"><div class="wx-label">Wind</div><div class="wx-value">' + esc(last.wind_speed != null ? Number(last.wind_speed).toFixed(1) : '—') + '</div><div class="wx-sub">m/s · Humidity ' + esc(last.humidity != null ? last.humidity : '—') + '%</div></div>' +
      '</div>' : '<div class="empty">No weather feed available for this session.</div>') +
      (rc.length ? rc.map(row => '<div class="rc-card"><div class="rc-title">' + esc(row.message || row.category || 'Race control') + '</div><div class="rc-sub">' + esc([row.category, row.flag, row.date ? String(row.date).slice(11, 16) : ''].filter(Boolean).join(' · ')) + '</div></div>').join('') : '<div class="empty">No race control messages available.</div>');
  }
  function initYears(){
    const year = new Date().getFullYear();
    document.getElementById('yearSelect').innerHTML = [year, year - 1, year - 2].map(v => '<option value="' + v + '">' + v + '</option>').join('');
    document.getElementById('yearSelect').value = String(year);
  }
  document.getElementById('yearSelect').addEventListener('change', loadMeetings);
  document.getElementById('meetingSelect').addEventListener('change', loadSessions);
  document.getElementById('sessionSelect').addEventListener('change', loadDetail);
  window.addEventListener('online', setOffline);
  window.addEventListener('offline', setOffline);
  setOffline();
  initYears();
  loadMeetings();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
