  <header class="app-header">

    <div class="page-bar"><div class="page-bar-brand" onclick="window.location.href='browse.html?tab=projects'" style="cursor:pointer;"><div class="page-bar-mark">RT</div><span class="page-bar-title">Milestones</span></div></div>
    <div class="pill-strip" style="padding-top:10px;padding-bottom:12px;"><a href="projects-dashboard.html" class="pill" style="text-decoration:none;">Overview</a><a href="projects-list.html" class="pill" style="text-decoration:none;">Projects</a><a href="projects-gantt.html" class="pill" style="text-decoration:none;">Gantt</a><a href="milestones.html" class="pill pill-active" style="text-decoration:none;">Milestones</a><a href="projects-workload.html" class="pill" style="text-decoration:none;">Workload</a><a href="projects-reports.html" class="pill" style="text-decoration:none;">Reports</a><a href="runbooks.html" class="pill" style="text-decoration:none;">Runbooks</a></div>

s.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a><a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a></div></nav>

<style>
  .milestone-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .milestone-name { font-size:14px; font-weight:700; color:var(--text); }
  .milestone-meta { font-size:12px; color:var(--text-3); margin-top:4px; }
  .milestone-pill { display:inline-block; margin-top:8px; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .state-overdue { background:#fee2e2; color:#991b1b; }
  .state-soon { background:#fef3c7; color:#92400e; }
  .state-done { background:#dcfce7; color:#166534; }
  .state-open { background:#eef2ff; color:#4338ca; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  let milestones = [];
  let filter = 'all';
  let query = '';
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function toDate(v){ return v ? new Date(String(v).slice(0,10) + 'T12:00:00') : null; }
  function isOverdue(m){ const d = toDate(m.start_date); const t = new Date(); t.setHours(0,0,0,0); return d && d < t && m.status !== 'completed'; }
  function isThisWeek(m){ const d = toDate(m.start_date); if (!d) return false; const t = new Date(); const monday = new Date(t); monday.setDate(t.getDate() - ((t.getDay() + 6) % 7)); monday.setHours(0,0,0,0); const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); return d >= monday && d <= sunday; }
  function isSoon(m){ const d = toDate(m.start_date); if (!d) return false; const t = new Date(); t.setHours(0,0,0,0); const diff = Math.round((d - t) / 86400000); return diff >= 0 && diff <= 14; }
  function visible(){ return milestones.filter(m => {
    if (filter === 'overdue' && !isOverdue(m)) return false;
    if (filter === 'thisweek' && !isThisWeek(m)) return false;
    if (filter === 'soon' && !isSoon(m)) return false;
    if (filter === 'done' && m.status !== 'completed') return false;
    if (query) {
      const hay = [m.title, m.plan_name, m.owner_name, m.status].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(query.toLowerCase())) return false;
    }
    return true;
  }); }
  function render(){
    const rows = visible();
    document.getElementById('milestoneList').innerHTML = rows.length ? rows.map(m => {
      const cls = m.status === 'completed' ? 'done' : isOverdue(m) ? 'overdue' : isSoon(m) ? 'soon' : 'open';
      return '<div class="milestone-card">' +
        '<div class="milestone-name">' + esc(m.title || 'Untitled milestone') + '</div>' +
        '<div class="milestone-meta">' + esc(m.plan_name || 'Unknown project') + ' · ' + esc(m.start_date ? new Date(String(m.start_date).slice(0,10) + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—') + '</div>' +
        '<span class="milestone-pill state-' + cls + '">' + esc(m.status || (cls === 'overdue' ? 'overdue' : 'open')) + '</span>' +
      '</div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-title">No milestones match</div><div class="empty-state-sub">Adjust the filters or search term.</div></div>';
  }
  document.getElementById('searchInput').addEventListener('input', e => { query = e.target.value.trim(); render(); });
  document.getElementById('filterStrip').addEventListener('click', e => { const btn = e.target.closest('[data-filter]'); if (!btn) return; filter = btn.dataset.filter; document.querySelectorAll('#filterStrip .pill').forEach(p => p.classList.remove('pill-active')); btn.classList.add('pill-active'); render(); });
  mobileFetch('/api/project-plans/milestones').then(data => { milestones = Array.isArray(data) ? data : (data.data || []); render(); });
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>

        <input id="searchInput" type="search" placeholder="Search milestones..." autocomplete="off" style="width:100%;box-sizing:border-box;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 32px;font-size:14px;background:var(--surface-2);outline:none;-webkit-appearance:none;">

<style>
  .ms-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .ms-title { font-size:14px; font-weight:700; color:var(--text); }
  .ms-meta { font-size:12px; color:var(--text-3); margin-top:4px; line-height:1.45; }
  .ms-tags { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .ms-tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; }
  .ms-tag.overdue { background:#fee2e2; color:#991b1b; }
  .ms-tag.soon { background:#fef3c7; color:#92400e; }
  .ms-tag.done { background:#dcfce7; color:#166534; }
  .ms-tag.info { background:#eef2ff; color:#4338ca; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  let milestones = [];
  let filter = 'all';
  let search = '';
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function fmtDate(v){ if (!v) return '—'; return new Date(String(v).slice(0,10) + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }
  function daysUntil(v){ if (!v) return null; const today = new Date(); today.setHours(0,0,0,0); const d = new Date(String(v).slice(0,10) + 'T00:00:00'); d.setHours(0,0,0,0); return Math.round((d - today) / 86400000); }
  function filtered(){
    return milestones.filter(item => {
      const diff = daysUntil(item.target_date || item.start_date || item.end_date);
      if (filter === 'overdue' && !(diff != null && diff < 0 && item.status !== 'completed')) return false;
      if (filter === 'week' && !(diff != null && diff >= 0 && diff <= 7)) return false;
      if (filter === 'soon' && !(diff != null && diff > 7 && diff <= 30)) return false;
      if (filter === 'done' && item.status !== 'completed') return false;
      if (search) {
        const hay = [item.title, item.plan_name, item.owner_name, item.status].filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(search.toLowerCase())) return false;
      }
      return true;
    });
  }
  function render(){
    const rows = filtered();
    document.getElementById('countLabel').textContent = rows.length ? rows.length + ' shown' : '';
    document.getElementById('milestoneList').innerHTML = rows.length ? rows.map(item => {
      const diff = daysUntil(item.target_date || item.start_date || item.end_date);
      const timeTag = item.status === 'completed' ? '<span class="ms-tag done">Done</span>' : diff != null && diff < 0 ? '<span class="ms-tag overdue">' + esc(String(Math.abs(diff))) + 'd overdue</span>' : diff != null && diff <= 7 ? '<span class="ms-tag soon">' + esc(String(diff)) + 'd away</span>' : '<span class="ms-tag info">Upcoming</span>';
      return '<div class="ms-card"><div class="ms-title">' + esc(item.title || 'Untitled milestone') + '</div><div class="ms-meta">' + esc(item.plan_name || 'Unknown project') + ' · ' + esc(fmtDate(item.target_date || item.start_date || item.end_date)) + '</div><div class="ms-meta">' + esc(item.owner_name || 'Unassigned owner') + '</div><div class="ms-tags">' + timeTag + '<span class="ms-tag info">' + esc(item.status || 'pending') + '</span></div></div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-icon">◆</div><div class="empty-state-title">No milestones found</div><div class="empty-state-sub">Try a different filter or search term.</div></div>';
  }
  document.getElementById('searchInput').addEventListener('input', e => { search = e.target.value.trim(); render(); });
  document.getElementById('filterStrip').addEventListener('click', e => {
    const btn = e.target.closest('[data-filter]');
    if (!btn) return;
    filter = btn.dataset.filter;
    Array.prototype.forEach.call(document.querySelectorAll('#filterStrip .pill'), node => node.classList.remove('pill-active'));
    btn.classList.add('pill-active');
    render();
  });
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
  mobileFetch('/api/project-plans/milestones').then(data => { milestones = (data && data.data) || []; render(); }).catch(() => { milestones = []; render(); });
})();
</script>
