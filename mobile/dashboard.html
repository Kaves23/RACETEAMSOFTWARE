<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Dashboard · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="app-header" style="padding-bottom:16px;">
    <div class="offline-banner" id="offlineBanner"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:5px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand">
        <div class="page-bar-mark">RT</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--text);line-height:1.1;">Race Team OS</div>
          <div id="dateLabel" style="font-size:11px;color:var(--text-3);margin-top:1px;"></div>
        </div>
      </div>
      <button id="refreshBtn" onclick="loadAll()" style="border:none;background:none;padding:6px;cursor:pointer;color:var(--text-3);font-size:18px;line-height:1;" title="Refresh">↻</button>
    </div>
  </header>

  <!-- Body -->
  <main class="app-body" style="padding:16px;">

    <!-- Stat grid -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">

      <div class="stat-card" id="statVehicles" onclick="window.location.href='vehicles.html'">
        <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div>
        <div class="stat-num" id="statVehiclesNum"><span class="stat-dot"></span></div>
        <div class="stat-label">Vehicles</div>
        <div class="stat-sub" id="statVehiclesSub"></div>
      </div>

      <div class="stat-card" id="statBoxes" onclick="window.location.href='boxes.html'">
        <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></div>
        <div class="stat-num" id="statBoxesNum"><span class="stat-dot"></span></div>
        <div class="stat-label">Boxes</div>
        <div class="stat-sub" id="statBoxesSub"></div>
      </div>

      <div class="stat-card" id="statAssets" onclick="window.location.href='assets.html'">
        <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></div>
        <div class="stat-num" id="statAssetsNum"><span class="stat-dot"></span></div>
        <div class="stat-label">Assets</div>
        <div class="stat-sub" id="statAssetsSub"></div>
      </div>

      <div class="stat-card" id="statStock" onclick="window.location.href='inventory.html'">
        <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>
        <div class="stat-num" id="statStockNum"><span class="stat-dot"></span></div>
        <div class="stat-label">Inventory</div>
        <div class="stat-sub" id="statStockSub"></div>
      </div>

    </div>

    <!-- Events + Drivers row -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">

      <div class="stat-card" id="statEvents" onclick="window.location.href='events.html'">
        <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <div class="stat-num" id="statEventsNum"><span class="stat-dot"></span></div>
        <div class="stat-label">Events</div>
        <div class="stat-sub" id="statEventsSub"></div>
      </div>

      <div class="stat-card" id="statDrivers" onclick="window.location.href='drivers.html'">
        <div class="stat-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
        <div class="stat-num" id="statDriversNum"><span class="stat-dot"></span></div>
        <div class="stat-label">Drivers</div>
        <div class="stat-sub" id="statDriversSub"></div>
      </div>

    </div>
    <div style="color:var(--text-3);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:10px;">Quick access</div>

    <a href="events.html"    class="dash-nav-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> <span>Events</span><span class="dash-nav-arrow">›</span></a>
    <a href="drivers.html"   class="dash-nav-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg> <span>Drivers</span><span class="dash-nav-arrow">›</span></a>
    <a href="load.html"      class="dash-nav-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg> <span>Load Plan</span><span class="dash-nav-arrow">›</span></a>
    <a href="tasks.html"     class="dash-nav-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4.5" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4.5" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg> <span>Lists &amp; Tasks</span><span class="dash-nav-arrow">›</span></a>
    <a href="browse.html"    class="dash-nav-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> <span>Browse Equipment</span><span class="dash-nav-arrow">›</span></a>
    <a href="scan.html"      class="dash-nav-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg> <span>Scanner</span><span class="dash-nav-arrow">›</span></a>

    <!-- Offline download -->
    <div style="margin-top:28px;">
      <button id="offlineBtn" onclick="saveForOffline()">
        Save for offline
      </button>
      <div id="offlineProgress" style="display:none;margin-top:12px;">
        <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:8px;">
          <div id="offlineBar" style="height:100%;background:#7c3aed;border-radius:3px;width:0%;transition:width 0.3s;"></div>
        </div>
        <div id="offlineMsg" style="font-size:12px;color:var(--text-3);text-align:center;"></div>
      </div>
      <div id="offlineSavedAt" style="font-size:11px;color:var(--text-3);text-align:center;margin-top:8px;"></div>
    </div>

  </main>

  <!-- Bottom nav -->
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item active">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span>
        <span class="nav-label">Dashboard</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span class="nav-label">Logistics</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=sporting" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Sporting</span>
        <div class="nav-dot"></div>
      </a>
      <a href="browse.html?tab=projects" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span>
        <span class="nav-label">Projects</span>
        <div class="nav-dot"></div>
      </a>
      <a href="scan.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span>
        <span class="nav-label">Scan</span>
        <div class="nav-dot"></div>
      </a>
    </div>
  </nav>

</div>

<style>
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 16px 14px 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s;
  }
  .stat-card:active { background: var(--bg-2, #f5f5f5); }
  .stat-icon { margin-bottom: 8px; line-height: 0; color: var(--text-2); }
  .stat-num {
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
    min-height: 28px;
  }
  .stat-label { font-size: 12px; font-weight: 600; color: var(--text-2, #525252); }
  .stat-sub   { font-size: 11px; color: var(--text-3); margin-top: 2px; min-height: 14px; }

  /* Loading dot */
  .stat-dot {
    display: inline-block;
    width: 20px;
    height: 10px;
    border-radius: 4px;
    background: var(--border);
    animation: shimmer 1.4s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes shimmer { 0%{opacity:.4} 50%{opacity:.9} 100%{opacity:.4} }

  /* Alert highlight on stat card */
  .stat-card.has-alert {
    border-color: #fcd34d;
    background: #fffbeb;
  }
  .stat-card.has-alert .stat-sub { color: #d97706; font-weight: 600; }

  /* Quick nav rows */
  .dash-nav-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    text-decoration: none;
    color: var(--text);
    font-size: 14px;
    font-weight: 500;
    -webkit-tap-highlight-color: transparent;
  }
  .dash-nav-row:last-child { border-bottom: none; }
  .dash-nav-row span:first-of-type { flex: 1; }
  .dash-nav-arrow { color: var(--text-3); font-size: 18px; }

  /* Offline button */
  #offlineBtn {
    display: block;
    width: 100%;
    padding: 14px;
    background: #7c3aed;
    color: #fff;
    border: none;
    border-radius: var(--r);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.01em;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, opacity 0.15s;
  }
  #offlineBtn:active  { background: #6d28d9; }
  #offlineBtn:disabled { opacity: 0.6; cursor: default; }
</style>

<script>
  // Auth guard
  if (!localStorage.getItem('auth_token') || sessionStorage.getItem('mobile_pin_ok') !== '1') {
    window.location.replace('index.html');
  }

  const API = window.location.origin;
  const auth = () => ({ 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') });

  // ── Offline banner ──────────────────────────────────────────────
  window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  if (!navigator.onLine) document.getElementById('offlineBanner').style.display = 'block';

  // ── Date label ──────────────────────────────────────────────────
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long'
  });

  // ── Helpers ──────────────────────────────────────────────────────
  function setNum(id, val) {
    document.getElementById(id).textContent = val;
  }
  function setSub(id, val) {
    document.getElementById(id).textContent = val;
  }

  // ── Load all stats ────────────────────────────────────────────────
  async function loadAll() {
    // Reset to loading state
    ['statVehiclesNum','statBoxesNum','statAssetsNum','statStockNum','statEventsNum','statDriversNum'].forEach(id => {
      document.getElementById(id).innerHTML = '<span class="stat-dot"></span>';
    });
    ['statVehiclesSub','statBoxesSub','statAssetsSub','statStockSub','statEventsSub','statDriversSub'].forEach(id => {
      document.getElementById(id).textContent = '';
    });
    document.getElementById('statStock').classList.remove('has-alert');

    const [trucks, boxes, assets, inventory, eventsResp, driversResp] = await Promise.allSettled([
      mobileFetch(`${API}/api/trucks`),
      mobileFetch(`${API}/api/boxes`),
      mobileFetch(`${API}/api/items`),
      mobileFetch(`${API}/api/collections/inventory`),
      mobileFetch(`${API}/api/collections/events`),
      mobileFetch(`${API}/api/drivers`),
    ]);

    // Events
    if (eventsResp.status === 'fulfilled' && eventsResp.value.success) {
      const all = eventsResp.value.items || [];
      const today = new Date().toISOString().slice(0,10);
      const upcoming = all.filter(e => (e.start_date || '').slice(0,10) >= today).length;
      setNum('statEventsNum', all.length);
      setSub('statEventsSub', upcoming + ' upcoming');
    } else {
      setNum('statEventsNum', '—');
    }

    // Drivers
    if (driversResp.status === 'fulfilled') {
      const all = driversResp.value.drivers || driversResp.value.items || [];
      setNum('statDriversNum', all.length);
      setSub('statDriversSub', all.length > 0 ? 'active roster' : '');
    } else {
      setNum('statDriversNum', '—');
    }

    // Vehicles
    if (trucks.status === 'fulfilled' && trucks.value.success) {
      const all = trucks.value.trucks || [];
      const active = all.filter(v => (v.status || '').toLowerCase() === 'in_use').length;
      setNum('statVehiclesNum', all.length);
      setSub('statVehiclesSub', active ? active + ' in use' : 'none in use');
    } else {
      setNum('statVehiclesNum', '—');
    }

    // Boxes
    if (boxes.status === 'fulfilled' && boxes.value.success) {
      const all = boxes.value.boxes || [];
      const packed = all.filter(b => (b.status || '').toLowerCase() === 'packed').length;
      setNum('statBoxesNum', all.length);
      setSub('statBoxesSub', packed + ' packed');
    } else {
      setNum('statBoxesNum', '—');
    }

    // Assets
    if (assets.status === 'fulfilled' && assets.value.success) {
      const all = assets.value.items || [];
      const active = all.filter(a => (a.status || '').toLowerCase() === 'in_use' || (a.status || '').toLowerCase() === 'in use').length;
      setNum('statAssetsNum', all.length);
      setSub('statAssetsSub', active ? active + ' in use' : '');
    } else {
      setNum('statAssetsNum', '—');
    }

    // Inventory + low stock alert
    if (inventory.status === 'fulfilled' && inventory.value.success) {
      const all = inventory.value.items || [];
      const lowStock = all.filter(i => {
        const qty = i.quantity ?? 0;
        const min = i.min_quantity ?? 0;
        return qty === 0 || (min > 0 && qty <= min);
      });
      setNum('statStockNum', all.length);
      if (lowStock.length > 0) {
        setSub('statStockSub', lowStock.length + ' low / out of stock');
        document.getElementById('statStock').classList.add('has-alert');
      } else {
        setSub('statStockSub', 'all stocked');
      }
    } else {
      setNum('statStockNum', '—');
    }
  }

  // ── Show last saved timestamp ─────────────────────────────────────────────
  function showSavedAt() {
    var ts = localStorage.getItem('offline_saved_at');
    var el = document.getElementById('offlineSavedAt');
    if (ts) {
      var d = new Date(parseInt(ts, 10));
      el.textContent = '✓ Last saved ' + d.toLocaleDateString('en-GB', { day:'numeric', month:'short' }) + ' at ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
    } else {
      el.textContent = 'Not saved yet';
    }
  }
  showSavedAt();

  // ── Save for offline ──────────────────────────────────────────────────────
  var DATA_CACHE = 'rts-offline-data';

  var OFFLINE_ENDPOINTS = [
    { label: 'Vehicles',   url: '/api/trucks' },
    { label: 'Boxes',      url: '/api/boxes' },
    { label: 'Assets',     url: '/api/items' },
    { label: 'Inventory',  url: '/api/collections/inventory' },
  ];

  async function saveForOffline() {
    if (!navigator.onLine) {
      alert('You need a connection to download data. Connect to WiFi first.');
      return;
    }

    var btn = document.getElementById('offlineBtn');
    var progressWrap = document.getElementById('offlineProgress');
    var bar = document.getElementById('offlineBar');
    var msg = document.getElementById('offlineMsg');

    btn.disabled = true;
    btn.textContent = 'Downloading…';
    progressWrap.style.display = 'block';

    var total = OFFLINE_ENDPOINTS.length;
    var done  = 0;
    var errors = 0;

    // Open the persistent data cache
    var cache;
    try {
      cache = await caches.open(DATA_CACHE);
    } catch (_) {
      // caches API not available (unlikely on modern mobile, but handle gracefully)
      cache = null;
    }

    for (var i = 0; i < OFFLINE_ENDPOINTS.length; i++) {
      var ep = OFFLINE_ENDPOINTS[i];
      msg.textContent = 'Downloading ' + ep.label + '…';
      bar.style.width = Math.round((i / total) * 100) + '%';

      try {
        var res = await fetch(ep.url, { headers: auth() });
        if (mobileHandle401(res)) return;
        if (res.ok && cache) {
          await cache.put(ep.url, res.clone());
          // Also fetch individual box details if this was the boxes endpoint
          if (ep.url === '/api/boxes') {
            var data = await res.clone().json().catch(function() { return null; });
            if (data && data.boxes) {
              var boxes = data.boxes.slice(0, 60); // cap at 60 to avoid timeouts
              for (var b = 0; b < boxes.length; b++) {
                var boxUrl = '/api/boxes/' + boxes[b].id;
                try {
                  var boxRes = await fetch(boxUrl, { headers: auth() });
                  if (boxRes.ok) await cache.put(boxUrl, boxRes.clone());
                } catch (_) {}
                // Update sub-progress for boxes
                msg.textContent = 'Box contents ' + (b + 1) + '/' + boxes.length + '…';
                bar.style.width = Math.round(((i + (b + 1) / boxes.length) / (total + 1)) * 100) + '%';
              }
            }
          }
        }
        done++;
      } catch (err) {
        errors++;
      }

      bar.style.width = Math.round(((i + 1) / total) * 100) + '%';
    }

    // Done
    bar.style.width = '100%';
    var savedAt = Date.now();
    localStorage.setItem('offline_saved_at', savedAt);

    if (errors === 0) {
      btn.textContent = '✓ Saved — safe to fly!';
      btn.style.background = '#16a34a';
      msg.textContent = 'All data ready for offline use.';
    } else {
      btn.textContent = 'Partial save (' + (done) + '/' + total + ')';
      btn.style.background = '#d97706';
      msg.textContent = done + ' of ' + total + ' downloaded. Try again on better WiFi.';
    }

    showSavedAt();

    // Reset button after 4 s
    setTimeout(function() {
      btn.textContent = 'Save for offline';
      btn.style.background = '';
      btn.disabled = false;
      progressWrap.style.display = 'none';
    }, 4000);
  }

  // ── SW ───────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  loadAll();
</script>

</body>
</html>
