<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Load Plan · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">⚡ Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Load Plan</span>
      </div>
    </div>
    <!-- Vehicle pill strip -->
    <div class="pill-strip" id="pillStrip">
      <div class="pill-skeleton"></div>
      <div class="pill-skeleton"></div>
      <div class="pill-skeleton"></div>
    </div>
    <!-- Stats bar -->
    <div class="stats-bar" id="statsBar" style="display:none;">
      <div class="stats-row">
        <span class="stats-label">Boxes loaded</span>
        <span class="stats-count" id="statsCount"><em>—</em></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>
  </header>

  <!-- Body -->
  <main class="app-body" id="appBody">
    <!-- Pull-to-refresh indicator -->
    <div id="ptrIndicator" style="
      text-align:center;
      padding:16px;
      color:var(--text-3);
      font-size:11px;
      font-weight:600;
      letter-spacing:0.06em;
      text-transform:uppercase;
      transform:translateY(-48px);
      transition:transform 0.18s;
      margin-top:-48px;
    ">
      <span id="ptrArrow" style="display:inline-block;transition:transform 0.18s;margin-right:6px;">↓</span>
      Pull to refresh
    </div>

    <!-- Box list -->
    <div id="boxList" class="box-list"></div>
  </main>

  <!-- Bottom nav -->
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="lists.html" class="nav-item">
        <span class="nav-icon">📋</span>
        <span class="nav-label">Lists</span>
        <div class="nav-dot"></div>
      </a>
      <a href="load.html" class="nav-item active">
        <span class="nav-icon">🚛</span>
        <span class="nav-label">Load Plan</span>
        <div class="nav-dot"></div>
      </a>
      <a href="scan.html" class="nav-item">
        <span class="nav-icon">📡</span>
        <span class="nav-label">Scan</span>
        <div class="nav-dot"></div>
      </a>
    </div>
  </nav>

</div>

<!-- Drawer backdrop -->
<div class="drawer-backdrop" id="drawerBackdrop"></div>

<!-- Slide-up drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-handle"><div class="drawer-handle-bar"></div></div>
  <div class="drawer-header">
    <div class="drawer-box-name" id="drawerBoxName">Box</div>
    <div class="drawer-box-meta" id="drawerBoxMeta"></div>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<script>
'use strict';

// ── Auth guard ────────────────────────────────────────────────────────────
(function() {
  if (!localStorage.getItem('auth_token')) {
    window.location.replace('index.html');
  }
  if (sessionStorage.getItem('mobile_pin_ok') !== '1') {
    window.location.replace('index.html');
  }
})();

// ── Service worker ────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/mobile/sw.js', { scope: '/mobile/' })
    .catch(function(e) { console.warn('SW registration failed:', e); });
}

// ── State ─────────────────────────────────────────────────────────────────
var trucks = [];
var activeTruckId = localStorage.getItem('mobile_last_truck') || null;
var currentManifest = null;
var isLoading = false;

// ── API helpers ───────────────────────────────────────────────────────────
function authHeader() {
  return { 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') };
}

function apiFetch(url) {
  return fetch(url, { headers: authHeader() }).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

// ── Init ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  loadTrucks();
  setupOnlineOffline();
  setupPullToRefresh();
  setupDrawer();
});

// ── Trucks / pills ────────────────────────────────────────────────────────
function loadTrucks() {
  apiFetch('/api/trucks').then(function(data) {
    trucks = (data.trucks || []).filter(function(t) { return t.status !== 'archived'; });
    renderPills();
    // Auto-select: last used, or first truck
    var select = activeTruckId && trucks.find(function(t) { return String(t.id) === String(activeTruckId); })
                 ? activeTruckId
                 : (trucks.length ? trucks[0].id : null);
    if (select) loadManifest(select);
  }).catch(function() {
    renderPillsError();
  });
}

function renderPills() {
  var strip = document.getElementById('pillStrip');
  if (!trucks.length) {
    strip.innerHTML = '<span style="font-size:12px;color:var(--text-3);padding:6px 0;">No vehicles found</span>';
    return;
  }
  strip.innerHTML = trucks.map(function(t) {
    var active = String(t.id) === String(activeTruckId);
    return '<button class="pill' + (active ? ' active' : '') + '" data-truckid="' + escHtml(String(t.id)) + '">' +
           escHtml(t.name || t.registration || 'Vehicle ' + t.id) +
           '</button>';
  }).join('');
  strip.addEventListener('click', function(e) {
    var btn = e.target.closest('[data-truckid]');
    if (btn) loadManifest(btn.getAttribute('data-truckid'));
  });
}

function renderPillsError() {
  document.getElementById('pillStrip').innerHTML =
    '<span style="font-size:12px;color:var(--text-3);padding:6px 0;">Could not load vehicles</span>';
}

// ── Manifest ──────────────────────────────────────────────────────────────
function loadManifest(truckId) {
  if (isLoading) return;
  isLoading = true;
  activeTruckId = String(truckId);
  localStorage.setItem('mobile_last_truck', activeTruckId);

  // Update active pill
  document.querySelectorAll('#pillStrip .pill').forEach(function(p) {
    p.classList.toggle('active', p.getAttribute('data-truckid') === activeTruckId);
  });

  renderBoxListSkeleton();
  document.getElementById('statsBar').style.display = 'none';

  apiFetch('/api/scan/manifest/' + encodeURIComponent(truckId))
    .then(function(data) {
      currentManifest = data;
      renderManifest(data);
    })
    .catch(function() {
      renderBoxListError();
    })
    .finally(function() {
      isLoading = false;
    });
}

function renderManifest(data) {
  var statsBar = document.getElementById('statsBar');

  if (!data.planFound || !data.boxes || data.boxes.length === 0) {
    document.getElementById('boxList').innerHTML =
      '<div class="state-empty">' +
      '<div class="state-icon">📦</div>' +
      '<div class="state-title">No load plan yet</div>' +
      '<div class="state-sub">Pack boxes from the desktop to see them here.</div>' +
      '</div>';
    statsBar.style.display = 'none';
    return;
  }

  // Sort by loadOrder then name
  var boxes = data.boxes.slice().sort(function(a, b) {
    if (a.loadOrder != null && b.loadOrder != null) return a.loadOrder - b.loadOrder;
    if (a.loadOrder != null) return -1;
    if (b.loadOrder != null) return 1;
    return (a.name || '').localeCompare(b.name || '');
  });

  var total   = data.totalCount  != null ? data.totalCount  : boxes.length;
  var loaded  = data.loadedCount != null ? data.loadedCount : boxes.filter(function(b) { return b.loaded; }).length;
  var pct     = total > 0 ? Math.round((loaded / total) * 100) : 0;

  // Stats bar
  statsBar.style.display = 'block';
  document.getElementById('statsCount').innerHTML =
    '<strong>' + loaded + '</strong> <em>of ' + total + ' loaded</em>';
  document.getElementById('progressFill').style.width = pct + '%';

  // Box rows
  document.getElementById('boxList').innerHTML = boxes.map(function(box) {
    var isLoaded = !!box.loaded;
    return '<div class="box-row" data-boxid="' + escHtml(String(box.id)) + '" data-boxname="' + escHtml(box.name || '') + '" data-boxbarcode="' + escHtml(box.barcode || '') + '">' +
      '<div class="box-row-icon' + (isLoaded ? ' loaded-icon' : '') + '">' + (isLoaded ? '✅' : '📦') + '</div>' +
      '<div class="box-row-body">' +
        '<div class="box-name">' + escHtml(box.name || 'Unnamed box') + '</div>' +
        '<div class="box-meta">' +
          (box.barcode ? '<span class="box-barcode mono">' + escHtml(box.barcode) + '</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="box-row-right">' +
        '<span class="badge ' + (isLoaded ? 'badge-loaded' : 'badge-pending') + '">' +
          (isLoaded ? 'Loaded' : 'Pending') +
        '</span>' +
        '<span class="chevron">›</span>' +
      '</div>' +
    '</div>';
  }).join('');

  document.getElementById('boxList').addEventListener('click', handleBoxRowClick);
}

function handleBoxRowClick(e) {
  var row = e.target.closest('.box-row');
  if (!row) return;
  openDrawer(row.getAttribute('data-boxid'), row.getAttribute('data-boxname'), row.getAttribute('data-boxbarcode'));
}

function renderBoxListSkeleton() {
  var html = '';
  for (var i = 0; i < 5; i++) {
    html += '<div class="skeleton-row">' +
      '<div class="skel skel-icon"></div>' +
      '<div class="skel-body">' +
        '<div class="skel skel-title"></div>' +
        '<div class="skel skel-sub"></div>' +
      '</div>' +
      '<div class="skel skel-badge"></div>' +
      '</div>';
  }
  document.getElementById('boxList').innerHTML = html;
}

function renderBoxListError() {
  document.getElementById('boxList').innerHTML =
    '<div class="state-empty">' +
    '<div class="state-icon">⚠️</div>' +
    '<div class="state-title">Could not load plan</div>' +
    '<div class="state-sub">Check your connection and tap to try again.</div>' +
    '</div>';
  document.getElementById('statsBar').style.display = 'none';
}

// ── Drawer ────────────────────────────────────────────────────────────────
function setupDrawer() {
  document.getElementById('drawerBackdrop').addEventListener('click', closeDrawer);
  document.getElementById('drawer').querySelector('.drawer-handle').addEventListener('click', closeDrawer);
}

function openDrawer(boxId, name, barcode) {
  document.getElementById('drawerBoxName').textContent = name || 'Box';
  document.getElementById('drawerBoxMeta').textContent = barcode || '';
  document.getElementById('drawerBody').innerHTML =
    '<div class="skeleton-row"><div class="skel" style="height:13px;width:66%;border-radius:4px;"></div></div>' +
    '<div class="skeleton-row"><div class="skel" style="height:13px;width:50%;border-radius:4px;"></div></div>' +
    '<div class="skeleton-row"><div class="skel" style="height:13px;width:58%;border-radius:4px;"></div></div>';

  document.getElementById('drawerBackdrop').classList.add('open');
  document.getElementById('drawer').classList.add('open');
  document.body.style.overflow = 'hidden';

  apiFetch('/api/boxes/' + encodeURIComponent(boxId))
    .then(function(data) {
      renderDrawerContents(data.contents || []);
    })
    .catch(function() {
      document.getElementById('drawerBody').innerHTML =
        '<div class="drawer-empty">Could not load contents.<br>Check connection.</div>';
    });
}

function renderDrawerContents(contents) {
  if (!contents.length) {
    document.getElementById('drawerBody').innerHTML =
      '<div class="drawer-empty">This box has no contents recorded.</div>';
    return;
  }
  document.getElementById('drawerBody').innerHTML = contents.map(function(item, i) {
    var identifier = item.item_barcode || item.sku || '';
    return '<div class="contents-row">' +
      '<div class="contents-num">' + (i + 1) + '</div>' +
      '<div class="contents-body">' +
        '<div class="contents-name">' + escHtml(item.name || 'Unknown item') + '</div>' +
        (identifier ? '<div class="contents-sku mono">' + escHtml(identifier) + '</div>' : '') +
      '</div>' +
      '<div class="contents-qty">' + (item.quantity_packed != null ? item.quantity_packed : 1) + '</div>' +
    '</div>';
  }).join('');
}

function closeDrawer() {
  document.getElementById('drawerBackdrop').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.body.style.overflow = '';
}

// Swipe-down to close drawer
(function() {
  var drawer = document.getElementById('drawer');
  var startY = 0, startScrollTop = 0;
  drawer.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    startScrollTop = document.getElementById('drawerBody').scrollTop;
  }, { passive: true });
  drawer.addEventListener('touchend', function(e) {
    var dy = e.changedTouches[0].clientY - startY;
    if (dy > 80 && startScrollTop <= 0) closeDrawer();
  }, { passive: true });
})();

// ── Online / offline ──────────────────────────────────────────────────────
function setupOnlineOffline() {
  function update() {
    document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine);
  }
  window.addEventListener('online',  update);
  window.addEventListener('offline', update);
  update();
}

// ── Pull-to-refresh ───────────────────────────────────────────────────────
function setupPullToRefresh() {
  var body = document.getElementById('appBody');
  var indicator = document.getElementById('ptrIndicator');
  var arrow = document.getElementById('ptrArrow');
  var startY = 0;
  var pulling = false;
  var THRESHOLD = 65;

  body.addEventListener('touchstart', function(e) {
    if (body.scrollTop === 0) {
      startY = e.touches[0].clientY;
      pulling = true;
    }
  }, { passive: true });

  body.addEventListener('touchmove', function(e) {
    if (!pulling) return;
    var dy = e.touches[0].clientY - startY;
    if (dy <= 0) return;
    var pull = Math.min(dy * 0.45, THRESHOLD + 20);
    indicator.style.transform = 'translateY(' + (pull - 48) + 'px)';
    arrow.style.transform = dy >= THRESHOLD ? 'rotate(180deg)' : 'rotate(0deg)';
  }, { passive: true });

  body.addEventListener('touchend', function(e) {
    if (!pulling) return;
    pulling = false;
    var dy = e.changedTouches[0].clientY - startY;
    indicator.style.transform = 'translateY(-48px)';
    arrow.style.transform = 'rotate(0deg)';
    if (dy >= THRESHOLD && activeTruckId && !isLoading) {
      loadManifest(activeTruckId);
    }
  }, { passive: true });
}

// ── Utility ───────────────────────────────────────────────────────────────
function escHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
</script>
</body>
</html>
