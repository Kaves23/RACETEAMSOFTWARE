<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Weather Station · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html?tab=sporting'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Weather Station</span>
      </div>
    </div>
    <div style="padding:0 16px 12px;display:grid;gap:8px;">
      <select id="eventSelect" style="height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;background:#fff;font-size:14px;"></select>
      <div id="locationLabel" style="font-size:12px;color:var(--text-3);"></div>
    </div>
  </header>
  <main class="app-body">
    <div id="content"></div>
  </main>
  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a>
      <a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=sporting" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=projects" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a>
      <a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a>
      <a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/><circle cx="7" cy="17" r="1.5"/><circle cx="17" cy="17" r="1.5"/><line x1="9" y1="17" x2="15" y2="17"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a>
      <a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a>
    </div>
  </nav>
</div>

<style>
  .wx-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:8px; padding:12px 16px; }
  .wx-card { background:#fff; border:1px solid var(--border); border-radius:var(--r); padding:12px; }
  .wx-label { font-size:10px; text-transform:uppercase; color:var(--text-3); font-weight:700; letter-spacing:.06em; }
  .wx-value { font-size:22px; font-weight:800; color:var(--text); margin-top:4px; }
  .wx-sub { font-size:12px; color:var(--text-3); margin-top:3px; }
  .hour-row { display:flex; gap:10px; padding:12px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .hour-time { width:58px; font-size:12px; font-weight:700; color:var(--text); }
  .hour-meta { flex:1; font-size:12px; color:var(--text-3); }
  .empty { padding:28px 18px; text-align:center; color:var(--text-3); font-size:13px; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');

  let events = [];
  let selectedId = '';

  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function itemsFrom(payload){ return Array.isArray(payload) ? payload : (payload && Array.isArray(payload.items) ? payload.items : []); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function currentEvent(){ return events.find(row => String(row.id) === String(selectedId)) || null; }
  function coordsFrom(event){
    const lat = event.latitude || event.lat || event.venue_lat || event.location_lat;
    const lon = event.longitude || event.lng || event.lon || event.venue_lng || event.location_lon;
    if (lat != null && lon != null) return Promise.resolve({ lat: Number(lat), lon: Number(lon), label: 'Stored event coordinates' });
    const query = [event.circuit, event.venue, event.city, event.country].filter(Boolean).join(', ');
    if (!query) return Promise.resolve(null);
    return fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=' + encodeURIComponent(query), { headers:{ 'Accept':'application/json' } })
      .then(r => r.ok ? r.json() : [])
      .then(rows => rows && rows[0] ? { lat: Number(rows[0].lat), lon: Number(rows[0].lon), label: rows[0].display_name } : null)
      .catch(() => null);
  }
  function renderEmpty(msg){ document.getElementById('content').innerHTML = '<div class="empty">' + esc(msg) + '</div>'; }
  async function loadWeather(){
    const event = currentEvent();
    if (!event) return renderEmpty('Select an event to load weather.');
    const coords = await coordsFrom(event);
    if (!coords) {
      document.getElementById('locationLabel').textContent = 'No location data found for this event.';
      return renderEmpty('This event needs a venue or coordinates before weather can load.');
    }
    document.getElementById('locationLabel').textContent = coords.label || [event.venue, event.city, event.country].filter(Boolean).join(' · ');
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + coords.lat + '&longitude=' + coords.lon + '&current=temperature_2m,apparent_temperature,wind_speed_10m,precipitation,relative_humidity_2m&hourly=temperature_2m,relative_humidity_2m,precipitation_probability,wind_speed_10m&timezone=auto&forecast_days=2';
    const payload = await fetch(url).then(r => r.ok ? r.json() : null).catch(() => null);
    if (!payload || !payload.current) return renderEmpty('Weather data is unavailable right now.');
    const current = payload.current;
    const times = payload.hourly && payload.hourly.time ? payload.hourly.time : [];
    const idx = times.findIndex(time => time === current.time);
    const rows = idx >= 0 ? times.slice(idx, idx + 6).map((time, i) => ({
      time: time,
      temp: payload.hourly.temperature_2m[idx + i],
      humidity: payload.hourly.relative_humidity_2m[idx + i],
      rain: payload.hourly.precipitation_probability[idx + i],
      wind: payload.hourly.wind_speed_10m[idx + i]
    })) : [];
    document.getElementById('content').innerHTML =
      '<div class="wx-grid">' +
        '<div class="wx-card"><div class="wx-label">Air</div><div class="wx-value">' + esc(current.temperature_2m) + '°C</div><div class="wx-sub">Feels like ' + esc(current.apparent_temperature) + '°C</div></div>' +
        '<div class="wx-card"><div class="wx-label">Wind</div><div class="wx-value">' + esc(current.wind_speed_10m) + '</div><div class="wx-sub">km/h trackside</div></div>' +
        '<div class="wx-card"><div class="wx-label">Humidity</div><div class="wx-value">' + esc(current.relative_humidity_2m) + '%</div><div class="wx-sub">Current moisture</div></div>' +
        '<div class="wx-card"><div class="wx-label">Rain</div><div class="wx-value">' + esc(current.precipitation || 0) + '</div><div class="wx-sub">mm now</div></div>' +
      '</div>' +
      (rows.length ? rows.map(row => '<div class="hour-row"><div class="hour-time">' + esc(String(row.time).slice(11, 16)) + '</div><div class="hour-meta">' + esc(row.temp) + '°C · Humidity ' + esc(row.humidity) + '% · Rain ' + esc(row.rain) + '% · Wind ' + esc(row.wind) + ' km/h</div></div>').join('') : '<div class="empty">No hourly forecast available.</div>');
  }
  async function load(){
    const payload = await mobileFetch('/api/collections/events').catch(() => ({ items: [] }));
    events = itemsFrom(payload).sort((a, b) => String(b.start_date || b.start || '').localeCompare(String(a.start_date || a.start || '')));
    const select = document.getElementById('eventSelect');
    select.innerHTML = events.length ? events.map(event => '<option value="' + esc(event.id) + '">' + esc((event.name || event.title || 'Untitled') + ((event.start_date || event.start) ? ' · ' + String(event.start_date || event.start).slice(0, 10) : '')) + '</option>').join('') : '<option value="">No events</option>';
    if (events[0]) selectedId = String(events[0].id);
    select.value = selectedId;
    loadWeather();
  }
  document.getElementById('eventSelect').addEventListener('change', e => { selectedId = e.target.value; loadWeather(); });
  window.addEventListener('online', setOffline);
  window.addEventListener('offline', setOffline);
  setOffline();
  load();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
