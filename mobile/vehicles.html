<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Vehicles · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>

<div class="app" id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-1px;margin-right:5px;"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Offline — showing cached data
    </div>
    <div class="page-bar">
      <div class="page-bar-brand" onclick="window.location.href='browse.html'" style="cursor:pointer;">
        <div class="page-bar-mark">RT</div>
        <span class="page-bar-title">Vehicles</span>
      </div>
      <button class="icon-btn" id="btnLogTrip" onclick="openNewTripSheet()" title="Log a trip" style="display:none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
    </div>
    <div style="padding:0 16px 12px;display:flex;gap:8px;align-items:center;">
      <div style="position:relative;flex:1;">
        <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="search" id="searchInput" placeholder="Search vehicles…" autocomplete="off" style="width:100%;box-sizing:border-box;height:36px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px 0 32px;font-size:14px;background:var(--surface);outline:none;-webkit-appearance:none;">
      </div>
    </div>
    <div class="pill-strip" id="statusStrip" style="padding-bottom:12px;">
      <button class="pill pill-active" data-status="">All</button>
      <button class="pill" data-status="available">Available</button>
      <button class="pill" data-status="in_use">In Use</button>
      <button class="pill" data-status="maintenance">Maintenance</button>
    </div>
  </header>

  <main class="app-body" id="appBody">
    <div id="vehicleList"></div>
  </main>

  <nav class="app-nav">
    <div class="nav-bar">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="browse.html" class="nav-item active">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
        <span class="nav-label">Logistics</span>
      </a>
      <a href="browse.html?tab=sporting" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">Sporting</span>
      </a>
      <a href="scan.html" class="nav-item">
        <span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span>
        <span class="nav-label">Scan</span>
      </a>
    </div>
  </nav>

</div>

<!-- Vehicle Detail Drawer -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="detailDrawer">
  <div class="drawer-handle" onclick="closeDrawer()"></div>
  <div class="drawer-header">
    <div>
      <div class="drawer-title" id="drawerName">—</div>
      <div id="drawerReg" style="font-size:12px;color:var(--text-3);font-family:ui-monospace,monospace;margin-top:2px;letter-spacing:0.05em;"></div>
    </div>
    <span id="drawerStatus" class="vstatus-tag">—</span>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
</div>

<!-- Trip Bottom Sheet -->
<div class="sheet-overlay" id="tripSheetOverlay" onclick="closeTripSheet()"></div>
<div class="bottom-sheet" id="tripSheet">
  <div class="sheet-handle-bar"></div>
  <div class="sheet-header">
    <div class="sheet-title">Log Trip</div>
    <button class="icon-btn" onclick="closeTripSheet()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="sheet-body">
    <div id="tripVehicleRow" style="display:none;" class="form-row">
      <label class="form-label">Vehicle *</label>
      <select id="tripVehicleId" class="form-input"><option value="">Select vehicle…</option></select>
    </div>
    <div class="form-row">
      <label class="form-label">Driver</label>
      <select id="tripDriverName" class="form-input"><option value="">— unassigned —</option></select>
    </div>
    <div class="form-row">
      <label class="form-label">Link to Event</label>
      <select id="tripEventId" class="form-input"><option value="">— no event —</option></select>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-row">
        <label class="form-label">From</label>
        <input type="text" id="tripFrom" class="form-input" placeholder="e.g. Workshop">
      </div>
      <div class="form-row">
        <label class="form-label">To</label>
        <input type="text" id="tripTo" class="form-input" placeholder="e.g. Killarney">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-row">
        <label class="form-label">Departure</label>
        <input type="datetime-local" id="tripDepartureAt" class="form-input">
      </div>
      <div class="form-row">
        <label class="form-label">Arrival</label>
        <input type="datetime-local" id="tripArrivalAt" class="form-input">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div class="form-row">
        <label class="form-label">Start ODO (km)</label>
        <input type="number" id="tripStartOdo" class="form-input" placeholder="e.g. 42500" step="0.1" min="0">
      </div>
      <div class="form-row">
        <label class="form-label">End ODO (km)</label>
        <input type="number" id="tripEndOdo" class="form-input" placeholder="e.g. 42800" step="0.1" min="0">
      </div>
    </div>
    <div id="tripDistPreview" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">
      Distance: <span id="tripDistKm">—</span> km
    </div>
    <div class="form-row">
      <label class="form-label">Notes</label>
      <textarea id="tripNotes" class="form-input" rows="2" placeholder="Any notes…" style="resize:none;"></textarea>
    </div>
    <button id="tripSaveBtn" class="action-btn" onclick="saveTrip()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="flex-shrink:0;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Save Trip
    </button>
  </div>
</div>

<style>
  .vehicle-row { display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);gap:12px;cursor:pointer;background:var(--bg);transition:background .12s;-webkit-tap-highlight-color:transparent; }
  .vehicle-row:active { background:var(--surface); }
  .vtype-badge { display:inline-flex;align-items:center;justify-content:center;width:40px;height:40px;border-radius:var(--r);font-size:9px;font-weight:800;letter-spacing:0.04em;flex-shrink:0; }
  .vtype-trailer { background:#e8f0fe;color:#1a73e8; }
  .vtype-truck   { background:#e6f4ea;color:#137333; }
  .vtype-van     { background:#fef7e0;color:#b06000; }
  .vtype-car     { background:#fce8e6;color:#c5221f; }
  .vtype-bus     { background:#f3e8fd;color:#6a1b9a; }
  .vtype-other   { background:var(--surface-2);color:var(--text-2); }
  .vehicle-info  { flex:1;min-width:0; }
  .vehicle-name  { font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .vehicle-meta  { font-size:12px;color:var(--text-3);margin-top:2px;display:flex;gap:6px;align-items:center; }
  .vehicle-reg   { font-family:ui-monospace,monospace;font-size:11px;letter-spacing:0.04em; }
  .vstatus-tag   { display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0; }
  .vs-available   { background:#dcfce7;color:#16a34a; }
  .vs-in_use      { background:#dbeafe;color:#1d4ed8; }
  .vs-maintenance { background:#fef3c7;color:#d97706; }
  .vs-retired     { background:#f3f4f6;color:#6b7280; }
  .alert-dot { width:7px;height:7px;border-radius:50%;background:#ef4444;flex-shrink:0; }
  .alert-dot.warn { background:#f59e0b; }
  .drawer-overlay { position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s; }
  .drawer-overlay.active { opacity:1;pointer-events:auto; }
  .drawer { position:fixed;bottom:0;left:0;right:0;background:#fff;z-index:101;border-radius:20px 20px 0 0;max-height:92dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);padding-bottom:calc(16px + var(--safe-b)); }
  .drawer.open { transform:translateY(0); }
  .drawer-handle { width:36px;height:4px;background:var(--border-2);border-radius:2px;margin:12px auto 4px;cursor:pointer; }
  .drawer-header { display:flex;justify-content:space-between;align-items:flex-start;padding:8px 16px 12px;border-bottom:1px solid var(--border); }
  .drawer-title  { font-size:17px;font-weight:700;color:var(--text); }
  .drawer-body   { padding:0 16px 16px; }
  .section-hdr   { font-size:11px;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:var(--text-3);padding:16px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px; }
  .detail-row    { display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--border);gap:12px; }
  .detail-row:last-child { border-bottom:none; }
  .detail-label  { font-size:12px;color:var(--text-3);font-weight:500;flex-shrink:0; }
  .detail-value  { font-size:13px;color:var(--text);text-align:right;word-break:break-word; }
  .compliance-row { display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);margin-bottom:8px;border:1px solid var(--border); }
  .c-label { flex:1;font-size:13px;font-weight:600;color:var(--text); }
  .c-date  { font-size:12px;color:var(--text-3); }
  .c-ok   { background:#f0fdf4;border-color:#bbf7d0!important; }
  .c-warn { background:#fffbeb;border-color:#fde68a!important; }
  .c-bad  { background:#fef2f2;border-color:#fecaca!important; }
  .trip-row  { display:flex;gap:10px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--border); }
  .trip-row:last-child { border-bottom:none; }
  .trip-icon { width:34px;height:34px;border-radius:var(--r-sm);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0; }
  .trip-info { flex:1;min-width:0; }
  .trip-route { font-size:13px;font-weight:600;color:var(--text); }
  .trip-meta  { font-size:12px;color:var(--text-3);margin-top:2px; }
  .trip-dist  { font-size:12px;font-weight:700;color:var(--text-2);white-space:nowrap; }
  .trip-del-btn { width:28px;height:28px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;color:var(--text-3);border:1px solid var(--border);background:var(--bg);flex-shrink:0; }
  .log-trip-btn { display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:12px;border-radius:var(--r);background:#1a0d2e;color:#fff;font-size:14px;font-weight:600;border:none;cursor:pointer;margin-top:12px; }
  .sheet-overlay { position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s; }
  .sheet-overlay.active { opacity:1;pointer-events:auto; }
  .bottom-sheet { position:fixed;bottom:0;left:0;right:0;background:#fff;z-index:201;border-radius:20px 20px 0 0;max-height:94dvh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);padding-bottom:calc(16px + var(--safe-b)); }
  .bottom-sheet.open { transform:translateY(0); }
  .sheet-handle-bar { width:36px;height:4px;background:var(--border-2);border-radius:2px;margin:12px auto 4px; }
  .sheet-header { display:flex;justify-content:space-between;align-items:center;padding:4px 16px 12px;border-bottom:1px solid var(--border); }
  .sheet-title  { font-size:16px;font-weight:700;color:var(--text); }
  .sheet-body   { padding:16px; }
  .form-row   { margin-bottom:12px; }
  .form-label { display:block;font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em; }
  .form-input { width:100%;border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;-webkit-appearance:none;transition:border-color .15s; }
  .form-input:focus { border-color:#1a0d2e; }
  textarea.form-input { padding:10px 12px; }
  .action-btn { display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;border-radius:var(--r);background:#1a0d2e;color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;margin-top:4px; }
  .action-btn:active { opacity:.85; }
  .action-btn.loading { opacity:.6;pointer-events:none; }
  .icon-btn { width:36px;height:36px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;-webkit-tap-highlight-color:transparent; }
  .skel-row  { padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:center; }
  .skel-icon { width:40px;height:40px;border-radius:var(--r);background:var(--border);flex-shrink:0; }
  .skel-lines { flex:1; }
  .skel-line  { height:12px;border-radius:4px;background:var(--border);margin-bottom:6px; }
  @keyframes shimmer { 0%{opacity:.5}50%{opacity:1}100%{opacity:.5} }
  .skel-icon,.skel-line { animation:shimmer 1.4s ease-in-out infinite; }
</style>

<script>
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');

  const API = window.location.origin;
  const ah  = () => ({ 'Authorization': 'Bearer ' + localStorage.getItem('auth_token') });
  const ahj = () => ({ ...ah(), 'Content-Type': 'application/json' });

  let allVehicles = [], allDrivers = [], allEvents = [];
  let activeStatus = '', searchQuery = '';
  let currentVehicleId = null;

  window.addEventListener('online',  () => document.getElementById('offlineBanner').style.display = 'none');
  window.addEventListener('offline', () => document.getElementById('offlineBanner').style.display = 'block');
  if (!navigator.onLine) document.getElementById('offlineBanner').style.display = 'block';

  async function init() {
    renderSkeletons();
    try {
      const [vRes, dRes, eRes] = await Promise.all([
        fetch(`${API}/api/trucks`,  { headers: ah() }),
        fetch(`${API}/api/drivers`, { headers: ah() }),
        fetch(`${API}/api/events`,  { headers: ah() }),
      ]);
      if (mobileHandle401(vRes)) return;
      const vData = await vRes.json();
      allVehicles = vData.trucks || [];
      if (dRes.ok) { const d = await dRes.json(); allDrivers = Array.isArray(d.items) ? d.items : (Array.isArray(d) ? d : []); }
      if (eRes.ok) { const e = await eRes.json(); allEvents  = Array.isArray(e.items) ? e.items : (Array.isArray(e) ? e : []); }
      document.getElementById('btnLogTrip').style.display = '';
      renderList();
    } catch (err) {
      document.getElementById('vehicleList').innerHTML =
        `<div style="padding:40px 16px;text-align:center;color:var(--text-3);font-size:13px;">Failed to load.<br><button onclick="init()" style="margin-top:12px;padding:8px 16px;border:1px solid var(--border);border-radius:var(--r);background:var(--bg);font-size:13px;cursor:pointer;">Retry</button></div>`;
    }
  }

  function renderSkeletons() {
    let h = '';
    for (let i=0;i<5;i++) h+=`<div class="skel-row"><div class="skel-icon"></div><div class="skel-lines"><div class="skel-line" style="width:55%"></div><div class="skel-line" style="width:35%"></div></div></div>`;
    document.getElementById('vehicleList').innerHTML = h;
  }

  document.getElementById('statusStrip').querySelectorAll('.pill').forEach(btn => {
    btn.addEventListener('click', () => {
      activeStatus = btn.dataset.status;
      document.getElementById('statusStrip').querySelectorAll('.pill').forEach(b => b.classList.remove('pill-active'));
      btn.classList.add('pill-active');
      renderList();
    });
  });
  document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value; renderList(); });

  function renderList() {
    const q = searchQuery.toLowerCase();
    const filtered = allVehicles.filter(v => {
      const matchS = !activeStatus || (v.status||'').toLowerCase() === activeStatus;
      const matchQ = !q || (v.name||'').toLowerCase().includes(q) || (v.registration||'').toLowerCase().includes(q);
      return matchS && matchQ;
    });
    if (!filtered.length) { document.getElementById('vehicleList').innerHTML=`<div style="padding:60px 16px;text-align:center;color:var(--text-3);font-size:13px;">No vehicles match.</div>`; return; }
    document.getElementById('vehicleList').innerHTML = filtered.map(v => {
      const status = (v.status||'available').toLowerCase();
      const hasAlert = alertLevel(v) !== 'ok';
      const isWarn   = alertLevel(v) === 'warn';
      const odo = v.current_odometer_km != null ? fmt(v.current_odometer_km)+' km' : '';
      return `<div class="vehicle-row" onclick="openVehicle('${esc(v.id)}')">
        ${vBadge(v.truck_type)}
        <div class="vehicle-info">
          <div class="vehicle-name">${esc(v.name)}</div>
          <div class="vehicle-meta"><span class="vehicle-reg">${esc(v.registration)}</span>${odo?`<span>·</span><span style="font-size:11px;color:var(--text-2);font-variant-numeric:tabular-nums;">${odo}</span>`:''}</div>
        </div>
        ${hasAlert?`<div class="alert-dot${isWarn?' warn':''}"></div>`:''}
        <span class="vstatus-tag vs-${status}">${status.replace(/_/g,' ')}</span>
      </div>`;
    }).join('');
  }

  function alertLevel(v) {
    const today = new Date(); today.setHours(0,0,0,0);
    const soon  = new Date(today); soon.setDate(soon.getDate()+30);
    const chk = d => { if(!d) return 'ok'; const dt=new Date(d); return dt<today?'bad':dt<=soon?'warn':'ok'; };
    const levels = [chk(v.insurance_expiry),chk(v.roadworthy_expiry),chk(v.licence_disc_expiry),chk(v.next_service_date)];
    return levels.includes('bad')?'bad':levels.includes('warn')?'warn':'ok';
  }

  function vBadge(type) {
    const t = (type||'').toLowerCase();
    if (t.includes('trailer')) return '<span class="vtype-badge vtype-trailer">TRL</span>';
    if (t.includes('van'))     return '<span class="vtype-badge vtype-van">VAN</span>';
    if (t.includes('car'))     return '<span class="vtype-badge vtype-car">CAR</span>';
    if (t.includes('truck'))   return '<span class="vtype-badge vtype-truck">TRK</span>';
    if (t.includes('bus'))     return '<span class="vtype-badge vtype-bus">BUS</span>';
    return '<span class="vtype-badge vtype-other">VEH</span>';
  }

  async function openVehicle(id) {
    const v = allVehicles.find(x => String(x.id) === String(id));
    if (!v) return;
    currentVehicleId = id;
    const status = (v.status||'available').toLowerCase();
    document.getElementById('drawerName').textContent = v.name || v.registration || '—';
    document.getElementById('drawerReg').textContent  = v.registration || '';
    const ds = document.getElementById('drawerStatus');
    ds.textContent = status.replace(/_/g,' ');
    ds.className = `vstatus-tag vs-${status}`;

    const makeModel = [v.year,v.make,v.model].filter(Boolean).join(' ');
    const dims = (v.dimensions_length_m||v.dimensions_width_m||v.dimensions_height_m)
      ? [v.dimensions_length_m,v.dimensions_width_m,v.dimensions_height_m].map(d=>d!=null?d+'m':'?').join('×') : null;

    let html = '';

    // Identity
    const idRows = [
      ['Type', esc(v.truck_type)],['Make / Model', makeModel?esc(makeModel):null],
      ['Colour',esc(v.colour)],['Fuel',esc(v.fuel_type)],
      ['VIN', v.vin?`<span style="font-family:ui-monospace,monospace;font-size:12px;">${esc(v.vin)}</span>`:null],
      ['Engine No.', v.engine_number?`<span style="font-family:ui-monospace,monospace;font-size:12px;">${esc(v.engine_number)}</span>`:null],
      ['Licence No.', v.licence_number?`<span style="font-family:ui-monospace,monospace;font-size:12px;">${esc(v.licence_number)}</span>`:null],
      ['Max Weight', v.max_weight_kg?fmt(v.max_weight_kg)+' kg':null],
      ['GVM', v.gvm_kg?fmt(v.gvm_kg)+' kg':null],
      ['Tare', v.tare_weight_kg?fmt(v.tare_weight_kg)+' kg':null],
      ['Dimensions', dims?esc(dims)+' (L×W×H)':null],
    ].filter(([,val])=>val);
    if (idRows.length) {
      html += `<div class="section-hdr">Vehicle Details</div>`;
      html += idRows.map(([l,v])=>`<div class="detail-row"><span class="detail-label">${l}</span><span class="detail-value">${v}</span></div>`).join('');
    }

    // Odometer
    const odoVal = v.current_odometer_km != null ? fmt(v.current_odometer_km)+' km' : '— not recorded';
    html += `<div class="section-hdr">Odometer</div>
    <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:var(--r);margin-bottom:4px;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a0d2e" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <div>
        <div style="font-size:18px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;">${odoVal}</div>
        <div style="font-size:12px;color:var(--text-3);">Current odometer</div>
      </div>
    </div>`;
    if (v.next_service_km) {
      const rem = parseFloat(v.next_service_km) - parseFloat(v.current_odometer_km||0);
      const remStr = rem>0 ? `${fmt(rem)} km until service` : `${fmt(Math.abs(rem))} km overdue`;
      const remCol = rem>0 ? (rem<1000?'#d97706':'#16a34a') : '#dc2626';
      html += `<div style="font-size:12px;font-weight:600;color:${remCol};padding:4px 0 8px;">${remStr}</div>`;
    }

    // Compliance
    const today2 = new Date(); today2.setHours(0,0,0,0);
    const soon2  = new Date(today2); soon2.setDate(soon2.getDate()+30);
    const compItems = [
      ['Insurance',    v.insurance_expiry,    v.insurance_notes],
      ['Roadworthy',   v.roadworthy_expiry,   v.roadworthy_notes],
      ['Licence Disc', v.licence_disc_expiry, null],
      ['Next Service', v.next_service_date,   v.next_service_km?'Due at '+fmt(v.next_service_km)+' km':null],
    ];
    const compHtml = compItems.filter(([,d])=>d).map(([label,expiry,notes])=>{
      const dt  = new Date(expiry);
      const cls = dt<today2?'c-bad':dt<=soon2?'c-warn':'c-ok';
      const dot = dt<today2
        ? `<div style="width:8px;height:8px;border-radius:50%;background:#dc2626;flex-shrink:0;"></div>`
        : dt<=soon2
        ? `<div style="width:8px;height:8px;border-radius:50%;background:#d97706;flex-shrink:0;"></div>`
        : `<div style="width:8px;height:8px;border-radius:50%;background:#16a34a;flex-shrink:0;"></div>`;
      return `<div class="compliance-row ${cls}">${dot}<div style="flex:1;"><div class="c-label">${esc(label)}</div>${notes?`<div class="c-date">${esc(notes)}</div>`:''}</div><div class="c-date">${fmtDate(expiry)}</div></div>`;
    }).join('');
    if (compHtml) html += `<div class="section-hdr">Compliance</div>${compHtml}`;

    if (v.notes) html += `<div class="section-hdr">Notes</div><div style="font-size:13px;color:var(--text);padding:6px 0;">${esc(v.notes)}</div>`;

    // Trips
    html += `<div class="section-hdr">Recent Trips</div>
    <div id="drawerTrips"><div style="padding:16px 0;text-align:center;color:var(--text-3);font-size:13px;">Loading…</div></div>
    <button class="log-trip-btn" onclick="openTripSheetForVehicle('${esc(id)}')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Log a Trip
    </button>`;

    document.getElementById('drawerBody').innerHTML = html;
    showDrawer();
    loadTrips(id);
  }

  async function loadTrips(truckId) {
    try {
      const res = await fetch(`${API}/api/trucks/${truckId}/trips`, { headers: ah() });
      if (!res.ok) throw new Error(res.status);
      const data = await res.json();
      renderTrips(data.trips || []);
    } catch {
      const el = document.getElementById('drawerTrips');
      if (el) el.innerHTML = `<div style="padding:8px 0;font-size:13px;color:var(--text-3);">Could not load trips.</div>`;
    }
  }

  function renderTrips(trips) {
    const el = document.getElementById('drawerTrips');
    if (!el) return;
    if (!trips.length) { el.innerHTML=`<div style="padding:8px 0;font-size:13px;color:var(--text-3);">No trips recorded yet.</div>`; return; }
    el.innerHTML = trips.slice(0,10).map(t => {
      const route = [t.departure_from,t.arrival_to].filter(Boolean).join(' → ') || 'Trip';
      const dist  = (t.start_odometer_km&&t.end_odometer_km) ? fmt(parseFloat(t.end_odometer_km)-parseFloat(t.start_odometer_km))+' km' : '';
      const meta  = [t.driver_name,t.event_name,fmtDate(t.departure_at)].filter(Boolean).join(' · ');
      return `<div class="trip-row">
        <div class="trip-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a0d2e" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 12l4-4M3 12l4 4M21 12l-4-4M21 12l-4 4"/></svg></div>
        <div class="trip-info">
          <div class="trip-route">${esc(route)}</div>
          ${meta?`<div class="trip-meta">${esc(meta)}</div>`:''}
        </div>
        ${dist?`<div class="trip-dist">${dist}</div>`:''}
        <button class="trip-del-btn" onclick="deleteTrip('${esc(currentVehicleId)}','${esc(t.id)}')" title="Delete">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  async function deleteTrip(truckId, tripId) {
    if (!confirm('Remove this trip?')) return;
    try { await fetch(`${API}/api/trucks/${truckId}/trips/${tripId}`,{method:'DELETE',headers:ah()}); loadTrips(truckId); } catch {}
  }

  function showDrawer() {
    document.getElementById('drawerOverlay').classList.add('active');
    document.getElementById('detailDrawer').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeDrawer() {
    document.getElementById('drawerOverlay').classList.remove('active');
    document.getElementById('detailDrawer').classList.remove('open');
    document.body.style.overflow = '';
    currentVehicleId = null;
  }

  function populateTripDropdowns(lockVehicleId) {
    const vs = document.getElementById('tripVehicleId');
    vs.innerHTML = '<option value="">Select vehicle…</option>' +
      allVehicles.map(v=>`<option value="${esc(v.id)}">${esc(v.name||v.registration)}</option>`).join('');
    const vRow = document.getElementById('tripVehicleRow');
    if (lockVehicleId) { vs.value=lockVehicleId; vRow.style.display='none'; } else { vRow.style.display=''; }

    document.getElementById('tripDriverName').innerHTML = '<option value="">— unassigned —</option>' +
      allDrivers.map(d=>`<option value="${esc(d.name||(d.first_name+' '+(d.last_name||'')).trim())}">${esc(d.name||(d.first_name+' '+(d.last_name||'')).trim())}</option>`).join('');

    const events = [...allEvents].sort((a,b)=>(b.startDate||b.start_date||'').localeCompare(a.startDate||a.start_date||''));
    document.getElementById('tripEventId').innerHTML = '<option value="">— no event —</option>' +
      events.slice(0,30).map(e=>`<option value="${esc(e.id)}">${esc(e.name||e.title||'Untitled')}${(e.startDate||e.start_date)?' ('+fmtDate(e.startDate||e.start_date)+')':''}</option>`).join('');

    const now = new Date(); now.setSeconds(0,0);
    document.getElementById('tripDepartureAt').value = toLocalISO(now);
    ['tripArrivalAt','tripFrom','tripTo','tripNotes'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('tripStartOdo').value = '';
    document.getElementById('tripEndOdo').value   = '';
    document.getElementById('tripDistPreview').style.display = 'none';

    if (lockVehicleId) {
      const veh = allVehicles.find(v=>String(v.id)===String(lockVehicleId));
      if (veh && veh.current_odometer_km != null) document.getElementById('tripStartOdo').value = veh.current_odometer_km;
    }
  }

  ['tripStartOdo','tripEndOdo'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      const s = parseFloat(document.getElementById('tripStartOdo').value);
      const e = parseFloat(document.getElementById('tripEndOdo').value);
      const prev = document.getElementById('tripDistPreview');
      if (!isNaN(s) && !isNaN(e) && e > s) { document.getElementById('tripDistKm').textContent=fmt(e-s); prev.style.display=''; }
      else prev.style.display='none';
    });
  });

  function openTripSheetForVehicle(vehicleId) {
    closeDrawer();
    populateTripDropdowns(vehicleId);
    openTripSheet();
  }
  function openNewTripSheet() {
    populateTripDropdowns(null);
    openTripSheet();
  }
  function openTripSheet() {
    document.getElementById('tripSheetOverlay').classList.add('active');
    document.getElementById('tripSheet').classList.add('open');
    document.body.style.overflow = 'hidden';
  }
  function closeTripSheet() {
    document.getElementById('tripSheetOverlay').classList.remove('active');
    document.getElementById('tripSheet').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function saveTrip() {
    const truckId = document.getElementById('tripVehicleId').value || currentVehicleId;
    if (!truckId) { alert('Please select a vehicle.'); return; }
    const btn = document.getElementById('tripSaveBtn');
    btn.classList.add('loading'); btn.textContent = 'Saving…';
    const body = {
      event_id:          document.getElementById('tripEventId').value     || null,
      driver_name:       document.getElementById('tripDriverName').value  || null,
      departure_from:    document.getElementById('tripFrom').value.trim() || null,
      arrival_to:        document.getElementById('tripTo').value.trim()   || null,
      departure_at:      document.getElementById('tripDepartureAt').value || null,
      arrival_at:        document.getElementById('tripArrivalAt').value   || null,
      start_odometer_km: parseFloat(document.getElementById('tripStartOdo').value) || null,
      end_odometer_km:   parseFloat(document.getElementById('tripEndOdo').value)   || null,
      notes:             document.getElementById('tripNotes').value.trim() || null,
    };
    try {
      const res = await fetch(`${API}/api/trucks/${truckId}/trips`,{method:'POST',headers:ahj(),body:JSON.stringify(body)});
      if (!res.ok) throw new Error(await res.text());
      if (body.end_odometer_km) {
        const v = allVehicles.find(x=>String(x.id)===String(truckId));
        if (v) v.current_odometer_km = body.end_odometer_km;
        renderList();
      }
      closeTripSheet();
      openVehicle(truckId);
    } catch (e) {
      alert('Save failed: ' + e.message);
    } finally {
      btn.classList.remove('loading');
      btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" style="flex-shrink:0;"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Save Trip`;
    }
  }

  function esc(str) { if(str==null)return''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function fmt(n)   { if(n==null)return'—'; return Number(n).toLocaleString('en-ZA',{maximumFractionDigits:1}); }
  function fmtDate(d) { if(!d)return''; const dt=new Date(d); if(isNaN(dt))return''; return dt.toLocaleDateString('en-ZA',{day:'numeric',month:'short',year:'numeric'}); }
  function toLocalISO(d) { const p=n=>String(n).padStart(2,'0'); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`; }

  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
  init();
</script>
</body>
</html>
