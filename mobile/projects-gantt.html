<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Gantt Plans · Race Team OS</title>
  <link rel="stylesheet" href="mobile.css">
  <script src="mobile-auth.js"></script>
</head>
<body>
<div class="app">
  <header class="app-header">
    <div class="offline-banner" id="offlineBanner">Offline — showing cached data</div>
    <div class="page-bar"><div class="page-bar-brand" onclick="window.location.href='browse.html?tab=projects'" style="cursor:pointer;"><div class="page-bar-mark">RT</div><span class="page-bar-title">Gantt Plans</span></div></div>
    <div class="pill-strip" style="padding-top:10px;padding-bottom:12px;"><a href="projects-dashboard.html" class="pill" style="text-decoration:none;">Overview</a><a href="projects-list.html" class="pill" style="text-decoration:none;">Projects</a><a href="projects-gantt.html" class="pill pill-active" style="text-decoration:none;">Gantt</a><a href="milestones.html" class="pill" style="text-decoration:none;">Milestones</a><a href="projects-workload.html" class="pill" style="text-decoration:none;">Workload</a><a href="projects-reports.html" class="pill" style="text-decoration:none;">Reports</a><a href="runbooks.html" class="pill" style="text-decoration:none;">Runbooks</a></div>
    <div style="padding:12px 16px 14px;display:grid;gap:8px;"><select id="planSelect" style="width:100%;height:38px;border:1px solid var(--border);border-radius:var(--r);padding:0 10px;background:#fff;font-size:14px;"></select><div id="planSummary" style="font-size:12px;color:var(--text-3);"></div></div>
  </header>
  <main class="app-body"><div id="taskList"></div></main>
  <nav class="app-nav"><div class="nav-bar"><a href="dashboard.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><polyline points="9 21 9 12 15 12 15 21"/></svg></span><span class="nav-label">Dashboard</span><div class="nav-dot"></div></a><a href="browse.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span><span class="nav-label">Logistics</span><div class="nav-dot"></div></a><a href="browse.html?tab=sporting" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span class="nav-label">Sporting</span><div class="nav-dot"></div></a><a href="browse.html?tab=projects" class="nav-item active"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="3" y1="5" x2="21" y2="5"/><rect x="4" y="8" width="9" height="3" rx="1"/><rect x="8" y="14" width="8" height="3" rx="1"/><line x1="3" y1="20" x2="21" y2="20"/></svg></span><span class="nav-label">Projects</span><div class="nav-dot"></div></a><a href="browse.html?tab=academy" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M2 9l10-5 10 5-10 5-10-5z"/><path d="M6 11.5v4.5c0 1.6 2.7 3 6 3s6-1.4 6-3v-4.5"/></svg></span><span class="nav-label">Academy</span><div class="nav-dot"></div></a><a href="vehicles.html?log=1" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 10l1-3a2 2 0 0 1 1.9-1.4h12.2A2 2 0 0 1 20 7l1 3v7H3v-7z"/></svg></span><span class="nav-label">Log Trip</span><div class="nav-dot"></div></a><a href="scan.html" class="nav-item"><span class="nav-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><line x1="7" y1="12" x2="17" y2="12"/></svg></span><span class="nav-label">Scan</span><div class="nav-dot"></div></a></div></nav>
</div>

<style>
  .task-card { padding:14px 16px; border-bottom:1px solid var(--border); background:#fff; }
  .task-title { font-size:14px; font-weight:700; color:var(--text); }
  .task-meta { font-size:12px; color:var(--text-3); margin-top:4px; line-height:1.45; }
  .task-row { display:flex; gap:8px; align-items:center; margin-top:8px; }
  .task-tag { display:inline-block; font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; background:#eef2ff; color:#4338ca; }
  .task-tag.done { background:#dcfce7; color:#166534; }
  .task-tag.blocked { background:#fee2e2; color:#991b1b; }
</style>

<script>
(() => {
  'use strict';
  if (!localStorage.getItem('auth_token')) window.location.replace('index.html');
  let plans = [];
  let tasks = [];
  let selected = '';
  function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function setOffline(){ document.getElementById('offlineBanner').classList.toggle('visible', !navigator.onLine); }
  function fmtDate(v){ if (!v) return '—'; return new Date(String(v).slice(0,10) + 'T12:00:00').toLocaleDateString('en-GB', { day:'numeric', month:'short' }); }
  function renderTasks(){
    const plan = plans.find(p => String(p.id) === String(selected));
    document.getElementById('planSummary').textContent = plan ? ((plan.name || 'Project') + ' · ' + tasks.length + ' tasks') : 'Choose a project plan';
    document.getElementById('taskList').innerHTML = tasks.length ? tasks.map(task => {
      const cls = task.status === 'completed' ? 'done' : task.status === 'blocked' || task.status === 'waiting_on' ? 'blocked' : '';
      return '<div class="task-card">' +
        '<div class="task-title">' + esc(task.title || 'Untitled task') + '</div>' +
        '<div class="task-meta">' + esc(task.assignee_name || 'Unassigned') + ' · ' + esc(fmtDate(task.start_date)) + ' to ' + esc(fmtDate(task.end_date)) + '</div>' +
        '<div class="task-row"><span class="task-tag ' + cls + '">' + esc(task.status || 'planned') + '</span>' + (task.is_milestone ? '<span class="task-tag">Milestone</span>' : '') + (task.department ? '<span class="task-tag">' + esc(task.department) + '</span>' : '') + '</div>' +
      '</div>';
    }).join('') : '<div class="empty-state"><div class="empty-state-title">No tasks loaded</div><div class="empty-state-sub">Select a plan to view its task breakdown.</div></div>';
  }
  function loadTasks(){
    if (!selected) { tasks = []; renderTasks(); return; }
    mobileFetch('/api/project-plans/' + encodeURIComponent(selected) + '/tasks').then(data => { tasks = Array.isArray(data) ? data : (data.data || []); renderTasks(); }).catch(() => { tasks = []; renderTasks(); });
  }
  mobileFetch('/api/project-plans').then(data => {
    plans = Array.isArray(data) ? data : (data.data || []);
    const select = document.getElementById('planSelect');
    select.innerHTML = '<option value="">Select a plan…</option>' + plans.map(plan => '<option value="' + esc(plan.id) + '">' + esc(plan.name || 'Untitled project') + '</option>').join('');
    if (plans[0]) { selected = String(plans[0].id); select.value = selected; loadTasks(); } else { renderTasks(); }
    select.addEventListener('change', e => { selected = e.target.value; loadTasks(); });
  });
  window.addEventListener('online', setOffline); window.addEventListener('offline', setOffline); setOffline();
})();
</script>
<script src="mobile-side-menu.js"></script>
</body>
</html>
