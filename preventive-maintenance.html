<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Preventive Maintenance</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .rts-main{padding:1.5rem;}
    .ev-stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.25rem;}
    .ev-stat-card{background:#fff;border-radius:10px;padding:1rem 1.5rem;box-shadow:0 2px 8px rgba(0,0,0,.08);min-width:120px;border-top:4px solid #0ea5e9;}
    .ev-stat-label{font-size:.72rem;text-transform:uppercase;color:#6b7280;font-weight:600;letter-spacing:.05em;}
    .ev-stat-value{font-size:1.8rem;font-weight:800;color:#1f2937;line-height:1.1;}
    .toolbar{display:flex;gap:.75rem;flex-wrap:wrap;align-items:flex-end;margin-bottom:1rem;}
    .toolbar .flabel{font-size:.7rem;font-weight:700;color:#6b7280;text-transform:uppercase;display:block;margin-bottom:.2rem;}
    .card-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
    @media(max-width:1100px){.card-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:700px){.card-grid{grid-template-columns:1fr;}}
    .pm-card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);border:2px solid transparent;padding:1.1rem 1.2rem;cursor:pointer;transition:box-shadow .15s,border-color .15s;position:relative;}
    .pm-card:hover{box-shadow:0 4px 16px rgba(14,165,233,.15);}
    .pm-card.overdue-card{border-color:#ef4444!important;background:#fff5f5;}
    .pm-card.selected{border-color:#0ea5e9!important;box-shadow:0 0 0 3px rgba(14,165,233,.2);}
    .pm-card .card-component{font-size:.95rem;font-weight:700;color:#1f2937;margin-bottom:.2rem;}
    .pm-card .card-car{font-size:.78rem;color:#6b7280;margin-bottom:.5rem;}
    .pm-card .card-desc{font-size:.8rem;color:#4b5563;margin-bottom:.75rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
    .pm-card .card-meta{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.6rem;}
    .pm-card .card-footer-row{display:flex;justify-content:space-between;align-items:center;margin-top:.5rem;padding-top:.5rem;border-top:1px solid #f3f4f6;font-size:.78rem;color:#6b7280;}
    .bp{display:inline-block;padding:.18rem .6rem;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;}
    .st-active{background:#d1fae5;color:#065f46;}
    .st-overdue{background:#fee2e2;color:#991b1b;}
    .st-completed{background:#dbeafe;color:#1d4ed8;}
    .st-suspended{background:#f3f4f6;color:#6b7280;}
    .p-low{background:#f0fdf4;color:#166534;}
    .p-normal{background:#eff6ff;color:#1d4ed8;}
    .p-high{background:#fef3c7;color:#92400e;}
    .p-critical{background:#fee2e2;color:#991b1b;}
    .page-title{font-weight:800;color:#0ea5e9;letter-spacing:-.01em;}
    .modal-header-accent{background:#0ea5e9;color:#fff;}
    .modal-header-accent .btn-close{filter:invert(1);}
    .empty-state{text-align:center;padding:3rem;color:#9ca3af;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <h2 class="page-title mb-0">Preventive Maintenance</h2>
      <div class="text-secondary small mt-1">Scheduled maintenance tasks, interval tracking and overdue alerts.</div>
    </div>
    <button class="btn btn-sm fw-semibold" style="background:#0ea5e9;color:#fff;padding:.4rem 1.1rem" onclick="openModal()">+ New Task</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Overdue</div><div class="ev-stat-value" style="color:#ef4444" id="kpiOverdue">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Due This Week</div><div class="ev-stat-value" style="color:#f59e0b" id="kpiDueWeek">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Active</div><div class="ev-stat-value" style="color:#0ea5e9" id="kpiActive">—</div></div>
  </div>

  <div class="toolbar">
    <div>
      <span class="flabel">Status</span>
      <select class="form-select form-select-sm" id="fltStatus" onchange="applyFilters()">
        <option value="">All</option>
        <option value="active">Active</option>
        <option value="overdue">Overdue</option>
        <option value="completed">Completed</option>
        <option value="suspended">Suspended</option>
      </select>
    </div>
    <div>
      <span class="flabel">Car #</span>
      <select class="form-select form-select-sm" id="fltCar" onchange="applyFilters()">
        <option value="">All</option>
      </select>
    </div>
    <div>
      <span class="flabel">Priority</span>
      <select class="form-select form-select-sm" id="fltPriority" onchange="applyFilters()">
        <option value="">All</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="normal">Normal</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div>
      <span class="flabel">Sort By</span>
      <select class="form-select form-select-sm" id="sortBy" onchange="applyFilters()">
        <option value="next_due_date">Next Due Date</option>
        <option value="car_number">Car #</option>
        <option value="priority">Priority</option>
      </select>
    </div>
    <div>
      <span class="flabel">Search</span>
      <input type="text" class="form-control form-control-sm" id="fltSearch" placeholder="Component…" oninput="applyFilters()" style="min-width:150px;">
    </div>
    <div style="margin-top:auto;">
      <button class="btn btn-sm btn-outline-secondary" onclick="clearFilters()">Clear</button>
    </div>
  </div>

  <div class="card-grid" id="cardGrid">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="crudModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header modal-header-accent">
        <h5 class="modal-title" id="modalTitle">New PM Task</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="crudForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold small">Component <span class="text-danger">*</span></label>
              <input type="text" class="form-control form-control-sm" id="fComponent" required/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Car Number</label>
              <input type="text" class="form-control form-control-sm" id="fCarNumber"/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Assigned To</label>
              <input type="text" class="form-control form-control-sm" id="fAssignedTo"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Task Description <span class="text-danger">*</span></label>
              <textarea class="form-control form-control-sm" id="fTaskDescription" rows="3" required></textarea>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Interval Type</label>
              <select class="form-select form-select-sm" id="fIntervalType">
                <option value="laps">Laps</option>
                <option value="hours">Hours</option>
                <option value="events">Events</option>
                <option value="calendar_days">Calendar Days</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Interval Value <span class="text-danger">*</span></label>
              <input type="number" class="form-control form-control-sm" id="fIntervalValue" min="1" required/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Priority</label>
              <select class="form-select form-select-sm" id="fPriority">
                <option value="low">Low</option>
                <option value="normal">Normal</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Last Done Date</label>
              <input type="date" class="form-control form-control-sm" id="fLastDoneDate"/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Last Done Laps</label>
              <input type="number" class="form-control form-control-sm" id="fLastDoneLaps" min="0"/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Next Due Date</label>
              <input type="date" class="form-control form-control-sm" id="fNextDueDate"/>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-semibold small">Next Due Laps</label>
              <input type="number" class="form-control form-control-sm" id="fNextDueLaps" min="0"/>
            </div>
            <div class="col-md-4">
              <label class="form-label fw-semibold small">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="active">Active</option>
                <option value="overdue">Overdue</option>
                <option value="completed">Completed</option>
                <option value="suspended">Suspended</option>
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold small">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm fw-semibold" style="background:#0ea5e9;color:#fff" onclick="saveRecord()">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API = '/api/preventive-maintenance';
let allData = [], selectedId = null;
const bsModal = new bootstrap.Modal(document.getElementById('crudModal'));
const TODAY = new Date().toISOString().split('T')[0];
const WEEK_LATER = new Date(Date.now()+7*864e5).toISOString().split('T')[0];
const PRIO_ORDER = ['critical','high','normal','low'];

async function load() {
  try { const r = await fetch(API); allData = await r.json(); } catch(e) { allData = []; }
  updateKPIs(); populateCarFilter(); applyFilters();
}

function isOverdue(r) {
  return r.next_due_date && r.next_due_date.split('T')[0] < TODAY && r.status !== 'completed' && r.status !== 'suspended';
}
function isDueThisWeek(r) {
  if (!r.next_due_date) return false;
  const d = r.next_due_date.split('T')[0];
  return d >= TODAY && d <= WEEK_LATER && r.status === 'active';
}

function updateKPIs() {
  document.getElementById('kpiTotal').textContent = allData.length;
  document.getElementById('kpiOverdue').textContent = allData.filter(isOverdue).length;
  document.getElementById('kpiDueWeek').textContent = allData.filter(isDueThisWeek).length;
  document.getElementById('kpiActive').textContent = allData.filter(x=>x.status==='active').length;
}

function populateCarFilter() {
  const sel = document.getElementById('fltCar');
  const stored = sel.value;
  const cars = [...new Set(allData.map(x=>x.car_number).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">All</option>' + cars.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  sel.value = stored;
}

function applyFilters() {
  const st = document.getElementById('fltStatus').value;
  const car = document.getElementById('fltCar').value;
  const pr = document.getElementById('fltPriority').value;
  const q = document.getElementById('fltSearch').value.toLowerCase();
  const sortKey = document.getElementById('sortBy').value;
  let filtered = allData.filter(r => {
    if (st && r.status !== st) return false;
    if (car && r.car_number !== car) return false;
    if (pr && r.priority !== pr) return false;
    if (q && !(r.component||'').toLowerCase().includes(q)) return false;
    return true;
  });
  filtered.sort((a,b) => {
    if (sortKey === 'priority') return PRIO_ORDER.indexOf(a.priority) - PRIO_ORDER.indexOf(b.priority);
    if (sortKey === 'car_number') return (a.car_number||'').localeCompare(b.car_number||'');
    const da = a.next_due_date||'9999'; const db = b.next_due_date||'9999';
    return da.localeCompare(db);
  });
  renderCards(filtered);
}

function clearFilters() {
  ['fltStatus','fltCar','fltPriority','fltSearch'].forEach(id=>{document.getElementById(id).value='';});
  applyFilters();
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return '—';return String(d).split('T')[0];}

function stBadge(s){
  const m={active:'st-active',overdue:'st-overdue',completed:'st-completed',suspended:'st-suspended'};
  const l={active:'Active',overdue:'Overdue',completed:'Completed',suspended:'Suspended'};
  return `<span class="bp ${m[s]||'st-active'}">${l[s]||esc(s)||'—'}</span>`;
}
function pBadge(s){
  const m={low:'p-low',normal:'p-normal',high:'p-high',critical:'p-critical'};
  const l={low:'Low',normal:'Normal',high:'High',critical:'Critical'};
  return `<span class="bp ${m[s]||'p-normal'}">${l[s]||esc(s)||'—'}</span>`;
}

function renderCards(filtered) {
  const grid = document.getElementById('cardGrid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No maintenance tasks match your filters.</div>';
    return;
  }
  grid.innerHTML = filtered.map(r => {
    const overdue = isOverdue(r);
    const intLabel = r.interval_value ? `Every ${r.interval_value} ${r.interval_type||''}` : '—';
    return `<div class="pm-card ${overdue?'overdue-card':''} ${selectedId===r.id?'selected':''}" onclick="selectCard(${r.id})">
      <div class="card-component">${esc(r.component)||'—'}</div>
      <div class="card-car">${r.car_number?'Car #'+esc(r.car_number):'No car assigned'}</div>
      <div class="card-desc">${esc(r.task_description)||'No description.'}</div>
      <div class="card-meta">${stBadge(r.status)} ${pBadge(r.priority)}<span class="bp" style="background:#f3f4f6;color:#374151;">${esc(intLabel)}</span></div>
      <div class="card-footer-row">
        <span>Next due: <strong>${fmtDate(r.next_due_date)}${r.next_due_laps?' / '+r.next_due_laps+' laps':''}</strong></span>
        <div class="d-flex gap-1 align-items-center">
          ${r.assigned_to?`<span class="text-muted small">${esc(r.assigned_to)}</span>`:''}
          <button class="btn btn-xs btn-outline-primary" style="padding:.1rem .5rem;font-size:.72rem" onclick="event.stopPropagation();editById(${r.id})">Edit</button>
          <button class="btn btn-xs btn-outline-danger" style="padding:.1rem .5rem;font-size:.72rem" onclick="event.stopPropagation();deleteById(${r.id})">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function selectCard(id) {
  selectedId = id;
  document.querySelectorAll('.pm-card').forEach(c=>{
    const m = c.getAttribute('onclick').match(/selectCard\((\d+)\)/);
    if(m) c.classList.toggle('selected', parseInt(m[1])===id);
  });
}

function editById(id) { const r=allData.find(x=>x.id===id); if(r) openModal(r); }

function openModal(r) {
  document.getElementById('crudForm').reset();
  document.getElementById('fId').value = '';
  document.getElementById('modalTitle').textContent = r ? 'Edit PM Task' : 'New PM Task';
  if (r) {
    document.getElementById('fId').value = r.id||'';
    document.getElementById('fComponent').value = r.component||'';
    document.getElementById('fCarNumber').value = r.car_number||'';
    document.getElementById('fTaskDescription').value = r.task_description||'';
    document.getElementById('fIntervalType').value = r.interval_type||'laps';
    document.getElementById('fIntervalValue').value = r.interval_value!=null?r.interval_value:'';
    document.getElementById('fLastDoneDate').value = r.last_done_date?r.last_done_date.split('T')[0]:'';
    document.getElementById('fLastDoneLaps').value = r.last_done_laps!=null?r.last_done_laps:'';
    document.getElementById('fNextDueDate').value = r.next_due_date?r.next_due_date.split('T')[0]:'';
    document.getElementById('fNextDueLaps').value = r.next_due_laps!=null?r.next_due_laps:'';
    document.getElementById('fAssignedTo').value = r.assigned_to||'';
    document.getElementById('fPriority').value = r.priority||'normal';
    document.getElementById('fStatus').value = r.status||'active';
    document.getElementById('fNotes').value = r.notes||'';
  }
  bsModal.show();
}

async function saveRecord() {
  const comp = document.getElementById('fComponent');
  const desc = document.getElementById('fTaskDescription');
  const intv = document.getElementById('fIntervalValue');
  if (!comp.value.trim()||!desc.value.trim()||!intv.value) {
    if(!comp.value.trim()) comp.classList.add('is-invalid');
    if(!desc.value.trim()) desc.classList.add('is-invalid');
    if(!intv.value) intv.classList.add('is-invalid');
    return;
  }
  [comp,desc,intv].forEach(el=>el.classList.remove('is-invalid'));
  const id = document.getElementById('fId').value;
  const body = {
    component: comp.value.trim(),
    car_number: document.getElementById('fCarNumber').value||null,
    task_description: desc.value.trim(),
    interval_type: document.getElementById('fIntervalType').value,
    interval_value: parseInt(intv.value),
    last_done_date: document.getElementById('fLastDoneDate').value||null,
    last_done_laps: document.getElementById('fLastDoneLaps').value!==''?parseInt(document.getElementById('fLastDoneLaps').value):null,
    next_due_date: document.getElementById('fNextDueDate').value||null,
    next_due_laps: document.getElementById('fNextDueLaps').value!==''?parseInt(document.getElementById('fNextDueLaps').value):null,
    assigned_to: document.getElementById('fAssignedTo').value||null,
    priority: document.getElementById('fPriority').value,
    status: document.getElementById('fStatus').value,
    notes: document.getElementById('fNotes').value||null
  };
  try {
    const r = await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if (!r.ok) throw new Error(await r.text());
    bsModal.hide(); await load();
  } catch(e) { alert('Save failed: '+e.message); }
}

async function deleteById(id) {
  if (!confirm('Delete this maintenance task?')) return;
  try {
    const r = await fetch(`${API}/${id}`,{method:'DELETE'});
    if (!r.ok) throw new Error();
    if(selectedId===id) selectedId=null;
    await load();
  } catch(e) { alert('Delete failed.'); }
}

load();
</script>
</body>
</html>
