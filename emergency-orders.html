<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Emergency Orders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 18px;min-width:120px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
    .ev-stat-value{font-size:1.6rem;font-weight:700;color:#1a1d24;}
    .main-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;overflow:hidden;}
    .main-card-hdr{padding:10px 14px;background:#f8f9fa;border-bottom:1px solid #dee2e6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
    .data-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .data-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .data-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;border-bottom:2px solid #dee2e6;white-space:nowrap;}
    .data-table td{padding:7px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;}
    .data-table tbody tr{cursor:pointer;transition:background .1s;}
    .data-table tbody tr:hover{background:#fff1f2;}
    .data-table tbody tr.overdue td{background:rgba(239,68,68,.07);}
    .data-table tbody tr.overdue:hover td{background:rgba(239,68,68,.14);}
    .filter-pill{padding:4px 12px;border-radius:20px;font-size:.75rem;cursor:pointer;border:1px solid #dee2e6;background:#fff;color:#495057;transition:all .15s;}
    .filter-pill.active{background:#ef4444;border-color:#ef4444;color:#fff;font-weight:600;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Emergency Orders</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Urgent procurement requests outside normal cycle</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#ef4444;border-color:#ef4444;">+ New Emergency Order</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #3b82f6;"><div class="ev-stat-label">Awaiting Delivery</div><div class="ev-stat-value" id="kpiAwaiting">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #ef4444;"><div class="ev-stat-label">Overdue</div><div class="ev-stat-value" id="kpiOverdue">—</div></div>
    <div class="ev-stat-card" style="border-left:3px solid #f59e0b;"><div class="ev-stat-label">Total Spend</div><div class="ev-stat-value" id="kpiSpend">—</div></div>
  </div>

  <div class="d-flex gap-2 mb-3 flex-wrap align-items-center">
    <span class="filter-pill active" data-val="">All</span>
    <span class="filter-pill" data-val="placed">Placed</span>
    <span class="filter-pill" data-val="confirmed">Confirmed</span>
    <span class="filter-pill" data-val="in_transit">In Transit</span>
    <span class="filter-pill" data-val="received">Received</span>
    <span class="filter-pill" data-val="cancelled">Cancelled</span>
    <input type="search" class="form-control form-control-sm ms-auto" id="searchBox" placeholder="Search…" style="width:200px;"/>
  </div>

  <div class="main-card">
    <div class="main-card-hdr">
      <small style="font-size:.7rem;font-weight:700;text-transform:uppercase;color:#6c757d;letter-spacing:.5px;">Orders — Newest First</small>
      <small id="rowCount" class="text-muted" style="font-size:.75rem;">0 records</small>
    </div>
    <div style="overflow-y:auto;max-height:calc(100vh - 370px);">
      <table class="data-table">
        <thead><tr><th>Supplier</th><th>Description</th><th>Reason</th><th>Qty</th><th>Total Cost</th><th>Ordered</th><th>Required By</th><th>Approved By</th><th>Status</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal fade" id="eoModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header" style="background:#ef4444;color:#fff;">
        <h5 class="modal-title" id="modalTitle">New Emergency Order</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="eoForm" class="row g-3" onsubmit="return false">
          <div class="col-md-6"><label class="form-label small fw-semibold">Supplier ID</label><input class="form-control form-control-sm" id="fSupplierId"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Supplier Name *</label><input class="form-control form-control-sm" id="fSupplierName"/></div>
          <div class="col-12"><label class="form-label small fw-semibold">Description *</label><textarea class="form-control form-control-sm" id="fDescription" rows="2"></textarea></div>
          <div class="col-12"><label class="form-label small fw-semibold">Reason *</label><textarea class="form-control form-control-sm" id="fReason" rows="2"></textarea></div>
          <div class="col-md-4"><label class="form-label small fw-semibold">Quantity</label><input type="number" class="form-control form-control-sm" id="fQuantity" min="0"/></div>
          <div class="col-md-4"><label class="form-label small fw-semibold">Unit Cost</label><input type="number" class="form-control form-control-sm" id="fUnitCost" step="0.01" min="0"/></div>
          <div class="col-md-4"><label class="form-label small fw-semibold">Total Cost <span class="text-muted fw-normal">(auto)</span></label><input type="number" class="form-control form-control-sm" id="fTotalCost" step="0.01" min="0"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Ordered Date</label><input type="date" class="form-control form-control-sm" id="fOrderedDate"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Required By</label><input type="date" class="form-control form-control-sm" id="fRequiredBy"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Status</label>
            <select class="form-select form-select-sm" id="fStatus">
              <option value="placed">Placed</option><option value="confirmed">Confirmed</option>
              <option value="in_transit">In Transit</option><option value="received">Received</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Approved By</label><input class="form-control form-control-sm" id="fApprovedBy"/></div>
          <div class="col-12"><label class="form-label small fw-semibold">Notes</label><textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Created By</label><input class="form-control form-control-sm" id="fCreatedBy"/></div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-sm btn-danger me-auto" id="btnDel" style="display:none;">Delete</button>
        <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-sm text-white" id="btnSave" style="background:#ef4444;border-color:#ef4444;">Save Order</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/emergency-orders';
let all=[],sel=null,filtStatus='';
const modal=new bootstrap.Modal(document.getElementById('eoModal'));
const gv=id=>(document.getElementById(id)||{}).value||'';
const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.value=v??'';};
const TODAY_STR=new Date().toISOString().slice(0,10);
const fmt=v=>v!=null?parseFloat(v).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}):'—';
const statusBadge=s=>{const m={placed:'primary',confirmed:'warning',in_transit:'info',received:'success',cancelled:'secondary'};return`<span class="badge bg-${m[s]||'secondary'}">${(s||'—').replace('_',' ')}</span>`;};

function isOverdue(row){
  if(!row.required_by)return false;
  if(row.status==='received'||row.status==='cancelled')return false;
  return row.required_by<TODAY_STR;
}

async function load(){
  try{const r=await fetch(API);const j=await r.json();
    all=Array.isArray(j)?j:(j.data||[]);
    // Sort by ordered_date desc
    all.sort((a,b)=>(b.ordered_date||'').localeCompare(a.ordered_date||''));
    updateKPIs();render();}
  catch(e){console.error(e);}
}

function updateKPIs(){
  document.getElementById('kpiTotal').textContent=all.length;
  document.getElementById('kpiAwaiting').textContent=all.filter(x=>['placed','confirmed','in_transit'].includes(x.status)).length;
  document.getElementById('kpiOverdue').textContent=all.filter(isOverdue).length;
  const spend=all.reduce((a,x)=>a+Number(x.total_cost||0),0);
  document.getElementById('kpiSpend').textContent='£'+fmt(spend);
}

function render(){
  const q=document.getElementById('searchBox').value.toLowerCase();
  let d=filtStatus?all.filter(x=>x.status===filtStatus):[...all];
  if(q) d=d.filter(x=>JSON.stringify(x).toLowerCase().includes(q));
  document.getElementById('rowCount').textContent=d.length+' records';
  document.getElementById('tbody').innerHTML=d.length
    ?d.map(row=>`<tr data-id="${row.id}" class="${isOverdue(row)?'overdue':''}">
        <td class="fw-semibold">${row.supplier_name||'—'}</td>
        <td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${row.description||'—'}</td>
        <td style="max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${row.reason||'—'}</td>
        <td>${row.quantity??'—'}</td>
        <td>${row.total_cost!=null?'£'+fmt(row.total_cost):'—'}</td>
        <td>${row.ordered_date||'—'}</td>
        <td>${row.required_by?`<span${isOverdue(row)?' style="color:#ef4444;font-weight:600;"':''}>⚠ ${row.required_by}</span>`:'—'}</td>
        <td>${row.approved_by||'—'}</td>
        <td>${statusBadge(row.status)}</td>
      </tr>`).join('')
    :'<tr><td colspan="9" class="text-center text-muted py-4">No emergency orders found</td></tr>';
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr=>tr.onclick=()=>{
    const item=all.find(x=>String(x.id)===tr.dataset.id);if(item)openEdit(item);
  });
}

function openNew(){
  sel=null;document.getElementById('eoForm').reset();
  sv('fOrderedDate',TODAY_STR);sv('fStatus','placed');
  document.getElementById('modalTitle').textContent='New Emergency Order';
  document.getElementById('btnDel').style.display='none';modal.show();
}

function openEdit(item){
  sel=item;document.getElementById('modalTitle').textContent='Edit Emergency Order';
  document.getElementById('btnDel').style.display='';
  sv('fSupplierId',item.supplier_id);sv('fSupplierName',item.supplier_name);
  sv('fDescription',item.description);sv('fReason',item.reason);
  sv('fQuantity',item.quantity);sv('fUnitCost',item.unit_cost);sv('fTotalCost',item.total_cost);
  sv('fOrderedDate',item.ordered_date);sv('fRequiredBy',item.required_by);
  sv('fStatus',item.status||'placed');sv('fApprovedBy',item.approved_by);
  sv('fNotes',item.notes);sv('fCreatedBy',item.created_by);
  modal.show();
}

function autoCalcTotal(){
  const u=parseFloat(gv('fUnitCost'))||0;const q=parseFloat(gv('fQuantity'))||0;
  if(u&&q) sv('fTotalCost',(u*q).toFixed(2));
}

async function save(){
  const body={supplier_id:gv('fSupplierId')||null,supplier_name:gv('fSupplierName'),
    description:gv('fDescription'),reason:gv('fReason'),quantity:gv('fQuantity')||null,
    unit_cost:gv('fUnitCost')||null,total_cost:gv('fTotalCost')||null,
    ordered_date:gv('fOrderedDate')||null,required_by:gv('fRequiredBy')||null,
    status:gv('fStatus')||'placed',approved_by:gv('fApprovedBy'),
    notes:gv('fNotes'),created_by:gv('fCreatedBy')};
  if(!body.supplier_name||!body.description||!body.reason){alert('Supplier Name, Description and Reason are required');return;}
  try{
    const url=sel?`${API}/${sel.id}`:API;const method=sel?'PUT':'POST';
    const r=await fetch(url,{method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){modal.hide();await load();}else alert('Save failed');
  }catch(e){console.error(e);alert('Save failed');}
}

async function del(){
  if(!sel||!confirm('Delete this emergency order?'))return;
  try{const r=await fetch(`${API}/${sel.id}`,{method:'DELETE'});if(r.ok){modal.hide();await load();}else alert('Delete failed');}
  catch(e){console.error(e);}
}

document.getElementById('btnAdd').onclick=openNew;
document.getElementById('btnSave').onclick=save;
document.getElementById('btnDel').onclick=del;
document.getElementById('searchBox').addEventListener('input',render);
document.getElementById('fUnitCost').addEventListener('input',autoCalcTotal);
document.getElementById('fQuantity').addEventListener('input',autoCalcTotal);
document.querySelectorAll('.filter-pill').forEach(p=>p.onclick=()=>{
  document.querySelectorAll('.filter-pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');filtStatus=p.dataset.val;render();
});
load();
</script>
</body>
</html>
