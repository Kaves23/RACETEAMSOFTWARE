<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Race Team OS – Junior Programme</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="style.css?v=20260420" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);min-height:100vh;}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:110px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}

    /* Pipeline */
    .pipeline-wrap{display:flex;gap:0;overflow-x:auto;padding-bottom:8px;}
    .pipeline-stage{flex:1 1 0;min-width:180px;}
    .stage-header{padding:10px 14px;border-radius:8px 8px 0 0;text-align:center;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;position:relative;}
    .stage-header::after{content:'›';position:absolute;right:-10px;top:50%;transform:translateY(-50%);font-size:1.4rem;color:#dee2e6;z-index:2;}
    .pipeline-stage:last-child .stage-header::after{display:none;}
    .sh-scouting{background:#ede9fe;color:#5b21b6;}
    .sh-academy{background:#dbeafe;color:#1e40af;}
    .sh-development{background:#d1fae5;color:#065f46;}
    .sh-reserve{background:#fef3c7;color:#92400e;}
    .sh-graduated{background:#d1fae5;color:#065f46;}

    .stage-body{border:1px solid #dee2e6;border-top:none;border-radius:0 0 8px 8px;min-height:200px;padding:8px;background:#fafafa;display:flex;flex-direction:column;gap:8px;}

    .driver-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .15s;}
    .driver-card:hover{border-color:#6366f1;box-shadow:0 2px 8px rgba(99,102,241,.15);transform:translateY(-1px);}
    .dc-name{font-size:.85rem;font-weight:700;color:#1a1d24;margin-bottom:3px;}
    .dc-meta{font-size:.72rem;color:#6c757d;margin-bottom:1px;}
    .dc-series{font-size:.72rem;font-weight:600;color:#6366f1;}
    .stage-empty{text-align:center;color:#9ca3af;font-size:.75rem;padding:20px 8px;}

    /* Released archive */
    .released-section{background:#fff;border:1px solid #dee2e6;border-radius:8px;padding:12px 16px;margin-top:16px;opacity:.7;}
    .released-header{font-size:.75rem;font-weight:700;text-transform:uppercase;color:#9ca3af;letter-spacing:.05em;margin-bottom:10px;}
    .released-grid{display:flex;flex-wrap:wrap;gap:8px;}
    .rc-card{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:8px 12px;font-size:.78rem;cursor:pointer;}
    .rc-card:hover{border-color:#6366f1;}
    .rc-name{font-weight:700;color:#6b7280;}
    .rc-meta{color:#9ca3af;font-size:.7rem;}
  </style>
</head>
<body class="light-mode">
<div id="rtsTopNav"></div>
<div class="rts-main container-fluid">
  <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
    <div>
      <h1 class="h4 mb-1">Junior Programme</h1>
      <p class="text-secondary mb-0" style="font-size:.85rem;">Driver development pipeline — scouting through graduation</p>
    </div>
    <button class="btn btn-sm text-white" id="btnAdd" style="background:#6366f1;border-color:#6366f1;">+ Add Driver</button>
  </div>

  <div class="ev-stats-bar">
    <div class="ev-stat-card"><div class="ev-stat-label">Total</div><div class="ev-stat-value" id="kpiTotal">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Active</div><div class="ev-stat-value" id="kpiActive">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Academy</div><div class="ev-stat-value" id="kpiAcademy">—</div></div>
    <div class="ev-stat-card"><div class="ev-stat-label">Development</div><div class="ev-stat-value" id="kpiDev">—</div></div>
  </div>

  <!-- Pipeline -->
  <div class="pipeline-wrap" id="pipelineWrap"></div>

  <!-- Released drivers archive -->
  <div class="released-section" id="releasedSection" style="display:none;">
    <div class="released-header">Released / Archive</div>
    <div class="released-grid" id="releasedGrid"></div>
  </div>
</div>

<!-- Detail/Edit Modal -->
<div class="modal fade" id="jModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header py-2" style="background:#6366f1;">
        <h6 class="modal-title text-white fw-bold" id="modalTitle">Add Driver</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="jForm" novalidate>
          <input type="hidden" id="fId"/>
          <div class="row g-2">
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Driver Name *</label>
              <input type="text" class="form-control form-control-sm" id="fDriverName" required/>
            </div>
            <div class="col-3">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Age</label>
              <input type="number" class="form-control form-control-sm" id="fAge" min="14" max="40"/>
            </div>
            <div class="col-3">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Nationality</label>
              <input type="text" class="form-control form-control-sm" id="fNationality" placeholder="e.g. British"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Current Series</label>
              <input type="text" class="form-control form-control-sm" id="fCurrentSeries"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Season *</label>
              <input type="text" class="form-control form-control-sm" id="fSeason" required/>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Programme Level</label>
              <select class="form-select form-select-sm" id="fProgrammeLevel">
                <option value="scouting">Scouting</option>
                <option value="academy">Academy</option>
                <option value="development">Development</option>
                <option value="reserve">Reserve</option>
                <option value="graduated">Graduated</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Status</label>
              <select class="form-select form-select-sm" id="fStatus">
                <option value="active">Active</option>
                <option value="on_hold">On Hold</option>
                <option value="graduated">Graduated</option>
                <option value="released">Released</option>
              </select>
            </div>
            <div class="col-4">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Coach Name</label>
              <input type="text" class="form-control form-control-sm" id="fCoachName"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Budget Support (£)</label>
              <input type="number" step="0.01" class="form-control form-control-sm" id="fBudgetSupport"/>
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Next Milestone</label>
              <input type="text" class="form-control form-control-sm" id="fNextMilestone"/>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Results Summary</label>
              <textarea class="form-control form-control-sm" id="fResultsSummary" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Development Areas</label>
              <textarea class="form-control form-control-sm" id="fDevelopmentAreas" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold" style="font-size:.78rem;">Notes</label>
              <textarea class="form-control form-control-sm" id="fNotes" rows="2"></textarea>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer py-2">
        <button type="button" class="btn btn-sm btn-danger me-auto d-none" id="btnDel">Delete</button>
        <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-sm text-white" id="btnSave" style="background:#6366f1;border-color:#6366f1;">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="topnav.js?v=20260420"></script>
<script src="core.js?v=20260420"></script>
<script>
const API='/api/junior-programme';
let allDrivers=[];
const modal=new bootstrap.Modal(document.getElementById('jModal'));

const STAGES=[
  {key:'scouting',label:'Scouting',cls:'sh-scouting'},
  {key:'academy',label:'Academy',cls:'sh-academy'},
  {key:'development',label:'Development',cls:'sh-development'},
  {key:'reserve',label:'Reserve',cls:'sh-reserve'},
  {key:'graduated',label:'Graduated',cls:'sh-graduated'}
];

const NAT_FLAGS={British:'🇬🇧',French:'🇫🇷',German:'🇩🇪',Italian:'🇮🇹',Spanish:'🇪🇸',Dutch:'🇳🇱',Belgian:'🇧🇪',Finnish:'🇫🇮',Swedish:'🇸🇪',Austrian:'🇦🇹',Swiss:'🇨🇭',American:'🇺🇸',Canadian:'🇨🇦',Australian:'🇦🇺',Japanese:'🇯🇵',Chinese:'🇨🇳',Brazilian:'🇧🇷',Mexican:'🇲🇽',Monegasque:'🇲🇨',Danish:'🇩🇰',Norwegian:'🇳🇴',Polish:'🇵🇱',Russian:'🇷🇺',Thai:'🇹🇭',Argentine:'🇦🇷',Colombian:'🇨🇴',Indian:'🇮🇳',Czech:'🇨🇿',Hungarian:'🇭🇺',Portuguese:'🇵🇹'};
function natFlag(n){return NAT_FLAGS[n]||'';}

function esc(s){return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function load(){
  try{const r=await fetch(API);if(r.ok)allDrivers=await r.json();}catch(e){allDrivers=[];}
  renderKPIs();
  renderPipeline();
}

function renderKPIs(){
  const active=allDrivers.filter(d=>d.status==='active');
  document.getElementById('kpiTotal').textContent=allDrivers.length;
  document.getElementById('kpiActive').textContent=active.length;
  document.getElementById('kpiAcademy').textContent=allDrivers.filter(d=>d.programme_level==='academy'&&d.status==='active').length;
  document.getElementById('kpiDev').textContent=allDrivers.filter(d=>d.programme_level==='development'&&d.status==='active').length;
}

function renderPipeline(){
  const pipeline=document.getElementById('pipelineWrap');
  pipeline.innerHTML=STAGES.map(stage=>{
    const drivers=allDrivers.filter(d=>d.programme_level===stage.key&&d.status!=='released');
    const cards=drivers.length?drivers.map(d=>`
      <div class="driver-card" onclick="openEdit(${d.id})">
        <div class="dc-name">${natFlag(d.nationality)} ${esc(d.driver_name||'')}</div>
        ${d.age?`<div class="dc-meta">Age: ${esc(String(d.age))}</div>`:''}
        ${d.current_series?`<div class="dc-series">${esc(d.current_series)}</div>`:''}
        ${d.coach_name?`<div class="dc-meta">Coach: ${esc(d.coach_name)}</div>`:''}
        ${d.season?`<div class="dc-meta">${esc(d.season)}</div>`:''}
      </div>`).join(''):`<div class="stage-empty">No drivers</div>`;
    return `<div class="pipeline-stage">
      <div class="stage-header ${stage.cls}">${stage.label} <span style="opacity:.7;margin-left:4px;">(${drivers.length})</span></div>
      <div class="stage-body">${cards}</div>
    </div>`;
  }).join('');

  // Released drivers
  const released=allDrivers.filter(d=>d.status==='released');
  const relSec=document.getElementById('releasedSection');
  if(released.length){
    relSec.style.display='block';
    document.getElementById('releasedGrid').innerHTML=released.map(d=>`
      <div class="rc-card" onclick="openEdit(${d.id})">
        <div class="rc-name">${natFlag(d.nationality)} ${esc(d.driver_name||'')}</div>
        <div class="rc-meta">${d.current_series?esc(d.current_series):''} ${d.season?`· ${esc(d.season)}`:''}</div>
      </div>`).join('');
  } else {
    relSec.style.display='none';
  }
}

function openNew(){
  document.getElementById('jForm').reset();
  document.getElementById('fId').value='';
  document.getElementById('fProgrammeLevel').value='scouting';
  document.getElementById('fStatus').value='active';
  document.getElementById('modalTitle').textContent='Add Driver';
  document.getElementById('btnDel').classList.add('d-none');
  modal.show();
}

function openEdit(id){
  const d=allDrivers.find(x=>x.id===id);if(!d)return;
  document.getElementById('fId').value=d.id;
  document.getElementById('fDriverName').value=d.driver_name||'';
  document.getElementById('fAge').value=d.age??'';
  document.getElementById('fNationality').value=d.nationality||'';
  document.getElementById('fCurrentSeries').value=d.current_series||'';
  document.getElementById('fSeason').value=d.season||'';
  document.getElementById('fProgrammeLevel').value=d.programme_level||'scouting';
  document.getElementById('fStatus').value=d.status||'active';
  document.getElementById('fCoachName').value=d.coach_name||'';
  document.getElementById('fBudgetSupport').value=d.budget_support??'';
  document.getElementById('fNextMilestone').value=d.next_milestone||'';
  document.getElementById('fResultsSummary').value=d.results_summary||'';
  document.getElementById('fDevelopmentAreas').value=d.development_areas||'';
  document.getElementById('fNotes').value=d.notes||'';
  document.getElementById('modalTitle').textContent='Edit Driver';
  document.getElementById('btnDel').classList.remove('d-none');
  modal.show();
}

async function save(){
  const id=document.getElementById('fId').value;
  const body={
    driver_name:document.getElementById('fDriverName').value.trim(),
    age:document.getElementById('fAge').value||null,
    nationality:document.getElementById('fNationality').value.trim(),
    current_series:document.getElementById('fCurrentSeries').value.trim(),
    season:document.getElementById('fSeason').value.trim(),
    programme_level:document.getElementById('fProgrammeLevel').value,
    status:document.getElementById('fStatus').value,
    coach_name:document.getElementById('fCoachName').value.trim(),
    budget_support:document.getElementById('fBudgetSupport').value||null,
    next_milestone:document.getElementById('fNextMilestone').value.trim(),
    results_summary:document.getElementById('fResultsSummary').value.trim(),
    development_areas:document.getElementById('fDevelopmentAreas').value.trim(),
    notes:document.getElementById('fNotes').value.trim()
  };
  if(!body.driver_name||!body.season){alert('Driver Name and Season are required');return;}
  const r=await fetch(id?`${API}/${id}`:API,{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){alert('Save failed');return;}
  modal.hide();load();
}

async function del(){
  const id=document.getElementById('fId').value;if(!id)return;
  if(!confirm('Remove this driver from the programme?'))return;
  const r=await fetch(`${API}/${id}`,{method:'DELETE'});
  if(!r.ok){alert('Delete failed');return;}
  modal.hide();load();
}

document.getElementById('btnAdd').addEventListener('click',openNew);
document.getElementById('btnSave').addEventListener('click',save);
document.getElementById('btnDel').addEventListener('click',del);
load();
</script>
</body>
</html>
