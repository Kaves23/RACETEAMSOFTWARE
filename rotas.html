<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Rotas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" />
  <style>
    body{background:linear-gradient(135deg,#f5f7fa 0%,#e8ecf1 100%);}
    .ev-stats-bar{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
    .ev-stat-card{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;padding:10px 16px;box-shadow:0 2px 4px rgba(0,0,0,.06);min-width:100px;}
    .ev-stat-label{font-size:.7rem;color:#6c757d;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
    .ev-stat-value{font-size:1.5rem;font-weight:700;color:#1a1d24;line-height:1.2;}
    #rotShell.mlo-shell{background:transparent;border:none;gap:10px;}
    #rotShell .mlo-pane-left,#rotShell .mlo-pane-mid,#rotShell .mlo-pane-right{background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.06);}
    #rotShell .mlo-pane-header{background:#f8f9fa;border-bottom:1px solid rgba(0,0,0,.1);}
    #rotShell .mlo-title{color:#1a1d24!important;} #rotShell .mlo-section-label{color:#6c757d!important;opacity:1!important;}
    #rotShell .mlo-resizer{background:transparent;} #rotShell .mlo-resizer:hover{background:rgba(166,77,255,.3);}
    .rot-table{width:100%;font-size:.82rem;border-collapse:separate;border-spacing:0;}
    .rot-table thead{position:sticky;top:0;background:#f8f9fa;z-index:5;}
    .rot-table th{padding:8px 10px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:#6c757d;border-bottom:2px solid #dee2e6;}
    .rot-table td{padding:6px 10px;border-bottom:1px solid rgba(0,0,0,.05);vertical-align:middle;color:#1a1d24;}
    .rot-table tbody tr{cursor:pointer;transition:background .1s;}
    .rot-table tbody tr:hover{background:#f8f9fa;}
    .rot-table tbody tr.selected{background:rgba(166,77,255,.08)!important;outline:2px solid #a64dff;outline-offset:-2px;}
    #rotShell .form-label{color:#495057!important;font-size:.78rem;font-weight:600;margin-bottom:2px;}
    #rotShell .form-control,#rotShell .form-select{background:#fff!important;color:#1a1d24!important;border-color:#dee2e6!important;font-size:.82rem;}
    #rotShell .mlo-pane-left .pastel-tree li{height:28px!important;display:flex!important;align-items:center!important;font-size:.83rem!important;font-weight:500!important;padding-left:10px!important;margin-bottom:2px!important;border-radius:5px!important;border:1px solid rgba(0,0,0,.08)!important;color:#1a1d24!important;cursor:pointer!important;}
    #rotShell .mlo-pane-left .pastel-tree li.active{background:rgba(166,77,255,.1)!important;border-color:rgba(166,77,255,.35)!important;color:#7c3aed!important;font-weight:700!important;}
  </style>
</head>
<body class="light-mode">
  <div id="rtsTopNav"></div>
  <div class="rts-version-badge">v1</div>
  <div class="rts-main container-fluid">
    <div class="pt-3 pb-2 mb-3 border-bottom d-flex justify-content-between align-items-end">
      <div>
        <h1 class="h4 mb-1">Rotas</h1>
        <div class="text-secondary" style="font-size:.85rem;">Event attendance rotas, travel duty lists, and schedule assignments.</div>
      </div>
      <button class="btn btn-sm btn-primary" id="btnAddRot">+ New Rota</button>
    </div>
    <div class="ev-stats-bar">
      <div class="ev-stat-card"><div class="ev-stat-label">Total Rotas</div><div class="ev-stat-value" id="statRotTotal">0</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Active</div><div class="ev-stat-value" id="statRotActive">0</div></div>
      <div class="ev-stat-card"><div class="ev-stat-label">Draft</div><div class="ev-stat-value" id="statRotDraft">0</div></div>
    </div>
    <div class="mlo-shell" id="rotShell">
      <section class="mlo-pane mlo-pane-left">
        <div class="mlo-pane-header"><div class="mlo-title">Filter</div></div>
        <div class="mlo-pane-content">
          <div class="mlo-section-label">Status</div>
          <ul class="mlo-tree pastel-tree" id="rotStatusFilter">
            <li class="active" data-filter="all">All</li>
            <li data-filter="draft">Draft</li>
            <li data-filter="published">Published</li>
            <li data-filter="active">Active</li>
            <li data-filter="archived">Archived</li>
          </ul>
        </div>
      </section>
      <div class="mlo-resizer"></div>
      <section class="mlo-pane mlo-pane-mid">
        <div class="mlo-pane-header">
          <div class="d-flex justify-content-between align-items-center">
            <div class="mlo-title">Rotas</div>
            <span class="badge text-bg-secondary" id="rotCountBadge">0</span>
          </div>
          <input class="form-control form-control-sm mt-2" type="search" id="rotSearch" placeholder="Search rota or event…" />
        </div>
        <div class="mlo-pane-content p-0">
          <table class="rot-table">
            <thead><tr><th>Rota Name</th><th>Event</th><th>Start Date</th><th>End Date</th><th>Staff Count</th><th>Status</th></tr></thead>
            <tbody id="rotTableBody"><tr><td colspan="6" class="text-center text-secondary py-4">No rotas found.</td></tr></tbody>
          </table>
        </div>
      </section>
      <div class="mlo-resizer"></div>
      <section class="mlo-pane mlo-pane-right">
        <div class="mlo-pane-header"><div class="mlo-title" id="rotDetailTitle">Rota Detail</div></div>
        <div class="mlo-pane-content">
          <div class="text-center text-secondary py-5" id="rotDetailEmpty"><div style="font-size:2rem;">📅</div><div class="mt-2">Select a rota</div></div>
          <form id="rotForm" style="display:none;">
            <div class="mb-2"><label class="form-label">Rota Name *</label><input class="form-control" id="rotFName" /></div>
            <div class="mb-2"><label class="form-label">Event</label><input class="form-control" id="rotFEvent" /></div>
            <div class="row g-2 mb-2">
              <div class="col"><label class="form-label">Start Date</label><input class="form-control" id="rotFStart" type="date" /></div>
              <div class="col"><label class="form-label">End Date</label><input class="form-control" id="rotFEnd" type="date" /></div>
            </div>
            <div class="row g-2 mb-2">
              <div class="col"><label class="form-label">Status</label>
                <select class="form-select" id="rotFStatus"><option value="draft">Draft</option><option value="published">Published</option><option value="active">Active</option><option value="archived">Archived</option></select></div>
              <div class="col"><label class="form-label">Created By</label><input class="form-control" id="rotFCreatedBy" /></div>
            </div>
            <div class="mb-2"><label class="form-label">Staff Assignments</label><textarea class="form-control" id="rotFStaff" rows="6" placeholder="Name – Role / Days / Travel&#10;e.g. John Smith – Chief Mech / Thu–Sun / Fly"></textarea></div>
            <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control" id="rotFNotes" rows="2"></textarea></div>
            <div class="d-flex gap-2">
              <button type="button" class="btn btn-primary btn-sm" id="rotBtnSave">Save</button>
              <button type="button" class="btn btn-outline-danger btn-sm" id="rotBtnDelete" style="display:none;">Delete</button>
              <button type="button" class="btn btn-outline-secondary btn-sm" id="rotBtnCancel">Cancel</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="core.js"></script><script src="topnav.js"></script>
  <script>
    let allRot=[],selectedId=null,filterStatus='all';
    function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
    async function load(){try{const r=await fetch('/api/rotas');if(r.ok)allRot=await r.json();}catch(_){allRot=[];}renderList();}
    function renderList(){
      const q=document.getElementById('rotSearch').value.trim().toLowerCase();
      const rows=allRot.filter(e=>{const ms=filterStatus==='all'||e.status===filterStatus;const mq=!q||(e.rota_name||'').toLowerCase().includes(q)||(e.event||'').toLowerCase().includes(q);return ms&&mq;});
      document.getElementById('rotCountBadge').textContent=rows.length;
      document.getElementById('statRotTotal').textContent=allRot.length;
      document.getElementById('statRotActive').textContent=allRot.filter(e=>e.status==='active'||e.status==='published').length;
      document.getElementById('statRotDraft').textContent=allRot.filter(e=>e.status==='draft').length;
      const tb=document.getElementById('rotTableBody');
      if(!rows.length){tb.innerHTML='<tr><td colspan="6" class="text-center text-secondary py-4">No rotas match.</td></tr>';return;}
      tb.innerHTML=rows.map(e=>`<tr data-id="${e.id}" class="${e.id==selectedId?'selected':''}">
        <td><strong>${esc(e.rota_name||'—')}</strong></td><td>${esc(e.event||'—')}</td>
        <td>${e.start_date||'—'}</td><td>${e.end_date||'—'}</td>
        <td>${e.staff_count||0}</td>
        <td><span class="badge text-bg-${e.status==='active'?'success':e.status==='published'?'primary':e.status==='archived'?'secondary':'warning'}">${esc(e.status||'—')}</span></td></tr>`).join('');
      tb.querySelectorAll('tr').forEach(r=>r.addEventListener('click',()=>selectRot(r.dataset.id)));
    }
    function selectRot(id){selectedId=id;const e=allRot.find(x=>x.id==id);if(!e)return;
      document.getElementById('rotDetailEmpty').style.display='none';document.getElementById('rotForm').style.display='';
      document.getElementById('rotDetailTitle').textContent=e.rota_name||'Rota';
      document.getElementById('rotFName').value=e.rota_name||'';document.getElementById('rotFEvent').value=e.event||'';
      document.getElementById('rotFStart').value=e.start_date||'';document.getElementById('rotFEnd').value=e.end_date||'';
      document.getElementById('rotFStatus').value=e.status||'draft';document.getElementById('rotFCreatedBy').value=e.created_by||'';
      document.getElementById('rotFStaff').value=e.staff_assignments||'';document.getElementById('rotFNotes').value=e.notes||'';
      document.getElementById('rotBtnDelete').style.display='';renderList();}
    document.getElementById('btnAddRot').addEventListener('click',()=>{selectedId=null;document.getElementById('rotDetailEmpty').style.display='none';document.getElementById('rotForm').style.display='';document.getElementById('rotDetailTitle').textContent='New Rota';document.getElementById('rotForm').reset();document.getElementById('rotBtnDelete').style.display='none';});
    document.getElementById('rotBtnSave').addEventListener('click',async()=>{
      const sa=document.getElementById('rotFStaff').value.trim();
      const body={rota_name:document.getElementById('rotFName').value.trim(),event:document.getElementById('rotFEvent').value.trim(),start_date:document.getElementById('rotFStart').value||null,end_date:document.getElementById('rotFEnd').value||null,status:document.getElementById('rotFStatus').value,created_by:document.getElementById('rotFCreatedBy').value.trim(),staff_assignments:sa,staff_count:sa.split('\n').filter(x=>x.trim()).length,notes:document.getElementById('rotFNotes').value.trim()};
      if(!body.rota_name){alert('Rota name is required.');return;}
      try{const url=selectedId?`/api/rotas/${selectedId}`:'/api/rotas';const r=await fetch(url,{method:selectedId?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());await load();}catch(e){alert('Save failed: '+e.message);}});
    document.getElementById('rotBtnDelete').addEventListener('click',async()=>{if(!selectedId||!confirm('Delete this rota?'))return;try{await fetch(`/api/rotas/${selectedId}`,{method:'DELETE'});selectedId=null;document.getElementById('rotDetailEmpty').style.display='';document.getElementById('rotForm').style.display='none';await load();}catch(e){alert('Delete failed: '+e.message);}});
    document.getElementById('rotBtnCancel').addEventListener('click',()=>{document.getElementById('rotForm').style.display='none';document.getElementById('rotDetailEmpty').style.display='';});
    document.getElementById('rotSearch').addEventListener('input',renderList);
    document.querySelectorAll('#rotStatusFilter li').forEach(li=>li.addEventListener('click',()=>{document.querySelectorAll('#rotStatusFilter li').forEach(x=>x.classList.remove('active'));li.classList.add('active');filterStatus=li.dataset.filter;renderList();}));
    load();
  </script>
</body>
</html>
