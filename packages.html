<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Team OS – Driver Packages</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="style.css?v=20260525" rel="stylesheet" />
  <style>
    .pkg-shell { display:flex; gap:12px; }
    .pkg-left { width:280px; min-width:240px; }
    .pkg-right { flex:1; }
    .pkg-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:12px; }
    .pkg-card { background:#0f1115; color:#e0e3e6; border:1px solid rgba(255,255,255,0.12); border-radius:10px; padding:12px; cursor:pointer; }
    .pkg-card.small { min-height:110px; display:flex; flex-direction:column; align-items:flex-start; justify-content:space-between; }
    .pkg-state { font-weight:700; }
    .pkg-included { background:#0a1f12; border-color:#0ea75a; }
    .pkg-included .pkg-state { color:#22c55e; }
    .pkg-included .pkg-name { color:#cdebd8; }
    .pkg-invoice { background:#1f0a0a; border-color:#c73a3a; }
    .pkg-invoice .pkg-state { color:#ef4444; }
    .pkg-invoice .pkg-name { color:#f2c3c3; }
  </style>
</head>
<body>
  <div id="rtsTopNav"></div>
  <div class="rts-main container-fluid">
    <h1 class="my-3">Driver Packages</h1>

    <div class="pkg-shell">
      <!-- LEFT: Drivers -->
      <section class="pkg-left" aria-label="Drivers">
        <div class="card" style="background:#0f1115; color:#e0e3e6; border:1px solid rgba(255,255,255,0.12);">
          <div class="card-header d-flex justify-content-between align-items-center" style="border-bottom:1px solid rgba(255,255,255,0.1);">
            <div>Drivers</div>
            <span id="pkgDriverCount" class="badge text-bg-secondary">0</span>
          </div>
          <div class="card-body">
            <input id="pkgDriverSearch" class="form-control form-control-sm mb-2" type="search" placeholder="Search drivers…" />
            <ul id="pkgDriverList" class="list-group list-group-flush"></ul>
          </div>
        </div>
      </section>

      <!-- RIGHT: Package grid -->
      <section class="pkg-right" aria-label="Package Options">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <div class="h5 mb-0" id="pkgDriverTitle">Select a driver</div>
          <div class="text-secondary" id="pkgSummary" style="font-size:0.9rem;"></div>
        </div>
        <div class="pkg-grid" id="pkgGrid"></div>
        <div class="mt-3 text-secondary" style="font-size:0.9rem;">
          Click a square to toggle between <span style="color:#22c55e; font-weight:600;">INCLUDED</span> and <span style="color:#ef4444; font-weight:600;">INVOICE</span>.
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="config.js"></script>
  <script src="core.js"></script>
  <script src="topnav.js?v=20260520"></script>
  <script>
  (async function(){
    RTS.setActiveNav();

    const LS = 'rts.driver.packages.v1';
    const money = (n) => RTS.moneyZAR(n);
    const pkgOptions = [
      { key:'tyres', name:'Tyres' },
      { key:'fuel', name:'Fuel' },
      { key:'entry', name:'Race Entry' },
      { key:'transport', name:'Transport' },
      { key:'setup', name:'Setup' },
      { key:'coaching', name:'Coaching' },
      { key:'spares', name:'Spares' },
      { key:'damage', name:'Damage Cover' },
      { key:'telemetry', name:'Telemetry' },
      { key:'seatfit', name:'Seat Fitting' },
      { key:'pitcrew', name:'Pit Crew' },
      { key:'lodging', name:'Accommodation' }
    ];

    const el = {
      list: document.getElementById('pkgDriverList'),
      count: document.getElementById('pkgDriverCount'),
      search: document.getElementById('pkgDriverSearch'),
      grid: document.getElementById('pkgGrid'),
      title: document.getElementById('pkgDriverTitle'),
      summary: document.getElementById('pkgSummary')
    };

    function getDrivers(){
      const s = RTS.getSettings();
      const arr = Array.isArray(s.drivers) ? s.drivers : [];
      return arr.filter(d => d && d.active !== false);
    }

    // ── API-backed package store ───────────────────────────────────────────
    // Shape: store[driverId][packageKey] = { mode, unit_price, qty }
    let store = {};

    async function loadStore(){
      try {
        const rows = await RTS_API.request('/driver-packages');
        const map = {};
        (rows || []).forEach(r => {
          map[r.driver_id] = map[r.driver_id] || {};
          map[r.driver_id][r.package_key] = {
            mode: r.mode || 'invoice',
            unit_price: Number(r.unit_price) || 0,
            qty: Number(r.qty) || 1
          };
        });
        store = map;
        // One-time import of any legacy localStorage state
        await maybeImportLegacy();
      } catch (e) {
        console.error('Failed to load driver packages from API', e);
        if (window.RTS && RTS.showToast) RTS.showToast('Could not load packages from server', 'error');
      }
    }

    async function maybeImportLegacy(){
      try {
        if (localStorage.getItem('rts.driver.packages.migrated')) return;
        const legacy = RTS.safeLoadJSON(LS, null);
        if (legacy && typeof legacy === 'object' && Object.keys(store).length === 0) {
          const puts = [];
          Object.keys(legacy).forEach(driverId => {
            const pkg = legacy[driverId] || {};
            Object.keys(pkg).forEach(key => {
              const mode = pkg[key] === 'included' ? 'included' : 'invoice';
              const opt = pkgOptions.find(o => o.key === key);
              puts.push(savePackage(driverId, key, opt ? opt.name : key, mode, 0));
            });
          });
          await Promise.all(puts);
        }
        localStorage.setItem('rts.driver.packages.migrated', '1');
      } catch (e) { console.error('Legacy package import failed', e); }
    }

    async function savePackage(driverId, key, name, mode, unitPrice){
      store[driverId] = store[driverId] || {};
      const cur = store[driverId][key] || { mode:'invoice', unit_price:0, qty:1 };
      const next = {
        mode: mode != null ? mode : cur.mode,
        unit_price: unitPrice != null ? unitPrice : cur.unit_price,
        qty: cur.qty || 1
      };
      store[driverId][key] = next;
      try {
        await RTS_API.request('/driver-packages', {
          method: 'PUT',
          body: JSON.stringify({
            driver_id: driverId, package_key: key, package_name: name,
            mode: next.mode, unit_price: next.unit_price, qty: next.qty
          })
        });
      } catch (e) {
        console.error('Failed to save package', e);
        if (window.RTS && RTS.showToast) RTS.showToast('Save failed — change not stored', 'error');
      }
    }

    let selectedId = null;
    let drivers = getDrivers();

    function renderDrivers(){
      const q = (el.search.value||'').toLowerCase();
      const list = drivers.filter(d => `${d.name||''} ${d.raceNumber||''}`.toLowerCase().includes(q));
      el.count.textContent = String(list.length);
      el.list.innerHTML = '';
      list.forEach(d => {
        const li = document.createElement('li');
        li.className = 'list-group-item list-group-item-action';
        li.style.background = '#11141a'; li.style.color = '#e0e3e6';
        li.textContent = `${d.raceNumber ? '#' + d.raceNumber + ' ' : ''}${d.name || 'Driver'}`;
        li.onclick = ()=>{ selectedId = d.id; renderGrid(); };
        el.list.appendChild(li);
      });
    }

    function renderGrid(){
      if (!selectedId){ el.title.textContent = 'Select a driver'; el.grid.innerHTML = ''; el.summary.textContent=''; return; }
      const driver = drivers.find(d => d.id === selectedId);
      el.title.textContent = driver ? `${driver.name || 'Driver'} ${driver.raceNumber ? '(' + driver.raceNumber + ')' : ''}` : 'Driver';
      const pkg = store[selectedId] || {};
      let inc = 0, inv = 0, invTotal = 0;
      el.grid.innerHTML = '';
      pkgOptions.forEach(opt => {
        const rec   = pkg[opt.key] || { mode:'invoice', unit_price:0, qty:1 };
        const state = (rec.mode === 'included') ? 'included' : 'invoice';
        const price = Number(rec.unit_price) || 0;
        if (state==='included') inc++; else { inv++; invTotal += price; }
        const card = document.createElement('div');
        card.className = 'pkg-card small ' + (state==='included' ? 'pkg-included' : 'pkg-invoice');
        card.innerHTML = `
          <div class="pkg-name">${opt.name}</div>
          <div class="d-flex align-items-center gap-1 w-100 mt-1" data-noflip>
            <span style="font-size:0.8rem;opacity:0.8;">R</span>
            <input type="number" min="0" step="0.01" value="${price}" class="form-control form-control-sm pkg-price"
                   style="background:#0a0c10;color:#e0e3e6;border:1px solid rgba(255,255,255,0.15);font-size:0.8rem;padding:2px 6px;" />
          </div>
          <div class="pkg-state mt-1">${state==='included'?'INCLUDED':'INVOICE'}</div>`;
        // Toggle mode when clicking the card (but not the price input)
        card.onclick = (e)=>{
          if (e.target.closest('[data-noflip]')) return;
          savePackage(selectedId, opt.key, opt.name, state==='included' ? 'invoice' : 'included', null).then(renderGrid);
        };
        const priceInput = card.querySelector('.pkg-price');
        priceInput.addEventListener('click', e => e.stopPropagation());
        priceInput.addEventListener('change', () => {
          savePackage(selectedId, opt.key, opt.name, null, parseFloat(priceInput.value)||0).then(renderGrid);
        });
        el.grid.appendChild(card);
      });
      el.summary.textContent = `${inc} INCLUDED • ${inv} INVOICE • Invoice total: ${money(invTotal)}`;
    }

    el.search.addEventListener('input', renderDrivers);

    await loadStore();
    renderDrivers();
    renderGrid();
  })();
  </script>
</body>
</html>
