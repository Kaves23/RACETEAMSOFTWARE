<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Notes - Race Team OS Mobile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      -webkit-tap-highlight-color: rgba(0,0,0,0);
      box-sizing: border-box;
    }
    
    :root {
      --primary-color: #7bd7ff;
      --bg-dark: #0f1115;
      --bg-card: #16191f;
      --text-primary: #e0e3e6;
      --text-secondary: #a0a3a8;
      --border-color: rgba(255,255,255,0.1);
      --safe-area-top: env(safe-area-inset-top);
      --safe-area-bottom: env(safe-area-inset-bottom);
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      overflow-x: hidden;
      height: 100vh;
      height: 100dvh;
      position: fixed;
      width: 100%;
    }
    
    /* Header */
    .mobile-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: calc(60px + var(--safe-area-top));
      padding-top: var(--safe-area-top);
      background: var(--bg-card);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-left: 16px;
      padding-right: 16px;
      z-index: 1000;
    }
    
    .mobile-header h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--primary-color);
    }
    
    .header-btn {
      background: none;
      border: none;
      color: var(--primary-color);
      font-size: 1.5rem;
      padding: 8px;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    /* Main content area */
    .mobile-content {
      position: fixed;
      top: calc(60px + var(--safe-area-top));
      bottom: calc(70px + var(--safe-area-bottom));
      left: 0;
      right: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Bottom navigation */
    .mobile-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: calc(70px + var(--safe-area-bottom));
      padding-bottom: var(--safe-area-bottom);
      background: var(--bg-card);
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 1000;
    }
    
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
      border: none;
      background: none;
      color: var(--text-secondary);
      cursor: pointer;
      min-height: 60px;
      transition: all 0.2s;
    }
    
    .nav-btn.active {
      color: var(--primary-color);
    }
    
    .nav-btn .icon {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }
    
    .nav-btn .label {
      font-size: 0.7rem;
      font-weight: 500;
    }
    
    /* Views */
    .view {
      display: none;
      padding: 16px;
      padding-bottom: 80px;
    }
    
    .view.active {
      display: block;
    }
    
    /* Note card */
    .note-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 70px;
    }
    
    .note-card:active {
      transform: scale(0.98);
      background: rgba(123, 215, 255, 0.05);
    }
    
    .note-card-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 6px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .note-card-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    
    .note-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      background: rgba(123, 215, 255, 0.15);
      color: var(--primary-color);
    }
    
    /* Tag filter chips */
    .tag-filters {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding-bottom: 12px;
      margin-bottom: 16px;
      -webkit-overflow-scrolling: touch;
    }
    
    .tag-filters::-webkit-scrollbar {
      display: none;
    }
    
    .tag-filter {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }
    
    .tag-filter.active {
      background: var(--primary-color);
      color: var(--bg-dark);
      border-color: var(--primary-color);
    }
    
    /* Note viewer */
    .note-viewer {
      background: var(--bg-card);
      border-radius: 12px;
      padding: 20px;
      line-height: 1.7;
    }
    
    .note-viewer h1 {
      color: var(--primary-color);
      font-size: 1.8rem;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid var(--border-color);
    }
    
    .note-viewer h1:first-child {
      margin-top: 0;
    }
    
    .note-viewer h2 {
      color: var(--primary-color);
      font-size: 1.4rem;
      margin-top: 1.25rem;
      margin-bottom: 0.75rem;
    }
    
    .note-viewer h3 {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }
    
    .note-viewer p {
      margin-bottom: 1rem;
    }
    
    .note-viewer code {
      background: var(--bg-dark);
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: var(--primary-color);
      font-size: 0.9em;
    }
    
    .note-viewer pre {
      background: var(--bg-dark);
      padding: 16px;
      border-radius: 8px;
      overflow-x: auto;
      border: 1px solid var(--border-color);
      margin: 16px 0;
    }
    
    .note-viewer pre code {
      background: none;
      padding: 0;
      color: var(--text-primary);
    }
    
    .note-viewer ul, .note-viewer ol {
      margin-bottom: 1rem;
      padding-left: 1.5rem;
    }
    
    .note-viewer li {
      margin-bottom: 0.5rem;
    }
    
    .note-viewer a {
      color: var(--primary-color);
      text-decoration: none;
    }
    
    .note-viewer a:active {
      opacity: 0.7;
    }
    
    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }
    
    .empty-state .icon {
      font-size: 4rem;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state h2 {
      font-size: 1.3rem;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    
    .empty-state p {
      font-size: 0.95rem;
      margin-bottom: 24px;
    }
    
    /* File upload button */
    .upload-btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--primary-color);
      color: var(--bg-dark);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    
    .upload-btn:active {
      opacity: 0.8;
    }
    
    input[type="file"] {
      display: none;
    }
    
    /* Badge */
    .badge {
      background: var(--primary-color);
      color: var(--bg-dark);
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-left: 8px;
    }
    
    /* Action buttons */
    .action-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    
    .btn-action {
      flex: 1;
      padding: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
    
    .btn-action:active {
      background: rgba(123, 215, 255, 0.1);
    }
    
    .btn-danger {
      background: rgba(220, 53, 69, 0.15);
      border-color: rgba(220, 53, 69, 0.3);
      color: #ff6b6b;
    }
    
    /* Search box */
    .search-box {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-dark);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 1rem;
      margin-bottom: 16px;
      min-height: 44px;
    }
    
    .search-box::placeholder {
      color: var(--text-secondary);
    }
    
    /* Viewer header */
    .viewer-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .back-btn {
      background: none;
      border: none;
      color: var(--primary-color);
      font-size: 1.8rem;
      padding: 0;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .viewer-title {
      flex: 1;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="mobile-header">
    <h1>📝 Notes</h1>
    <button class="header-btn" id="btnMenu" onclick="showUploadOptions()">⚙️</button>
  </div>

  <!-- Main content -->
  <div class="mobile-content">
    <!-- Library View -->
    <div class="view active" id="viewLibrary">
      <div class="action-bar">
        <label for="fileInput" class="upload-btn" style="flex: 1;">
          📤 Upload .md File
        </label>
        <input type="file" id="fileInput" accept=".md,.markdown,.txt" multiple>
        <button class="btn-action btn-danger" onclick="clearAllNotes()" style="flex: 0.5;">🗑️</button>
      </div>

      <input type="text" class="search-box" placeholder="🔍 Search notes..." id="searchInput" oninput="filterNotes()">

      <div class="tag-filters" id="tagFilters">
        <!-- Tag filters populated here -->
      </div>

      <div id="notesList">
        <!-- Notes list populated here -->
      </div>
    </div>

    <!-- Note Viewer -->
    <div class="view" id="viewNote">
      <div class="viewer-header">
        <button class="back-btn" onclick="showLibrary()">←</button>
        <div class="viewer-title" id="viewerTitle">Note</div>
      </div>
      <div class="note-viewer" id="noteContent">
        <!-- Note content populated here -->
      </div>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="mobile-nav">
    <button class="nav-btn active" onclick="showLibrary()">
      <div class="icon">📚</div>
      <div class="label">Library</div>
    </button>
    <button class="nav-btn" onclick="showCurrentNote()">
      <div class="icon">📄</div>
      <div class="label">Note</div>
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Storage key (shared with desktop version)
    const STORAGE_KEY = 'raceTeamNotes';
    let currentNoteIndex = -1;
    let activeTagFilter = 'all';
    let searchQuery = '';

    // Initialize marked
    if (typeof marked !== 'undefined') {
      marked.setOptions({
        breaks: true,
        gfm: true,
        headerIds: true,
        mangle: false
      });
    }

    // Storage functions
    function loadNotes() {
      const stored = localStorage.getItem(STORAGE_KEY);
      return stored ? JSON.parse(stored) : [];
    }

    function saveNotes(notes) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    }

    // Get all unique tags
    function getAllTags() {
      const notes = loadNotes();
      const tagSet = new Set();
      notes.forEach(note => {
        if (note.tags && Array.isArray(note.tags)) {
          note.tags.forEach(tag => tagSet.add(tag));
        }
      });
      return Array.from(tagSet).sort();
    }

    // Display tag filters
    function displayTagFilters() {
      const tags = getAllTags();
      const container = document.getElementById('tagFilters');
      
      let html = '<div class="tag-filter' + (activeTagFilter === 'all' ? ' active' : '') + '" onclick="filterByTag(\'all\')">All Notes</div>';
      
      tags.forEach(tag => {
        html += '<div class="tag-filter' + (activeTagFilter === tag ? ' active' : '') + '" onclick="filterByTag(\'' + tag + '\')">' + tag + '</div>';
      });
      
      container.innerHTML = html;
    }

    // Filter by tag
    function filterByTag(tag) {
      activeTagFilter = tag;
      displayTagFilters();
      displayNotesList();
    }

    // Filter notes by search
    function filterNotes() {
      searchQuery = document.getElementById('searchInput').value.toLowerCase();
      displayNotesList();
    }

    // Display notes list
    function displayNotesList() {
      const notes = loadNotes();
      const notesList = document.getElementById('notesList');
      
      // Apply filters
      let filteredNotes = notes;
      
      // Tag filter
      if (activeTagFilter !== 'all') {
        filteredNotes = filteredNotes.filter(note => 
          note.tags && note.tags.includes(activeTagFilter)
        );
      }
      
      // Search filter
      if (searchQuery) {
        filteredNotes = filteredNotes.filter(note => 
          note.name.toLowerCase().includes(searchQuery) ||
          (note.content && note.content.toLowerCase().includes(searchQuery))
        );
      }
      
      // Display
      if (filteredNotes.length === 0) {
        notesList.innerHTML = `
          <div class="empty-state">
            <div class="icon">📭</div>
            <h2>No Notes Found</h2>
            <p>${searchQuery ? 'Try a different search term' : 'Upload a .md file to get started'}</p>
          </div>
        `;
        return;
      }
      
      notesList.innerHTML = filteredNotes.map((note, idx) => {
        const originalIndex = notes.indexOf(note);
        const date = new Date(note.timestamp);
        const size = (note.content.length / 1024).toFixed(1);
        const tags = note.tags && note.tags.length > 0 
          ? '<div class="note-tags">' + note.tags.map(t => '<span class="tag">' + t + '</span>').join('') + '</div>'
          : '';
        
        return `
          <div class="note-card" onclick="openNote(${originalIndex})">
            <div class="note-card-name">
              📄 ${note.name}
            </div>
            <div class="note-card-meta">
              ${date.toLocaleDateString()} · ${size} KB
            </div>
            ${tags}
          </div>
        `;
      }).join('');
    }

    // Open a note
    function openNote(index) {
      const notes = loadNotes();
      if (index < 0 || index >= notes.length) return;
      
      currentNoteIndex = index;
      const note = notes[index];
      
      document.getElementById('viewerTitle').textContent = note.name;
      
      // Parse markdown
      if (typeof marked !== 'undefined') {
        document.getElementById('noteContent').innerHTML = marked.parse(note.content);
      } else {
        document.getElementById('noteContent').innerHTML = '<pre>' + note.content + '</pre>';
      }
      
      // Switch view
      showView('viewNote');
      updateNav(1);
    }

    // File upload handler
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const files = e.target.files;
      if (!files.length) return;
      
      const notes = loadNotes();
      let filesProcessed = 0;
      
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        
        reader.onload = function(event) {
          const content = event.target.result;
          
          notes.push({
            name: file.name,
            content: content,
            timestamp: new Date().toISOString(),
            tags: []
          });
          
          filesProcessed++;
          
          if (filesProcessed === files.length) {
            saveNotes(notes);
            displayNotesList();
            displayTagFilters();
            
            // Show first uploaded note
            openNote(notes.length - filesProcessed);
          }
        };
        
        reader.readAsText(file);
      });
      
      e.target.value = '';
    });

    // Clear all notes
    function clearAllNotes() {
      if (confirm('Delete all notes? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEY);
        currentNoteIndex = -1;
        activeTagFilter = 'all';
        searchQuery = '';
        document.getElementById('searchInput').value = '';
        displayNotesList();
        displayTagFilters();
        showLibrary();
      }
    }

    // Show library view
    function showLibrary() {
      showView('viewLibrary');
      updateNav(0);
    }

    // Show current note
    function showCurrentNote() {
      if (currentNoteIndex >= 0) {
        showView('viewNote');
        updateNav(1);
      } else {
        alert('No note selected. Select a note from the library first.');
        showLibrary();
      }
    }

    // Show upload options
    function showUploadOptions() {
      document.getElementById('fileInput').click();
    }

    // View management
    function showView(viewId) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewId).classList.add('active');
    }

    // Update nav buttons
    function updateNav(activeIndex) {
      const navBtns = document.querySelectorAll('.nav-btn');
      navBtns.forEach((btn, idx) => {
        if (idx === activeIndex) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    // Load workspace markdowns
    async function loadWorkspaceMarkdown() {
      const markdownFiles = [
        'README.md',
        'DRIVER_PACKAGES_INVOICING.md',
        'DATABASE_SCHEMA_LOGISTICS.md',
        'FULL_SYSTEM_SCHEMA.md',
        'server/TELEMETRY_TSDB_README.md'
      ];
      
      for (const filename of markdownFiles) {
        try {
          const response = await fetch(filename);
          if (response.ok) {
            const content = await response.text();
            const notes = loadNotes();
            
            if (!notes.some(n => n.name === filename)) {
              notes.push({
                name: filename,
                content: content,
                timestamp: new Date().toISOString(),
                tags: ['workspace']
              });
              saveNotes(notes);
            }
          }
        } catch (e) {
          console.log(`Could not load ${filename}`);
        }
      }
      
      displayNotesList();
      displayTagFilters();
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
      displayNotesList();
      displayTagFilters();
      loadWorkspaceMarkdown();
    });

    // Prevent pull-to-refresh on mobile
    document.body.addEventListener('touchmove', function(e) {
      const scrollableElements = document.querySelectorAll('.mobile-content, .tag-filters');
      let isScrollable = false;
      
      scrollableElements.forEach(el => {
        if (el.contains(e.target)) {
          isScrollable = true;
        }
      });
      
      if (!isScrollable && e.cancelable) {
        e.preventDefault();
      }
    }, { passive: false });
  </script>
</body>
</html>
